services:
  # ──────────────────────────────────────────────────────────────────
  # INFRASTRUCTURE DATABASES
  # ──────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: etradie-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-etradie}
      POSTGRES_USER: ${POSTGRES_USER:-etradie}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - etradie-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-etradie} -d ${POSTGRES_DB:-etradie}"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  redis:
    image: redis:7-alpine
    container_name: etradie-redis
    restart: unless-stopped
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}
    command: >
      redis-server
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}
    ports:
      - "6379:6379"
    networks:
      - etradie-net
    healthcheck:
      test: ["CMD", "sh", "-c", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 128M

  chromadb:
    image: chromadb/chroma:latest
    container_name: etradie-chromadb
    restart: unless-stopped
    environment:
      - CHROMA_SERVER_AUTHN_PROVIDER=chromadb.auth.token_authn.TokenAuthenticationServerProvider
      - CHROMA_SERVER_AUTH_CREDENTIALS=${CHROMA_AUTH_TOKEN:-etradie_chroma_dev_token}
      - CHROMA_SERVER_AUTH_TOKEN_TRANSPORT_HEADER=Authorization
      - IS_PERSISTENT=TRUE
    ports:
      - "8002:8000"
    volumes:
      - chromadb_data:/chroma/chroma
    networks:
      - etradie-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/v2/heartbeat || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ──────────────────────────────────────────────────────────────────
  # MIGRATIONS
  # ──────────────────────────────────────────────────────────────────
  migrator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: etradie-migrator
    env_file: .env
    dns:
      - 8.8.8.8
      - 8.8.4.4
    dns_opt:
      - ndots:0
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - etradie-net
    # Runs alembic upgrade, then shuts itself down automatically
    command: ["alembic", "upgrade", "head"]

  # ──────────────────────────────────────────────────────────────────
  # PYTHON INTELLIGENCE ENGINE
  # ──────────────────────────────────────────────────────────────────
  engine:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: etradie-engine
    user: "1000:1000"
    restart: unless-stopped
    env_file: .env
    dns:
      - 8.8.8.8
      - 8.8.4.4
    dns_opt:
      - ndots:0
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/app/src
    volumes:
      - ./src:/app/src:ro
      - ./tests:/app/tests:ro
      - ./scripts:/app/scripts:ro
      - ./pyproject.toml:/app/pyproject.toml:ro
      - ./knowledge:/app/knowledge:ro
      - ./model_cache:/home/etradie/.cache
      - ./output:/output
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    networks:
      - etradie-net
    extra_hosts:
      - "host.docker.internal:${WSL_HOST_IP:-host-gateway}"
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    
  # ──────────────────────────────────────────────────────────────────
  # GO GATEWAY API
  # ──────────────────────────────────────────────────────────────────
  gateway:
    build:
      context: .
      dockerfile: src/gateway/Dockerfile
    container_name: etradie-gateway
    restart: unless-stopped
    env_file: .env
    dns:
      - 8.8.8.8
      - 8.8.4.4
    dns_opt:
      - ndots:0
    environment:
      - GATEWAY_ENGINE_HTTP_URL=http://engine:8000
      - GATEWAY_EXECUTION_ADDR=execution:50053
      - GATEWAY_MANAGEMENT_ADDR=management:50054
      - AUTH_DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
    ports:
      - "8080:8080"
      - "50052:50052"
    depends_on:
      engine:
        condition: service_healthy
    networks:
      - etradie-net
    deploy:
      resources:
        limits:
          memory: 256M

  # ──────────────────────────────────────────────────────────────────
  # GO STATELESS EXECUTION ENGINE
  # ──────────────────────────────────────────────────────────────────
  execution:
    build:
      context: .
      dockerfile: src/execution/Dockerfile
    container_name: etradie-execution
    restart: unless-stopped
    env_file: .env
    dns:
      - 8.8.8.8
      - 8.8.4.4
    dns_opt:
      - ndots:0
    environment:
      - EXECUTION_BROKER_BRIDGE_URL=http://engine:8000
      - EXECUTION_GATEWAY_ADDR=gateway:50052
    ports:
      - "50053:50053"
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      engine:
        condition: service_healthy
    networks:
      - etradie-net
    deploy:
      resources:
        limits:
          memory: 256M

  # ──────────────────────────────────────────────────────────────────
  # GO TRADE MANAGEMENT ENGINE (MODULE C)
  # ──────────────────────────────────────────────────────────────────
  management:
    build:
      context: .
      dockerfile: src/management/Dockerfile
    container_name: etradie-management
    restart: unless-stopped
    env_file: .env
    dns:
      - 8.8.8.8
      - 8.8.4.4
    dns_opt:
      - ndots:0
    environment:
      - MANAGEMENT_BROKER_BRIDGE_URL=http://engine:8000
    ports:
      - "50054:50054"
      - "8083:8083"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      engine:
        condition: service_healthy
    networks:
      - etradie-net
    deploy:
      resources:
        limits:
          memory: 256M

  # ──────────────────────────────────────────────────────────────────
  # OBSERVABILITY
  # ──────────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: etradie-prometheus
    restart: unless-stopped
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - etradie-net
    deploy:
      resources:
        limits:
          memory: 128M

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: etradie-jaeger
    restart: unless-stopped
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686" # Web UI
      - "4317:4317"   # OTLP gRPC payload ingest
    networks:
      - etradie-net
    deploy:
      resources:
        limits:
          memory: 256M

  grafana:
    image: grafana/grafana:10.4.0
    container_name: etradie-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD:?GF_ADMIN_PASSWORD must be set in .env}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
    depends_on:
      - prometheus
    networks:
      - etradie-net
    deploy:
      resources:
        limits:
          memory: 256M

  # ──────────────────────────────────────────────────────────────────
  # EDGE PROFILE (opt-in)
  # Activate with: docker compose --profile edge up
  # Adds envoy + edge-ingress in front of gateway so the full
  # Cloudflare → edge-ingress → envoy → gateway chain can be exercised
  # locally. Without --profile edge these services stay off and the
  # gateway is reachable directly on :8080 as before.
  # ──────────────────────────────────────────────────────────────────

  # ──────────────────────────────────────────────────────────────────
  # GEOIP INIT (edge profile only, run-once)
  # Populates the geoip-data named volume with GeoLite2-City.mmdb so
  # the read-only edge-ingress container can mmap it at the path the
  # Rust binary requires (/data/geoip/GeoLite2-City.mmdb).
  #
  # Mirrors the helm/edge-ingress init-container contract
  # (helm/edge-ingress/templates/configmap-geoip-init.yaml +
  # deployment.yaml initContainers[geoip-downloader]) so the local
  # stack reproduces the same wiring as staging / production.
  #
  # Runs once per `up` and exits 0; subsequent refreshes are handled
  # by the helm init-container in cluster, not by this local-only
  # service. GEOIPUPDATE_FREQUENCY=0 disables daemon mode.
  # ──────────────────────────────────────────────────────────────────
  edge-geoip-init:
    profiles: ["edge"]
    image: maxmindinc/geoipupdate:v6.0
    container_name: etradie-edge-geoip-init
    environment:
      - GEOIPUPDATE_ACCOUNT_ID=${MAXMIND_ACCOUNT_ID:?MAXMIND_ACCOUNT_ID must be set in .env to run the edge profile}
      - GEOIPUPDATE_LICENSE_KEY=${MAXMIND_LICENSE_KEY:?MAXMIND_LICENSE_KEY must be set in .env to run the edge profile}
      - GEOIPUPDATE_EDITION_IDS=GeoLite2-City
      - GEOIPUPDATE_FREQUENCY=0
    volumes:
      - geoip-data:/usr/share/GeoIP
    networks:
      - etradie-net
    restart: "no"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  envoy:
    profiles: ["edge"]
    # Use the same upstream image as the helm chart
    # (helm/envoy/values.yaml `image.repository`). The WASM filter is
    # mounted from the host build output, mirroring the cluster's
    # ConfigMap-mounted contract. Developers must build the WASM
    # before `make edge-up`:
    #   cd src/envoy && bash scripts/build-wasm.sh
    # CI does the same thing and injects bytes via
    # `helm --set-file wasm.base64=...` at promotion time.
    image: envoyproxy/envoy:v1.28.0
    container_name: etradie-envoy
    restart: unless-stopped
    environment:
      - ENVIRONMENT=local
      - LOG_LEVEL=debug
    volumes:
      - ./src/envoy/config/local/envoy-local.yaml:/etc/envoy/envoy.yaml:ro
      # WASM filter built by src/envoy/scripts/build-wasm.sh.
      # The path is required; ${VAR:?...} aborts compose-up with a
      # clear message when the .wasm is missing rather than letting
      # envoy boot into a missing-WASM crash loop.
      - ${EDGE_ENVOY_WASM_PATH:?EDGE_ENVOY_WASM_PATH must point at the built integration-filter.wasm; run "cd src/envoy && bash scripts/build-wasm.sh" first}:/etc/envoy/wasm/integration-filter.wasm:ro
    command:
      - "-c"
      - "/etc/envoy/envoy.yaml"
      - "--service-cluster"
      - "etradie-envoy"
      - "--service-node"
      - "etradie-envoy-local"
      - "--log-level"
      - "info"
    ports:
      - "18080:8080"  # HTTP listener (also receives from edge-ingress in-network)
      - "19901:9901"  # Admin / Prometheus
    depends_on:
      gateway:
        condition: service_started
    networks:
      - etradie-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9901/ready || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 15s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  edge-ingress:
    profiles: ["edge"]
    build:
      context: .
      dockerfile: deployments/edge-ingress/docker/Dockerfile.edge-ingress
      args:
        BUILD_DATE: ${BUILD_DATE:-2024-01-01T00:00:00Z}
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
    image: etradie/edge-ingress:local
    container_name: etradie-edge-ingress
    restart: unless-stopped
    environment:
      - CONFIG_PATH=/etc/edge-ingress/config/edge-ingress.yaml
      - RUST_LOG=info,edge_ingress=debug
      - RUST_BACKTRACE=1
    volumes:
      - ./deployments/edge-ingress/docker/config:/etc/edge-ingress/config:ro
      - ./deployments/edge-ingress/docker/certs:/etc/edge-ingress/certs:ro
      # Local Cloudflare AOP CA + dev client cert produced by
      # `make dev-certs`
      # (deployments/cloudflare/origin-pull/generate-dev-certs.sh).
      # The generator script is committed; the resulting PEMs are
      # gitignored. Mounted at the same in-pod path used in staging
      # and production so there is one TLS code path everywhere.
      - ./deployments/cloudflare/origin-pull:/etc/edge-ingress/cloudflare:ro
      # GeoLite2-City.mmdb populated by edge-geoip-init.
      # Mounted read-only because the edge-ingress container runs
      # with read_only=true and only mmap reads happen here at
      # runtime; refresh writes are owned by the geoip-init service.
      - geoip-data:/data/geoip:ro
    ports:
      - "8443:443"   # TLS listener (host-side: https://localhost:8443)
      - "19902:9902" # Metrics / health
    depends_on:
      envoy:
        condition: service_healthy
      edge-geoip-init:
        condition: service_completed_successfully
    networks:
      - etradie-net
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9902/healthz || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 15s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    # Bounded tmpfs. Matches helm/edge-ingress values.yaml
    # (volumes.tmp.sizeLimit) so OOM behaviour is identical across
    # local / staging / production. 256Mi is enough headroom for any
    # realistic POST body the Rust spooler writes here; the previous
    # unbounded `tmpfs: - /tmp` defaulted to 50% of host RAM, which
    # is both inconsistent with cluster posture and a denial-of-
    # service vector on a developer workstation.
    tmpfs:
      - /tmp:size=256m,mode=1777
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

volumes:
  postgres_data:
    driver: local
  prometheus_data:
    driver: local
  chromadb_data:
    driver: local
  grafana_data:
    driver: local
  # GeoLite2-City.mmdb populated by edge-geoip-init (edge profile).
  # Mounted read-only into edge-ingress at /data/geoip.
  geoip-data:
    driver: local

networks:
  etradie-net:
    driver: bridge
