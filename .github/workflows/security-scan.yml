name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements/security.txt
      - name: Bandit — static analysis
        run: bandit -r src/ -c pyproject.toml -f json -o bandit-report.json || true
      - name: Bandit — report
        run: bandit -r src/ -c pyproject.toml
      - name: pip-audit — dependency vulnerabilities
        # GHSA-rrmf-rvhw-rf47: torch 2.12.0 — no fix released yet
        # (latest on PyPI is 2.12.0). Remove this ignore once a
        # patched torch version is published.
        run: pip-audit -r requirements/base.txt --strict --ignore-vuln GHSA-rrmf-rvhw-rf47
      - name: Set up Go (for gosec)
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest
      - name: gosec — Go static analysis
        # Audit ref: SS-H1. Severity threshold medium so the build
        # fails on real issues but tolerates style warnings.
        run: gosec -fmt json -out gosec-report.json -severity medium ./src/gateway/... ./src/execution/... ./src/management/... ./src/billing/... ./src/auth/...
      - name: Upload gosec report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gosec-report
          path: gosec-report.json
          retention-days: 30
      - name: Upload security report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: bandit-report.json
          retention-days: 30

  go-vuln:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: govulncheck — Go dependency CVEs
        # Reports known vulnerabilities in go.mod/go.sum that are
        # reachable from the service entrypoints. Fails the build on
        # any finding.
        run: govulncheck ./src/gateway/... ./src/execution/... ./src/management/... ./src/billing/... ./src/auth/...

  rust-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: cargo audit — Rust dependency advisories
        # Scans src/edge-ingress/Cargo.lock against the RustSec
        # advisory database. Fails on any unpatched advisory.
        working-directory: src/edge-ingress
        run: cargo audit

  trivy-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy vulnerability scanner on Docker image
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,misconfig,secret
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          format: table

  dockerfile-digest-pin:
    name: Dockerfile base-image digest pin check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check every Dockerfile FROM is digest-pinned
        # WARN-ONLY until the base images are pinned. The base images
        # are not yet pinned to @sha256 digests; a hard failure here
        # would break CI before an operator has run
        # `make pin-image-digests` and committed the result.
        #
        # TO MAKE THIS A BLOCKING GATE once digests are committed:
        # replace the whole `run:` body below with the single line
        #     bash scripts/check-image-digests.sh
        # so a non-zero exit fails the job.
        run: |
          bash scripts/check-image-digests.sh || {
            echo "::warning::Unpinned Dockerfile base images detected. Run 'make pin-image-digests' and commit the result; this check will become blocking afterwards."
          }

  trivy-image:
    name: Trivy image scan (Go services)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: gateway
            dockerfile: src/gateway/Dockerfile
          - service: execution
            dockerfile: src/execution/Dockerfile
          - service: management
            dockerfile: src/management/Dockerfile
          - service: billing
            dockerfile: src/billing/Dockerfile
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build ${{ matrix.service }} image (local, no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          load: true
          tags: etradie/${{ matrix.service }}:scan
          cache-from: type=gha,scope=${{ matrix.service }}
      - name: Run Trivy vulnerability scanner on Edge Ingress code
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: etradie/${{ matrix.service }}:scan
          scanners: vuln
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          format: table
