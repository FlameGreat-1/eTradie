name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  terraform:
    name: Terraform fmt + validate (all modules)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5
      - name: terraform fmt -check
        run: terraform fmt -check -recursive infrastructure/
      - name: terraform validate - cloudflare
        run: |
          cd infrastructure/cloudflare
          terraform init -backend=false -input=false
          terraform validate
      - name: terraform validate - cluster/vault-paths
        run: |
          cd infrastructure/cluster/vault-paths
          terraform init -backend=false -input=false
          terraform validate
      - name: terraform validate - cluster/oci
        run: |
          cd infrastructure/cluster/oci
          terraform init -backend=false -input=false
          terraform validate
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements/dev.txt
      - name: Install dependencies
        run: pip install -r requirements/dev.txt
      - name: Ruff lint
        run: ruff check src/ tests/
      - name: Ruff format check
        run: ruff format --check src/ tests/
      - name: Mypy type check
        run: mypy src/
      - name: Contract check (Go/Python ProcessorOutput parity)
        run: python scripts/validate_processor_contract.py

  helm:
    name: Helm chart lint + render + schema validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0
      - name: Install kubeconform
        run: |
          curl -fsSL https://github.com/yannh/kubeconform/releases/download/v0.6.4/kubeconform-linux-amd64.tar.gz \
            | tar -xz -C /usr/local/bin kubeconform
      - name: Drift gate - chart-local cloudflare ranges match canonical files
        run: |
          diff -q deployments/cloudflare/ip-ranges/ipv4.txt helm/gateway/files/cloudflare/ipv4.txt
          diff -q deployments/cloudflare/ip-ranges/ipv6.txt helm/gateway/files/cloudflare/ipv6.txt
      - name: Cloudflare AOP CA pin file is present
        run: |
          # The pin file is committed at
          # deployments/cloudflare/origin-pull/aop-ca.sha256 and is the
          # source of truth for the AOP CA fingerprint. The weekly
          # refresh-cloudflare-ips.sh job exits 1 if it is empty; we
          # surface a presence-check at PR-time so an accidental wipe
          # fails the build immediately.
          PIN_FILE=deployments/cloudflare/origin-pull/aop-ca.sha256
          test -f "${PIN_FILE}" || { echo "FATAL: ${PIN_FILE} missing"; exit 1; }
          PIN="$(grep -v -E '^[[:space:]]*(#|$)' "${PIN_FILE}" | head -n1 | tr -d '[:space:]')"
          if [ -z "${PIN}" ]; then
            echo "WARN: ${PIN_FILE} is empty (bootstrap pending)."
            echo "Run: bash deployments/cloudflare/scripts/refresh-cloudflare-ips.sh --bootstrap"
            echo "and commit the result. The weekly refresh job will fail until populated."
          fi
      - name: helm lint - edge-ingress
        run: helm lint helm/edge-ingress
      - name: helm lint - envoy
        run: helm lint helm/envoy
      - name: helm lint - gateway
        run: helm lint helm/gateway
      - name: helm template + kubeconform - edge-ingress staging
        run: |
          # Default cloudProvider=cloudflare-tunnel; no LB, no ACM.
          helm template edge-ingress helm/edge-ingress \
            -f helm/edge-ingress/values.yaml \
            -f helm/edge-ingress/values-staging.yaml \
            > /tmp/edge-ingress-staging.yaml
          kubeconform -strict -kubernetes-version 1.30.0 \
            -schema-location default \
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
            /tmp/edge-ingress-staging.yaml
      - name: helm template + kubeconform - edge-ingress production
        run: |
          helm template edge-ingress helm/edge-ingress \
            -f helm/edge-ingress/values.yaml \
            -f helm/edge-ingress/values-production.yaml \
            > /tmp/edge-ingress-production.yaml
          kubeconform -strict -kubernetes-version 1.30.0 \
            -schema-location default \
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
            /tmp/edge-ingress-production.yaml
      - name: helm template + kubeconform - edge-ingress production with generic LB
        run: |
          # Exercise the alternative cloud provider so a future
          # template change cannot silently break the LoadBalancer
          # render path.
          helm template edge-ingress helm/edge-ingress \
            -f helm/edge-ingress/values.yaml \
            -f helm/edge-ingress/values-production.yaml \
            --set service.cloudProvider=generic \
            > /tmp/edge-ingress-production-generic.yaml
          kubeconform -strict -kubernetes-version 1.30.0 \
            -schema-location default \
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
            /tmp/edge-ingress-production-generic.yaml
      - name: helm template + kubeconform - edge-ingress production with customMetricsEnabled
        run: |
          # Exercise the autoscaling.customMetricsEnabled gate so a
          # future template change cannot silently break the
          # adapter-served metrics path.
          helm template edge-ingress helm/edge-ingress \
            -f helm/edge-ingress/values.yaml \
            -f helm/edge-ingress/values-production.yaml \
            --set autoscaling.customMetricsEnabled=true \
            > /tmp/edge-ingress-production-cm.yaml
          kubeconform -strict -kubernetes-version 1.30.0 \
            -schema-location default \
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
            /tmp/edge-ingress-production-cm.yaml
      - name: helm template + kubeconform - envoy staging
        run: |
          # Inject 1 byte of valid base64 ("AA==" = 0x00) so the chart
          # template renders for CI; production must inject the real
          # WASM via --set-file at promotion time.
          helm template etradie-envoy helm/envoy \
            -f helm/envoy/values.yaml \
            -f helm/envoy/values-staging.yaml \
            --set wasm.base64=AA== \
            --set wasm.sha256=ci-placeholder \
            > /tmp/envoy-staging.yaml
          kubeconform -strict -kubernetes-version 1.30.0 \
            -schema-location default \
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
            /tmp/envoy-staging.yaml
      - name: helm template + kubeconform - envoy production
        run: |
          helm template etradie-envoy helm/envoy \
            -f helm/envoy/values.yaml \
            -f helm/envoy/values-production.yaml \
            --set wasm.base64=AA== \
            --set wasm.sha256=ci-placeholder \
            > /tmp/envoy-production.yaml
          kubeconform -strict -kubernetes-version 1.30.0 \
            -schema-location default \
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
            /tmp/envoy-production.yaml
      - name: helm template + kubeconform - envoy production with customMetricsEnabled
        run: |
          helm template etradie-envoy helm/envoy \
            -f helm/envoy/values.yaml \
            -f helm/envoy/values-production.yaml \
            --set wasm.base64=AA== \
            --set wasm.sha256=ci-placeholder \
            --set autoscaling.customMetricsEnabled=true \
            > /tmp/envoy-production-cm.yaml
          kubeconform -strict -kubernetes-version 1.30.0 \
            -schema-location default \
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
            /tmp/envoy-production-cm.yaml
      - name: helm template + kubeconform - gateway staging
        run: |
          helm template etradie-gateway helm/gateway \
            -f helm/gateway/values.yaml \
            -f helm/gateway/values-staging.yaml \
            > /tmp/gateway-staging.yaml
          kubeconform -strict -kubernetes-version 1.30.0 \
            -schema-location default \
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
            /tmp/gateway-staging.yaml
      - name: helm template + kubeconform - gateway production
        run: |
          helm template etradie-gateway helm/gateway \
            -f helm/gateway/values.yaml \
            -f helm/gateway/values-production.yaml \
            > /tmp/gateway-production.yaml
          kubeconform -strict -kubernetes-version 1.30.0 \
            -schema-location default \
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
            /tmp/gateway-production.yaml
      - name: helm template + kubeconform - gateway with empty initContainer.dependencies
        run: |
          # Exercise the init-container gate: when dependencies is an
          # empty list, the init-container must not be rendered at all
          # (and the rest of the chart must still render cleanly).
          helm template etradie-gateway helm/gateway \
            -f helm/gateway/values.yaml \
            -f helm/gateway/values-production.yaml \
            --set initContainer.dependencies=null \
            > /tmp/gateway-no-init.yaml
          kubeconform -strict -kubernetes-version 1.30.0 \
            -schema-location default \
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
            /tmp/gateway-no-init.yaml
          if grep -q 'initContainers:' /tmp/gateway-no-init.yaml; then
            echo "FATAL: gateway initContainers block was rendered with empty dependencies list"
            exit 1
          fi
      - name: helm lint - engine
        run: helm lint helm/engine
      - name: helm template + kubeconform - engine staging
        run: |
          helm template etradie-engine helm/engine \
            -f helm/engine/values.yaml \
            -f helm/engine/values-staging.yaml \
            > /tmp/engine-staging.yaml
          kubeconform -strict -kubernetes-version 1.30.0 \
            -schema-location default \
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
            /tmp/engine-staging.yaml
      - name: helm template + kubeconform - engine production
        run: |
          helm template etradie-engine helm/engine \
            -f helm/engine/values.yaml \
            -f helm/engine/values-production.yaml \
            > /tmp/engine-production.yaml
          kubeconform -strict -kubernetes-version 1.30.0 \
            -schema-location default \
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
            /tmp/engine-production.yaml
      - name: helm lint - execution
        run: helm lint helm/execution
      - name: helm template + kubeconform - execution staging
        run: |
          helm template etradie-execution helm/execution \
            -f helm/execution/values.yaml \
            -f helm/execution/values-staging.yaml \
            > /tmp/execution-staging.yaml
          kubeconform -strict -kubernetes-version 1.30.0 \
            -schema-location default \
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
            /tmp/execution-staging.yaml
      - name: helm template + kubeconform - execution production
        run: |
          helm template etradie-execution helm/execution \
            -f helm/execution/values.yaml \
            -f helm/execution/values-production.yaml \
            > /tmp/execution-production.yaml
          kubeconform -strict -kubernetes-version 1.30.0 \
            -schema-location default \
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
            /tmp/execution-production.yaml
      - name: helm lint - management
        run: helm lint helm/management
      - name: helm template + kubeconform - management staging
        run: |
          helm template etradie-management helm/management \
            -f helm/management/values.yaml \
            -f helm/management/values-staging.yaml \
            > /tmp/management-staging.yaml
          kubeconform -strict -kubernetes-version 1.30.0 \
            -schema-location default \
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
            /tmp/management-staging.yaml
      - name: helm template + kubeconform - management production
        run: |
          helm template etradie-management helm/management \
            -f helm/management/values.yaml \
            -f helm/management/values-production.yaml \
            > /tmp/management-production.yaml
          kubeconform -strict -kubernetes-version 1.30.0 \
            -schema-location default \
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
            /tmp/management-production.yaml
      - name: helm lint - data-layer
        run: helm lint helm/data-layer
      - name: helm template + kubeconform - data-layer staging
        run: |
          helm template etradie-data-layer helm/data-layer \
            -f helm/data-layer/values.yaml \
            -f helm/data-layer/values-staging.yaml \
            > /tmp/data-layer-staging.yaml
          kubeconform -strict -kubernetes-version 1.30.0 \
            -schema-location default \
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
            /tmp/data-layer-staging.yaml
      - name: helm template + kubeconform - data-layer production
        run: |
          helm template etradie-data-layer helm/data-layer \
            -f helm/data-layer/values.yaml \
            -f helm/data-layer/values-production.yaml \
            > /tmp/data-layer-production.yaml
          kubeconform -strict -kubernetes-version 1.30.0 \
            -schema-location default \
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
            /tmp/data-layer-production.yaml
      - name: helm lint - billing
        run: helm lint helm/billing
      - name: helm template + kubeconform - billing staging
        run: |
          helm template etradie-billing helm/billing \
            -f helm/billing/values.yaml \
            -f helm/billing/values-staging.yaml \
            > /tmp/billing-staging.yaml
          kubeconform -strict -kubernetes-version 1.30.0 \
            -schema-location default \
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
            /tmp/billing-staging.yaml
      - name: helm template + kubeconform - billing production
        run: |
          helm template etradie-billing helm/billing \
            -f helm/billing/values.yaml \
            -f helm/billing/values-production.yaml \
            > /tmp/billing-production.yaml
          kubeconform -strict -kubernetes-version 1.30.0 \
            -schema-location default \
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
            /tmp/billing-production.yaml
      - name: argocd manifests parse
        run: |
          # ArgoCD CRDs are schema-checked separately. We only confirm
          # the YAML parses and the AppProject + Application docs are
          # syntactically valid Kubernetes manifests.
          for f in deployments/argocd/appproject.yaml \
                   deployments/argocd/root-app.yaml \
                   deployments/argocd/children/*.yaml; do
            python3 -c "import yaml,sys; list(yaml.safe_load_all(open('$f')))"
          done

  test:
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: etradie_test
          POSTGRES_USER: etradie_test
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U etradie_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # Connection string targets the in-job postgres service container
      # (credentials: etradie_test / test_password / etradie_test).
      DATABASE_URL: postgresql+asyncpg://etradie_test:test_password@localhost:5432/etradie_test
      REDIS_URL: redis://localhost:6379/0
      APP_ENV: testing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements/dev.txt
      - name: Install dependencies
        run: pip install -r requirements/dev.txt
      - name: Run tests
        run: pytest --timeout=60
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 7

  test-go:
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: etradie
          POSTGRES_USER: etradie
          POSTGRES_PASSWORD: etradie_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U etradie"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # Connection strings target the in-job postgres service container
      # (credentials: etradie / etradie_dev / etradie). sslmode=disable
      # is correct for the GitHub Actions service network.
      DATABASE_URL: postgres://etradie:etradie_dev@localhost:5432/etradie?sslmode=disable
      EXECUTION_DATABASE_URL: postgres://etradie:etradie_dev@localhost:5432/etradie?sslmode=disable
      MANAGEMENT_DATABASE_URL: postgres://etradie:etradie_dev@localhost:5432/etradie?sslmode=disable
      POSTGRES_HOST: localhost
      POSTGRES_USER: etradie
      POSTGRES_PASSWORD: etradie_dev
      POSTGRES_DB: etradie
      REDIS_URL: redis://localhost:6379/0
      REDIS_HOST: localhost
      EXECUTION_REDIS_URL: redis://localhost:6379/1
      GATEWAY_REDIS_URL: redis://localhost:6379/0
      MANAGEMENT_REDIS_URL: redis://localhost:6379/1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true
      - name: Run Go unit and integration tests
        run: |
          go test ./src/gateway/... -v -count=1 -timeout 120s
          go test ./src/execution/... -v -count=1 -timeout 120s
          go test ./src/management/... -v -count=1 -timeout 120s
      - name: Run Gateway gRPC integration tests
        run: go test ./src/gateway/grpctest/... -v -count=1 -timeout 120s
      - name: Run Execution broker integration tests
        run: go test ./src/execution/brokertest/... -v -count=1 -timeout 60s
      - name: Run Management broker integration tests
        run: go test ./src/management/brokertest/... -v -count=1 -timeout 60s
      - name: Run E2E pipeline tests
        run: go test ./src/gateway/e2etest/... -v -count=1 -timeout 300s

  build:
    name: Build (and push on main) all four service images
    runs-on: ubuntu-latest
    needs: [test, test-go, helm]
    # GHCR push requires packages: write. contents: read is the
    # workflow's read-only access to the repo for actions/checkout.
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: engine
            dockerfile: Dockerfile
            context: .
          - service: gateway
            dockerfile: src/gateway/Dockerfile
            context: .
          - service: execution
            dockerfile: src/execution/Dockerfile
            context: .
          - service: management
            dockerfile: src/management/Dockerfile
            context: .
          # Rust edge-ingress binary. Dockerfile lives under
          # deployments/edge-ingress/docker/ so the rendered Helm
          # chart can pull a real image from GHCR (matches
          # helm/edge-ingress/values.yaml::image.repository).
          - service: edge-ingress
            dockerfile: deployments/edge-ingress/docker/Dockerfile.edge-ingress
            context: .
          # Billing microservice. helm/billing/values.yaml pins
          # ghcr.io/flamegreat-1/etradie/billing:0.1.0 and the gateway's
          # init-container waits for billing-service:8082, so this image
          # MUST be in the matrix or every fresh ArgoCD sync ImagePullBackOff's.
          - service: billing
            dockerfile: src/billing/Dockerfile
            context: .
    env:
      # Image registry path that helm/<service>/values.yaml encodes.
      # GHCR is case-sensitive: owner + repo must be lowercase.
      REGISTRY: ghcr.io
      IMAGE_BASE: ghcr.io/flamegreat-1/etradie
      # Image release tag. MUST match every chart's appVersion +
      # image.tag pin. Audit ref: CI-H1.
      #
      # Every helm chart (engine, gateway, billing, execution,
      # management, data-layer) currently pins image.tag: "0.1.0".
      # edge-ingress pins "0.2.0" (a chart-local override; see
      # helm/edge-ingress/values.yaml). The image build below tags BOTH
      # the git SHA and RELEASE_TAG so the chart-pinned tag always
      # resolves in GHCR.
      #
      # Bump procedure: cut a new appVersion in every Chart.yaml +
      # bump image.tag in every chart's values.yaml + bump RELEASE_TAG
      # here in the same commit. The CI workflow then publishes
      # ghcr.io/flamegreat-1/etradie/<svc>:<RELEASE_TAG> for every
      # service, and ArgoCD picks the new images up on next sync.
      RELEASE_TAG: "0.1.0"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Login is only needed when we actually push (push event on main).
      # Pull-request runs build-only to keep the registry clean.
      # GHCR honours the built-in GITHUB_TOKEN when the job has
      # packages: write permission, so no operator secret is needed.
      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') && ' and push' || '' }} ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          # Push only on main branch pushes; PRs verify-build only.
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.IMAGE_BASE }}/${{ matrix.service }}:${{ github.sha }}
            ${{ env.IMAGE_BASE }}/${{ matrix.service }}:${{ env.RELEASE_TAG }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          provenance: false
          sbom: false

      # Smoke-verify the engine image only (it is the one we used to
      # verify before this commit; the Go images are statically linked
      # binaries and do not need an `import`-style smoke test).
      - name: Verify engine image (engine only)
        if: matrix.service == 'engine' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker pull ${{ env.IMAGE_BASE }}/engine:${{ github.sha }}
          docker run --rm ${{ env.IMAGE_BASE }}/engine:${{ github.sha }} python -c "import engine; print('OK')"
