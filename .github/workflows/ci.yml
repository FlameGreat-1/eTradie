name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements/dev.txt
      - name: Install dependencies
        run: pip install -r requirements/dev.txt
      - name: Ruff lint
        run: ruff check src/ tests/
      - name: Ruff format check
        run: ruff format --check src/ tests/
      - name: Mypy type check
        run: mypy src/
      - name: Contract check (Go/Python ProcessorOutput parity)
        run: python scripts/validate_processor_contract.py

  test:
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: etradie_test
          POSTGRES_USER: etradie_test
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U etradie_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://etradie_test:test_password@localhost:5432/etradie_test
      REDIS_URL: redis://localhost:6379/0
      APP_ENV: testing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements/dev.txt
      - name: Install dependencies
        run: pip install -r requirements/dev.txt
      - name: Run tests
        run: pytest --timeout=60
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 7

  test-go:
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: etradie
          POSTGRES_USER: etradie
          POSTGRES_PASSWORD: etradie_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U etradie"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://etradie:etradie_dev@localhost:5432/etradie?sslmode=disable
      REDIS_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true
      - name: Run Go unit and integration tests
        run: |
          go test ./src/gateway/... -v -count=1 -timeout 120s
          go test ./src/execution/... -v -count=1 -timeout 120s
          go test ./src/management/... -v -count=1 -timeout 120s
      - name: Run Gateway gRPC integration tests
        run: go test ./src/gateway/grpctest/... -v -count=1 -timeout 120s
      - name: Run Execution broker integration tests
        run: go test ./src/execution/brokertest/... -v -count=1 -timeout 60s
      - name: Run Management broker integration tests
        run: go test ./src/management/brokertest/... -v -count=1 -timeout 60s
      - name: Run E2E pipeline tests
        run: go test ./src/gateway/e2etest/... -v -count=1 -timeout 300s

  build:
    runs-on: ubuntu-latest
    needs: [test, test-go]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -f Dockerfile -t etradie-engine:${{ github.sha }} .
      - name: Verify image
        run: docker run --rm etradie-engine:${{ github.sha }} python -c "import engine; print('OK')"
