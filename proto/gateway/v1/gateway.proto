syntax = "proto3";

package gateway.v1;

option go_package = "github.com/flamegreat-1/etradie/proto/gateway/v1;gatewayv1";

// GatewayService is the gateway's own gRPC API.
// Used by the dashboard, CLI, or other internal services to trigger
// analysis cycles and manage symbol selection.
service GatewayService {
  // RunCycle triggers an analysis cycle for the given symbols.
  rpc RunCycle(RunCycleRequest) returns (RunCycleResponse);

  // ConfirmSetup runs a targeted TA-only confirmation pulse for an
  // instant-mode watcher. Bypasses Macro, RAG, and Processor.
  // Called by Module B's watcher when price enters the POI zone.
  rpc ConfirmSetup(ConfirmSetupRequest) returns (ConfirmSetupResponse);

  // NotifyExecutionCompleted is called by Module B's watcher immediately
  // after a market order is successfully FILLED at the broker.
  // This triggers Step 7 of the architecture: Handoff to Module C.
  rpc NotifyExecutionCompleted(NotifyExecutionCompletedRequest) returns (NotifyExecutionCompletedResponse);

  // SetActiveSymbols updates the user's active symbol selection.
  rpc SetActiveSymbols(SetActiveSymbolsRequest) returns (SetActiveSymbolsResponse);

  // GetActiveSymbols returns the current active symbol selection.
  rpc GetActiveSymbols(GetActiveSymbolsRequest) returns (GetActiveSymbolsResponse);

  // ResetActiveSymbols resets symbol selection to config defaults.
  rpc ResetActiveSymbols(ResetActiveSymbolsRequest) returns (ResetActiveSymbolsResponse);

  // SetCycleInterval changes the analysis cycle interval at runtime.
  // The scheduler resets its ticker immediately. Persisted in Redis
  // so the setting survives gateway restarts.
  rpc SetCycleInterval(SetCycleIntervalRequest) returns (SetCycleIntervalResponse);

  // GetGatewayConfig returns the current runtime-configurable settings.
  rpc GetGatewayConfig(GetGatewayConfigRequest) returns (GetGatewayConfigResponse);

  // GetHealth returns the gateway's health status.
  rpc GetHealth(GetHealthRequest) returns (GetHealthResponse);
}

message RunCycleRequest {
  // Symbols to analyse. If empty, uses the active symbol selection.
  repeated string symbols = 1;
  string trace_id = 2;
}

message CycleOutput {
  string cycle_status = 1;
  string cycle_outcome = 2;
  string phase_reached = 3;
  string symbol = 4;
  double duration_ms = 5;
  string trace_id = 6;
  string error = 7;
  string error_stage = 8;
  // Full processor output, guard result, and execution result as JSON.
  bytes processor_output_json = 9;
  bytes guard_result_json = 10;
  bytes execution_result_json = 11;
}

message RunCycleResponse {
  repeated CycleOutput outputs = 1;
}

// ConfirmSetupRequest is sent by the Execution watcher when live
// price enters the POI zone for an instant-mode candidate.
message ConfirmSetupRequest {
  string symbol = 1;              // e.g. "EURUSD"
  string analysis_id = 2;         // Links to the original TA candidate
  string trace_id = 3;
}

// ConfirmSetupResponse indicates whether the TA engine confirms
// the setup's LTF conditions are now met.
message ConfirmSetupResponse {
  bool   confirmed = 1;           // true if LTF confirmation now exists
  bool   ltf_confirmation = 2;    // explicit LTF field from TA
  string reason = 3;              // Human-readable reason if not confirmed
  string trace_id = 4;
}

message SetActiveSymbolsRequest {
  repeated string symbols = 1;
}

message SetActiveSymbolsResponse {
  bool success = 1;
  repeated string active_symbols = 2;
}

message GetActiveSymbolsRequest {}

message GetActiveSymbolsResponse {
  repeated string symbols = 1;
  string source = 2; // "redis" or "gateway_config"
}

message ResetActiveSymbolsRequest {}

message ResetActiveSymbolsResponse {
  bool success = 1;
  repeated string active_symbols = 2; // The default symbols now active
}

message SetCycleIntervalRequest {
  // New interval in seconds. Must be >= 60 and <= 86400 (24 hours).
  int32 interval_seconds = 1;
}

message SetCycleIntervalResponse {
  bool success = 1;
  int32 current_interval_seconds = 2;
  string message = 3;
}

message GetGatewayConfigRequest {}

message GetGatewayConfigResponse {
  bool enabled = 1;
  int32 cycle_interval_seconds = 2;
  int32 cycle_timeout_seconds = 3;
  int32 max_concurrent_symbols = 4;
  int32 ta_cache_ttl_seconds = 5;
  int32 macro_cache_ttl_seconds = 6;
  int32 max_cycle_retries = 7;
  repeated string default_symbols = 8;
  repeated string active_symbols = 9;
  string active_symbols_source = 10;
  bool execution_enabled = 11;
}

message GetHealthRequest {}

message GetHealthResponse {
  string status = 1; // "ok" | "degraded"
  bool redis_connected = 2;
  bool engine_connected = 3;
  int32 active_cycles = 4;
}

message NotifyExecutionCompletedRequest {
  string symbol = 1;
  string broker_order_id = 2;
  double fill_price = 3;
  double slippage = 4;
  double lot_size = 5;
  string analysis_id = 6;
  string trace_id = 7;

  // Full trade context for Module C handoff — carried from Module B's Order.
  string direction = 8;              // "BUY" or "SELL"
  double stop_loss = 9;
  double tp1_price = 10;
  int32  tp1_pct = 11;
  double tp2_price = 12;
  int32  tp2_pct = 13;
  double tp3_price = 14;
  int32  tp3_pct = 15;
  double risk_amount = 16;
  double risk_percent = 17;
  double rr_ratio = 18;
  string grade = 19;
  string trading_style = 20;         // "SCALPING", "INTRADAY", "SWING", "POSITIONAL"
  string session = 21;
  double confluence_score = 22;
  string execution_mode = 23;        // "LIMIT" or "INSTANT"
  string setup_type = 24;            // Passed back to Gateway for Management Engine consumption
}

message NotifyExecutionCompletedResponse {
  bool   success = 1;
  string management_trade_id = 2;    // Module C's tracking ID, returned for reference
}

