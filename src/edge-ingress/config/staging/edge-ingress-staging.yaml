server:
  tls_bind_address: "0.0.0.0:443"
  metrics_bind_address: "0.0.0.0:9902"
  idle_timeout_secs: 180

tls:
  min_tls_version: "1.2"
  preferred_tls_version: "1.3"
  handshake_timeout:
    secs: 8
    nanos: 0
  enable_sni: true
  cert_reload_interval:
    secs: 1800
    nanos: 0
  # Cloudflare Authenticated Origin Pulls (mTLS).
  # required: false because staging runs behind Cloudflare Tunnel
  # (cloudflared as the connector). cloudflared has no field in its
  # originRequest schema to present a client cert, so mandatory mTLS
  # at edge-ingress would fail every handshake. Defense in depth in
  # staging: Cloudflare DDoS/WAF + origin IP not in public DNS + ufw
  # inbound deny + tunnel JWT + server-side TLS to edge-ingress with
  # internal CA verify + Linkerd mesh mTLS + gateway trusted-proxy
  # CIDR (10.42.0.0/16, see helm/gateway/values-staging.yaml) honors
  # CF-Connecting-IP for per-IP rate limiting.
  client_auth:
    ca_path: "/etc/edge-ingress/cloudflare/origin-pull-ca.pem"
    required: false
  certificates:
    - hostname: "staging-api.exoper.com"
      cert_path: "/etc/edge-ingress/certs/staging-api.exoper.com.crt"
      key_path: "/etc/edge-ingress/certs/staging-api.exoper.com.key"
      is_default: true
    - hostname: "*.staging.exoper.com"
      cert_path: "/etc/edge-ingress/certs/wildcard.staging.exoper.com.crt"
      key_path: "/etc/edge-ingress/certs/wildcard.staging.exoper.com.key"
      is_default: false

upstream:
  connect_timeout_secs: 4
  request_timeout_secs: 45
  endpoints:
    - region: "us-east-1"
      address: "envoy.etradie-system.svc.cluster.local:8080"
    - region: "us-west-2"
      address: "envoy-us-west-2.etradie-system.svc.cluster.local:8080"

connection_limits:
  max_global_connections: 50000
  max_connections_per_ip: 500

health_check:
  interval_secs: 8
  timeout_secs: 3
  unhealthy_threshold: 3
  healthy_threshold: 2

retry:
  max_attempts: 1
  backoff_ms: 75

geoip:
  database_path: "/data/geoip/GeoLite2-City.mmdb"
