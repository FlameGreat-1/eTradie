server:
  tls_bind_address: "0.0.0.0:443"
  metrics_bind_address: "0.0.0.0:9902"
  idle_timeout_secs: 300

tls:
  min_tls_version: "1.2"
  preferred_tls_version: "1.3"
  handshake_timeout:
    secs: 10
    nanos: 0
  enable_sni: true
  cert_reload_interval:
    secs: 3600
    nanos: 0
  # Cloudflare Authenticated Origin Pulls (mTLS).
  # `required: true` is the strict default used by direct-internet /
  # Cloudflare-AOP deployments. Tunnel-mode deployments override
  # `required: false` in their environment-specific overlay
  # (config/staging/edge-ingress-staging.yaml, etc).
  client_auth:
    ca_path: "/etc/edge-ingress/cloudflare/origin-pull-ca.pem"
    required: true
  certificates:
    - hostname: "api.exoper.com"
      cert_path: "/etc/edge-ingress/certs/api.exoper.com.crt"
      key_path: "/etc/edge-ingress/certs/api.exoper.com.key"
      is_default: true
    - hostname: "*.exoper.com"
      cert_path: "/etc/edge-ingress/certs/wildcard.exoper.com.crt"
      key_path: "/etc/edge-ingress/certs/wildcard.exoper.com.key"
      is_default: false

upstream:
  connect_timeout_secs: 5
  request_timeout_secs: 60
  endpoints:
    - region: "us-east-1"
      address: "envoy.etradie-system.svc.cluster.local:8080"
    - region: "us-west-2"
      address: "envoy-us-west-2.etradie-system.svc.cluster.local:8080"
    - region: "eu-west-1"
      address: "envoy-eu-west-1.etradie-system.svc.cluster.local:8080"
    - region: "ap-southeast-1"
      address: "envoy-ap-southeast-1.etradie-system.svc.cluster.local:8080"

connection_limits:
  max_global_connections: 100000
  max_connections_per_ip: 1000

health_check:
  interval_secs: 10
  timeout_secs: 3
  unhealthy_threshold: 3
  healthy_threshold: 2

retry:
  max_attempts: 1
  backoff_ms: 100

geoip:
  database_path: "/data/geoip/GeoLite2-City.mmdb"
