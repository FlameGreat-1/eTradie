admin:
  address:
    socket_address:
      address: 0.0.0.0
      port_value: 9901

static_resources:
  listeners:
    - name: http_listener
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 8080
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: ingress_http
                codec_type: AUTO
                use_remote_address: false
                xff_num_trusted_hops: 0
                
                route_config:
                  name: local_route
                  virtual_hosts:
                    - name: backend
                      domains: ["*"]
                      routes:
                        # Liveness probe - process is running
                        - match:
                            path: "/livez"
                          direct_response:
                            status: 200
                            body:
                              inline_string: '{"status":"alive","service":"envoy"}'
                        
                        # Readiness probe - can accept requests
                        - match:
                            path: "/readyz"
                          direct_response:
                            status: 200
                            body:
                              inline_string: '{"status":"ready","service":"envoy"}'
                        
                        # Legacy health check endpoint (for compatibility)
                        - match:
                            path: "/healthz"
                          direct_response:
                            status: 200
                            body:
                              inline_string: '{"status":"healthy","service":"envoy"}'
                        
                        # Long-running, NON-IDEMPOTENT analysis POSTs.
                        # These trigger a full TA+Macro+RAG+LLM cycle
                        # (~140s) that spends LLM tokens. They MUST NOT
                        # be retried by the proxy: a per-try timeout that
                        # fires mid-cycle would replay the POST and stack
                        # another full LLM call while the gateway keeps
                        # running the orphaned cycle. Generous timeout,
                        # no per_try_timeout, zero retries.
                        - match:
                            prefix: "/api/v1/cycle/run"
                          route:
                            cluster: gateway_cluster
                            timeout: 600s
                            idle_timeout: 600s
                            retry_policy:
                              num_retries: 0
                        - match:
                            prefix: "/api/analysis/rerun"
                          route:
                            cluster: gateway_cluster
                            timeout: 600s
                            idle_timeout: 600s
                            retry_policy:
                              num_retries: 0

                        # All other routes go to gateway. Timeout raised
                        # above the slow-tail of normal calls; retries
                        # restricted to safe connect-level failures only
                        # (no "cancelled", which on a non-idempotent
                        # route would replay a mutating request).
                        - match:
                            prefix: "/"
                          route:
                            cluster: gateway_cluster
                            timeout: 120s
                            idle_timeout: 60s
                            retry_policy:
                              retry_on: "connect-failure,refused-stream,unavailable,retriable-status-codes"
                              num_retries: 2
                              per_try_timeout: 60s
                              retriable_status_codes: [503]
                
                http_filters:
                  - name: envoy.filters.http.wasm
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.wasm.v3.Wasm
                      config:
                        name: etradie_integration_filter
                        root_id: etradie_root
                        vm_config:
                          runtime: envoy.wasm.runtime.v8
                          code:
                            local:
                              filename: /etc/envoy/wasm/integration-filter.wasm
                          allow_precompiled: true
                  
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
                
                access_log:
                  - name: envoy.access_loggers.stdout
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog
                      log_format:
                        json_format:
                          timestamp: "%START_TIME%"
                          method: "%REQ(:METHOD)%"
                          path: "%REQ(X-ENVOY-ORIGINAL-PATH?:PATH)%"
                          protocol: "%PROTOCOL%"
                          response_code: "%RESPONSE_CODE%"
                          response_flags: "%RESPONSE_FLAGS%"
                          bytes_received: "%BYTES_RECEIVED%"
                          bytes_sent: "%BYTES_SENT%"
                          duration_ms: "%DURATION%"
                          upstream_service_time: "%RESP(X-ENVOY-UPSTREAM-SERVICE-TIME)%"
                          x_forwarded_for: "%REQ(X-FORWARDED-FOR)%"
                          user_agent: "%REQ(USER-AGENT)%"
                          request_id: "%REQ(X-REQUEST-ID)%"
                          trace_id: "%REQ(X-TRACE-ID)%"
                          authority: "%REQ(:AUTHORITY)%"
                          upstream_host: "%UPSTREAM_HOST%"
                          upstream_cluster: "%UPSTREAM_CLUSTER%"

  clusters:
    - name: gateway_cluster
      connect_timeout: 5s
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      dns_lookup_family: V4_ONLY
      
      # Circuit breakers - prevent cascading failures
      circuit_breakers:
        thresholds:
          - priority: DEFAULT
            max_connections: 256
            max_pending_requests: 256
            max_requests: 256
            max_retries: 3
      
      # Outlier detection - eject unhealthy endpoints
      outlier_detection:
        consecutive_5xx: 5
        interval: 10s
        base_ejection_time: 30s
        max_ejection_percent: 50
        enforcing_consecutive_5xx: 100
      
      load_assignment:
        cluster_name: gateway_cluster
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      # Local docker-compose service is named `gateway`
                      # (see root docker-compose.yml). Port 8080 matches
                      # the gateway HTTP listener.
                      address: gateway
                      port_value: 8080
      
      # Active health checks - Envoy checks Gateway health
      # This does NOT affect Envoy's own health status
      health_checks:
        - timeout: 1s
          interval: 10s
          unhealthy_threshold: 3
          healthy_threshold: 2
          http_health_check:
            path: /status/200
            expected_statuses:
              - start: 200
                end: 299

overload_manager:
  refresh_interval: 0.25s
  resource_monitors:
    - name: envoy.resource_monitors.fixed_heap
      typed_config:
        "@type": type.googleapis.com/envoy.extensions.resource_monitors.fixed_heap.v3.FixedHeapConfig
        max_heap_size_bytes: 536870912
  
  actions:
    - name: envoy.overload_actions.shrink_heap
      triggers:
        - name: envoy.resource_monitors.fixed_heap
          threshold:
            value: 0.95
    
    - name: envoy.overload_actions.stop_accepting_requests
      triggers:
        - name: envoy.resource_monitors.fixed_heap
          threshold:
            value: 0.98

layered_runtime:
  layers:
    - name: static_layer
      static_layer:
        overload:
          global_downstream_max_connections: 1000
