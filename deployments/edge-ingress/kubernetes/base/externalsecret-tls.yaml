apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: edge-ingress-tls-certs
  namespace: etradie-system
  labels:
    app.kubernetes.io/name: edge-ingress
    app.kubernetes.io/component: edge
    app.kubernetes.io/part-of: etradie
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: edge-ingress-tls-certs
    creationPolicy: Owner
  data:
    # Primary API certificate (default)
    - secretKey: api.etradie.com.crt
      remoteRef:
        key: etradie/services/edge-ingress/tls
        property: api_cert
    - secretKey: api.etradie.com.key
      remoteRef:
        key: etradie/services/edge-ingress/tls
        property: api_key
    # Wildcard certificate
    - secretKey: wildcard.etradie.com.crt
      remoteRef:
        key: etradie/services/edge-ingress/tls
        property: wildcard_cert
    - secretKey: wildcard.etradie.com.key
      remoteRef:
        key: etradie/services/edge-ingress/tls
        property: wildcard_key
    # EU regional certificate
    - secretKey: api-eu.etradie.com.crt
      remoteRef:
        key: etradie/services/edge-ingress/tls
        property: api_eu_cert
    - secretKey: api-eu.etradie.com.key
      remoteRef:
        key: etradie/services/edge-ingress/tls
        property: api_eu_key
    # AP regional certificate
    - secretKey: api-ap.etradie.com.crt
      remoteRef:
        key: etradie/services/edge-ingress/tls
        property: api_ap_cert
    - secretKey: api-ap.etradie.com.key
      remoteRef:
        key: etradie/services/edge-ingress/tls
        property: api_ap_key
