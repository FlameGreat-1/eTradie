apiVersion: apps/v1
kind: Deployment
metadata:
  name: edge-ingress
  namespace: etradie-system
  labels:
    app.kubernetes.io/name: edge-ingress
    app.kubernetes.io/component: edge
    app.kubernetes.io/part-of: etradie
    app.kubernetes.io/version: "0.1.0"
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: edge-ingress
      app.kubernetes.io/component: edge
  template:
    metadata:
      labels:
        app.kubernetes.io/name: edge-ingress
        app.kubernetes.io/component: edge
        app.kubernetes.io/part-of: etradie
        app.kubernetes.io/version: "0.1.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9902"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: edge-ingress
      automountServiceAccountToken: false
      priorityClassName: edge-ingress-critical
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: In
                      values:
                        - edge-ingress
                topologyKey: kubernetes.io/hostname
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: edge-ingress
      initContainers:
        - name: geoip-downloader
          image: alpine:3.19
          command: ["/bin/sh", "/scripts/download-geoip.sh"]
          env:
            - name: MAXMIND_LICENSE_KEY
              valueFrom:
                secretKeyRef:
                  name: maxmind-credentials
                  key: license-key
          volumeMounts:
            - name: geoip-init-script
              mountPath: /scripts
            - name: geoip-data
              mountPath: /data/geoip
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 1000
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
      containers:
        - name: edge-ingress
          image: etradie/edge-ingress:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: tls
              containerPort: 443
              protocol: TCP
            - name: metrics
              containerPort: 9902
              protocol: TCP
          env:
            - name: CONFIG_PATH
              value: "/etc/edge-ingress/config/edge-ingress.yaml"
            - name: RUST_LOG
              value: "info,edge_ingress=debug"
            - name: RUST_BACKTRACE
              value: "1"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          volumeMounts:
            - name: config
              mountPath: /etc/edge-ingress/config
              readOnly: true
            - name: tls-certs
              mountPath: /etc/edge-ingress/certs
              readOnly: true
            - name: geoip-data
              mountPath: /data/geoip
              readOnly: true
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
              ephemeral-storage: 256Mi
            limits:
              cpu: 2000m
              memory: 2Gi
              ephemeral-storage: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 9902
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: 9902
              scheme: HTTP
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              add:
                - NET_BIND_SERVICE
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
      volumes:
        - name: config
          configMap:
            name: edge-ingress-config
            defaultMode: 0444
        - name: tls-certs
          secret:
            secretName: edge-ingress-tls-certs
            defaultMode: 0400
        - name: geoip-data
          emptyDir:
            sizeLimit: 200Mi
        - name: geoip-init-script
          configMap:
            name: edge-ingress-geoip-init
            defaultMode: 0755
      dnsPolicy: ClusterFirst
      restartPolicy: Always
