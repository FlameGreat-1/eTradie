apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: edge-ingress
  namespace: etradie-system
  labels:
    app.kubernetes.io/name: edge-ingress
    app.kubernetes.io/component: edge
    app.kubernetes.io/part-of: etradie
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: edge-ingress
  minReplicas: 3
  maxReplicas: 20
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
        - type: Pods
          value: 2
          periodSeconds: 60
      selectPolicy: Min
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 4
          periodSeconds: 30
      selectPolicy: Max
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
    - type: Pods
      pods:
        metric:
          name: edge_ingress_active_connections
        target:
          type: AverageValue
          averageValue: "5000"
