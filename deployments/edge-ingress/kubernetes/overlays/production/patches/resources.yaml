apiVersion: apps/v1
kind: Deployment
metadata:
  name: edge-ingress
spec:
  template:
    spec:
      containers:
        - name: edge-ingress
          resources:
            requests:
              cpu: 1000m
              memory: 1Gi
              ephemeral-storage: 256Mi
            limits:
              cpu: 4000m
              memory: 4Gi
              ephemeral-storage: 1Gi
