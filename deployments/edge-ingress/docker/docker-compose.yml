services:
  geoip-updater:
    image: maxmindinc/geoipupdate:v6.0
    container_name: geoip-updater
    volumes:
      - geoip-data:/usr/share/GeoIP
    environment:
      - GEOIPUPDATE_ACCOUNT_ID=1292283
      - GEOIPUPDATE_LICENSE_KEY=${MAXMIND_LICENSE_KEY}
      - GEOIPUPDATE_EDITION_IDS=GeoLite2-City
      - GEOIPUPDATE_FREQUENCY=168
    restart: unless-stopped
    networks:
      - etradie-network

  edge-ingress:
    depends_on:
      - geoip-updater
    build:
      context: ../../../
      dockerfile: deployments/edge-ingress/docker/Dockerfile.edge-ingress
      args:
        BUILD_DATE: ${BUILD_DATE:-2024-01-01T00:00:00Z}
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
    image: etradie/edge-ingress:local
    container_name: edge-ingress
    hostname: edge-ingress
    restart: unless-stopped
    ports:
      - "8443:443"
      - "9902:9902"
    volumes:
      - ./config:/etc/edge-ingress/config:ro
      - ./certs:/etc/edge-ingress/certs:ro
      - geoip-data:/data/geoip:ro
    environment:
      - CONFIG_PATH=/etc/edge-ingress/config/edge-ingress.yaml
      - RUST_LOG=info,edge_ingress=debug
      - RUST_BACKTRACE=1
      - MAXMIND_LICENSE_KEY=${MAXMIND_LICENSE_KEY}
    networks:
      - etradie-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --inet4-only -O /dev/null http://localhost:9902/healthz || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 15s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp

networks:
  etradie-network:
    name: etradie-network
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  geoip-data:
