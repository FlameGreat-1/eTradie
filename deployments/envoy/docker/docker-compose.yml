services:
  envoy:
    build:
      context: ../../../src/envoy
      dockerfile: ../../../deployments/envoy/docker/Dockerfile.envoy
    image: etradie/envoy:latest
    container_name: etradie-envoy
    hostname: etradie-envoy
    
    ports:
      - "8080:8080"   # HTTP listener (receives from edge-ingress)
      - "9901:9901"   # Admin interface (Prometheus scrapes metrics/logs from the exposed port)
    
    environment:
      - ENVIRONMENT=local
      - LOG_LEVEL=debug
    
    volumes:
      - ../../../src/envoy/config/local/envoy-local.yaml:/etc/envoy/envoy.yaml:ro
      - ../../../src/envoy/target/wasm32-wasi/release/etradie_envoy_integration_filter.wasm:/etc/envoy/wasm/integration-filter.wasm:ro
      - envoy-cache:/var/cache/envoy
      - envoy-tmp:/tmp
    
    networks:
      - etradie-network
    
    healthcheck:
      test: ["CMD-SHELL", "grep -q :26AD /proc/net/tcp || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    
    restart: unless-stopped
    
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G
    
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    
    depends_on:
      - mock-gateway  # TODO: switch to the real eTradie upstream once envoy->backend flow is finalized

  # ============================================================================
  # MOCK GATEWAY (TEMPORARY - placeholder until eTradie upstream flow is finalized)
  # ============================================================================
  mock-gateway:
    image: kennethreitz/httpbin
    container_name: mock-gateway
    hostname: gateway-service
    
    ports:
      - "5000:80"  # Optional: expose for direct testing
    
    networks:
      - etradie-network
    
    restart: unless-stopped
    
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  # ============================================================================
  # REAL UPSTREAM (UNCOMMENT AFTER ENVOY->BACKEND FLOW IS FINALIZED)
  # ============================================================================
  # gateway:
  #   build:
  #     context: ../../..
  #     dockerfile: src/gateway/Dockerfile
  #   image: etradie/gateway:latest
  #   container_name: etradie-gateway
  #   hostname: gateway-service
  #   
  #   ports:
  #     - "8081:8081"
  #   
  #   environment:
  #     - ENVIRONMENT=local
  #     - PORT=8081
  #     - LOG_LEVEL=debug
  #   
  #   networks:
  #     - etradie-network
  #   
  #   healthcheck:
  #     test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 3
  #     start_period: 10s
  #   
  #   restart: unless-stopped

networks:
  etradie-network:
    name: etradie-network
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  envoy-cache:
    driver: local
  envoy-tmp:
    driver: local
