apiVersion: v1
kind: Service
metadata:
  name: etradie-envoy
  namespace: envoy-system
  labels:
    app: etradie-envoy
    component: proxy
    version: v0.1.0
  annotations:
    description: "Exoper Envoy proxy service - HTTP traffic endpoint"
spec:
  type: ClusterIP
  sessionAffinity: None
  selector:
    app: etradie-envoy
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
    - name: admin
      port: 9901
      targetPort: 9901
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: etradie-envoy-headless
  namespace: envoy-system
  labels:
    app: etradie-envoy
    component: proxy
    version: v0.1.0
  annotations:
    description: "Exoper Envoy headless service - for direct pod access"
spec:
  type: ClusterIP
  clusterIP: None
  publishNotReadyAddresses: false
  selector:
    app: etradie-envoy
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
    - name: admin
      port: 9901
      targetPort: 9901
      protocol: TCP
