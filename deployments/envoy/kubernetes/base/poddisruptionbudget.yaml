apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: etradie-envoy
  namespace: envoy-system
  labels:
    app: etradie-envoy
    component: availability
  annotations:
    description: "Ensures minimum availability during voluntary disruptions"
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: etradie-envoy
  unhealthyPodEvictionPolicy: IfHealthyBudget
