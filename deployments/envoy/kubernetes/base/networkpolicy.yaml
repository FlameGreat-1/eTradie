apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: envoy-network-policy
  namespace: envoy-system
  labels:
    app.kubernetes.io/name: etradie-envoy
    app.kubernetes.io/component: network-policy
    app.kubernetes.io/part-of: etradie
spec:
  podSelector:
    matchLabels:
      app: etradie-envoy
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic from edge-ingress (AND: namespace AND pod)
    - from:
        - namespaceSelector:
            matchLabels:
              name: etradie-system
          podSelector:
            matchLabels:
              app.kubernetes.io/name: edge-ingress
      ports:
        - protocol: TCP
          port: 8080
    # Allow Prometheus scraping (AND: namespace AND pod)
    - from:
        - namespaceSelector:
            matchLabels:
              name: monitoring
          podSelector:
            matchLabels:
              app: prometheus
      ports:
        - protocol: TCP
          port: 9901
  egress:
    # Allow connections to the eTradie gateway HTTP listener.
    # The label app.kubernetes.io/name=etradie-gateway is the canonical
    # selector applied by deployments/gateway/kubernetes/base. Port 8080
    # is the gateway HTTP port (see src/gateway/internal/config: HTTPPort
    # default 8080).
    - to:
        - namespaceSelector:
            matchLabels:
              app.kubernetes.io/part-of: etradie
          podSelector:
            matchLabels:
              app.kubernetes.io/name: etradie-gateway
      ports:
        - protocol: TCP
          port: 8080
    # Allow DNS resolution (UDP + TCP)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
