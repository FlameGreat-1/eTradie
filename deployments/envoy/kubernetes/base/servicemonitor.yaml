apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: etradie-envoy
  namespace: envoy-system
  labels:
    app: etradie-envoy
    component: monitoring
    prometheus: kube-prometheus
spec:
  selector:
    matchLabels:
      app: etradie-envoy
  namespaceSelector:
    matchNames:
      - envoy-system
  endpoints:
    - port: admin
      path: /stats/prometheus
      interval: 30s
      scrapeTimeout: 10s
      scheme: http
      relabelings:
        - sourceLabels: [__meta_kubernetes_pod_name]
          targetLabel: pod
        - sourceLabels: [__meta_kubernetes_pod_node_name]
          targetLabel: node
        - sourceLabels: [__meta_kubernetes_namespace]
          targetLabel: namespace
        - sourceLabels: [__meta_kubernetes_service_name]
          targetLabel: service
      metricRelabelings:
        - sourceLabels: [__name__]
          regex: 'envoy_cluster_.*'
          action: keep
        - sourceLabels: [__name__]
          regex: 'envoy_http_.*'
          action: keep
        - sourceLabels: [__name__]
          regex: 'envoy_listener_.*'
          action: keep
        - sourceLabels: [__name__]
          regex: 'envoy_server_.*'
          action: keep
        - sourceLabels: [__name__]
          regex: 'etradie_.*'
          action: keep
