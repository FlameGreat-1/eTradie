{{- if .Values.externalSecrets.enabled }}
# Materialises the Linkerd identity issuer as a kubernetes.io/tls Secret
# named `linkerd-identity-issuer` (the name Linkerd expects under
# identity.issuer.scheme=kubernetes.io/tls) from Vault via ESO. Also
# materialises the trust-anchor PEM into a ConfigMap the control-plane
# Application references. NO cert bytes are committed; ESO pulls them
# from Vault at runtime. Audit ref: Tier 9 G9-1.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: linkerd-identity-issuer
  namespace: linkerd
  labels:
    app.kubernetes.io/part-of: etradie
    app.kubernetes.io/component: linkerd-identity
  annotations:
    # Sync-wave -5: the issuer Secret MUST exist before the control
    # plane (-4) starts and reads scheme=kubernetes.io/tls.
    argocd.argoproj.io/sync-wave: "-5"
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStoreName | default "vault-backend" }}
    kind: {{ .Values.externalSecrets.secretStoreKind | default "ClusterSecretStore" }}
  target:
    name: linkerd-identity-issuer
    creationPolicy: {{ .Values.externalSecrets.creationPolicy | default "Owner" }}
    template:
      type: kubernetes.io/tls
      metadata:
        labels:
          app.kubernetes.io/part-of: etradie
          app.kubernetes.io/component: linkerd-identity
      data:
        tls.crt: "{{ `{{ .issuer_tls_crt }}` }}"
        tls.key: "{{ `{{ .issuer_tls_key }}` }}"
  data:
    - secretKey: issuer_tls_crt
      remoteRef:
        key: {{ .Values.externalSecrets.vaultPath | quote }}
        property: issuer_tls_crt
    - secretKey: issuer_tls_key
      remoteRef:
        key: {{ .Values.externalSecrets.vaultPath | quote }}
        property: issuer_tls_key
{{- end }}
