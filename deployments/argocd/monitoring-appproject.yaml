# AppProject for the kube-prometheus-stack monitoring stack.
#
# Separate from the `etradie` AppProject because the chart installs a
# wide cluster-scoped surface (10 monitoring.coreos.com CRDs, two
# admission webhooks, several ClusterRoles + ClusterRoleBindings, a
# PriorityClass). Keeping it in its own project isolates that blast
# radius from the app-workload project. Same pattern as the existing
# `linkerd` AppProject.
#
# Apply directly:
#   kubectl apply -f deployments/argocd/monitoring-appproject.yaml
#
# The root app reconciles only files under deployments/argocd/children/,
# so AppProject files in deployments/argocd/ are not GitOps-managed and
# must be applied with kubectl on each change.
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: monitoring
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: etradie
    app.kubernetes.io/managed-by: argocd
  annotations:
    description: "kube-prometheus-stack: Prometheus + Grafana + kube-state-metrics + node-exporter + prometheus-operator."
spec:
  description: "kube-prometheus monitoring stack"

  # The chart is pulled from the prometheus-community Helm repo; the
  # values overlay path is in the platform repo. Both GitHub URL
  # variants are listed tolerantly, matching linkerd-appproject.yaml.
  sourceRepos:
    - https://prometheus-community.github.io/helm-charts
    - https://github.com/FlameGreat-1/eTradie.git
    - https://github.com/FlameGreat-1/eTradie

  destinations:
    - name: in-cluster
      namespace: monitoring

  # Cluster-scoped resources the chart installs. Scoped to the exact
  # kinds kube-prometheus-stack creates; no wildcards.
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
    - group: admissionregistration.k8s.io
      kind: MutatingWebhookConfiguration
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
    - group: scheduling.k8s.io
      kind: PriorityClass

  # Namespace-scoped resources the chart renders into `monitoring`,
  # plus ExternalSecret so Vault-sourced credentials (Grafana admin
  # password, Alertmanager receiver tokens) can be wired via ESO.
  namespaceResourceWhitelist:
    - group: ""
      kind: ConfigMap
    - group: ""
      kind: Secret
    - group: ""
      kind: Service
    - group: ""
      kind: ServiceAccount
    - group: ""
      kind: PersistentVolumeClaim
    - group: apps
      kind: Deployment
    - group: apps
      kind: StatefulSet
    - group: apps
      kind: DaemonSet
    - group: rbac.authorization.k8s.io
      kind: Role
    - group: rbac.authorization.k8s.io
      kind: RoleBinding
    - group: networking.k8s.io
      kind: NetworkPolicy
    - group: policy
      kind: PodDisruptionBudget
    - group: monitoring.coreos.com
      kind: Prometheus
    - group: monitoring.coreos.com
      kind: PrometheusAgent
    - group: monitoring.coreos.com
      kind: Alertmanager
    - group: monitoring.coreos.com
      kind: AlertmanagerConfig
    - group: monitoring.coreos.com
      kind: ServiceMonitor
    - group: monitoring.coreos.com
      kind: PodMonitor
    - group: monitoring.coreos.com
      kind: PrometheusRule
    - group: monitoring.coreos.com
      kind: Probe
    - group: monitoring.coreos.com
      kind: ScrapeConfig
    - group: monitoring.coreos.com
      kind: ThanosRuler
    - group: external-secrets.io
      kind: ExternalSecret

  # Same group bindings as the etradie + linkerd projects so platform
  # maintainers can sync the monitoring stack without separate group
  # mapping.
  roles:
    - name: maintainers
      description: "Platform maintainers can sync any monitoring Application in this project."
      policies:
        - p, proj:monitoring:maintainers, applications, get, monitoring/*, allow
        - p, proj:monitoring:maintainers, applications, sync, monitoring/*, allow
        - p, proj:monitoring:maintainers, applications, action/*, monitoring/*, allow
      groups:
        - etradie:platform-maintainers
    - name: readers
      description: "Read-only access to monitoring Application status and history."
      policies:
        - p, proj:monitoring:readers, applications, get, monitoring/*, allow
      groups:
        - etradie:engineering

  # No syncWindows. Per-environment promotion gating is enforced on
  # the Applications themselves (staging: prune+selfHeal on; production:
  # off). A business-hours window here would block emergency Prometheus
  # config changes during an incident.
