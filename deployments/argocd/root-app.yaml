# Root "app of apps" Application. Reconciles every YAML under
# deployments/argocd/children/ as its own ArgoCD Application. Adding a
# new environment / service is a single commit to children/ - no
# argocd CLI invocation.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: etradie-root
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: etradie
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: etradie

  source:
    repoURL: https://github.com/FlameGreat-1/eTradie.git
    targetRevision: HEAD
    path: deployments/argocd/children
    directory:
      recurse: true
      jsonnet: {}

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=false
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 5m
