apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: data-layer-staging
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: etradie
    etradie.com/component: data-layer
    etradie.com/environment: staging
  annotations:
    # Sync wave -2: data layer must reach Ready before engine
    # (-1) and gateway/execution/management (0) are reconciled.
    argocd.argoproj.io/sync-wave: "-2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: etradie

  source:
    repoURL: https://github.com/FlameGreat-1/eTradie.git
    targetRevision: HEAD
    path: helm/data-layer
    helm:
      releaseName: etradie-data-layer
      valueFiles:
        - values.yaml
        - values-staging.yaml
      parameters: []

  destination:
    server: https://kubernetes.default.svc
    namespace: etradie-system

  ignoreDifferences:
    - group: ""
      kind: Secret
      jsonPointers:
        - /data
    # PVC capacity is not pruneable through helm; ignore drift
    # on resources.requests.storage so a manual resize does not
    # cause a sync loop.
    - group: ""
      kind: PersistentVolumeClaim
      jsonPointers:
        - /spec/resources/requests/storage

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 10m

  revisionHistoryLimit: 20
