apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: engine-staging
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: etradie
    exoper.com/component: engine
    exoper.com/environment: staging
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: etradie

  source:
    repoURL: https://github.com/FlameGreat-1/eTradie.git
    targetRevision: main
    path: helm/engine
    helm:
      releaseName: etradie-engine
      valueFiles:
        - values.yaml
        - values-image.yaml
        - values-staging.yaml
      parameters: []

  destination:
    server: https://kubernetes.default.svc
    namespace: etradie-system

  ignoreDifferences:
    - group: ""
      kind: Secret
      jsonPointers:
        - /data

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      # ApplyOutOfSyncOnly is intentionally NOT set. With it enabled,
      # ArgoCD only applies resources it already considers out of sync,
      # so a manual out-of-band field mutation (e.g.
      # `kubectl set env deploy/etradie-engine MT_NODE_IMAGE=<sha>`,
      # which added an explicit env entry that overrode the ConfigMap
      # value for multiple sessions) was never reconciled away and
      # silently persisted across every pod restart. Applying the full
      # rendered spec every sync makes such drift self-heal.
      - ServerSideApply=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 10m

  revisionHistoryLimit: 20
