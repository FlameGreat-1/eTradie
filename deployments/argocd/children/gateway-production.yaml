apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gateway-production
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: etradie
    etradie.com/component: gateway
    etradie.com/environment: production
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: etradie

  source:
    repoURL: https://github.com/FlameGreat-1/eTradie.git
    # Default-tracks `main`. See data-layer-production.yaml for the
    # immutable-tag pin procedure. Audit ref: NOTE.md S1-F.
    targetRevision: main
    path: helm/gateway
    helm:
      releaseName: etradie-gateway
      valueFiles:
        - values.yaml
        - values-production.yaml
      parameters: []

  destination:
    server: https://kubernetes.default.svc
    namespace: etradie-system

  ignoreDifferences:
    - group: ""
      kind: Secret
      jsonPointers:
        - /data

  syncPolicy:
    automated:
      prune: false
      selfHeal: false
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 3
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 10m

  revisionHistoryLimit: 20
