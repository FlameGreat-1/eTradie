# Linkerd control plane (CHECKLIST Tier 9: automatic mTLS for every
# meshed pod-to-pod hop). Sync-wave -4: AFTER the CRDs (-5), BEFORE
# data-layer (-2) / engine (-1) / gateway (0) so the proxy injector
# and identity service are ready before any workload is injected.
#
# Identity (trust anchor + issuer) is NOT generated by cert-manager
# (the platform deliberately runs no cert-manager). It is sourced from
# Vault via the linkerd-identity-issuer ExternalSecret (see
# linkerd-identity-externalsecret-production.yaml). The chart consumes
# the materialised Secret through identity.issuer.scheme=kubernetes.io/tls
# referencing that Secret, and the trust anchor PEM via
# identityTrustAnchorsPEM (operator-populated Vault key). NO cert
# bytes are committed to git.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: linkerd-control-plane-production
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: etradie
    exoper.com/component: linkerd-control-plane
    exoper.com/environment: production
  annotations:
    argocd.argoproj.io/sync-wave: "-4"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: linkerd

  sources:
    # The Linkerd control-plane chart, plus an in-repo values overlay
    # (multi-source Application) so the trust-anchor PEM + issuer
    # Secret reference live in git-reviewed values without committing
    # cert bytes.
    - repoURL: https://helm.linkerd.io
      chart: linkerd-control-plane
      targetRevision: 1.16.11
      helm:
        releaseName: linkerd-control-plane
        valueFiles:
          - $values/deployments/linkerd/control-plane-values.yaml
        # Trust anchor (PUBLIC root CA). The chart reads it only as this
        # literal value; ArgoCD cannot source it from a cluster object,
        # so the operator overrides this parameter at promote time from
        # Vault (single source of truth for the mesh CA):
        #   argocd app set linkerd-control-plane-production \
        #     --helm-set-file identityTrustAnchorsPEM=ca.crt
        # where ca.crt = `vault kv get -field=trust_anchor_pem \
        #   etradie/platform/linkerd/<env>`.
        # The sentinel below is intentionally NOT a valid PEM so a
        # forgotten override fails loud at sync instead of silently
        # starting the identity service with no trust anchor.
        parameters:
          - name: identityTrustAnchorsPEM
            value: "REPLACE_AT_PROMOTE_WITH_VAULT_TRUST_ANCHOR_PEM"
            forceString: true
    - repoURL: https://github.com/FlameGreat-1/eTradie.git
      targetRevision: main
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: linkerd

  ignoreDifferences:
    # The proxy-injector + identity webhooks have caBundle fields the
    # control plane rotates; do not fight them.
    - group: admissionregistration.k8s.io
      kind: MutatingWebhookConfiguration
      jqPathExpressions:
        - .webhooks[].clientConfig.caBundle
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
      jqPathExpressions:
        - .webhooks[].clientConfig.caBundle

  syncPolicy:
    automated:
      prune: false
      selfHeal: false
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 3
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 10m

  revisionHistoryLimit: 20
