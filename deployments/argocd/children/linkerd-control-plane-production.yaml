# Linkerd control plane (CHECKLIST Tier 9: automatic mTLS for every
# meshed pod-to-pod hop). Sync-wave -4: AFTER the CRDs (-5), BEFORE
# data-layer (-2) / engine (-1) / gateway (0) so the proxy injector
# and identity service are ready before any workload is injected.
#
# Identity model (no cert-manager on this platform):
#   - Trust anchor (PUBLIC root CA): committed as a YAML block scalar
#     under identityTrustAnchorsPEM in
#     deployments/linkerd/control-plane-values.yaml (the $values
#     overlay below). Vault (etradie/platform/linkerd/production:
#     trust_anchor_pem) remains the canonical source of truth for the
#     mesh CA lifecycle; the committed PEM is a GitOps-pure copy of
#     the public bytes (no private key) so ArgoCD can render the chart
#     without operator --set intervention or selfHeal drift.
#   - Issuer cert/key (PRIVATE): delivered as the kubernetes.io/tls
#     Secret `linkerd-identity-issuer` by the linkerd-identity
#     ExternalSecret (ESO -> Vault). The chart reads it via
#     identity.issuer.scheme=kubernetes.io/tls. Private bytes never
#     touch git.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: linkerd-control-plane-production
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: etradie
    exoper.com/component: linkerd-control-plane
    exoper.com/environment: production
  annotations:
    argocd.argoproj.io/sync-wave: "-4"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: linkerd

  sources:
    # The Linkerd control-plane chart, plus an in-repo values overlay
    # (multi-source Application) so the trust-anchor PEM + issuer
    # Secret reference live in git-reviewed values without committing
    # cert bytes.
    #
    # Linkerd chart index lives at /stable; the repo root returns 404
    # (verified 2026-06-15: GET https://helm.linkerd.io/index.yaml -> 404,
    # GET https://helm.linkerd.io/stable/index.yaml -> 200).
    - repoURL: https://helm.linkerd.io/stable
      chart: linkerd-control-plane
      # 1.16.11 -> 1.16.12: minimal patch upgrade within the 2.14 line
      # to pick up the linkerd2-proxy fix for outbound mTLS to opaque-
      # port destinations on native-sidecar single-node K3s. Ships
      # proxy 2.211.x (was 2.210.4 in 1.16.11 — Nov 2023 build,
      # carries the bug that broke engine -> postgres + engine -> redis
      # outbound on this cluster). Bump in lockstep with linkerd-crds.
      # See Phase 10.6 H7 debug arc + commit message of the bump for
      # the full RCA. If this patch does NOT resolve the outbound mTLS
      # symptom (re-test via mesh-probe), escalate to 2.16 stable
      # (chart 1.18.x, proxy 2.232+).
      targetRevision: 1.16.12
      helm:
        releaseName: linkerd-control-plane
        valueFiles:
          - $values/deployments/linkerd/control-plane-values.yaml
        # NO helm.parameters block here. The trust anchor PEM is the
        # ONLY value the chart needs beyond defaults, and it is
        # committed in control-plane-values.yaml above. An explicit
        # `parameters: []` is omitted on purpose — adding it back with
        # an identityTrustAnchorsPEM entry would override the values
        # file (helm --set wins over -f) and the identity controller
        # would fail to start.
    - repoURL: https://github.com/FlameGreat-1/eTradie.git
      targetRevision: main
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: linkerd

  ignoreDifferences:
    # The proxy-injector + identity webhooks have caBundle fields the
    # control plane rotates; do not fight them.
    - group: admissionregistration.k8s.io
      kind: MutatingWebhookConfiguration
      jqPathExpressions:
        - .webhooks[].clientConfig.caBundle
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
      jqPathExpressions:
        - .webhooks[].clientConfig.caBundle

  syncPolicy:
    automated:
      prune: false
      selfHeal: false
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 3
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 10m

  revisionHistoryLimit: 20
