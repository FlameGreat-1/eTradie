apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mt-node-staging
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: etradie
    exoper.com/component: mt-node
    exoper.com/environment: staging
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: etradie

  source:
    repoURL: https://github.com/FlameGreat-1/eTradie.git
    targetRevision: main
    path: helm/mt-node
    helm:
      releaseName: etradie-mt-node-platform
      valueFiles:
        - values.yaml
        - values-staging.yaml
      parameters:
        - name: mtConnection.enabled
          value: "false"
        - name: mtConnection.connectionId
          value: "platform"
        - name: mtConnection.userId
          value: "platform"
        - name: mtConnection.platform
          value: "mt5"
        - name: mtConnection.server
          value: "platform"
        - name: mtConnection.sealedSecretName
          value: "platform"

  destination:
    server: https://kubernetes.default.svc
    namespace: etradie-system

  ignoreDifferences:
    - group: ""
      kind: Secret
      jsonPointers:
        - /data

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
    retry:
      limit: 3
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 10m

  revisionHistoryLimit: 20
