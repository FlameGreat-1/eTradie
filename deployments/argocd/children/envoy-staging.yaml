apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: envoy-staging
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: etradie
    exoper.com/component: envoy
    exoper.com/environment: staging
  annotations:
    argocd.argoproj.io/sync-wave: "5"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: etradie

  source:
    repoURL: https://github.com/FlameGreat-1/eTradie.git
    targetRevision: main
    path: helm/envoy
    helm:
      releaseName: etradie-envoy
      valueFiles:
        - values.yaml
        - values-staging.yaml
      # CI must inject the WASM bytes at promotion time:
      #   argocd app set envoy-staging \
      #     --helm-set-file wasm.base64=src/envoy/target/wasm32-wasi/release/etradie_envoy_integration_filter.wasm \
      #     --helm-set wasm.sha256=$WASM_SHA256 \
      #     --helm-set wasm.builtAt=$BUILD_TIMESTAMP
      parameters: []

  destination:
    server: https://kubernetes.default.svc
    namespace: envoy-system

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m

  revisionHistoryLimit: 10
