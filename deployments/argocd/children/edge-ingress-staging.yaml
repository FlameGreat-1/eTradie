apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: edge-ingress-staging
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: etradie
    exoper.com/component: edge-ingress
    exoper.com/environment: staging
  annotations:
    argocd.argoproj.io/sync-wave: "10"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: etradie

  source:
    repoURL: https://github.com/FlameGreat-1/eTradie.git
    targetRevision: main
    path: helm/edge-ingress
    helm:
      releaseName: edge-ingress
      valueFiles:
        - values.yaml
        - values-staging.yaml
      # Image tag is pinned in values-staging.yaml. Cloud-LB strategy
      # is `cloudflare-tunnel` (default) so no per-promotion ARN or
      # cloud-specific override is needed.
      #
      # DEPLOY MECHANISM (canonical, implemented in .github/workflows/
      # ci.yml `deploy-bump`): on every push to main, after the image is
      # built + signed, CI writes the immutable github.sha into
      # helm/edge-ingress/values-staging.yaml::image.tag and commits it.
      # ArgoCD's targetRevision stays `main` and rolls this app whenever
      # its image.tag changes. This is per-service (edge-ingress rolls
      # only when ITS image changed), unlike rewriting targetRevision
      # which would couple every app to one SHA. Do NOT add a
      # targetRevision-rewrite path; it would conflict with this one.
      parameters: []

  destination:
    server: https://kubernetes.default.svc
    namespace: edge-ingress-system

  ignoreDifferences:
    # ESO synthesises Secret bytes; ArgoCD must not try to revert
    # them on every refresh.
    - group: ""
      kind: Secret
      jsonPointers:
        - /data
    # ESO writes refresh-time + secret-resource-version annotations and
    # may normalize spec.refreshInterval ("1h" -> "3600s") on refresh.
    # Narrow pointers so a real chart-level change to secretStoreRef /
    # target / data mappings still surfaces as OutOfSync.
    - group: external-secrets.io
      kind: ExternalSecret
      jsonPointers:
        - /metadata/annotations
        - /spec/refreshInterval
    # Prometheus operator normalizes spec.endpoints (sorts relabelings,
    # fills defaults). Same narrow-pointer policy: a chart change to
    # selector / jobLabel / namespaceSelector still surfaces.
    - group: monitoring.coreos.com
      kind: ServiceMonitor
      jsonPointers:
        - /spec/endpoints

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m

  revisionHistoryLimit: 10
