apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: edge-ingress-staging
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: etradie
    etradie.com/component: edge-ingress
    etradie.com/environment: staging
  annotations:
    argocd.argoproj.io/sync-wave: "10"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: etradie

  source:
    repoURL: https://github.com/FlameGreat-1/eTradie.git
    targetRevision: HEAD
    path: helm/edge-ingress
    helm:
      releaseName: edge-ingress
      valueFiles:
        - values.yaml
        - values-staging.yaml
      # CI overrides the image tag and ACM ARN at promotion time:
      #   argocd app set edge-ingress-staging \
      #     --helm-set image.tag=$CI_COMMIT_SHORT_SHA \
      #     --helm-set service.tlsCertificateArn=$STAGING_ACM_ARN
      parameters: []

  destination:
    server: https://kubernetes.default.svc
    namespace: edge-ingress-system

  ignoreDifferences:
    # ESO synthesises Secret bytes; ArgoCD must not try to revert
    # them on every refresh.
    - group: ""
      kind: Secret
      jsonPointers:
        - /data

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m

  revisionHistoryLimit: 10
