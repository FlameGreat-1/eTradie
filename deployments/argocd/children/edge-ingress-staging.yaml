apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: edge-ingress-staging
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: etradie
    exoper.com/component: edge-ingress
    exoper.com/environment: staging
  annotations:
    argocd.argoproj.io/sync-wave: "10"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: etradie

  source:
    repoURL: https://github.com/FlameGreat-1/eTradie.git
    targetRevision: main
    path: helm/edge-ingress
    helm:
      releaseName: edge-ingress
      valueFiles:
        - values.yaml
        - values-staging.yaml
      # Image tag is pinned in values-staging.yaml. Cloud-LB strategy
      # is `cloudflare-tunnel` (default) so no per-promotion ARN or
      # cloud-specific override is needed. CI rewrites this file's
      # targetRevision to the new SHA on each merge to main; ArgoCD
      # reconciles from there.
      parameters: []

  destination:
    server: https://kubernetes.default.svc
    namespace: edge-ingress-system

  ignoreDifferences:
    # ESO synthesises Secret bytes; ArgoCD must not try to revert
    # them on every refresh.
    - group: ""
      kind: Secret
      jsonPointers:
        - /data

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m

  revisionHistoryLimit: 10
