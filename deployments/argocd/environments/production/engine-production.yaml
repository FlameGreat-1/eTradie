apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: engine-production
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: etradie
    exoper.com/component: engine
    exoper.com/environment: production
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: etradie

  source:
    repoURL: https://github.com/FlameGreat-1/eTradie.git
    # Default-tracks `main`. See data-layer-production.yaml for the
    # immutable-tag pin procedure. Audit ref: NOTE.md S1-F.
    targetRevision: main
    path: helm/engine
    helm:
      releaseName: etradie-engine
      valueFiles:
        - values.yaml
        - values-image.yaml
        - values-production.yaml
      parameters: []

  destination:
    server: https://kubernetes.default.svc
    namespace: etradie-system

  ignoreDifferences:
    - group: ""
      kind: Secret
      jsonPointers:
        - /data

  syncPolicy:
    automated:
      prune: false
      selfHeal: false
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      # ApplyOutOfSyncOnly is intentionally NOT set. Production runs
      # selfHeal=false + prune=false (human-gated cutover, by design),
      # so combined with ApplyOutOfSyncOnly an out-of-band field
      # mutation (e.g. `kubectl set env deploy/etradie-engine
      # MT_NODE_IMAGE=<sha>`) would NEVER be reconciled away. Removing
      # it means a human-triggered `argocd app sync` applies the full
      # rendered spec and reverts such drift. Mirrors engine-staging.
      - ServerSideApply=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 3
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 10m

  revisionHistoryLimit: 20
