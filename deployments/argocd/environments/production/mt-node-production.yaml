apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mt-node-production
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: etradie
    exoper.com/component: mt-node
    exoper.com/environment: production
  annotations:
    # mt-node platform must be in place BEFORE the engine starts
    # provisioning per-tenant Deployments. Lands in sync-wave -1
    # alongside the engine.
    argocd.argoproj.io/sync-wave: "-1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: etradie

  source:
    repoURL: https://github.com/FlameGreat-1/eTradie.git
    targetRevision: main
    path: helm/mt-node
    helm:
      releaseName: etradie-mt-node-platform
      valueFiles:
        - values.yaml
        - values-image.yaml
        - values-production.yaml
      # Platform-only render: skip per-tenant resources (StatefulSet,
      # Service, NetworkPolicy, PDB, ServiceMonitor, SA). Only the
      # PriorityClass + platform ExternalSecret + watchdog ConfigMap
      # land in the cluster.
      parameters:
        - name: mtConnection.enabled
          value: "false"
        # Stub identifiers so the preflight in any conditionally-rendered
        # template that still uses them does not raise.
        - name: mtConnection.connectionId
          value: "platform"
        - name: mtConnection.userId
          value: "platform"
        - name: mtConnection.platform
          value: "mt5"
        - name: mtConnection.server
          value: "platform"
        - name: mtConnection.sealedSecretName
          value: "platform"

  destination:
    server: https://kubernetes.default.svc
    namespace: etradie-system

  ignoreDifferences:
    - group: ""
      kind: Secret
      jsonPointers:
        - /data
    # ESO writes refresh-time + secret-resource-version annotations and
    # may normalize spec.refreshInterval ("1h" -> "3600s") on refresh.
    # Narrow pointers so a real chart-level change to secretStoreRef /
    # target / data mappings still surfaces as OutOfSync.
    - group: external-secrets.io
      kind: ExternalSecret
      jsonPointers:
        - /metadata/annotations
        - /spec/refreshInterval
    # Prometheus operator normalizes spec.endpoints (sorts relabelings,
    # fills defaults). Same narrow-pointer policy: a chart change to
    # selector / jobLabel / namespaceSelector still surfaces.
    - group: monitoring.coreos.com
      kind: ServiceMonitor
      jsonPointers:
        - /spec/endpoints

  syncPolicy:
    automated:
      prune: false
      selfHeal: false
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 3
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 10m

  revisionHistoryLimit: 20
