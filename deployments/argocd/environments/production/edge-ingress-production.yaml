apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: edge-ingress-production
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: etradie
    exoper.com/component: edge-ingress
    exoper.com/environment: production
  annotations:
    argocd.argoproj.io/sync-wave: "10"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: etradie

  source:
    repoURL: https://github.com/FlameGreat-1/eTradie.git
    # Default-tracks `main` (no tag exists yet). Production gating is
    # enforced via syncPolicy.automated.{prune:false,selfHeal:false}
    # below + the AppProject sync window. To pin to an immutable tag
    # once one is cut, see the procedure documented in
    # deployments/argocd/children/data-layer-production.yaml.
    # Audit ref: NOTE.md S1-F.
    targetRevision: main
    path: helm/edge-ingress
    helm:
      releaseName: edge-ingress
      valueFiles:
        - values.yaml
        - values-production.yaml
      parameters: []

  destination:
    server: https://kubernetes.default.svc
    namespace: edge-ingress-system

  ignoreDifferences:
    - group: ""
      kind: Secret
      jsonPointers:
        - /data

  # Production REQUIRES manual sync. The AppProject sync window allows
  # automated sync only inside business hours, but we additionally
  # disable selfHeal so a misconfigured commit cannot auto-roll out.
  syncPolicy:
    automated:
      prune: false
      selfHeal: false
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 3
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 10m

  revisionHistoryLimit: 20
