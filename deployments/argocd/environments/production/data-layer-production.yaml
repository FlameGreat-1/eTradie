apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: data-layer-production
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: etradie
    exoper.com/component: data-layer
    exoper.com/environment: production
  annotations:
    # Sync wave -2: data layer must reach Ready before engine and
    # the rest of the platform.
    argocd.argoproj.io/sync-wave: "-2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: etradie

  source:
    repoURL: https://github.com/FlameGreat-1/eTradie.git
    # Default-tracks `main`. Production change-control is enforced by
    # `syncPolicy.automated.{prune: false, selfHeal: false}` plus the
    # AppProject's business-hours sync window, so commits land on
    # `main` but require an explicit operator click to roll out.
    #
    # To pin to an immutable tag (industry-standard once a release is
    # actually cut):
    #   git tag vX.Y.Z <merge-sha> && git push --tags
    #   then change `targetRevision: main` -> `vX.Y.Z` in a follow-up
    #   commit. Bump `helm/data-layer/Chart.yaml` appVersion in lockstep.
    # Audit ref: NOTE.md S1-F.
    targetRevision: main
    path: helm/data-layer
    helm:
      releaseName: etradie-data-layer
      valueFiles:
        - values.yaml
        - values-production.yaml
      parameters: []

  destination:
    server: https://kubernetes.default.svc
    namespace: etradie-system

  ignoreDifferences:
    - group: ""
      kind: Secret
      jsonPointers:
        - /data
    - group: ""
      kind: PersistentVolumeClaim
      jsonPointers:
        - /spec/resources/requests/storage

  syncPolicy:
    # Production: NO automated prune, NO automated selfHeal.
    # Operators promote with an explicit "Sync" click in the
    # AppProject's allow window (etradie AppProject:
    # syncWindows[*-production], 13:00 UTC Mon-Fri, 8h).
    automated:
      prune: false
      selfHeal: false
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 3
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 10m

  revisionHistoryLimit: 20
