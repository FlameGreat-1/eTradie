apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: billing-production
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: etradie
    exoper.com/component: billing
    exoper.com/environment: production
  annotations:
    # sync-wave: "1" ensures billing starts AFTER the data-layer
    # (wave 0) so Postgres + Redis are ready before the billing
    # init-container probes them. The gateway is also wave 0; billing
    # at wave 1 means the gateway's init-container wait-for-billing
    # dep is satisfied before the gateway pod becomes Ready.
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: etradie

  source:
    repoURL: https://github.com/FlameGreat-1/eTradie.git
    targetRevision: main
    path: helm/billing
    helm:
      releaseName: etradie-billing
      valueFiles:
        - values.yaml
        - values-production.yaml
      parameters: []

  destination:
    server: https://kubernetes.default.svc
    namespace: etradie-system

  ignoreDifferences:
    - group: ""
      kind: Secret
      jsonPointers:
        - /data
    # ESO writes refresh-time + secret-resource-version annotations and
    # may normalize spec.refreshInterval ("1h" -> "3600s") on refresh.
    # Narrow pointers so a real chart-level change to secretStoreRef /
    # target / data mappings still surfaces as OutOfSync.
    - group: external-secrets.io
      kind: ExternalSecret
      jsonPointers:
        - /metadata/annotations
        - /spec/refreshInterval
    # Prometheus operator normalizes spec.endpoints (sorts relabelings,
    # fills defaults). Same narrow-pointer policy: a chart change to
    # selector / jobLabel / namespaceSelector still surfaces.
    - group: monitoring.coreos.com
      kind: ServiceMonitor
      jsonPointers:
        - /spec/endpoints

  syncPolicy:
    automated:
      prune: false
      selfHeal: false
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 3
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 10m

  revisionHistoryLimit: 20
