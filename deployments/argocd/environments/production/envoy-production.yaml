apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: envoy-production
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: etradie
    exoper.com/component: envoy
    exoper.com/environment: production
  annotations:
    argocd.argoproj.io/sync-wave: "5"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: etradie

  source:
    repoURL: https://github.com/FlameGreat-1/eTradie.git
    # Default-tracks `main`. See data-layer-production.yaml for the
    # immutable-tag pin procedure. Audit ref: NOTE.md S1-F.
    targetRevision: main
    path: helm/envoy
    helm:
      releaseName: etradie-envoy
      valueFiles:
        - values.yaml
        - values-production.yaml
      # CI must inject the WASM bytes at promotion time:
      #   argocd app set envoy-production \
      #     --helm-set-file wasm.base64=src/envoy/target/wasm32-wasi/release/etradie_envoy_integration_filter.wasm \
      #     --helm-set wasm.sha256=$WASM_SHA256 \
      #     --helm-set wasm.builtAt=$BUILD_TIMESTAMP
      # Audit ref: DA-M5.
      parameters: []

  destination:
    server: https://kubernetes.default.svc
    namespace: envoy-system

  syncPolicy:
    automated:
      prune: false
      selfHeal: false
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 3
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 10m

  revisionHistoryLimit: 20
