apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: etradie
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: etradie
    app.kubernetes.io/managed-by: argocd
  annotations:
    description: "eTradie platform AppProject - scopes the sources, destinations, and resource kinds the platform Applications may touch."
spec:
  description: "eTradie platform (gateway + envoy + edge-ingress)"

  # Allowed git sources. Adding any other repo requires a deliberate
  # AppProject change reviewed by platform owners.
  sourceRepos:
    - https://github.com/FlameGreat-1/eTradie.git
    - https://github.com/FlameGreat-1/eTradie

  # Allowed destinations. Limited to the namespaces this platform
  # actually owns or integrates with. Bootstrap of new namespaces
  # requires an explicit AppProject change.
  destinations:
    # root-app (the App-of-Apps) lives in this AppProject and reconciles
    # INTO the argocd namespace because the children it creates are
    # argoproj.io/Application objects, which ArgoCD requires to live
    # in the argocd namespace. Without this entry, root-app fails its
    # own reconcile with InvalidSpecError and no children are created.
    # The argoproj.io/Application kind is whitelisted under
    # namespaceResourceWhitelist below, completing the permission grant.
    - name: in-cluster
      namespace: argocd
    - name: in-cluster
      namespace: etradie-system
    - name: in-cluster
      namespace: envoy-system
    - name: in-cluster
      namespace: edge-ingress-system
    # `monitoring` is referenced by every chart's NetworkPolicy as
    # the source for Prometheus scrape ingress. Allowlisting it here
    # lets a future monitoring-stack Application target this project.
    # The namespace label `kubernetes.io/metadata.name: monitoring`
    # used in selectors is set automatically by the kube-apiserver
    # (NamespaceDefaultLabelName admission, GA in K8s 1.22+).
    # Audit ref: NOTE.md S2-B.
    - name: in-cluster
      namespace: monitoring
    # `etradie-observability` is referenced by NetworkPolicy egress
    # rules pointing at an OTel collector. The collector itself is
    # operator-installed; allowlisting the namespace here allows a
    # future observability Application to be project-scoped without
    # an AppProject diff at deploy time.
    - name: in-cluster
      namespace: etradie-observability

  # Cluster-scoped resources the Applications are allowed to manage.
  # PriorityClass and ClusterSecretStore are needed; everything else
  # is rejected.
  clusterResourceWhitelist:
    - group: scheduling.k8s.io
      kind: PriorityClass
    - group: external-secrets.io
      kind: ClusterSecretStore
    - group: ""
      kind: Namespace
    # Section 6 (CHECKLIST): the observability-logs chart deploys
    # Promtail with a narrow ClusterRole (pods/nodes get,list,watch)
    # for kubernetes_sd_configs service discovery.
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding

  # Namespace-scoped resources the Applications are allowed to manage.
  namespaceResourceWhitelist:
    - group: ""
      kind: ConfigMap
    - group: ""
      kind: Service
    - group: ""
      kind: ServiceAccount
    - group: ""
      kind: Secret
    - group: ""
      kind: ResourceQuota
    - group: ""
      kind: LimitRange
    - group: ""
      kind: PersistentVolumeClaim
    - group: apps
      kind: Deployment
    - group: apps
      kind: StatefulSet
    # Section 6 (CHECKLIST): Promtail DaemonSet for log aggregation.
    - group: apps
      kind: DaemonSet
    - group: autoscaling
      kind: HorizontalPodAutoscaler
    - group: policy
      kind: PodDisruptionBudget
    - group: networking.k8s.io
      kind: NetworkPolicy
    # Tier 9 (CHECKLIST microservice security): per-service mTLS
    # authorization. Server + ServerAuthorization are namespace-scoped
    # policy.linkerd.io resources that live in etradie-system alongside
    # the workloads, so they belong to THIS project (the Linkerd
    # control plane itself lives in the separate `linkerd` AppProject).
    # Audit ref: Tier 9 G9-2.
    - group: policy.linkerd.io
      kind: Server
    - group: policy.linkerd.io
      kind: ServerAuthorization
    - group: policy.linkerd.io
      kind: AuthorizationPolicy
    - group: policy.linkerd.io
      kind: MeshTLSAuthentication
    - group: policy.linkerd.io
      kind: NetworkAuthentication
    - group: rbac.authorization.k8s.io
      kind: Role
    - group: rbac.authorization.k8s.io
      kind: RoleBinding
    - group: monitoring.coreos.com
      kind: ServiceMonitor
    - group: monitoring.coreos.com
      kind: PodMonitor
    - group: monitoring.coreos.com
      kind: PrometheusRule
    - group: external-secrets.io
      kind: ExternalSecret
    - group: external-secrets.io
      kind: SecretStore
    # Required so the root-app (App-of-Apps) can create / update / prune
    # the child Applications under deployments/argocd/children/.
    - group: argoproj.io
      kind: Application
    # batch/CronJob is required for the postgres nightly backup job
    # created by helm/data-layer/templates/postgres-backup-cronjob.yaml
    # AND for the helm/mt-node Wine-prefix snapshot CronJob.
    # batch/Job is required because the CronJob controller spawns Jobs
    # in this project; ArgoCD must be allowed to observe them so
    # selfHeal does not mistakenly try to prune controller-owned Jobs.
    - group: batch
      kind: CronJob
    - group: batch
      kind: Job
    # CHECKLIST hardening (Gap #10): VolumeSnapshot is the resource
    # the mt-node snapshotter CronJob creates daily for every Wine
    # prefix PVC. Namespace-scoped resource. The VolumeSnapshotClass
    # is cluster-scoped and operator-managed (created once at cluster
    # bootstrap, not by the chart) so it is NOT whitelisted here.
    - group: snapshot.storage.k8s.io
      kind: VolumeSnapshot

  # Roles the project grants. Maintainers can sync; readers cannot.
  roles:
    - name: maintainers
      description: "Platform maintainers - can sync any Application in this project."
      policies:
        - p, proj:etradie:maintainers, applications, get, etradie/*, allow
        - p, proj:etradie:maintainers, applications, sync, etradie/*, allow
        - p, proj:etradie:maintainers, applications, action/*, etradie/*, allow
      groups:
        - etradie:platform-maintainers
    - name: readers
      description: "Read-only access to Application status and history."
      policies:
        - p, proj:etradie:readers, applications, get, etradie/*, allow
      groups:
        - etradie:engineering

  # Production sync window. Automated sync for `*-production`
  # Applications can only fire during this window; outside the window,
  # automated sync is paused. Manual sync by a maintainer is allowed
  # at any time INSIDE the window (manualSync: true).
  #
  # An additional `deny` window is intentionally NOT used here: an
  # `* * * * *` deny would override the allow window 24/7
  # (ArgoCD evaluates deny with higher precedence than allow), which
  # would brick production. Production is gated instead by:
  #   - `syncPolicy.automated.{prune: false, selfHeal: false}` on every
  #     `*-production` Application;
  #   - this single allow window, which restricts AUTOMATED sync to
  #     business hours and requires an explicit operator click for
  #     manual sync inside the window.
  syncWindows:
    - kind: allow
      schedule: "0 13 * * 1-5"   # 13:00 UTC Mon-Fri (business hours)
      duration: 8h
      applications:
        - "*-production"
      manualSync: true
    # 24/7 selfHeal window scoped to mt-node-* Applications.
    # Trading is 24/5 and an mt-node platform Secret rotation or
    # PriorityClass drift cannot wait for Monday 13:00 UTC. The
    # business-hours window above continues to gate every other
    # production Application as before. ArgoCD evaluates allow windows
    # additively: an mt-node-* Application sees BOTH windows and uses
    # the union, i.e. 24/7.
    - kind: allow
      schedule: "* * * * *"      # always
      duration: 24h
      applications:
        - "mt-node-*"
      manualSync: true
