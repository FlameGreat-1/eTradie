apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: etradie
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: etradie
    app.kubernetes.io/managed-by: argocd
  annotations:
    description: "eTradie platform AppProject - scopes the sources, destinations, and resource kinds the platform Applications may touch."
spec:
  description: "eTradie platform (gateway + envoy + edge-ingress)"

  # Allowed git sources. Adding any other repo requires a deliberate
  # AppProject change reviewed by platform owners.
  sourceRepos:
    - https://github.com/FlameGreat-1/eTradie.git
    - https://github.com/FlameGreat-1/eTradie

  # Allowed destinations. Limited to the namespaces this platform
  # actually owns. Bootstrap of new namespaces requires an explicit
  # AppProject change.
  destinations:
    - name: in-cluster
      namespace: etradie-system
    - name: in-cluster
      namespace: envoy-system
    - name: in-cluster
      namespace: edge-ingress-system

  # Cluster-scoped resources the Applications are allowed to manage.
  # PriorityClass and ClusterSecretStore are needed; everything else
  # is rejected.
  clusterResourceWhitelist:
    - group: scheduling.k8s.io
      kind: PriorityClass
    - group: external-secrets.io
      kind: ClusterSecretStore
    - group: ""
      kind: Namespace

  # Namespace-scoped resources the Applications are allowed to manage.
  namespaceResourceWhitelist:
    - group: ""
      kind: ConfigMap
    - group: ""
      kind: Service
    - group: ""
      kind: ServiceAccount
    - group: ""
      kind: Secret
    - group: ""
      kind: ResourceQuota
    - group: ""
      kind: LimitRange
    - group: apps
      kind: Deployment
    - group: apps
      kind: StatefulSet
    - group: autoscaling
      kind: HorizontalPodAutoscaler
    - group: policy
      kind: PodDisruptionBudget
    - group: networking.k8s.io
      kind: NetworkPolicy
    - group: rbac.authorization.k8s.io
      kind: Role
    - group: rbac.authorization.k8s.io
      kind: RoleBinding
    - group: monitoring.coreos.com
      kind: ServiceMonitor
    - group: monitoring.coreos.com
      kind: PodMonitor
    - group: monitoring.coreos.com
      kind: PrometheusRule
    - group: external-secrets.io
      kind: ExternalSecret
    - group: external-secrets.io
      kind: SecretStore
    # Required so the root-app (App-of-Apps) can create / update / prune
    # the child Applications under deployments/argocd/children/.
    - group: argoproj.io
      kind: Application
    # batch/CronJob is required for the postgres nightly backup job
    # created by helm/data-layer/templates/postgres-backup-cronjob.yaml.
    # batch/Job is required because the CronJob controller spawns Jobs
    # in this project; ArgoCD must be allowed to observe them so
    # selfHeal does not mistakenly try to prune controller-owned Jobs.
    - group: batch
      kind: CronJob
    - group: batch
      kind: Job

  # Roles the project grants. Maintainers can sync; readers cannot.
  roles:
    - name: maintainers
      description: "Platform maintainers - can sync any Application in this project."
      policies:
        - p, proj:etradie:maintainers, applications, get, etradie/*, allow
        - p, proj:etradie:maintainers, applications, sync, etradie/*, allow
        - p, proj:etradie:maintainers, applications, action/*, etradie/*, allow
      groups:
        - etradie:platform-maintainers
    - name: readers
      description: "Read-only access to Application status and history."
      policies:
        - p, proj:etradie:readers, applications, get, etradie/*, allow
      groups:
        - etradie:engineering

  # Production sync window. Automated sync for `*-production`
  # Applications can only fire during this window; outside the window,
  # automated sync is paused. Manual sync by a maintainer is allowed
  # at any time INSIDE the window (manualSync: true).
  #
  # An additional `deny` window is intentionally NOT used here: an
  # `* * * * *` deny would override the allow window 24/7
  # (ArgoCD evaluates deny with higher precedence than allow), which
  # would brick production. Production is gated instead by:
  #   - `syncPolicy.automated.{prune: false, selfHeal: false}` on every
  #     `*-production` Application;
  #   - this single allow window, which restricts AUTOMATED sync to
  #     business hours and requires an explicit operator click for
  #     manual sync inside the window.
  syncWindows:
    - kind: allow
      schedule: "0 13 * * 1-5"   # 13:00 UTC Mon-Fri (business hours)
      duration: 8h
      applications:
        - "*-production"
      manualSync: true
