# ExternalSecret that resolves the Cloudflare Authenticated Origin Pulls
# CA chain from Vault and synthesises a Kubernetes Secret named
# `cloudflare-aop-ca` in the edge-ingress-system namespace.
#
# The Secret is mounted into the edge-ingress pod at
# /etc/edge-ingress/cloudflare/origin-pull-ca.pem. The Rust TLS layer
# (src/edge-ingress/crates/tls/) reads the path from the
# `tls.client_auth.ca_path` field in edge-ingress.yaml.
#
# Vault layout (operator responsibility):
#   secret/etradie/services/edge-ingress/cloudflare/aop_ca
#       \__ aop_ca: <PEM bytes of the Cloudflare AOP CA>
#
# Rotation: when Cloudflare rotates the AOP CA (rare), update the Vault
# value to the new chain. ExternalSecret refreshInterval=1h means
# edge-ingress pods see the new CA within an hour, after which a rolling
# restart picks up the new file.
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cloudflare-aop-ca
  namespace: edge-ingress-system
  labels:
    app.kubernetes.io/name: cloudflare-aop-ca
    app.kubernetes.io/component: edge-trust
    app.kubernetes.io/part-of: etradie
  annotations:
    description: "Cloudflare AOP CA bundle for edge-ingress mTLS client auth"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: cloudflare-aop-ca
    creationPolicy: Owner
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/name: cloudflare-aop-ca
          app.kubernetes.io/part-of: etradie
  data:
    - secretKey: origin-pull-ca.pem
      remoteRef:
        key: etradie/services/edge-ingress/cloudflare/aop_ca
        property: aop_ca
