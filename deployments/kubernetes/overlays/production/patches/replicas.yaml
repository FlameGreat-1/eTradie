apiVersion: apps/v1
kind: Deployment
metadata:
  name: exoper-envoy
  namespace: envoy-system
spec:
  replicas: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 2
      maxUnavailable: 0
  template:
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: exoper-envoy
              topologyKey: kubernetes.io/hostname
            - labelSelector:
                matchLabels:
                  app: exoper-envoy
              topologyKey: topology.kubernetes.io/zone
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: node.kubernetes.io/instance-type
                    operator: In
                    values:
                      - c5.2xlarge
                      - c5.4xlarge
                      - c6i.2xlarge
                      - c6i.4xlarge
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: exoper-envoy
  namespace: envoy-system
spec:
  minReplicas: 5
  maxReplicas: 10
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 25
          periodSeconds: 120
        - type: Pods
          value: 1
          periodSeconds: 120
      selectPolicy: Min
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
        - type: Pods
          value: 2
          periodSeconds: 60
      selectPolicy: Max
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
    - type: Pods
      pods:
        metric:
          name: envoy_http_downstream_rq_active
        target:
          type: AverageValue
          averageValue: "2000"
    - type: Pods
      pods:
        metric:
          name: envoy_cluster_upstream_rq_active
        target:
          type: AverageValue
          averageValue: "1500"
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: exoper-envoy
  namespace: envoy-system
spec:
  minAvailable: 3
  selector:
    matchLabels:
      app: exoper-envoy
  unhealthyPodEvictionPolicy: IfHealthyBudget
