apiVersion: v1
kind: Namespace
metadata:
  name: envoy-system
  labels:
    name: envoy-system
    app.kubernetes.io/name: exoper-envoy
    app.kubernetes.io/component: proxy
    app.kubernetes.io/part-of: exoper
    app.kubernetes.io/managed-by: kustomize
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: latest
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
  annotations:
    description: "Exoper Envoy proxy namespace"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: envoy-resource-quota
  namespace: envoy-system
  labels:
    app.kubernetes.io/name: exoper-envoy
    app.kubernetes.io/component: resource-quota
spec:
  hard:
    requests.cpu: "8"
    requests.memory: 16Gi
    limits.cpu: "16"
    limits.memory: 32Gi
    persistentvolumeclaims: "0"
    services.loadbalancers: "0"
    services.nodeports: "0"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: envoy-limit-range
  namespace: envoy-system
  labels:
    app.kubernetes.io/name: exoper-envoy
    app.kubernetes.io/component: limit-range
spec:
  limits:
    - max:
        cpu: "4"
        memory: 8Gi
      min:
        cpu: 100m
        memory: 128Mi
      default:
        cpu: "2"
        memory: 4Gi
      defaultRequest:
        cpu: "1"
        memory: 2Gi
      type: Container
    - max:
        cpu: "8"
        memory: 16Gi
      min:
        cpu: 100m
        memory: 128Mi
      type: Pod
