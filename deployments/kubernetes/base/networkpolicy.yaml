apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: envoy-network-policy
  namespace: envoy-system
  labels:
    app.kubernetes.io/name: exoper-envoy
    app.kubernetes.io/component: network-policy
    app.kubernetes.io/part-of: exoper
spec:
  podSelector:
    matchLabels:
      app: exoper-envoy
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic from edge-ingress (AND: namespace AND pod)
    - from:
        - namespaceSelector:
            matchLabels:
              name: exoper-system
          podSelector:
            matchLabels:
              app.kubernetes.io/name: edge-ingress
      ports:
        - protocol: TCP
          port: 8080
    # Allow Prometheus scraping (AND: namespace AND pod)
    - from:
        - namespaceSelector:
            matchLabels:
              name: monitoring
          podSelector:
            matchLabels:
              app: prometheus
      ports:
        - protocol: TCP
          port: 9901
  egress:
    # Allow connections to gateway (AND: namespace AND pod)
    - to:
        - namespaceSelector:
            matchLabels:
              app.kubernetes.io/part-of: exoper
          podSelector:
            matchLabels:
              app.kubernetes.io/name: gateway-orchestrator
      ports:
        - protocol: TCP
          port: 8081
    # Allow DNS resolution (UDP + TCP)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
