apiVersion: v1
kind: ServiceAccount
metadata:
  name: exoper-envoy
  namespace: envoy-system
  labels:
    app: exoper-envoy
    component: serviceaccount
  annotations:
    description: "Service account for Exoper Envoy proxy pods"
automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: exoper-envoy
  namespace: envoy-system
  labels:
    app: exoper-envoy
    component: rbac
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
    resourceNames:
      - exoper-envoy-config
      - exoper-envoy-wasm
  - apiGroups: [""]
    resources: ["endpoints"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: exoper-envoy
  namespace: envoy-system
  labels:
    app: exoper-envoy
    component: rbac
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: exoper-envoy
subjects:
  - kind: ServiceAccount
    name: exoper-envoy
    namespace: envoy-system
