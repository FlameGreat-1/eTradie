apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: etradie-system

commonLabels:
  environment: staging
  app.kubernetes.io/instance: staging

commonAnnotations:
  managed-by: kustomize
  tier: staging

resources:
  - ../../base

patches:
  - path: patches/replicas.yaml
  - target:
      kind: ConfigMap
      name: etradie-gateway-config
    patch: |-
      - op: replace
        path: /data/GATEWAY_LOG_LEVEL
        value: "DEBUG"
      - op: replace
        path: /data/GATEWAY_ALLOWED_ORIGINS
        value: "https://staging.etradie.com,https://staging-app.etradie.com"
      - op: replace
        path: /data/AUTH_TRUSTED_PROXY_CIDRS
        value: "10.42.0.0/16"
      - op: replace
        path: /data/AUTH_TRUST_CLOUDFLARE
        value: "false"
  - target:
      kind: HorizontalPodAutoscaler
      name: etradie-gateway
    patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 3
      - op: replace
        path: /spec/maxReplicas
        value: 6
  - target:
      kind: PodDisruptionBudget
      name: etradie-gateway
    patch: |-
      - op: replace
        path: /spec/minAvailable
        value: 2
  - target:
      kind: ServiceMonitor
      name: etradie-gateway
    patch: |-
      - op: replace
        path: /spec/endpoints/0/interval
        value: "15s"
      - op: replace
        path: /spec/endpoints/0/scrapeTimeout
        value: "10s"
  - target:
      kind: ResourceQuota
      name: etradie-gateway-resource-quota
    patch: |-
      - op: replace
        path: /spec/hard/requests.cpu
        value: "8"
      - op: replace
        path: /spec/hard/requests.memory
        value: "16Gi"
      - op: replace
        path: /spec/hard/limits.cpu
        value: "16"
      - op: replace
        path: /spec/hard/limits.memory
        value: "32Gi"

images:
  - name: registry.gitlab.com/cotradee3/cotradeecode/gateway
    newTag: "staging-0.1.0"

replicas:
  - name: etradie-gateway
    count: 3
