apiVersion: apps/v1
kind: Deployment
metadata:
  name: etradie-gateway
  namespace: etradie-system
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    spec:
      containers:
        - name: gateway
          resources:
            requests:
              cpu: "500m"
              memory: "768Mi"
              ephemeral-storage: "256Mi"
            limits:
              cpu: "1500m"
              memory: "1536Mi"
              ephemeral-storage: "512Mi"
