apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: etradie-system

commonLabels:
  environment: production
  app.kubernetes.io/instance: production

commonAnnotations:
  managed-by: kustomize
  tier: production

resources:
  - ../../base

patches:
  - path: patches/replicas.yaml
  - path: patches/resources.yaml
  - target:
      kind: ConfigMap
      name: etradie-gateway-config
    patch: |-
      - op: replace
        path: /data/GATEWAY_LOG_LEVEL
        value: "INFO"
      - op: replace
        path: /data/GATEWAY_LOG_FULL_CONTEXT_PAYLOAD
        value: "false"
      - op: replace
        path: /data/GATEWAY_ALLOWED_ORIGINS
        value: "https://app.etradie.com,https://etradie.com"
      - op: replace
        path: /data/AUTH_TRUSTED_PROXY_CIDRS
        value: "10.100.0.0/16"
      - op: replace
        path: /data/AUTH_TRUST_CLOUDFLARE
        value: "true"
  - target:
      kind: Deployment
      name: etradie-gateway
    patch: |-
      - op: add
        path: /spec/template/metadata/annotations/cluster-autoscaler.kubernetes.io~1safe-to-evict
        value: "false"
  - target:
      kind: HorizontalPodAutoscaler
      name: etradie-gateway
    patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 5
      - op: replace
        path: /spec/maxReplicas
        value: 10
  - target:
      kind: PodDisruptionBudget
      name: etradie-gateway
    patch: |-
      - op: replace
        path: /spec/minAvailable
        value: 3
  - target:
      kind: ServiceMonitor
      name: etradie-gateway
    patch: |-
      - op: replace
        path: /spec/endpoints/0/interval
        value: "10s"
      - op: replace
        path: /spec/endpoints/0/scrapeTimeout
        value: "8s"
  - target:
      kind: ResourceQuota
      name: etradie-gateway-resource-quota
    patch: |-
      - op: replace
        path: /spec/hard/requests.cpu
        value: "24"
      - op: replace
        path: /spec/hard/requests.memory
        value: "48Gi"
      - op: replace
        path: /spec/hard/limits.cpu
        value: "48"
      - op: replace
        path: /spec/hard/limits.memory
        value: "96Gi"

images:
  - name: registry.gitlab.com/cotradee3/cotradeecode/gateway
    newTag: "0.1.0"
    digest: sha256:placeholder-replaced-by-ci

replicas:
  - name: etradie-gateway
    count: 5
