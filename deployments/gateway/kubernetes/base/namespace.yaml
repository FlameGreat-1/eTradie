apiVersion: v1
kind: Namespace
metadata:
  name: etradie-system
  labels:
    name: etradie-system
    app.kubernetes.io/name: etradie-gateway
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: etradie
    app.kubernetes.io/managed-by: kustomize
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: latest
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
  annotations:
    description: "eTradie gateway namespace (Go API + gRPC)"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: etradie-gateway-resource-quota
  namespace: etradie-system
  labels:
    app.kubernetes.io/name: etradie-gateway
    app.kubernetes.io/component: resource-quota
    app.kubernetes.io/part-of: etradie
spec:
  hard:
    requests.cpu: "4"
    requests.memory: 8Gi
    limits.cpu: "8"
    limits.memory: 16Gi
    persistentvolumeclaims: "0"
    services.loadbalancers: "0"
    services.nodeports: "0"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: etradie-gateway-limit-range
  namespace: etradie-system
  labels:
    app.kubernetes.io/name: etradie-gateway
    app.kubernetes.io/component: limit-range
    app.kubernetes.io/part-of: etradie
spec:
  limits:
    - max:
        cpu: "2"
        memory: 4Gi
      min:
        cpu: 100m
        memory: 128Mi
      default:
        cpu: "1"
        memory: 2Gi
      defaultRequest:
        cpu: 250m
        memory: 512Mi
      type: Container
    - max:
        cpu: "4"
        memory: 8Gi
      min:
        cpu: 100m
        memory: 128Mi
      type: Pod
