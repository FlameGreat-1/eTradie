apiVersion: apps/v1
kind: Deployment
metadata:
  name: etradie-gateway
  namespace: etradie-system
  labels:
    app.kubernetes.io/name: etradie-gateway
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: etradie
    app.kubernetes.io/version: "0.1.0"
spec:
  replicas: 3
  revisionHistoryLimit: 10
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: etradie-gateway
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: etradie-gateway
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: etradie
        app.kubernetes.io/version: "0.1.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
        # Trigger pod restart when ConfigMap / Secret content changes.
        # (Kustomize replaces these placeholders via a configMapGenerator/
        # secretGenerator hash in overlays, not here.)
        checksum/config: "placeholder-replaced-by-overlay"
        checksum/secrets: "placeholder-replaced-by-overlay"
    spec:
      serviceAccountName: etradie-gateway
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: etradie-gateway
                topologyKey: kubernetes.io/hostname
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: etradie-gateway
      initContainers:
        - name: wait-for-deps
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            capabilities:
              drop:
                - ALL
          command:
            - /bin/sh
            - -c
            - |
              # Wait up to ~120s for Postgres and Redis to accept TCP.
              # Fail loudly if either is still down so the pod's
              # restart-loop surfaces a real cluster issue.
              set -eu
              for i in $(seq 1 60); do
                if nc -z postgres-service 5432 && nc -z redis-service 6379; then
                  echo "postgres and redis are reachable"
                  exit 0
                fi
                echo "[$i/60] waiting for postgres:5432 and redis:6379"
                sleep 2
              done
              echo "timed out waiting for postgres / redis"
              exit 1
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
      containers:
        - name: gateway
          image: registry.gitlab.com/cotradee3/cotradeecode/gateway:0.1.0
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: grpc
              containerPort: 50052
              protocol: TCP
          envFrom:
            - configMapRef:
                name: etradie-gateway-config
                optional: false
            - secretRef:
                name: etradie-gateway-secrets
                optional: false
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
              ephemeral-storage: 256Mi
            limits:
              cpu: 1
              memory: 1Gi
              ephemeral-storage: 512Mi
          startupProbe:
            httpGet:
              path: /health
              port: http
              scheme: HTTP
            initialDelaySeconds: 5
            periodSeconds: 2
            timeoutSeconds: 2
            successThreshold: 1
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /health
              port: http
              scheme: HTTP
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 3
          readinessProbe:
            httpGet:
              # /readiness probes Redis + engine; see
              # src/gateway/internal/server/http_server.go::handleReadiness.
              path: /readiness
              port: http
              scheme: HTTP
            initialDelaySeconds: 0
            periodSeconds: 5
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                # Sleep 5s so the endpoints controller has time to
                # deregister this pod from gateway-service before
                # SIGTERM lands. Eliminates the EOF window during
                # rollouts.
                command: ["/bin/sh", "-c", "sleep 5"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: cache
              mountPath: /var/cache/etradie-gateway
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi
        - name: cache
          emptyDir:
            sizeLimit: 256Mi
      dnsPolicy: ClusterFirst
      restartPolicy: Always
