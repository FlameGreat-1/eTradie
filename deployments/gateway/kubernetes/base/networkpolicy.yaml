apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: etradie-gateway-network-policy
  namespace: etradie-system
  labels:
    app.kubernetes.io/name: etradie-gateway
    app.kubernetes.io/component: network-policy
    app.kubernetes.io/part-of: etradie
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: etradie-gateway
      app.kubernetes.io/component: api
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # ── HTTP from envoy (the only public ingress path) ─────────────────────────────────
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: envoy-system
          podSelector:
            matchLabels:
              app.kubernetes.io/name: etradie-envoy
      ports:
        - protocol: TCP
          port: 8080
    # ── Prometheus scraping the /metrics endpoint ────────────────────────────────────
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
          podSelector:
            matchLabels:
              app: prometheus
      ports:
        - protocol: TCP
          port: 8080
    # ── gRPC from Execution + Management (intra-namespace) ────────────────────────────
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: etradie-execution
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: etradie-management
      ports:
        - protocol: TCP
          port: 50052
  egress:
    # ── PostgreSQL ───────────────────────────────────────────────────────────
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: postgres
      ports:
        - protocol: TCP
          port: 5432
    # ── Redis ─────────────────────────────────────────────────────────────────
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: redis
      ports:
        - protocol: TCP
          port: 6379
    # ── Python engine (RAG + processor + broker bridge) ───────────────────────────────
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: etradie-engine
      ports:
        - protocol: TCP
          port: 8000
    # ── Execution gRPC ─────────────────────────────────────────────────────────
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: etradie-execution
      ports:
        - protocol: TCP
          port: 50053
    # ── Management gRPC ─────────────────────────────────────────────────────────
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: etradie-management
      ports:
        - protocol: TCP
          port: 50054
    # ── OTel collector (trace export) ───────────────────────────────────────────────
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: etradie-observability
          podSelector:
            matchLabels:
              app.kubernetes.io/name: otel-collector
      ports:
        - protocol: TCP
          port: 4317
    # ── DNS ───────────────────────────────────────────────────────────────────────
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
