apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: etradie-gateway-secrets
  namespace: etradie-system
  labels:
    app.kubernetes.io/name: etradie-gateway
    app.kubernetes.io/component: secret
    app.kubernetes.io/part-of: etradie
  annotations:
    description: "Gateway runtime secrets resolved from Vault"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: etradie-gateway-secrets
    creationPolicy: Owner
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/name: etradie-gateway
          app.kubernetes.io/part-of: etradie
  data:
    # ── Database ───────────────────────────────────────────────────────
    - secretKey: AUTH_DATABASE_URL
      remoteRef:
        key: etradie/services/gateway
        property: auth_database_url
    - secretKey: POSTGRES_USER
      remoteRef:
        key: etradie/services/gateway
        property: postgres_user
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: etradie/services/gateway
        property: postgres_password
    - secretKey: POSTGRES_HOST
      remoteRef:
        key: etradie/services/gateway
        property: postgres_host
    - secretKey: POSTGRES_PORT
      remoteRef:
        key: etradie/services/gateway
        property: postgres_port
    - secretKey: POSTGRES_DB
      remoteRef:
        key: etradie/services/gateway
        property: postgres_db

    # ── Redis ───────────────────────────────────────────────────────────
    - secretKey: GATEWAY_REDIS_URL
      remoteRef:
        key: etradie/services/gateway
        property: gateway_redis_url

    # ── JWT signing ─────────────────────────────────────────────────────
    - secretKey: AUTH_JWT_SECRET
      remoteRef:
        key: etradie/services/gateway
        property: auth_jwt_secret

    # ── Admin seed ──────────────────────────────────────────────────────
    # Used only on first startup; rotate in Vault after bootstrap.
    - secretKey: AUTH_ADMIN_PASSWORD
      remoteRef:
        key: etradie/services/gateway
        property: auth_admin_password

    # ── Credential-at-rest encryption ──────────────────────────────────────────
    # Used to encrypt broker / LLM connection credentials persisted in
    # PostgreSQL by the Python engine. Mounted into the gateway pod
    # so the engine sidecar (run as a separate container in some
    # topologies) shares the same key material; remove if engine
    # runs in its own pod.
    - secretKey: BROKER_ENCRYPTION_KEY
      remoteRef:
        key: etradie/services/gateway
        property: broker_encryption_key
    - secretKey: LLM_ENCRYPTION_KEY
      remoteRef:
        key: etradie/services/gateway
        property: llm_encryption_key
