apiVersion: v1
kind: ServiceAccount
metadata:
  name: etradie-gateway
  namespace: etradie-system
  labels:
    app.kubernetes.io/name: etradie-gateway
    app.kubernetes.io/component: serviceaccount
    app.kubernetes.io/part-of: etradie
  annotations:
    description: "Service account for eTradie gateway pods"
# Token is mounted explicitly only when the pod opts in (via
# automountServiceAccountToken on the Deployment). The default of
# `false` here is defence in depth: a compromised pod cannot
# enumerate the API server unless an operator explicitly grants it.
automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: etradie-gateway
  namespace: etradie-system
  labels:
    app.kubernetes.io/name: etradie-gateway
    app.kubernetes.io/component: rbac
    app.kubernetes.io/part-of: etradie
rules:
  # Read-only access to the gateway's own ConfigMap so the in-process
  # config loader can hot-reload settings on SIGHUP without bouncing
  # the pod. Scope is restricted to the named ConfigMap to limit
  # blast radius of a token leak.
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
    resourceNames:
      - etradie-gateway-config
  # Required to reflect the Service endpoints that fronted the
  # gateway (used by graceful-shutdown logic to drain in-flight
  # connections before the pod terminates).
  - apiGroups: [""]
    resources: ["endpoints"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: etradie-gateway
  namespace: etradie-system
  labels:
    app.kubernetes.io/name: etradie-gateway
    app.kubernetes.io/component: rbac
    app.kubernetes.io/part-of: etradie
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: etradie-gateway
subjects:
  - kind: ServiceAccount
    name: etradie-gateway
    namespace: etradie-system
