global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "etradie-engine"
    metrics_path: /metrics
    static_configs:
      - targets: ["engine:8000"]
        labels:
          service: "etradie-engine"
          environment: "development"

  - job_name: "etradie-gateway"
    metrics_path: /metrics
    static_configs:
      - targets: ["gateway:8080"]
        labels:
          service: "etradie-gateway"
          environment: "development"

  - job_name: "etradie-execution"
    metrics_path: /metrics
    static_configs:
      - targets: ["execution:8080"]
        labels:
          service: "etradie-execution"
          environment: "development"
