# helm/edge-ingress - default values.
#
# Local dev does not use this chart (kustomize-only).
# values-staging.yaml and values-production.yaml override what
# genuinely differs per environment.
#
# Baseline sizing rationale:
#   - replicaCount/minReplicas: 3 satisfies single-node loss
#     resilience (>=2 healthy after one drains) AND single-AZ loss
#     resilience (chart spreads across >=2 zones via
#     topologySpreadConstraints + pod anti-affinity).
#   - Required hostname-level pod anti-affinity stays in place
#     (affinity.podAntiAffinity.requiredDuringSchedulingIgnoredDuringExecution
#     below) so the cluster needs at least replicaCount distinct
#     nodes in the edge pool. With replicaCount=3 that is the same
#     order as gateway/engine baseline elsewhere in this repo.
#   - HPA bursts up to maxReplicas=50 at 60% CPU in under 30s, so
#     baseline = sustainable + emergency-resilience floor, not
#     peak-traffic floor.
#   - PDB.minAvailable: 2 keeps service available during voluntary
#     evictions (one node drain) while leaving room for a pod to
#     restart.

replicaCount: 3
revisionHistoryLimit: 10

image:
  # CI publishes to GHCR (ghcr.io/<owner>/<repo>/<service>:<tag>).
  # Owner + repo lowercased per GHCR case-sensitivity. Matches the
  # IMAGE_BASE in .github/workflows/ci.yml.
  repository: ghcr.io/flamegreat-1/etradie/edge-ingress
  pullPolicy: IfNotPresent
  tag: "0.2.0"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: "edge-ingress"

namespace:
  create: true
  name: "edge-ingress-system"
  podSecurityStandard: "restricted"

serviceAccount:
  create: true
  name: ""
  annotations: {}
  automountServiceAccountToken: false

podAnnotations: {}

podSecurityContext:
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

securityContext:
  runAsUser: 1000

strategy:
  maxSurge: 1
  maxUnavailable: 0

service:
  # Cloud LB strategy. One of:
  #   - "cloudflare-tunnel": no public LB; a cloudflared deployment
  #     opens an outbound tunnel to Cloudflare and forwards to
  #     edge-ingress on :443 in-cluster. Service.type=ClusterIP.
  #     This is the default because Cloudflare is already part of
  #     the trust chain (AOP CA, CF-Connecting-IP, IP ranges).
  #   - "generic": LoadBalancer Service with no cloud-specific
  #     annotations (works on OCI OKE, GKE, AKS, MetalLB on bare
  #     metal). TLS terminates inside edge-ingress.
  #
  # AWS is intentionally NOT a supported mode — the platform does
  # not deploy on AWS.
  cloudProvider: "cloudflare-tunnel"
  # type is auto-selected from cloudProvider above. This value is
  # honoured only as an explicit override; leave empty to let the
  # template choose ClusterIP (cloudflare-tunnel) or LoadBalancer
  # (generic).
  type: ""
  externalTrafficPolicy: Local
  ports:
    tls:
      port: 443
  # Extra annotations applied regardless of cloudProvider. Keep this
  # empty unless you genuinely need a vendor-specific knob.
  annotations: {}

# Cloudflare Tunnel (cloudflared) configuration. Only rendered when
# service.cloudProvider="cloudflare-tunnel". The tunnel token is
# resolved through External Secrets Operator from Vault, identical to
# the existing tlsCerts / aopCa / maxmind ExternalSecrets pattern.
cloudflareTunnel:
  enabled: true   # honoured only when service.cloudProvider=cloudflare-tunnel
  replicaCount: 2
  image:
    repository: "cloudflare/cloudflared"
    tag: "2024.10.1"
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 100m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi
  # ExternalSecret for the tunnel token. The token authenticates the
  # cloudflared pod against Cloudflare's edge; it must be rotated
  # via Vault, never committed.
  externalSecret:
    secretStoreName: "vault-backend"
    secretStoreKind: "ClusterSecretStore"
    refreshInterval: "1h"
    targetSecretName: "cloudflared-tunnel-token"
    vaultPath: "etradie/services/edge-ingress/production/cloudflare/tunnel"
    property: "tunnel_token"
  # Tunnel forwards inbound requests to this in-cluster URL. The
  # default points at the edge-ingress ClusterIP Service on :443.
  upstreamUrl: "https://edge-ingress.edge-ingress-system.svc.cluster.local:443"
  # cloudflared can run in --no-tls-verify when the ingress terminates
  # TLS with a cert that cloudflared cannot validate (e.g. self-signed
  # or internal CA). For production with Cloudflare AOP CA, the
  # certificate is publicly trusted via the same AOP chain, so we
  # leave verification ON.
  noTlsVerify: false

metricsService:
  type: ClusterIP
  port: 9902

# Resource envelope sized so HPA peak (maxReplicas × limits.cpu) fits
# under namespace ResourceQuota.hard.limitsCpu with headroom for
# platform overhead. 2:1 limits-to-requests ratio is enough burst for
# TLS handshake spikes; the Rust binary's RSS under 5k sustained
# connections is ~400 MiB so memory limits=2Gi is a 5x safety margin.
resources:
  requests:
    cpu: 1000m
    memory: 1Gi
    ephemeral-storage: 256Mi
  limits:
    cpu: 2000m
    memory: 2Gi
    ephemeral-storage: 512Mi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 50
  targetCPUUtilizationPercentage: 60
  targetMemoryUtilizationPercentage: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 600
      policies:
        - type: Percent
          value: 25
          periodSeconds: 120
        - type: Pods
          value: 2
          periodSeconds: 120
      selectPolicy: Min
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
        - type: Pods
          value: 5
          periodSeconds: 15
      selectPolicy: Max
  # Custom metrics require an external adapter (prometheus-adapter or
  # KEDA) installed in the cluster. Default-OFF so the chart works on
  # any cluster; the operator flips this to true in
  # values-production.yaml once the adapter is installed.
  #
  # Metric: edge_ingress_active_connections (registered in
  # src/edge-ingress/crates/common/src/metrics.rs as a Prometheus
  # IntGauge per pod). This is a true per-pod connection count.
  #
  # Required prometheus-adapter rule (paste into the adapter's
  # ConfigMap; do NOT ship from this chart, that crosses concerns):
  #
  #   - seriesQuery: 'edge_ingress_active_connections{namespace!="",pod!=""}'
  #     resources:
  #       overrides:
  #         namespace: { resource: namespace }
  #         pod:       { resource: pod }
  #     name:
  #       matches: 'edge_ingress_active_connections'
  #       as:      'edge_ingress_active_connections'
  #     metricsQuery: |
  #       sum by (<<.GroupBy>>) (
  #         edge_ingress_active_connections{<<.LabelMatchers>>}
  #       )
  customMetricsEnabled: false
  customMetricsList:
    - type: Pods
      pods:
        metric:
          name: edge_ingress_active_connections
        target:
          type: AverageValue
          averageValue: "5000"

podDisruptionBudget:
  enabled: true
  minAvailable: 2
  unhealthyPodEvictionPolicy: AlwaysAllow

resourceQuota:
  enabled: true
  hard:
    requestsCpu: "60"
    requestsMemory: "60Gi"
    limitsCpu: "240"
    limitsMemory: "240Gi"
    servicesLoadbalancers: "1"
    servicesNodeports: "0"

networkPolicy:
  enabled: true
  monitoringNamespace: "monitoring"
  envoyNamespace: "envoy-system"
  envoyPort: 8080
  extraEgress: []

serviceMonitor:
  enabled: true
  interval: "15s"
  scrapeTimeout: "10s"
  labels:
    prometheus: kube-prometheus

priorityClass:
  enabled: true
  name: "edge-ingress-critical"
  value: 1000000
  globalDefault: false
  description: "Critical priority for edge-ingress pods handling internet traffic"

affinity:
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchExpressions:
            - key: app.kubernetes.io/name
              operator: In
              values:
                - edge-ingress
        topologyKey: kubernetes.io/hostname
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - edge-ingress
          topologyKey: topology.kubernetes.io/zone

topologySpreadConstraints: []

# Scheduling constraints. Empty by default so the chart deploys on any
# EKS cluster. Production layers values-production.yaml on top and pins
# the instance type + adds the matching toleration for the dedicated
# `edge` node taint applied by infrastructure/cluster/.
nodeSelector: {}

tolerations: []

terminationGracePeriodSeconds: 30

logging:
  rustLog: "info,edge_ingress=info"
  rustBacktrace: "0"

extraEnv: []

volumes:
  geoipData:
    sizeLimit: "200Mi"
  tmp:
    sizeLimit: "64Mi"

geoip:
  # Editions to download. GeoLite2-City is sufficient for the
  # geo-router's country / region resolution. Adding GeoLite2-Country
  # or GeoLite2-ASN here is supported by the upstream image
  # (space-separated list).
  editionIds: "GeoLite2-City"
  initContainer:
    # Official MaxMind geoipupdate image. Same image as the local
    # docker-compose `edge-geoip-init` service (docker-compose.yml).
    # v6+ is required because MaxMind deprecated the legacy
    # license-key-only download URL alongside the v6 client release.
    image: "maxmindinc/geoipupdate:v6.0"
    pullPolicy: IfNotPresent

# Preflight init-container that validates the Cloudflare AOP CA Secret
# is present, non-empty, and parseable as PEM before the main
# edge-ingress container starts. Without this, an empty Vault path
# (operator has not yet populated `aop_ca`) produces a Rust panic at
# TLS handshake; with this, pods stay in Init: with a clear error
# message, traffic is never routed, and the operator gets a precise
# pointer to the Vault path that needs populating.
aopCaPreflight:
  enabled: true
  # Tiny alpine image with the openssl CLI. Pinned by tag (no
  # :latest). Air-gapped clusters can mirror this and override the
  # repository here.
  image: "alpine/openssl:3.3"
  pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 10m
      memory: 16Mi
    limits:
      cpu: 100m
      memory: 64Mi

externalSecrets:
  enabled: true
  tlsCerts:
    secretStoreName: "vault-backend"
    secretStoreKind: "ClusterSecretStore"
    refreshInterval: "1h"
    targetSecretName: "edge-ingress-tls-certs"
    # Production Vault path. Aligns with infrastructure/cluster/main.tf
    # which creates etradie/services/edge-ingress/${environment}/tls.
    # values-staging.yaml overrides this to the staging-segmented path.
    vaultPath: "etradie/services/edge-ingress/production/tls"
    entries:
      - secretKey: "api.etradie.com.crt"
        property: "api_cert"
      - secretKey: "api.etradie.com.key"
        property: "api_key"
      - secretKey: "wildcard.etradie.com.crt"
        property: "wildcard_cert"
      - secretKey: "wildcard.etradie.com.key"
        property: "wildcard_key"
      - secretKey: "api-eu.etradie.com.crt"
        property: "api_eu_cert"
      - secretKey: "api-eu.etradie.com.key"
        property: "api_eu_key"
      - secretKey: "api-ap.etradie.com.crt"
        property: "api_ap_cert"
      - secretKey: "api-ap.etradie.com.key"
        property: "api_ap_key"
  maxmind:
    secretStoreName: "vault-backend"
    secretStoreKind: "ClusterSecretStore"
    refreshInterval: "24h"
    targetSecretName: "maxmind-credentials"
    # Production Vault path; staging/production overlays override.
    vaultPath: "etradie/services/edge-ingress/production/maxmind"
  aopCa:
    secretStoreName: "vault-backend"
    secretStoreKind: "ClusterSecretStore"
    refreshInterval: "1h"
    targetSecretName: "cloudflare-aop-ca"
    # Production Vault path. Aligns with
    # infrastructure/cluster/main.tf::vault_kv_secret_v2.edge_ingress_aop_ca
    # (etradie/services/edge-ingress/${environment}/cloudflare/aop_ca).
    vaultPath: "etradie/services/edge-ingress/production/cloudflare/aop_ca"

# Edge-ingress YAML config rendered by templates/configmap.yaml.
config:
  server:
    tlsBindAddress: "0.0.0.0:443"
    metricsBindAddress: "0.0.0.0:9902"
    idleTimeoutSecs: 300
  tls:
    minTlsVersion: "1.2"
    preferredTlsVersion: "1.3"
    handshakeTimeoutSecs: 10
    enableSni: true
    certReloadIntervalSecs: 3600
    # Cloudflare AOP CA path inside the pod. Mandatory; templates fail
    # rendering if empty.
    clientAuth:
      caPath: "/etc/edge-ingress/cloudflare/origin-pull-ca.pem"
    certificates:
      - hostname: "api.etradie.com"
        certPath: "/etc/edge-ingress/certs/api.etradie.com.crt"
        keyPath: "/etc/edge-ingress/certs/api.etradie.com.key"
        isDefault: true
      - hostname: "*.etradie.com"
        certPath: "/etc/edge-ingress/certs/wildcard.etradie.com.crt"
        keyPath: "/etc/edge-ingress/certs/wildcard.etradie.com.key"
        isDefault: false
      - hostname: "api-eu.etradie.com"
        certPath: "/etc/edge-ingress/certs/api-eu.etradie.com.crt"
        keyPath: "/etc/edge-ingress/certs/api-eu.etradie.com.key"
        isDefault: false
      - hostname: "api-ap.etradie.com"
        certPath: "/etc/edge-ingress/certs/api-ap.etradie.com.crt"
        keyPath: "/etc/edge-ingress/certs/api-ap.etradie.com.key"
        isDefault: false
  upstream:
    connectTimeoutSecs: 5
    requestTimeoutSecs: 60
    # Only list regions that actually have an envoy Service deployed.
    # Each entry triggers a periodic DNS + TCP health probe; entries
    # whose FQDN does not resolve produce noisy NXDOMAIN traffic and
    # spurious upstream-unhealthy metrics with no functional value
    # (the geo-router fallback policy steers everything to a healthy
    # region anyway). When a new region is brought online, deploy an
    # envoy chart instance with fullnameOverride matching the FQDN
    # below and add the entry here in the same MR.
    endpoints:
      - region: "us-east-1"
        address: "etradie-envoy.envoy-system.svc.cluster.local:8080"
  connectionLimits:
    maxGlobalConnections: 100000
    maxConnectionsPerIp: 1000
  healthCheck:
    intervalSecs: 10
    timeoutSecs: 3
    unhealthyThreshold: 3
    healthyThreshold: 2
  retry:
    maxAttempts: 1
    backoffMs: 100
  geoip:
    databasePath: "/data/geoip/GeoLite2-City.mmdb"
