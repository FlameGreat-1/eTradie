# helm/edge-ingress - default values.
#
# Local dev runs the docker-compose stack against
# deployments/edge-ingress/docker/. This chart is for cluster
# deployment only. values-staging.yaml and values-production.yaml
# override what genuinely differs per environment.
#
# Baseline sizing rationale:
#   - replicaCount/minReplicas: 3 satisfies single-node loss
#     resilience (>=2 healthy after one drains) AND single-AZ loss
#     resilience (chart spreads across >=2 zones via
#     topologySpreadConstraints + pod anti-affinity).
#   - Required hostname-level pod anti-affinity stays in place
#     (affinity.podAntiAffinity.requiredDuringSchedulingIgnoredDuringExecution
#     below) so the cluster needs at least replicaCount distinct
#     nodes in the edge pool. With replicaCount=3 that is the same
#     order as gateway/engine baseline elsewhere in this repo.
#   - HPA bursts up to maxReplicas=50 at 60% CPU in under 30s, so
#     baseline = sustainable + emergency-resilience floor, not
#     peak-traffic floor.
#   - PDB.minAvailable: 2 keeps service available during voluntary
#     evictions (one node drain) while leaving room for a pod to
#     restart.

replicaCount: 3
revisionHistoryLimit: 10

image:
  # CI publishes to GHCR (ghcr.io/<owner>/<repo>/<service>:<tag>).
  # Owner + repo lowercased per GHCR case-sensitivity. Matches the
  # IMAGE_BASE in .github/workflows/ci.yml.
  repository: ghcr.io/flamegreat-1/etradie/edge-ingress
  pullPolicy: IfNotPresent
  tag: "0.2.0"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: "edge-ingress"

namespace:
  create: true
  name: "edge-ingress-system"
  podSecurityStandard: "restricted"

serviceAccount:
  create: true
  name: ""
  annotations: {}
  automountServiceAccountToken: false

# Tier 9 (CHECKLIST microservice security): mesh edge-ingress so its
# OUTBOUND hop to envoy is Linkerd-mTLS'd, while LEAVING the external
# :443 listener untouched. :443 is terminated by the Cloudflare Tunnel
# with Authenticated Origin Pull (AOP) mTLS — that handshake is the
# external trust boundary and Linkerd MUST NOT intercept it, or the
# tunnel breaks. skip-inbound-ports "443" makes the proxy ignore that
# listener; every other port (metrics/health :9902, outbound to envoy)
# is meshed. Audit ref: Tier 9 G9-1.
podAnnotations:
  linkerd.io/inject: enabled
  # Native sidecar for a uniform mesh. The :443 listener stays skipped
  # below.
  config.linkerd.io/proxy-enable-native-sidecar: "true"
  config.linkerd.io/skip-inbound-ports: "443"

podSecurityContext:
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

securityContext:
  runAsUser: 1000

strategy:
  maxSurge: 1
  maxUnavailable: 0

service:
  # Cloud LB strategy. One of:
  #   - "cloudflare-tunnel": no public LB; a cloudflared deployment
  #     opens an outbound tunnel to Cloudflare and forwards to
  #     edge-ingress on :443 in-cluster. Service.type=ClusterIP.
  #     This is the default because Cloudflare is already part of
  #     the trust chain (AOP CA, CF-Connecting-IP, IP ranges).
  #   - "generic": LoadBalancer Service with no cloud-specific
  #     annotations (works on OCI OKE, GKE, AKS, MetalLB on bare
  #     metal). TLS terminates inside edge-ingress.
  #
  # AWS is intentionally NOT a supported mode — the platform does
  # not deploy on AWS.
  cloudProvider: "cloudflare-tunnel"
  # type is auto-selected from cloudProvider above. This value is
  # honoured only as an explicit override; leave empty to let the
  # template choose ClusterIP (cloudflare-tunnel) or LoadBalancer
  # (generic).
  type: ""
  externalTrafficPolicy: Local
  ports:
    tls:
      port: 443
  # Extra annotations applied regardless of cloudProvider. Keep this
  # empty unless you genuinely need a vendor-specific knob.
  annotations: {}

# Cloudflare Tunnel (cloudflared) configuration. Only rendered when
# service.cloudProvider="cloudflare-tunnel". The tunnel token is
# resolved through External Secrets Operator from Vault, identical to
# the existing tlsCerts / aopCa / maxmind ExternalSecrets pattern.
cloudflareTunnel:
  enabled: true   # honoured only when service.cloudProvider=cloudflare-tunnel
  replicaCount: 2
  image:
    repository: "cloudflare/cloudflared"
    tag: "2024.10.1"
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 100m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi
  # ExternalSecret for the tunnel token. The token authenticates the
  # cloudflared pod against Cloudflare's edge; it must be rotated
  # via Vault, never committed.
  externalSecret:
    secretStoreName: "vault-backend"
    secretStoreKind: "ClusterSecretStore"
    refreshInterval: "1h"
    targetSecretName: "cloudflared-tunnel-token"
    vaultPath: "etradie/services/edge-ingress/production/cloudflare/tunnel"
    property: "tunnel_token"
  # Tunnel forwards inbound requests to this in-cluster URL. The
  # default points at the edge-ingress ClusterIP Service on :443.
  upstreamUrl: "https://edge-ingress.edge-ingress-system.svc.cluster.local:443"
  # cloudflared can run in --no-tls-verify when the ingress terminates
  # TLS with a cert that cloudflared cannot validate (e.g. self-signed
  # or internal CA). For production with Cloudflare AOP CA, the
  # certificate is publicly trusted via the same AOP chain, so we
  # leave verification ON.
  noTlsVerify: false

metricsService:
  type: ClusterIP
  port: 9902

# Resource envelope sized so HPA peak (maxReplicas × limits.cpu) fits
# under namespace ResourceQuota.hard.limitsCpu with headroom for
# platform overhead. 2:1 limits-to-requests ratio is enough burst for
# TLS handshake spikes; the Rust binary's RSS under 5k sustained
# connections is ~400 MiB so memory limits=2Gi is a 5x safety margin.
resources:
  requests:
    cpu: 1000m
    memory: 1Gi
    ephemeral-storage: 256Mi
  limits:
    cpu: 2000m
    memory: 2Gi
    ephemeral-storage: 512Mi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 50
  targetCPUUtilizationPercentage: 60
  targetMemoryUtilizationPercentage: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 600
      policies:
        - type: Percent
          value: 25
          periodSeconds: 120
        - type: Pods
          value: 2
          periodSeconds: 120
      selectPolicy: Min
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
        - type: Pods
          value: 5
          periodSeconds: 15
      selectPolicy: Max
  # Custom metrics require an external adapter (prometheus-adapter or
  # KEDA) installed in the cluster. Default-OFF so the chart works on
  # any cluster; the operator flips this to true in
  # values-production.yaml once the adapter is installed.
  #
  # Metric: edge_ingress_active_connections (registered in
  # src/edge-ingress/crates/common/src/metrics.rs as a Prometheus
  # IntGauge per pod). This is a true per-pod connection count.
  #
  # Required prometheus-adapter rule (paste into the adapter's
  # ConfigMap; do NOT ship from this chart, that crosses concerns):
  #
  #   - seriesQuery: 'edge_ingress_active_connections{namespace!="",pod!=""}'
  #     resources:
  #       overrides:
  #         namespace: { resource: namespace }
  #         pod:       { resource: pod }
  #     name:
  #       matches: 'edge_ingress_active_connections'
  #       as:      'edge_ingress_active_connections'
  #     metricsQuery: |
  #       sum by (<<.GroupBy>>) (
  #         edge_ingress_active_connections{<<.LabelMatchers>>}
  #       )
  customMetricsEnabled: false
  customMetricsList:
    - type: Pods
      pods:
        metric:
          name: edge_ingress_active_connections
        target:
          type: AverageValue
          averageValue: "5000"

podDisruptionBudget:
  enabled: true
  minAvailable: 2
  unhealthyPodEvictionPolicy: AlwaysAllow

resourceQuota:
  enabled: true
  hard:
    requestsCpu: "60"
    requestsMemory: "60Gi"
    limitsCpu: "240"
    limitsMemory: "240Gi"
    servicesLoadbalancers: "1"
    servicesNodeports: "0"

networkPolicy:
  enabled: true
  monitoringNamespace: "monitoring"
  envoyNamespace: "envoy-system"
  envoyPort: 8080
  extraEgress: []

serviceMonitor:
  enabled: true
  interval: "15s"
  scrapeTimeout: "10s"
  labels:
    prometheus: kube-prometheus

priorityClass:
  enabled: true
  name: "edge-ingress-critical"
  value: 1000000
  globalDefault: false
  description: "Critical priority for edge-ingress pods handling internet traffic"

affinity:
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchExpressions:
            - key: app.kubernetes.io/name
              operator: In
              values:
                - edge-ingress
        topologyKey: kubernetes.io/hostname
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - edge-ingress
          topologyKey: topology.kubernetes.io/zone

topologySpreadConstraints: []

# Scheduling constraints. Empty by default so the chart deploys on
# any conformant Kubernetes cluster (Contabo K3s, OCI OKE, GKE, AKS,
# kubeadm, kind). Production layers values-production.yaml on top
# and adds a toleration for the dedicated `edge` node taint when
# the cluster operator chooses to taint a node pool for edge
# workloads. A toleration without a matching taint is a no-op so
# the chart stays portable.
nodeSelector: {}

tolerations: []

terminationGracePeriodSeconds: 30

logging:
  rustLog: "info,edge_ingress=info"
  rustBacktrace: "0"

extraEnv: []

volumes:
  geoipData:
    sizeLimit: "200Mi"
  tmp:
    sizeLimit: "64Mi"

geoip:
  # Editions to download. GeoLite2-City is sufficient for the
  # geo-router's country / region resolution. Adding GeoLite2-Country
  # or GeoLite2-ASN here is supported by the upstream image
  # (space-separated list).
  editionIds: "GeoLite2-City"
  initContainer:
    # Official MaxMind geoipupdate image. Same image as the local
    # docker-compose `edge-geoip-init` service (docker-compose.yml).
    # v6+ is required because MaxMind deprecated the legacy
    # license-key-only download URL alongside the v6 client release.
    image: "maxmindinc/geoipupdate:v6.0"
    pullPolicy: IfNotPresent

# Preflight init-container that validates the Cloudflare AOP CA Secret
# is present, non-empty, and parseable as PEM before the main
# edge-ingress container starts. Without this, an empty Vault path
# (operator has not yet populated `aop_ca`) produces a Rust panic at
# TLS handshake; with this, pods stay in Init: with a clear error
# message, traffic is never routed, and the operator gets a precise
# pointer to the Vault path that needs populating.
aopCaPreflight:
  enabled: true
  # Official OpenSSL Software Foundation image on Docker Hub. Same
  # image the data-layer chart's tls-cert-init initContainer uses
  # (helm/data-layer/templates/postgres-statefulset.yaml), pinned by
  # the SAME SHA-256 digest for byte-identical reproducibility across
  # both charts and across re-pulls (cache eviction, new node, ArgoCD
  # sync after node drain). Current digest corresponds to OpenSSL
  # 3.5.7 (verified with `docker run alpine/openssl version` in
  # commit 520b29ce when this pinning decision was originally made
  # for the data-layer chart). Bumping the digest is a deliberate
  # operator action visible in a commit diff; matches the
  # data-layer chart's pinning rationale verbatim. The previous tag
  # `alpine/openssl:3.3` did not exist on Docker Hub (the alpine/openssl
  # repository uses numeric tags like 3.4.0 / 3.5.0 / 3.5.7, not
  # minor-version aliases) and caused ImagePullBackOff at first sync.
  # Air-gapped clusters can mirror this image and override the
  # repository here.
  image: "alpine/openssl@sha256:923270611179f81b420bfb5bb5c18bf07fd59d84ed4163ac04cb371faa6d150f"
  pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 10m
      memory: 16Mi
    limits:
      cpu: 100m
      memory: 64Mi

externalSecrets:
  enabled: true
  tlsCerts:
    secretStoreName: "vault-backend"
    secretStoreKind: "ClusterSecretStore"
    refreshInterval: "1h"
    targetSecretName: "edge-ingress-tls-certs"
    # Production Vault path. Aligns with infrastructure/cluster/main.tf
    # which creates etradie/services/edge-ingress/${environment}/tls.
    # values-staging.yaml overrides this to the staging-segmented path.
    vaultPath: "etradie/services/edge-ingress/production/tls"
    # Default: single-region (api + wildcard). The chart's
    # config.tls.certificates list below references exactly these two
    # cert pairs by default, so the ExternalSecret resolves cleanly
    # on a single-region Vault.
    #
    # Multi-region operators add api-eu / api-ap entries here in
    # values-production.yaml AND extend config.tls.certificates to
    # match. Both lists must stay in lockstep, otherwise edge-ingress
    # fails at startup (cert path referenced but file does not exist)
    # OR ESO blocks indefinitely (Vault key referenced but absent).
    entries:
      - secretKey: "api.exoper.com.crt"
        property: "api_cert"
      - secretKey: "api.exoper.com.key"
        property: "api_key"
      - secretKey: "wildcard.exoper.com.crt"
        property: "wildcard_cert"
      - secretKey: "wildcard.exoper.com.key"
        property: "wildcard_key"
      # Internal cluster-DNS TLS chain. CA is operator-generated
      # ONCE per environment (workstation `step` commands documented
      # in PROGRESS.md) and written to the same Vault path as the
      # public certs (etradie/services/edge-ingress/${env}/tls).
      # All three property names are environment-independent;
      # staging and production use the same names in the same
      # vault-path layout.
      #   internal_ca_pem  - CA public cert (cloudflared trusts this)
      #   internal_cert    - server leaf cert (edge-ingress presents)
      #   internal_key     - server leaf private key
      # cloudflared loads internal_ca_pem via originRequest.caPool
      # on the tunnel ingress at Cloudflare's edge; edge-ingress
      # mounts the leaf cert + key on disk for SNI selection by the
      # cluster DNS hostname.
      - secretKey: "internal-ca.pem"
        property: "internal_ca_pem"
      - secretKey: "internal-cert.crt"
        property: "internal_cert"
      - secretKey: "internal-cert.key"
        property: "internal_key"
      # Multi-region. Uncomment and populate the corresponding Vault
      # keys (api_eu_cert / api_eu_key / api_ap_cert / api_ap_key)
      # before enabling. Adding a region also requires adding the
      # hostname to config.tls.certificates below.
      # - secretKey: "api-eu.exoper.com.crt"
      #   property: "api_eu_cert"
      # - secretKey: "api-eu.exoper.com.key"
      #   property: "api_eu_key"
      # - secretKey: "api-ap.exoper.com.crt"
      #   property: "api_ap_cert"
      # - secretKey: "api-ap.exoper.com.key"
      #   property: "api_ap_key"
  maxmind:
    secretStoreName: "vault-backend"
    secretStoreKind: "ClusterSecretStore"
    refreshInterval: "24h"
    targetSecretName: "maxmind-credentials"
    # Production Vault path; staging/production overlays override.
    vaultPath: "etradie/services/edge-ingress/production/maxmind"
  aopCa:
    secretStoreName: "vault-backend"
    secretStoreKind: "ClusterSecretStore"
    refreshInterval: "1h"
    targetSecretName: "cloudflare-aop-ca"
    # Production Vault path. Aligns with
    # infrastructure/cluster/main.tf::vault_kv_secret_v2.edge_ingress_aop_ca
    # (etradie/services/edge-ingress/${environment}/cloudflare/aop_ca).
    vaultPath: "etradie/services/edge-ingress/production/cloudflare/aop_ca"

# Edge-ingress YAML config rendered by templates/configmap.yaml.
config:
  server:
    tlsBindAddress: "0.0.0.0:443"
    metricsBindAddress: "0.0.0.0:9902"
    idleTimeoutSecs: 300
  tls:
    minTlsVersion: "1.2"
    preferredTlsVersion: "1.3"
    handshakeTimeoutSecs: 10
    enableSni: true
    certReloadIntervalSecs: 3600
    # Cloudflare AOP client-cert verification.
    #
    # caPath: PEM bundle that signs valid client certs. For Cloudflare
    #   AOP this is /etc/edge-ingress/cloudflare/origin-pull-ca.pem
    #   mounted from the cloudflare-aop-ca Secret.
    # required: when true (chart base default), every handshake MUST
    #   present a client cert signed by caPath. Fits direct-internet
    #   Cloudflare-proxy deployments. When false, handshakes without a
    #   client cert are accepted; a cert that IS presented is still
    #   verified. Fits Cloudflare Tunnel deployments where cloudflared
    #   cannot present a client cert. Both staging AND production
    #   overlays in this repo set required: false because both use
    #   Cloudflare Tunnel.
    clientAuth:
      caPath: "/etc/edge-ingress/cloudflare/origin-pull-ca.pem"
      required: true
    # Default: single-region (api + wildcard). Add api-eu / api-ap
    # entries below AND the matching ExternalSecret entries above
    # when bringing additional regions online.
    certificates:
      - hostname: "api.exoper.com"
        certPath: "/etc/edge-ingress/certs/api.exoper.com.crt"
        keyPath: "/etc/edge-ingress/certs/api.exoper.com.key"
        isDefault: true
      - hostname: "*.exoper.com"
        certPath: "/etc/edge-ingress/certs/wildcard.exoper.com.crt"
        keyPath: "/etc/edge-ingress/certs/wildcard.exoper.com.key"
        isDefault: false
      # Multi-region. Uncomment when externalSecrets.tlsCerts.entries
      # also contains api_eu / api_ap and Vault is populated.
      # - hostname: "api-eu.exoper.com"
      #   certPath: "/etc/edge-ingress/certs/api-eu.exoper.com.crt"
      #   keyPath: "/etc/edge-ingress/certs/api-eu.exoper.com.key"
      #   isDefault: false
      # - hostname: "api-ap.exoper.com"
      #   certPath: "/etc/edge-ingress/certs/api-ap.exoper.com.crt"
      #   keyPath: "/etc/edge-ingress/certs/api-ap.exoper.com.key"
      #   isDefault: false
  upstream:
    connectTimeoutSecs: 5
    requestTimeoutSecs: 60
    # Only list regions that actually have an envoy Service deployed.
    # Each entry triggers a periodic DNS + TCP health probe; entries
    # whose FQDN does not resolve produce noisy NXDOMAIN traffic and
    # spurious upstream-unhealthy metrics with no functional value
    # (the geo-router fallback policy steers everything to a healthy
    # region anyway). When a new region is brought online, deploy an
    # envoy chart instance with fullnameOverride matching the FQDN
    # below and add the entry here in the same MR.
    endpoints:
      - region: "us-east-1"
        address: "etradie-envoy.envoy-system.svc.cluster.local:8080"
  connectionLimits:
    maxGlobalConnections: 100000
    maxConnectionsPerIp: 1000
  healthCheck:
    intervalSecs: 10
    timeoutSecs: 3
    unhealthyThreshold: 3
    healthyThreshold: 2
  retry:
    maxAttempts: 1
    backoffMs: 100
  geoip:
    databasePath: "/data/geoip/GeoLite2-City.mmdb"
