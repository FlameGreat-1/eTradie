# helm/edge-ingress - default values (production posture).
#
# Local dev does not use this chart (kustomize-only).
# values-staging.yaml overrides what genuinely differs in staging.

replicaCount: 10
revisionHistoryLimit: 10

image:
  repository: etradie/edge-ingress
  pullPolicy: IfNotPresent
  tag: "v0.1.0"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: "edge-ingress"

namespace:
  create: true
  name: "edge-ingress-system"
  podSecurityStandard: "restricted"

serviceAccount:
  create: true
  name: ""
  annotations: {}
  automountServiceAccountToken: false

podAnnotations: {}

podSecurityContext:
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

securityContext:
  runAsUser: 1000

strategy:
  maxSurge: 1
  maxUnavailable: 0

service:
  type: LoadBalancer
  externalTrafficPolicy: Local
  ports:
    tls:
      port: 443
  # ACM cert ARN that the NLB terminates TLS with. REQUIRED in any
  # environment that wants public TLS termination at the NLB layer
  # (i.e. staging + production). The chart fails rendering when this
  # is empty, so CI must inject it explicitly:
  #   --set service.tlsCertificateArn=arn:aws:acm:<region>:<acct>:certificate/<id>
  tlsCertificateArn: ""
  # NLB access-log S3 bucket (production only). Empty disables access
  # logging; non-empty enables and points at the bucket.
  accessLogS3Bucket: ""
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
    service.beta.kubernetes.io/aws-load-balancer-backend-protocol: "tcp"
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-protocol: "http"
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-port: "9902"
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-path: "/healthz"
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-interval: "10"
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-timeout: "3"
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-healthy-threshold: "2"
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-unhealthy-threshold: "3"

metricsService:
  type: ClusterIP
  port: 9902

resources:
  requests:
    cpu: 1000m
    memory: 1Gi
    ephemeral-storage: 256Mi
  limits:
    cpu: 4000m
    memory: 4Gi
    ephemeral-storage: 512Mi

autoscaling:
  enabled: true
  minReplicas: 10
  maxReplicas: 50
  targetCPUUtilizationPercentage: 60
  targetMemoryUtilizationPercentage: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 600
      policies:
        - type: Percent
          value: 25
          periodSeconds: 120
        - type: Pods
          value: 2
          periodSeconds: 120
      selectPolicy: Min
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
        - type: Pods
          value: 5
          periodSeconds: 15
      selectPolicy: Max
  customMetrics:
    - type: Pods
      pods:
        metric:
          name: edge_ingress_active_connections
        target:
          type: AverageValue
          averageValue: "5000"

podDisruptionBudget:
  enabled: true
  minAvailable: 5
  unhealthyPodEvictionPolicy: AlwaysAllow

resourceQuota:
  enabled: true
  hard:
    requestsCpu: "60"
    requestsMemory: "60Gi"
    limitsCpu: "240"
    limitsMemory: "240Gi"
    servicesLoadbalancers: "1"
    servicesNodeports: "0"

networkPolicy:
  enabled: true
  monitoringNamespace: "monitoring"
  envoyNamespace: "envoy-system"
  envoyPort: 8080
  extraEgress: []

serviceMonitor:
  enabled: true
  interval: "15s"
  scrapeTimeout: "10s"
  labels:
    prometheus: kube-prometheus

priorityClass:
  enabled: true
  name: "edge-ingress-critical"
  value: 1000000
  globalDefault: false
  description: "Critical priority for edge-ingress pods handling internet traffic"

affinity:
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchExpressions:
            - key: app.kubernetes.io/name
              operator: In
              values:
                - edge-ingress
        topologyKey: kubernetes.io/hostname
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - edge-ingress
          topologyKey: topology.kubernetes.io/zone

topologySpreadConstraints: []

# Scheduling constraints. Empty by default so the chart deploys on any
# EKS cluster. Production layers values-production.yaml on top and pins
# the instance type + adds the matching toleration for the dedicated
# `edge` node taint applied by infrastructure/cluster/.
nodeSelector: {}

tolerations: []

terminationGracePeriodSeconds: 30

logging:
  rustLog: "info,edge_ingress=info"
  rustBacktrace: "0"

extraEnv: []

volumes:
  geoipData:
    sizeLimit: "200Mi"
  tmp:
    sizeLimit: "64Mi"

geoip:
  # Editions to download. GeoLite2-City is sufficient for the
  # geo-router's country / region resolution. Adding GeoLite2-Country
  # or GeoLite2-ASN here is supported by the upstream image
  # (space-separated list).
  editionIds: "GeoLite2-City"
  initContainer:
    # Official MaxMind geoipupdate image. Same image as the local
    # docker-compose `edge-geoip-init` service (docker-compose.yml).
    # v6+ is required because MaxMind deprecated the legacy
    # license-key-only download URL alongside the v6 client release.
    image: "maxmindinc/geoipupdate:v6.0"
    pullPolicy: IfNotPresent

externalSecrets:
  enabled: true
  tlsCerts:
    secretStoreName: "vault-backend"
    secretStoreKind: "ClusterSecretStore"
    refreshInterval: "1h"
    targetSecretName: "edge-ingress-tls-certs"
    vaultPath: "etradie/services/edge-ingress/tls"
    entries:
      - secretKey: "api.etradie.com.crt"
        property: "api_cert"
      - secretKey: "api.etradie.com.key"
        property: "api_key"
      - secretKey: "wildcard.etradie.com.crt"
        property: "wildcard_cert"
      - secretKey: "wildcard.etradie.com.key"
        property: "wildcard_key"
      - secretKey: "api-eu.etradie.com.crt"
        property: "api_eu_cert"
      - secretKey: "api-eu.etradie.com.key"
        property: "api_eu_key"
      - secretKey: "api-ap.etradie.com.crt"
        property: "api_ap_cert"
      - secretKey: "api-ap.etradie.com.key"
        property: "api_ap_key"
  maxmind:
    secretStoreName: "vault-backend"
    secretStoreKind: "ClusterSecretStore"
    refreshInterval: "24h"
    targetSecretName: "maxmind-credentials"
    vaultPath: "etradie/services/edge-ingress/maxmind"
  aopCa:
    secretStoreName: "vault-backend"
    secretStoreKind: "ClusterSecretStore"
    refreshInterval: "1h"
    targetSecretName: "cloudflare-aop-ca"
    vaultPath: "etradie/services/edge-ingress/cloudflare/aop_ca"

# Edge-ingress YAML config rendered by templates/configmap.yaml.
config:
  server:
    tlsBindAddress: "0.0.0.0:443"
    metricsBindAddress: "0.0.0.0:9902"
    idleTimeoutSecs: 300
  tls:
    minTlsVersion: "1.2"
    preferredTlsVersion: "1.3"
    handshakeTimeoutSecs: 10
    enableSni: true
    certReloadIntervalSecs: 3600
    # Cloudflare AOP CA path inside the pod. Mandatory; templates fail
    # rendering if empty.
    clientAuth:
      caPath: "/etc/edge-ingress/cloudflare/origin-pull-ca.pem"
    certificates:
      - hostname: "api.etradie.com"
        certPath: "/etc/edge-ingress/certs/api.etradie.com.crt"
        keyPath: "/etc/edge-ingress/certs/api.etradie.com.key"
        isDefault: true
      - hostname: "*.etradie.com"
        certPath: "/etc/edge-ingress/certs/wildcard.etradie.com.crt"
        keyPath: "/etc/edge-ingress/certs/wildcard.etradie.com.key"
        isDefault: false
      - hostname: "api-eu.etradie.com"
        certPath: "/etc/edge-ingress/certs/api-eu.etradie.com.crt"
        keyPath: "/etc/edge-ingress/certs/api-eu.etradie.com.key"
        isDefault: false
      - hostname: "api-ap.etradie.com"
        certPath: "/etc/edge-ingress/certs/api-ap.etradie.com.crt"
        keyPath: "/etc/edge-ingress/certs/api-ap.etradie.com.key"
        isDefault: false
  upstream:
    connectTimeoutSecs: 5
    requestTimeoutSecs: 60
    endpoints:
      - region: "us-east-1"
        address: "etradie-envoy.envoy-system.svc.cluster.local:8080"
      - region: "us-west-2"
        address: "etradie-envoy-us-west-2.envoy-system.svc.cluster.local:8080"
      - region: "eu-west-1"
        address: "etradie-envoy-eu-west-1.envoy-system.svc.cluster.local:8080"
      - region: "ap-southeast-1"
        address: "etradie-envoy-ap-southeast-1.envoy-system.svc.cluster.local:8080"
  connectionLimits:
    maxGlobalConnections: 100000
    maxConnectionsPerIp: 1000
  healthCheck:
    intervalSecs: 10
    timeoutSecs: 3
    unhealthyThreshold: 3
    healthyThreshold: 2
  retry:
    maxAttempts: 1
    backoffMs: 100
  geoip:
    databasePath: "/data/geoip/GeoLite2-City.mmdb"
