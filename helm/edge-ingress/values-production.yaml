# helm/edge-ingress values-production.yaml
#
# The base values.yaml already represents production posture, so this
# file only adds production-only annotations and selects the NLB access
# log bucket. The ACM cert ARN is NOT committed; CI must inject it via
#   --set service.tlsCertificateArn=arn:aws:acm:<region>:<acct>:certificate/<id>
# Empty values force a chart render failure (see templates/service.yaml).

podAnnotations:
  cluster-autoscaler.kubernetes.io/safe-to-evict: "false"
  tier: "production"

service:
  # ACM cert ARN is provided by CI from Vault / AWS Secrets Manager.
  # tlsCertificateArn: "arn:aws:acm:us-east-1:<account-id>:certificate/<cert-id>"
  accessLogS3Bucket: "etradie-prod-nlb-logs"

serviceMonitor:
  labels:
    prometheus: kube-prometheus
    environment: production
    tier: critical
