# helm/edge-ingress values-production.yaml
#
# TABLE 2B profile (BUDGET.md): the base values carry the multi-node HA
# posture; this overlay tunes edge-ingress down to the single-node
# Contabo box (1 replica, lean resources) with the full stack ON.
# Cloud-LB-agnostic (Cloudflare Tunnel default; no AWS coupling).

replicaCount: 1

podAnnotations:
  cluster-autoscaler.kubernetes.io/safe-to-evict: "false"
  tier: "production"

resources:
  requests:
    cpu: 300m
    memory: 384Mi
  limits:
    cpu: 1000m
    memory: 768Mi

# Single node: HPA pinned OFF. Revert with the base values when the
# platform moves to the multi-node cluster (BUDGET.md Table 5).
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 1

# A 1-replica PDB with minAvailable>=1 blocks every node drain forever.
podDisruptionBudget:
  enabled: false

# Single-node scheduling: drop the base REQUIRED hostname anti-affinity
# (rollout deadlock with maxSurge:1 on one node); the base preferred
# zone term still applies.
affinity:
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution: null

cloudflareTunnel:
  # One tunnel replica on the single-node box.
  replicaCount: 1

# Internal cluster-DNS TLS cert. cloudflared dials
# edge-ingress.edge-ingress-system.svc.cluster.local:443 with strict TLS
# verify (Phase 6.2.3, Tier 11 mandatory). The Cloudflare Origin Certs
# above are valid for the public hostnames only, so a third cert is
# added here for the cluster DNS name, self-generated by the
# tls-cert-init initContainer at first boot. SAN covers all three
# Service address forms. Byte-identical to the matching entry in
# values-staging.yaml because the cluster DNS name is environment-
# independent (same Service name, same namespace).
config:
  tls:
    certificates:
      - hostname: "api.exoper.com"
        certPath: "/etc/edge-ingress/certs/api.exoper.com.crt"
        keyPath: "/etc/edge-ingress/certs/api.exoper.com.key"
        isDefault: true
      - hostname: "*.exoper.com"
        certPath: "/etc/edge-ingress/certs/wildcard.exoper.com.crt"
        keyPath: "/etc/edge-ingress/certs/wildcard.exoper.com.key"
        isDefault: false
      - hostname: "edge-ingress.edge-ingress-system.svc.cluster.local"
        certPath: "/etc/edge-ingress/internal-cert/server.crt"
        keyPath: "/etc/edge-ingress/internal-cert/server.key"
        isDefault: false

resourceQuota:
  hard:
    requestsCpu: "2"
    requestsMemory: "4Gi"
    limitsCpu: "4"
    limitsMemory: "8Gi"
    servicesLoadbalancers: "1"
    servicesNodeports: "0"

# Cloud-agnostic: a toleration without a matching taint is a no-op on
# the untainted single-node K3s box.
nodeSelector: {}

tolerations:
  - key: "workload"
    operator: "Equal"
    value: "edge"
    effect: "NoSchedule"

serviceMonitor:
  labels:
    prometheus: kube-prometheus
    environment: production
    tier: critical
