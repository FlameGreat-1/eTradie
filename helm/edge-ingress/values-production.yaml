# helm/edge-ingress values-production.yaml
#
# The base values.yaml already represents production posture. This
# file only adds production-only annotations, and is cloud-LB-agnostic
# (Cloudflare Tunnel is the default; no AWS coupling anywhere).

podAnnotations:
  cluster-autoscaler.kubernetes.io/safe-to-evict: "false"
  tier: "production"

# Production overrides the chart-default baseline of 3 replicas to 5
# so a single-AZ loss in a 3-AZ deployment leaves >=3 healthy
# replicas (one per remaining AZ) without an HPA scale-up gap.
# Lift these in lockstep if real production traffic justifies it;
# the cap (maxReplicas: 50) is unchanged.
replicaCount: 5

autoscaling:
  minReplicas: 5

podDisruptionBudget:
  minAvailable: 3

# Cloud-agnostic. A toleration without a matching taint is a no-op,
# so this stays portable across Contabo K3s, OCI OKE, GKE, AKS,
# kubeadm, kind. Cluster operators that taint their edge node pool
# with `workload=edge:NoSchedule` get the intended scheduling; those
# who do not are unaffected.
nodeSelector: {}

tolerations:
  - key: "workload"
    operator: "Equal"
    value: "edge"
    effect: "NoSchedule"

serviceMonitor:
  labels:
    prometheus: kube-prometheus
    environment: production
    tier: critical
