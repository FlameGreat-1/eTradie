# helm/edge-ingress values-production.yaml
#
# TABLE 2B profile (BUDGET.md): the base values carry the multi-node HA
# posture; this overlay tunes edge-ingress down to the single-node
# Contabo box (1 replica, lean resources) with the full stack ON.
# Cloud-LB-agnostic (Cloudflare Tunnel default; no AWS coupling).

replicaCount: 1

podAnnotations:
  cluster-autoscaler.kubernetes.io/safe-to-evict: "false"
  tier: "production"

resources:
  requests:
    cpu: 300m
    memory: 384Mi
  limits:
    cpu: 1000m
    memory: 768Mi

# Single node: HPA pinned OFF. Revert with the base values when the
# platform moves to the multi-node cluster (BUDGET.md Table 5).
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 1

# A 1-replica PDB with minAvailable>=1 blocks every node drain forever.
podDisruptionBudget:
  enabled: false

# Single-node scheduling: drop the base REQUIRED hostname anti-affinity
# (rollout deadlock with maxSurge:1 on one node); the base preferred
# zone term still applies.
affinity:
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution: null

cloudflareTunnel:
  # One tunnel replica on the single-node box.
  replicaCount: 1

resourceQuota:
  hard:
    requestsCpu: "2"
    requestsMemory: "4Gi"
    limitsCpu: "4"
    limitsMemory: "8Gi"
    servicesLoadbalancers: "1"
    servicesNodeports: "0"

# Cloud-agnostic: a toleration without a matching taint is a no-op on
# the untainted single-node K3s box.
nodeSelector: {}

tolerations:
  - key: "workload"
    operator: "Equal"
    value: "edge"
    effect: "NoSchedule"

serviceMonitor:
  labels:
    prometheus: kube-prometheus
    environment: production
    tier: critical
