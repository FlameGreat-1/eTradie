replicaCount: 10

image:
  repository: etradie/edge-ingress
  pullPolicy: IfNotPresent
  tag: "v0.1.0"

service:
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
    service.beta.kubernetes.io/aws-load-balancer-backend-protocol: "tcp"
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-protocol: "http"
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-port: "9902"
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-path: "/healthz"
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-interval: "10"
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-timeout: "3"
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-healthy-threshold: "2"
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-unhealthy-threshold: "3"
    service.beta.kubernetes.io/aws-load-balancer-access-log-enabled: "true"
    service.beta.kubernetes.io/aws-load-balancer-access-log-s3-bucket-name: "etradie-prod-nlb-logs"

config:
  server:
    tls_bind_address: "0.0.0.0:443"
    metrics_bind_address: "0.0.0.0:9902"
    idle_timeout_secs: 300
  
  tls:
    min_tls_version: "1.2"
    preferred_tls_version: "1.3"
    handshake_timeout:
      secs: 10
      nanos: 0
    enable_sni: true
    cert_reload_interval:
      secs: 3600
      nanos: 0
    client_auth:
      ca_path: "/etc/edge-ingress/cloudflare/origin-pull-ca.pem"
    certificates:
      - hostname: "api.etradie.com"
        cert_path: "/etc/edge-ingress/certs/api.etradie.com.crt"
        key_path: "/etc/edge-ingress/certs/api.etradie.com.key"
        is_default: true
      - hostname: "*.etradie.com"
        cert_path: "/etc/edge-ingress/certs/wildcard.etradie.com.crt"
        key_path: "/etc/edge-ingress/certs/wildcard.etradie.com.key"
        is_default: false
      - hostname: "api-eu.etradie.com"
        cert_path: "/etc/edge-ingress/certs/api-eu.etradie.com.crt"
        key_path: "/etc/edge-ingress/certs/api-eu.etradie.com.key"
        is_default: false
      - hostname: "api-ap.etradie.com"
        cert_path: "/etc/edge-ingress/certs/api-ap.etradie.com.crt"
        key_path: "/etc/edge-ingress/certs/api-ap.etradie.com.key"
        is_default: false
  
  upstream:
    connect_timeout_secs: 5
    request_timeout_secs: 60
    endpoints:
      - region: "us-east-1"
        address: "envoy.etradie-system.svc.cluster.local:8080"
      - region: "us-west-2"
        address: "envoy-us-west-2.etradie-system.svc.cluster.local:8080"
      - region: "eu-west-1"
        address: "envoy-eu-west-1.etradie-system.svc.cluster.local:8080"
      - region: "ap-southeast-1"
        address: "envoy-ap-southeast-1.etradie-system.svc.cluster.local:8080"
  
  connection_limits:
    max_global_connections: 100000
    max_connections_per_ip: 1000
  
  health_check:
    interval_secs: 10
    timeout_secs: 3
    unhealthy_threshold: 3
    healthy_threshold: 2
  
  retry:
    max_attempts: 1
    backoff_ms: 100
  
  geoip:
    database_path: "/data/geoip/GeoLite2-City.mmdb"

externalSecrets:
  enabled: true
  tlsCerts:
    vaultPath: secret/edge-ingress/production/tls
  maxmind:
    vaultPath: secret/edge-ingress/production/maxmind

resources:
  requests:
    cpu: 1000m
    memory: 1Gi
  limits:
    cpu: 4000m
    memory: 4Gi

autoscaling:
  enabled: true
  minReplicas: 10
  maxReplicas: 50
  targetCPUUtilizationPercentage: 60
  targetMemoryUtilizationPercentage: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 600
      policies:
        - type: Percent
          value: 25
          periodSeconds: 120
        - type: Pods
          value: 2
          periodSeconds: 120
      selectPolicy: Min
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
        - type: Pods
          value: 5
          periodSeconds: 15
      selectPolicy: Max

podDisruptionBudget:
  enabled: true
  minAvailable: 5

priorityClass:
  enabled: true
  name: edge-ingress-critical
  value: 1000000
  globalDefault: false
  description: "Critical priority for Edge-Ingress pods handling production internet traffic"

affinity:
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchExpressions:
            - key: app.kubernetes.io/name
              operator: In
              values:
                - edge-ingress
        topologyKey: kubernetes.io/hostname
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - edge-ingress
          topologyKey: topology.kubernetes.io/zone

nodeSelector:
  node.kubernetes.io/instance-type: c6i.2xlarge

tolerations:
  - key: "workload"
    operator: "Equal"
    value: "edge"
    effect: "NoSchedule"

env:
  - name: CONFIG_PATH
    value: "/etc/edge-ingress/config/edge-ingress.yaml"
  - name: RUST_LOG
    value: "info,edge_ingress=info"
  - name: RUST_BACKTRACE
    value: "0"
