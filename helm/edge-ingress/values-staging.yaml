# helm/edge-ingress values-staging.yaml
# Overrides the production-default base values for staging.
#
# TABLE 2B profile (BUDGET.md): single-node Contabo, full stack ON,
# 1 replica.

replicaCount: 1
image:
  # tag is overwritten on every push to main by the CI `deploy-bump`
  # job with the immutable git SHA (see .github/workflows/ci.yml); the
  # literal below is only the value between pushes. IfNotPresent is
  # correct because each push produces a NEW tag (the SHA), so ArgoCD
  # always sees a real diff and the node always pulls the new bytes.
  tag: "89229a1300e9a9dbe8ec965cbed3c11959090592"
  pullPolicy: IfNotPresent
resources:
  requests:
    cpu: 150m
    memory: 256Mi
  limits:
    cpu: 750m
    memory: 512Mi
# Single node: HPA pinned OFF (a scale-up cannot add availability on
# one host). Revert with the base values on a multi-node cluster.
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 1
# A 1-replica PDB with minAvailable>=1 blocks every node drain forever.
podDisruptionBudget:
  enabled: false
# Single-node scheduling: the base chart's REQUIRED hostname
# anti-affinity + strategy maxSurge:1/maxUnavailable:0 deadlocks every
# rollout on one node. Drop the required term (null deletes the base
# key); the base preferred zone-affinity term still applies.
affinity:
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution: null
cloudflareTunnel:
  # One tunnel replica on the single-node box (the second replica only
  # buys node-level redundancy, which one node cannot provide).
  replicaCount: 1
  externalSecret:
    # Staging-segmented Vault path. The base value points at the
    # production path; without this override staging cloudflared would
    # authenticate with the PRODUCTION tunnel token.
    vaultPath: "etradie/services/edge-ingress/staging/cloudflare/tunnel"
logging:
  rustLog: "info,edge_ingress=debug"
  rustBacktrace: "1"
resourceQuota:
  hard:
    requestsCpu: "2"
    requestsMemory: "4Gi"
    limitsCpu: "4"
    limitsMemory: "8Gi"
    servicesLoadbalancers: "1"
    servicesNodeports: "0"
externalSecrets:
  tlsCerts:
    vaultPath: "etradie/services/edge-ingress/staging/tls"
    entries:
      - secretKey: "staging-api.exoper.com.crt"
        property: "staging_api_cert"
      - secretKey: "staging-api.exoper.com.key"
        property: "staging_api_key"
      - secretKey: "wildcard.staging.exoper.com.crt"
        property: "staging_wildcard_cert"
      - secretKey: "wildcard.staging.exoper.com.key"
        property: "staging_wildcard_key"
      # Internal cluster-DNS TLS chain (cloudflared <-> edge-ingress
      # hop). See helm/edge-ingress/values.yaml for the full
      # rationale; the three property names are environment-
      # independent and the chart edits are byte-identical between
      # staging and production.
      - secretKey: "internal-ca.pem"
        property: "internal_ca_pem"
      - secretKey: "internal-cert.crt"
        property: "internal_cert"
      - secretKey: "internal-cert.key"
        property: "internal_key"
  maxmind:
    vaultPath: "etradie/services/edge-ingress/staging/maxmind"
  aopCa:
    vaultPath: "etradie/services/edge-ingress/staging/cloudflare/aop_ca"
config:
  server:
    idleTimeoutSecs: 180
  tls:
    handshakeTimeoutSecs: 8
    certReloadIntervalSecs: 1800
    # Tunnel topology: cloudflared cannot present a client cert to
    # edge-ingress (no field in its originRequest schema). caPath
    # stays set so any client cert that IS presented is still
    # verified, but the missing-cert case no longer fails ServerHello.
    # Defense in depth in staging: Cloudflare DDoS/WAF + origin IP
    # not in public DNS + ufw inbound deny + tunnel JWT + server-side
    # TLS to edge-ingress with internal CA verify + Linkerd mesh mTLS
    # + gateway trusted-proxy-CIDR (10.42.0.0/16) honors
    # CF-Connecting-IP for per-IP rate limiting.
    clientAuth:
      required: false
    certificates:
      - hostname: "staging-api.exoper.com"
        certPath: "/etc/edge-ingress/certs/staging-api.exoper.com.crt"
        keyPath: "/etc/edge-ingress/certs/staging-api.exoper.com.key"
        isDefault: true
      - hostname: "*.staging.exoper.com"
        certPath: "/etc/edge-ingress/certs/wildcard.staging.exoper.com.crt"
        keyPath: "/etc/edge-ingress/certs/wildcard.staging.exoper.com.key"
        isDefault: false
      # Cluster-DNS cert presented to cloudflared via SNI selection.
      # Same paths in values-production.yaml (cluster DNS name is
      # environment-independent). Cert + key are sourced from Vault
      # at etradie/services/edge-ingress/staging/tls (properties
      # internal_cert + internal_key) via ESO into the existing
      # edge-ingress-tls-certs Secret.
      - hostname: "edge-ingress.edge-ingress-system.svc.cluster.local"
        certPath: "/etc/edge-ingress/internal-cert/server.crt"
        keyPath: "/etc/edge-ingress/internal-cert/server.key"
        isDefault: false
  upstream:
    connectTimeoutSecs: 4
    requestTimeoutSecs: 45
    # Single envoy release in staging; do not list non-existent
    # secondary-region FQDNs here (NXDOMAIN noise, no benefit).
    endpoints:
      - region: "us-east-1"
        address: "etradie-envoy.envoy-system.svc.cluster.local:8080"
  connectionLimits:
    maxGlobalConnections: 50000
    maxConnectionsPerIp: 500
  healthCheck:
    intervalSecs: 8
  retry:
    backoffMs: 75
# GeoIP: persistent cache + daily refresh inherited from the base
# values.yaml geoip block (single-node staging, BUDGET.md Table 2B).
# The PVC uses the K3s local-path default StorageClass. Explicitly
# pinned here for operator visibility; values match the base defaults.
geoip:
  persistence:
    enabled: true
    createPvc: true
    size: "200Mi"
    storageClassName: ""
  refresh:
    enabled: true
    schedule: "0 3 * * *"
serviceMonitor:
  interval: "15s"
  scrapeTimeout: "10s"
  labels:
    prometheus: kube-prometheus
    environment: staging
nodeSelector: {}
tolerations: []
# GHCR pull credentials. Packages are PRIVATE on GHCR (push posture);
# K8s containerd needs a docker-registry Secret to pull. The `ghcr-pull`
# Secret is created per-namespace at Phase 10.0 BEFORE this chart syncs.
# Future hardening: source this Secret from Vault via ESO (PROGRESS TODO).
imagePullSecrets:
  - name: ghcr-pull
