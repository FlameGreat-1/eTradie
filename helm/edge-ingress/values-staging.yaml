replicaCount: 5

image:
  repository: etradie/edge-ingress
  pullPolicy: IfNotPresent
  tag: "staging-v0.1.0"

service:
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
    service.beta.kubernetes.io/aws-load-balancer-backend-protocol: "tcp"
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-protocol: "http"
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-port: "9902"
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-path: "/healthz"
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-interval: "10"
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-timeout: "3"
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-healthy-threshold: "2"
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-unhealthy-threshold: "3"

config:
  server:
    tls_bind_address: "0.0.0.0:443"
    metrics_bind_address: "0.0.0.0:9902"
    idle_timeout_secs: 180
  
  tls:
    min_tls_version: "1.2"
    preferred_tls_version: "1.3"
    handshake_timeout:
      secs: 8
      nanos: 0
    enable_sni: true
    cert_reload_interval:
      secs: 1800
      nanos: 0
    client_auth:
      enabled: true
      mode: "optional"
      ca_path: "/etc/edge-ingress/cloudflare/origin-pull-ca.pem"
    certificates:
      - hostname: "staging-api.etradie.com"
        cert_path: "/etc/edge-ingress/certs/staging-api.etradie.com.crt"
        key_path: "/etc/edge-ingress/certs/staging-api.etradie.com.key"
        is_default: true
      - hostname: "*.staging.etradie.com"
        cert_path: "/etc/edge-ingress/certs/wildcard.staging.etradie.com.crt"
        key_path: "/etc/edge-ingress/certs/wildcard.staging.etradie.com.key"
        is_default: false
  
  upstream:
    connect_timeout_secs: 4
    request_timeout_secs: 45
    endpoints:
      - region: "us-east-1"
        address: "envoy.etradie-system.svc.cluster.local:8080"
      - region: "us-west-2"
        address: "envoy-us-west-2.etradie-system.svc.cluster.local:8080"
  
  connection_limits:
    max_global_connections: 50000
    max_connections_per_ip: 500
  
  health_check:
    interval_secs: 8
    timeout_secs: 3
    unhealthy_threshold: 3
    healthy_threshold: 2
  
  retry:
    max_attempts: 1
    backoff_ms: 75
  
  geoip:
    database_path: "/data/geoip/GeoLite2-City.mmdb"

externalSecrets:
  enabled: true
  tlsCerts:
    vaultPath: secret/edge-ingress/staging/tls
  maxmind:
    vaultPath: secret/edge-ingress/staging/maxmind

resources:
  requests:
    cpu: 750m
    memory: 768Mi
  limits:
    cpu: 3000m
    memory: 3Gi

autoscaling:
  enabled: true
  minReplicas: 5
  maxReplicas: 15
  targetCPUUtilizationPercentage: 65
  targetMemoryUtilizationPercentage: 75

podDisruptionBudget:
  enabled: true
  minAvailable: 3

env:
  - name: CONFIG_PATH
    value: "/etc/edge-ingress/config/edge-ingress.yaml"
  - name: RUST_LOG
    value: "info,edge_ingress=debug"
  - name: RUST_BACKTRACE
    value: "1"
