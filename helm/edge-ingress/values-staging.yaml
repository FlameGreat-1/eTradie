# helm/edge-ingress values-staging.yaml
# Overrides the production-default base values for staging.

replicaCount: 5

image:
  tag: "staging-v0.1.0"

# Staging mirrors production's 2:1 limits-to-requests ratio so
# load tests in staging produce the same scheduler behaviour as
# production. Smaller absolute numbers because staging traffic is
# bounded.
resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

autoscaling:
  minReplicas: 5
  maxReplicas: 15
  targetCPUUtilizationPercentage: 65
  targetMemoryUtilizationPercentage: 75

podDisruptionBudget:
  minAvailable: 3

logging:
  rustLog: "info,edge_ingress=debug"
  rustBacktrace: "1"

resourceQuota:
  hard:
    requestsCpu: "30"
    requestsMemory: "30Gi"
    limitsCpu: "120"
    limitsMemory: "120Gi"
    servicesLoadbalancers: "1"
    servicesNodeports: "0"

externalSecrets:
  tlsCerts:
    vaultPath: "etradie/services/edge-ingress/staging/tls"
    entries:
      - secretKey: "staging-api.etradie.com.crt"
        property: "staging_api_cert"
      - secretKey: "staging-api.etradie.com.key"
        property: "staging_api_key"
      - secretKey: "wildcard.staging.etradie.com.crt"
        property: "staging_wildcard_cert"
      - secretKey: "wildcard.staging.etradie.com.key"
        property: "staging_wildcard_key"
  maxmind:
    vaultPath: "etradie/services/edge-ingress/staging/maxmind"
  aopCa:
    vaultPath: "etradie/services/edge-ingress/staging/cloudflare/aop_ca"

config:
  server:
    idleTimeoutSecs: 180
  tls:
    handshakeTimeoutSecs: 8
    certReloadIntervalSecs: 1800
    certificates:
      - hostname: "staging-api.etradie.com"
        certPath: "/etc/edge-ingress/certs/staging-api.etradie.com.crt"
        keyPath: "/etc/edge-ingress/certs/staging-api.etradie.com.key"
        isDefault: true
      - hostname: "*.staging.etradie.com"
        certPath: "/etc/edge-ingress/certs/wildcard.staging.etradie.com.crt"
        keyPath: "/etc/edge-ingress/certs/wildcard.staging.etradie.com.key"
        isDefault: false
  upstream:
    connectTimeoutSecs: 4
    requestTimeoutSecs: 45
    # Single envoy release in staging; do not list non-existent
    # us-west-2 FQDN here (it produces NXDOMAIN noise with no
    # functional benefit; geo-router's region fallback already
    # tolerates an unreachable secondary).
    endpoints:
      - region: "us-east-1"
        address: "etradie-envoy.envoy-system.svc.cluster.local:8080"
  connectionLimits:
    maxGlobalConnections: 50000
    maxConnectionsPerIp: 500
  healthCheck:
    intervalSecs: 8
  retry:
    backoffMs: 75

serviceMonitor:
  interval: "15s"
  scrapeTimeout: "10s"
  labels:
    prometheus: kube-prometheus
    environment: staging

nodeSelector: {}
tolerations: []
