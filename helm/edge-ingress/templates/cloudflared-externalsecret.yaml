{{- if and (eq (.Values.service.cloudProvider | default "cloudflare-tunnel") "cloudflare-tunnel") .Values.externalSecrets.enabled }}
{{- /*
Fail-fast: cloudflared cannot start without TUNNEL_TOKEN. Catch a
missing Vault path at render time, same pattern as the other
ExternalSecret templates in this chart. Audit ref: NOTE.md S1-C, N-H2.
*/ -}}
{{- $vaultPath := required "helm/edge-ingress: .Values.cloudflareTunnel.externalSecret.vaultPath is required when service.cloudProvider=cloudflare-tunnel and externalSecrets.enabled=true. Set it to the Vault path holding the Cloudflare Tunnel token." .Values.cloudflareTunnel.externalSecret.vaultPath -}}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cloudflared-tunnel-token
  namespace: {{ include "edge-ingress.namespace" . }}
  labels:
    {{- include "edge-ingress.labels" . | nindent 4 }}
    app.kubernetes.io/name: cloudflared
    app.kubernetes.io/component: edge-tunnel
spec:
  refreshInterval: {{ .Values.cloudflareTunnel.externalSecret.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ .Values.cloudflareTunnel.externalSecret.secretStoreName | default "vault-backend" }}
    kind: {{ .Values.cloudflareTunnel.externalSecret.secretStoreKind | default "ClusterSecretStore" }}
  target:
    name: {{ .Values.cloudflareTunnel.externalSecret.targetSecretName | default "cloudflared-tunnel-token" }}
    creationPolicy: Owner
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/name: cloudflared
          app.kubernetes.io/component: edge-tunnel
  data:
    - secretKey: TUNNEL_TOKEN
      remoteRef:
        key: {{ $vaultPath | quote }}
        property: {{ .Values.cloudflareTunnel.externalSecret.property | default "tunnel_token" | quote }}
{{- end }}
