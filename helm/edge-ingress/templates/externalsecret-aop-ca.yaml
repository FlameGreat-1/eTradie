{{- if .Values.externalSecrets.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "edge-ingress.fullname" . }}-aop-ca
  namespace: {{ include "edge-ingress.namespace" . }}
  labels:
    {{- include "edge-ingress.labels" . | nindent 4 }}
    app.kubernetes.io/component: aop-ca-secret
  annotations:
    description: "Cloudflare AOP CA bundle for mTLS client auth"
spec:
  refreshInterval: {{ .Values.externalSecrets.aopCa.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.aopCa.secretStoreName | default "vault-backend" }}
    kind: {{ .Values.externalSecrets.aopCa.secretStoreKind | default "ClusterSecretStore" }}
  target:
    name: {{ .Values.externalSecrets.aopCa.targetSecretName | default "cloudflare-aop-ca" }}
    creationPolicy: Owner
    template:
      type: Opaque
  data:
    - secretKey: origin-pull-ca.pem
      remoteRef:
        key: {{ .Values.externalSecrets.aopCa.vaultPath | quote }}
        property: aop_ca
{{- end }}
