{{- if and (eq (.Values.service.cloudProvider | default "cloudflare-tunnel") "cloudflare-tunnel") .Values.cloudflareTunnel.enabled .Values.serviceMonitor.enabled }}
# ServiceMonitor for cloudflared. Without this the pod annotations
# on the cloudflared Deployment are inert under kube-prometheus's
# ServiceMonitor-only scrape policy. Audit ref: EI-H1.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: cloudflared
  namespace: {{ include "edge-ingress.namespace" . }}
  labels:
    {{- include "cloudflared.labels" . | nindent 4 }}
    app.kubernetes.io/component: monitoring
    {{- with .Values.serviceMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/component: metrics
  namespaceSelector:
    matchNames:
      - {{ include "edge-ingress.namespace" . }}
  endpoints:
    - port: metrics
      path: /metrics
      interval: {{ .Values.serviceMonitor.interval | default "15s" }}
      scrapeTimeout: {{ .Values.serviceMonitor.scrapeTimeout | default "10s" }}
      scheme: http
      relabelings:
        - sourceLabels: [__meta_kubernetes_pod_name]
          targetLabel: pod
          action: replace
        - sourceLabels: [__meta_kubernetes_pod_node_name]
          targetLabel: node
          action: replace
        - sourceLabels: [__meta_kubernetes_namespace]
          targetLabel: namespace
          action: replace
{{- end }}
