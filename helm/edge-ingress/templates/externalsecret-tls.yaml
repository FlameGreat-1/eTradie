{{- if .Values.externalSecrets.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "edge-ingress.fullname" . }}-tls
  namespace: {{ include "edge-ingress.namespace" . }}
  labels:
    {{- include "edge-ingress.labels" . | nindent 4 }}
    app.kubernetes.io/component: tls-secret
spec:
  refreshInterval: {{ .Values.externalSecrets.tlsCerts.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.tlsCerts.secretStoreName | default "vault-backend" }}
    kind: {{ .Values.externalSecrets.tlsCerts.secretStoreKind | default "ClusterSecretStore" }}
  target:
    name: {{ .Values.externalSecrets.tlsCerts.targetSecretName | default "edge-ingress-tls-certs" }}
    creationPolicy: Owner
  data:
    {{- range .Values.externalSecrets.tlsCerts.entries }}
    - secretKey: {{ .secretKey | quote }}
      remoteRef:
        key: {{ $.Values.externalSecrets.tlsCerts.vaultPath | quote }}
        property: {{ .property | quote }}
    {{- end }}
{{- end }}
