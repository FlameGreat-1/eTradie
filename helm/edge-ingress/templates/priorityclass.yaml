{{- if .Values.priorityClass.enabled }}
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: {{ .Values.priorityClass.name | default "edge-ingress-critical" }}
  labels:
    {{- include "edge-ingress.labels" . | nindent 4 }}
value: {{ .Values.priorityClass.value | default 1000000 }}
globalDefault: {{ .Values.priorityClass.globalDefault | default false }}
description: {{ .Values.priorityClass.description | default "Critical priority for edge-ingress pods handling internet traffic" | quote }}
{{- end }}
