apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "edge-ingress.fullname" . }}
  namespace: {{ include "edge-ingress.namespace" . }}
  labels:
    {{- include "edge-ingress.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  revisionHistoryLimit: {{ .Values.revisionHistoryLimit | default 10 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: {{ .Values.strategy.maxSurge | default 1 }}
      maxUnavailable: {{ .Values.strategy.maxUnavailable | default 0 }}
  selector:
    matchLabels:
      {{- include "edge-ingress.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "edge-ingress.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
        app.kubernetes.io/part-of: etradie
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ .Values.metricsService.port | default 9902 | quote }}
        prometheus.io/path: "/metrics"
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "edge-ingress.serviceAccountName" . }}
      automountServiceAccountToken: false
      {{- if .Values.priorityClass.enabled }}
      priorityClassName: {{ .Values.priorityClass.name | default "edge-ingress-critical" }}
      {{- end }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds | default 30 }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: {{ .Values.podSecurityContext.runAsUser | default 1000 }}
        runAsGroup: {{ .Values.podSecurityContext.runAsGroup | default 1000 }}
        fsGroup: {{ .Values.podSecurityContext.fsGroup | default 1000 }}
        seccompProfile:
          type: RuntimeDefault
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: geoip-downloader
          image: "{{ .Values.geoip.initContainer.image }}"
          imagePullPolicy: {{ .Values.geoip.initContainer.pullPolicy | default "IfNotPresent" }}
          command: ["/bin/sh", "/scripts/download-geoip.sh"]
          env:
            - name: MAXMIND_LICENSE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalSecrets.maxmind.targetSecretName | default "maxmind-credentials" }}
                  key: license-key
          volumeMounts:
            - name: geoip-init-script
              mountPath: /scripts
              readOnly: true
            - name: geoip-data
              mountPath: /data/geoip
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: {{ .Values.podSecurityContext.runAsUser | default 1000 }}
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
      containers:
        - name: edge-ingress
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy | default "IfNotPresent" }}
          ports:
            - name: tls
              containerPort: 443
              protocol: TCP
            - name: metrics
              containerPort: {{ .Values.metricsService.port | default 9902 }}
              protocol: TCP
          env:
            - name: CONFIG_PATH
              value: "/etc/edge-ingress/config/edge-ingress.yaml"
            - name: RUST_LOG
              value: {{ .Values.logging.rustLog | default "info,edge_ingress=info" | quote }}
            - name: RUST_BACKTRACE
              value: {{ .Values.logging.rustBacktrace | default "0" | quote }}
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          volumeMounts:
            - name: config
              mountPath: /etc/edge-ingress/config
              readOnly: true
            - name: tls-certs
              mountPath: /etc/edge-ingress/certs
              readOnly: true
            - name: cloudflare-aop-ca
              mountPath: /etc/edge-ingress/cloudflare
              readOnly: true
            - name: geoip-data
              mountPath: /data/geoip
              readOnly: true
            - name: tmp
              mountPath: /tmp
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: metrics
              scheme: HTTP
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /readyz
              port: metrics
              scheme: HTTP
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 30
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              add:
                - NET_BIND_SERVICE
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: {{ .Values.securityContext.runAsUser | default 1000 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "edge-ingress.fullname" . }}-config
            defaultMode: 0444
        - name: tls-certs
          secret:
            secretName: {{ .Values.externalSecrets.tlsCerts.targetSecretName | default "edge-ingress-tls-certs" }}
            defaultMode: 0400
        - name: cloudflare-aop-ca
          secret:
            secretName: {{ .Values.externalSecrets.aopCa.targetSecretName | default "cloudflare-aop-ca" }}
            defaultMode: 0400
        - name: geoip-data
          emptyDir:
            sizeLimit: {{ .Values.volumes.geoipData.sizeLimit | default "200Mi" }}
        - name: geoip-init-script
          configMap:
            name: {{ include "edge-ingress.fullname" . }}-geoip-init
            defaultMode: 0555
        - name: tmp
          emptyDir:
            sizeLimit: {{ .Values.volumes.tmp.sizeLimit | default "64Mi" }}
      dnsPolicy: ClusterFirst
      restartPolicy: Always
