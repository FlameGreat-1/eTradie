apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "edge-ingress.fullname" . }}
  namespace: {{ include "edge-ingress.namespace" . }}
  labels:
    {{- include "edge-ingress.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  revisionHistoryLimit: {{ .Values.revisionHistoryLimit | default 10 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: {{ .Values.strategy.maxSurge | default 1 }}
      maxUnavailable: {{ .Values.strategy.maxUnavailable | default 0 }}
  selector:
    matchLabels:
      {{- include "edge-ingress.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "edge-ingress.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
        app.kubernetes.io/part-of: etradie
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ .Values.metricsService.port | default 9902 | quote }}
        prometheus.io/path: "/metrics"
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "edge-ingress.serviceAccountName" . }}
      automountServiceAccountToken: false
      {{- if .Values.priorityClass.enabled }}
      priorityClassName: {{ .Values.priorityClass.name | default "edge-ingress-critical" }}
      {{- end }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds | default 30 }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: {{ .Values.podSecurityContext.runAsUser | default 1000 }}
        runAsGroup: {{ .Values.podSecurityContext.runAsGroup | default 1000 }}
        fsGroup: {{ .Values.podSecurityContext.fsGroup | default 1000 }}
        seccompProfile:
          type: RuntimeDefault
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        # GeoIP database bootstrap (idempotent + fault-tolerant).
        #
        # The GeoLite2-City DB lives on the persistent geoip-cache PVC
        # (see geoip-pvc.yaml) and is refreshed daily out-of-band by
        # the geoip-refresh CronJob (see geoip-refresh-cronjob.yaml).
        # This init container exists ONLY to guarantee the DB is on
        # disk before the Rust binary starts (config_loader.rs
        # validate() + server.rs build_geoip_lookup() hard-fail on a
        # missing .mmdb). It is therefore cache-aware:
        #
        #   * cached .mmdb present  -> SKIP download (steady-state pod
        #     restart makes ZERO MaxMind calls; this is what stops the
        #     daily-download-cap exhaustion -> 429 -> CrashLoop -> 502
        #     failure mode);
        #   * .mmdb missing (cold)  -> download once (self-sufficient
        #     first boot, even before the CronJob has ever run);
        #   * download fails but a cached .mmdb exists -> warn + proceed
        #     (resilient to MaxMind 429 / outage / rate-limit);
        #   * download fails and NO .mmdb exists       -> exit 1 (the
        #     binary genuinely cannot run without it).
        #
        # Implemented on busybox (guaranteed /bin/sh + wget + tar)
        # against the MaxMind direct download API, identical endpoint +
        # flow to src/edge-ingress/scripts/download-geoip.sh. This
        # avoids depending on the maxmindinc/geoipupdate image's shell
        # for the in-pod conditional; the official geoipupdate image is
        # still used by the scheduled CronJob refresh.
        - name: geoip-downloader
          image: "{{ .Values.geoip.bootstrapInitImage | default \"busybox:1.36\" }}"
          imagePullPolicy: {{ .Values.geoip.initContainer.pullPolicy | default "IfNotPresent" }}
          command:
            - /bin/sh
            - -c
            - |
              set -u
              DB=/data/geoip/GeoLite2-City.mmdb
              MIN_BYTES=1000000   # a real GeoLite2-City.mmdb is tens of MB; guard against truncated/empty files

              if [ -s "$DB" ]; then
                SIZE=$(wc -c < "$DB" 2>/dev/null || echo 0)
                if [ "$SIZE" -ge "$MIN_BYTES" ]; then
                  echo "[geoip-bootstrap] cached DB present ($SIZE bytes) at $DB; skipping download"
                  exit 0
                fi
                echo "[geoip-bootstrap] cached DB at $DB is too small ($SIZE bytes); will attempt refresh"
              else
                echo "[geoip-bootstrap] no cached DB at $DB (cold start); attempting download"
              fi

              URL="https://download.maxmind.com/app/geoip_download?edition_id=${GEOIPUPDATE_EDITION_IDS}&license_key=${GEOIPUPDATE_LICENSE_KEY}&suffix=tar.gz"
              TMP=/tmp/geoip-dl
              rm -rf "$TMP" && mkdir -p "$TMP"

              if wget -q -O "$TMP/db.tar.gz" "$URL"; then
                if tar -xzf "$TMP/db.tar.gz" -C "$TMP" 2>/dev/null; then
                  FOUND=$(find "$TMP" -name 'GeoLite2-City.mmdb' -type f 2>/dev/null | head -n1)
                  if [ -n "$FOUND" ] && [ -s "$FOUND" ]; then
                    cp "$FOUND" "$DB.tmp" && mv "$DB.tmp" "$DB"
                    echo "[geoip-bootstrap] download OK; installed $(wc -c < "$DB") bytes at $DB"
                    rm -rf "$TMP"
                    exit 0
                  fi
                fi
                echo "[geoip-bootstrap] WARN: downloaded archive did not contain a valid GeoLite2-City.mmdb" >&2
              else
                echo "[geoip-bootstrap] WARN: MaxMind download failed (rate-limit 429 / outage / network)." >&2
              fi
              rm -rf "$TMP"

              # Download failed. Tolerate it ONLY if a usable cached DB
              # is already on the PVC (resilience); otherwise this is a
              # true cold start with no DB and we must fail so the pod
              # does not start a binary that will exit(1) anyway.
              if [ -s "$DB" ]; then
                SIZE=$(wc -c < "$DB" 2>/dev/null || echo 0)
                if [ "$SIZE" -ge "$MIN_BYTES" ]; then
                  echo "[geoip-bootstrap] proceeding with existing cached DB ($SIZE bytes); refresh deferred to the daily CronJob"
                  exit 0
                fi
              fi
              echo "[geoip-bootstrap] FATAL: no usable GeoIP DB and download failed. The MaxMind daily download cap may be exhausted (resets 00:00 UTC) or the license key/account-id is wrong. The geoip-refresh CronJob will retry on schedule; check the maxmind-credentials Secret." >&2
              exit 1
          env:
            - name: GEOIPUPDATE_LICENSE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalSecrets.maxmind.targetSecretName | default "maxmind-credentials" }}
                  key: license-key
            - name: GEOIPUPDATE_EDITION_IDS
              value: {{ .Values.geoip.editionIds | default "GeoLite2-City" | quote }}
          volumeMounts:
            - name: geoip-data
              mountPath: /data/geoip
            # busybox wget/tar stage under /tmp; readOnlyRootFilesystem
            # blocks the root fs so a writable /tmp emptyDir is required
            # (same volume the main container mounts at /tmp).
            - name: tmp
              mountPath: /tmp
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: {{ .Values.podSecurityContext.runAsUser | default 1000 }}
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
        {{- if .Values.aopCaPreflight.enabled }}
        # AOP CA preflight: validates the Cloudflare AOP CA bundle is
        # present, non-empty, and parseable as PEM before the main
        # edge-ingress container boots. Catches the failure mode where
        # the Vault path etradie/services/edge-ingress/cloudflare/aop_ca
        # is bootstrapped (placeholder by Terraform) but the operator
        # has not yet populated the real CA bytes; in that case ESO
        # synthesises an empty Secret and the Rust binary would panic
        # at first TLS handshake. Failing here keeps the pod out of
        # Ready and surfaces a clear operator action in the log.
        - name: aop-ca-preflight
          image: "{{ .Values.aopCaPreflight.image }}"
          imagePullPolicy: {{ .Values.aopCaPreflight.pullPolicy | default "IfNotPresent" }}
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              CA=/aop-ca/origin-pull-ca.pem
              if [ ! -s "$CA" ]; then
                echo "[aop-ca-preflight] FATAL: $CA is missing or empty." >&2
                echo "[aop-ca-preflight] The Vault path" >&2
                echo "[aop-ca-preflight]   etradie/services/edge-ingress/cloudflare/aop_ca" >&2
                echo "[aop-ca-preflight] resolved by the cloudflare-aop-ca ExternalSecret has" >&2
                echo "[aop-ca-preflight] no bytes. Populate it with the live Cloudflare AOP CA" >&2
                echo "[aop-ca-preflight] bundle (run" >&2
                echo "[aop-ca-preflight]   bash deployments/cloudflare/scripts/refresh-cloudflare-ips.sh --bootstrap" >&2
                echo "[aop-ca-preflight] for the canonical bytes), then push them into Vault." >&2
                exit 1
              fi
              if ! openssl x509 -in "$CA" -noout >/dev/null 2>&1; then
                echo "[aop-ca-preflight] FATAL: $CA is not a parseable PEM certificate." >&2
                echo "[aop-ca-preflight] Check the Vault payload at" >&2
                echo "[aop-ca-preflight]   etradie/services/edge-ingress/cloudflare/aop_ca" >&2
                echo "[aop-ca-preflight] - the value MUST be the literal PEM-encoded CA bundle," >&2
                echo "[aop-ca-preflight] not base64-encoded, not double-quoted JSON." >&2
                exit 1
              fi
              echo "[aop-ca-preflight] AOP CA bundle present and parseable"
          volumeMounts:
            - name: cloudflare-aop-ca
              mountPath: /aop-ca
              readOnly: true
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: {{ .Values.podSecurityContext.runAsUser | default 1000 }}
            seccompProfile:
              type: RuntimeDefault
          resources:
            {{- toYaml .Values.aopCaPreflight.resources | nindent 12 }}
        {{- end }}
      containers:
        - name: edge-ingress
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy | default "IfNotPresent" }}
          ports:
            - name: tls
              containerPort: 443
              protocol: TCP
            - name: metrics
              containerPort: {{ .Values.metricsService.port | default 9902 }}
              protocol: TCP
          env:
            - name: CONFIG_PATH
              value: "/etc/edge-ingress/config/edge-ingress.yaml"
            - name: RUST_LOG
              value: {{ .Values.logging.rustLog | default "info,edge_ingress=info" | quote }}
            - name: RUST_BACKTRACE
              value: {{ .Values.logging.rustBacktrace | default "0" | quote }}
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          volumeMounts:
            - name: config
              mountPath: /etc/edge-ingress/config
              readOnly: true
            - name: tls-certs
              mountPath: /etc/edge-ingress/certs
              readOnly: true
            - name: cloudflare-aop-ca
              mountPath: /etc/edge-ingress/cloudflare
              readOnly: true
            # The internal-cert mount projects ONLY the leaf cert +
            # key from the same edge-ingress-tls-certs Secret that
            # provides the public Cloudflare Origin Certs above.
            # subPath is used so the public-cert files at
            # /etc/edge-ingress/certs/ and the internal-cert files
            # at /etc/edge-ingress/internal-cert/ live at separate
            # paths even though they come from the same Secret.
            # See volumes block below for the source.
            - name: internal-cert
              mountPath: /etc/edge-ingress/internal-cert/server.crt
              subPath: internal-cert.crt
              readOnly: true
            - name: internal-cert
              mountPath: /etc/edge-ingress/internal-cert/server.key
              subPath: internal-cert.key
              readOnly: true
            - name: geoip-data
              mountPath: /data/geoip
              readOnly: true
            - name: tmp
              mountPath: /tmp
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: metrics
              scheme: HTTP
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /readyz
              port: metrics
              scheme: HTTP
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 30
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              add:
                - NET_BIND_SERVICE
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: {{ .Values.securityContext.runAsUser | default 1000 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "edge-ingress.fullname" . }}-config
            defaultMode: 0444
        - name: tls-certs
          secret:
            secretName: {{ .Values.externalSecrets.tlsCerts.targetSecretName | default "edge-ingress-tls-certs" }}
            # 0440 (owner+group read) is required when the pod uses
            # fsGroup. With 0400, files are root:<fsGroup> mode 0400
            # which strips group bits, so a non-root container cannot
            # read them. 0440 keeps the file world-unreadable while
            # giving the runtime UID (1000, member of fsGroup 1000)
            # read access. See N-C3 in audit NOTE.md.
            defaultMode: 0440
        - name: cloudflare-aop-ca
          secret:
            secretName: {{ .Values.externalSecrets.aopCa.targetSecretName | default "cloudflare-aop-ca" }}
            # Same rationale as tls-certs above (N-C2). The aop-ca
            # preflight init container also runs as uid 1000 and
            # needs to read the PEM through openssl.
            defaultMode: 0440
        # Internal cluster-DNS TLS chain. Sourced from the same
        # Secret as the public certs above (single source of truth
        # for everything ESO populates from
        # etradie/services/edge-ingress/${env}/tls). subPath mounts
        # in the main container (above) select only the leaf cert +
        # key from this volume; the CA bytes are not mounted into
        # edge-ingress (only cloudflared trusts them, see
        # cloudflared-deployment.yaml).
        - name: internal-cert
          secret:
            secretName: {{ .Values.externalSecrets.tlsCerts.targetSecretName | default "edge-ingress-tls-certs" }}
            defaultMode: 0440
            items:
              - key: internal-cert.crt
                path: internal-cert.crt
              - key: internal-cert.key
                path: internal-cert.key
        - name: geoip-data
          {{- if .Values.geoip.persistence.enabled }}
          # Persistent GeoIP cache (geoip-pvc.yaml). Survives pod
          # restarts so the DB is re-used, not re-downloaded, on every
          # boot. RWO is correct on the single-node profile (all edge
          # pods + the refresh CronJob co-locate on one node).
          persistentVolumeClaim:
            claimName: {{ include "edge-ingress.fullname" . }}-geoip-cache
          {{- else }}
          # Legacy ephemeral cache (opt-out path). NOTE: re-downloads
          # GeoLite2 on every pod recreate and can exhaust the MaxMind
          # daily cap under churn; persistence.enabled=true is strongly
          # preferred.
          emptyDir:
            sizeLimit: {{ .Values.volumes.geoipData.sizeLimit | default "200Mi" }}
          {{- end }}
        - name: tmp
          emptyDir:
            sizeLimit: {{ .Values.volumes.tmp.sizeLimit | default "64Mi" }}
      dnsPolicy: ClusterFirst
      restartPolicy: Always
