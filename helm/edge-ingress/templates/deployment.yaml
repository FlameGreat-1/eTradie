apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "edge-ingress.fullname" . }}
  namespace: {{ include "edge-ingress.namespace" . }}
  labels:
    {{- include "edge-ingress.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  revisionHistoryLimit: {{ .Values.revisionHistoryLimit | default 10 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: {{ .Values.strategy.maxSurge | default 1 }}
      maxUnavailable: {{ .Values.strategy.maxUnavailable | default 0 }}
  selector:
    matchLabels:
      {{- include "edge-ingress.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "edge-ingress.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
        app.kubernetes.io/part-of: etradie
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ .Values.metricsService.port | default 9902 | quote }}
        prometheus.io/path: "/metrics"
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "edge-ingress.serviceAccountName" . }}
      automountServiceAccountToken: false
      {{- if .Values.priorityClass.enabled }}
      priorityClassName: {{ .Values.priorityClass.name | default "edge-ingress-critical" }}
      {{- end }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds | default 30 }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: {{ .Values.podSecurityContext.runAsUser | default 1000 }}
        runAsGroup: {{ .Values.podSecurityContext.runAsGroup | default 1000 }}
        fsGroup: {{ .Values.podSecurityContext.fsGroup | default 1000 }}
        seccompProfile:
          type: RuntimeDefault
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        # tls-cert-init: generate a self-signed RSA server cert + key at
        # first boot for the in-cluster DNS name
        # `edge-ingress.edge-ingress-system.svc.cluster.local`. Phase 6.2.3
        # of docs/runbooks/README.md configures cloudflared to dial this
        # exact cluster DNS name with strict TLS verify (noTLSVerify:
        # false, Tier 11 mandatory). The chart's other TLS certs are
        # Cloudflare Origin Certs valid for the PUBLIC hostnames
        # (staging-api.exoper.com / api.exoper.com), so they cannot
        # satisfy the hostname check on the cluster-DNS hop. A
        # Cloudflare-issued cert for *.svc.cluster.local is not
        # obtainable (the public-PKI contract excludes non-public
        # hostnames). The cleanest answer is the same pattern the
        # data-layer chart uses for postgres TLS (commit 97cd47d0):
        # an init container that self-generates a long-lived
        # self-signed cert into a pod-local emptyDir at first boot.
        # SNI selection at edge-ingress's TLS engine picks this cert
        # when cloudflared specifies the cluster DNS name; the
        # Cloudflare Origin Certs continue to be presented for
        # connections asking for the public hostnames.
        #
        # Image: SAME SHA-256 digest the data-layer chart's
        # tls-cert-init initContainer uses (alpine/openssl 3.5.7,
        # verified pullable on this cluster). Pinning by digest makes
        # both charts byte-identical and reproducible across re-pulls.
        #
        # PSS restricted-tier compliant: runAsUser matches the main
        # container (1000), runAsNonRoot, readOnlyRootFilesystem,
        # allowPrivilegeEscalation: false, capabilities.drop: [ALL].
        # No outbound network egress required.
        - name: tls-cert-init
          image: "alpine/openssl@sha256:923270611179f81b420bfb5bb5c18bf07fd59d84ed4163ac04cb371faa6d150f"
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              set -eu
              CERT_DIR=/etc/edge-ingress/internal-cert
              CERT_FILE=$CERT_DIR/server.crt
              KEY_FILE=$CERT_DIR/server.key
              VALIDITY_DAYS=3650
              CN=edge-ingress.edge-ingress-system.svc.cluster.local
              # Idempotency: regenerate only when the cert is missing
              # OR will expire in <30 days. Rolling restart on the same
              # node reuses the same cert (emptyDir is pod-scoped, so
              # an in-place container restart sees the existing files);
              # pod recreate (new emptyDir) generates fresh.
              if [ -f "$CERT_FILE" ] && [ -f "$KEY_FILE" ]; then
                if openssl x509 -in "$CERT_FILE" -noout -checkend 2592000 >/dev/null 2>&1; then
                  echo "[tls-cert-init] existing internal cert is valid for >30d; skipping regeneration"
                  echo "[tls-cert-init] subject: $(openssl x509 -in "$CERT_FILE" -noout -subject)"
                  echo "[tls-cert-init] not after: $(openssl x509 -in "$CERT_FILE" -noout -enddate)"
                  exit 0
                fi
                echo "[tls-cert-init] existing internal cert expires within 30d; regenerating"
              else
                echo "[tls-cert-init] no internal cert present; generating fresh self-signed cert for $CN"
              fi
              umask 077
              openssl req -x509 -newkey rsa:2048 -nodes \
                -days "$VALIDITY_DAYS" \
                -subj "/CN=$CN" \
                -addext "subjectAltName=DNS:edge-ingress.edge-ingress-system.svc.cluster.local,DNS:edge-ingress.edge-ingress-system.svc,DNS:edge-ingress" \
                -keyout "$KEY_FILE" \
                -out "$CERT_FILE"
              chmod 0644 "$CERT_FILE"
              chmod 0600 "$KEY_FILE"
              echo "[tls-cert-init] generated internal cert:"
              openssl x509 -in "$CERT_FILE" -noout -subject -dates -ext subjectAltName
          volumeMounts:
            - name: internal-cert
              mountPath: /etc/edge-ingress/internal-cert
            - name: tmp
              mountPath: /tmp
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: {{ .Values.podSecurityContext.runAsUser | default 1000 }}
            runAsGroup: {{ .Values.podSecurityContext.runAsGroup | default 1000 }}
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
        # GeoIP database downloader. Uses the official MaxMind
        # geoipupdate v6 image, identical to the local docker-compose
        # `edge-geoip-init` service so cluster + local share one
        # credential model and one binary. Reads BOTH account_id and
        # license_key from the maxmind-credentials Secret synthesised
        # by templates/externalsecret-maxmind.yaml. Runs once
        # (GEOIPUPDATE_FREQUENCY=0) and exits 0; the main container
        # then mmaps the .mmdb at the same in-pod path the Rust
        # binary expects (/data/geoip/GeoLite2-City.mmdb).
        - name: geoip-downloader
          image: "{{ .Values.geoip.initContainer.image }}"
          imagePullPolicy: {{ .Values.geoip.initContainer.pullPolicy | default "IfNotPresent" }}
          env:
            - name: GEOIPUPDATE_ACCOUNT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalSecrets.maxmind.targetSecretName | default "maxmind-credentials" }}
                  key: account-id
            - name: GEOIPUPDATE_LICENSE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalSecrets.maxmind.targetSecretName | default "maxmind-credentials" }}
                  key: license-key
            - name: GEOIPUPDATE_EDITION_IDS
              value: {{ .Values.geoip.editionIds | default "GeoLite2-City" | quote }}
            - name: GEOIPUPDATE_FREQUENCY
              value: "0"
            - name: GEOIPUPDATE_DB_DIR
              value: "/data/geoip"
          volumeMounts:
            - name: geoip-data
              mountPath: /data/geoip
            # The MaxMind geoipupdate v6 binary internally creates
            # /tmp/geoipupdate as a lock/staging directory at startup.
            # readOnlyRootFilesystem: true blocks any write to the root
            # filesystem, so the init container needs a writable /tmp
            # via the pod's already-declared `tmp` emptyDir volume
            # (same volume the main edge-ingress container mounts at
            # /tmp). Without this mount the init container crashes with
            # `mkdir: can't create directory '/tmp/geoipupdate':
            # Read-only file system` -> CrashLoopBackOff -> pod never
            # reaches Ready -> Service has no endpoint -> cloudflared
            # returns 502 to the public path.
            - name: tmp
              mountPath: /tmp
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: {{ .Values.podSecurityContext.runAsUser | default 1000 }}
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
        {{- if .Values.aopCaPreflight.enabled }}
        # AOP CA preflight: validates the Cloudflare AOP CA bundle is
        # present, non-empty, and parseable as PEM before the main
        # edge-ingress container boots. Catches the failure mode where
        # the Vault path etradie/services/edge-ingress/cloudflare/aop_ca
        # is bootstrapped (placeholder by Terraform) but the operator
        # has not yet populated the real CA bytes; in that case ESO
        # synthesises an empty Secret and the Rust binary would panic
        # at first TLS handshake. Failing here keeps the pod out of
        # Ready and surfaces a clear operator action in the log.
        - name: aop-ca-preflight
          image: "{{ .Values.aopCaPreflight.image }}"
          imagePullPolicy: {{ .Values.aopCaPreflight.pullPolicy | default "IfNotPresent" }}
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              CA=/aop-ca/origin-pull-ca.pem
              if [ ! -s "$CA" ]; then
                echo "[aop-ca-preflight] FATAL: $CA is missing or empty." >&2
                echo "[aop-ca-preflight] The Vault path" >&2
                echo "[aop-ca-preflight]   etradie/services/edge-ingress/cloudflare/aop_ca" >&2
                echo "[aop-ca-preflight] resolved by the cloudflare-aop-ca ExternalSecret has" >&2
                echo "[aop-ca-preflight] no bytes. Populate it with the live Cloudflare AOP CA" >&2
                echo "[aop-ca-preflight] bundle (run" >&2
                echo "[aop-ca-preflight]   bash deployments/cloudflare/scripts/refresh-cloudflare-ips.sh --bootstrap" >&2
                echo "[aop-ca-preflight] for the canonical bytes), then push them into Vault." >&2
                exit 1
              fi
              if ! openssl x509 -in "$CA" -noout >/dev/null 2>&1; then
                echo "[aop-ca-preflight] FATAL: $CA is not a parseable PEM certificate." >&2
                echo "[aop-ca-preflight] Check the Vault payload at" >&2
                echo "[aop-ca-preflight]   etradie/services/edge-ingress/cloudflare/aop_ca" >&2
                echo "[aop-ca-preflight] - the value MUST be the literal PEM-encoded CA bundle," >&2
                echo "[aop-ca-preflight] not base64-encoded, not double-quoted JSON." >&2
                exit 1
              fi
              echo "[aop-ca-preflight] AOP CA bundle present and parseable"
          volumeMounts:
            - name: cloudflare-aop-ca
              mountPath: /aop-ca
              readOnly: true
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: {{ .Values.podSecurityContext.runAsUser | default 1000 }}
            seccompProfile:
              type: RuntimeDefault
          resources:
            {{- toYaml .Values.aopCaPreflight.resources | nindent 12 }}
        {{- end }}
      containers:
        - name: edge-ingress
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy | default "IfNotPresent" }}
          ports:
            - name: tls
              containerPort: 443
              protocol: TCP
            - name: metrics
              containerPort: {{ .Values.metricsService.port | default 9902 }}
              protocol: TCP
          env:
            - name: CONFIG_PATH
              value: "/etc/edge-ingress/config/edge-ingress.yaml"
            - name: RUST_LOG
              value: {{ .Values.logging.rustLog | default "info,edge_ingress=info" | quote }}
            - name: RUST_BACKTRACE
              value: {{ .Values.logging.rustBacktrace | default "0" | quote }}
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          volumeMounts:
            - name: config
              mountPath: /etc/edge-ingress/config
              readOnly: true
            - name: tls-certs
              mountPath: /etc/edge-ingress/certs
              readOnly: true
            - name: cloudflare-aop-ca
              mountPath: /etc/edge-ingress/cloudflare
              readOnly: true
            - name: internal-cert
              mountPath: /etc/edge-ingress/internal-cert
              readOnly: true
            - name: geoip-data
              mountPath: /data/geoip
              readOnly: true
            - name: tmp
              mountPath: /tmp
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: metrics
              scheme: HTTP
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /readyz
              port: metrics
              scheme: HTTP
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 30
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              add:
                - NET_BIND_SERVICE
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: {{ .Values.securityContext.runAsUser | default 1000 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "edge-ingress.fullname" . }}-config
            defaultMode: 0444
        - name: tls-certs
          secret:
            secretName: {{ .Values.externalSecrets.tlsCerts.targetSecretName | default "edge-ingress-tls-certs" }}
            # 0440 (owner+group read) is required when the pod uses
            # fsGroup. With 0400, files are root:<fsGroup> mode 0400
            # which strips group bits, so a non-root container cannot
            # read them. 0440 keeps the file world-unreadable while
            # giving the runtime UID (1000, member of fsGroup 1000)
            # read access. See N-C3 in audit NOTE.md.
            defaultMode: 0440
        - name: cloudflare-aop-ca
          secret:
            secretName: {{ .Values.externalSecrets.aopCa.targetSecretName | default "cloudflare-aop-ca" }}
            # Same rationale as tls-certs above (N-C2). The aop-ca
            # preflight init container also runs as uid 1000 and
            # needs to read the PEM through openssl.
            defaultMode: 0440
        - name: geoip-data
          emptyDir:
            sizeLimit: {{ .Values.volumes.geoipData.sizeLimit | default "200Mi" }}
        - name: internal-cert
          # Pod-local emptyDir holding the self-signed TLS cert for the
          # in-cluster DNS name (generated by the tls-cert-init init
          # container at first boot). Never leaves the pod; not stored
          # in Vault, not stored in a K8s Secret. 32Mi is the floor for
          # a 2KB cert + 2KB key + filesystem overhead.
          emptyDir:
            sizeLimit: 32Mi
        - name: tmp
          emptyDir:
            sizeLimit: {{ .Values.volumes.tmp.sizeLimit | default "64Mi" }}
      dnsPolicy: ClusterFirst
      restartPolicy: Always
