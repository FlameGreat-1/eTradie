{{- if and (eq (.Values.service.cloudProvider | default "cloudflare-tunnel") "cloudflare-tunnel") .Values.cloudflareTunnel.enabled }}
# Headless metrics Service for cloudflared. Required for the
# Prometheus ServiceMonitor below to discover the pod-level
# /metrics endpoint on :2000. clusterIP: None because there is no
# need for a load-balanced VIP; the ServiceMonitor scrapes per-pod
# via endpoints. Audit ref: EI-H1.
apiVersion: v1
kind: Service
metadata:
  name: cloudflared-metrics
  namespace: {{ include "edge-ingress.namespace" . }}
  labels:
    {{- include "edge-ingress.labels" . | nindent 4 }}
    app.kubernetes.io/name: cloudflared
    app.kubernetes.io/component: metrics
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app.kubernetes.io/name: cloudflared
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: metrics
      port: 2000
      targetPort: metrics
      protocol: TCP
{{- end }}
