{{- if eq (.Values.service.cloudProvider | default "cloudflare-tunnel") "cloudflare-tunnel" }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cloudflared
  namespace: {{ include "edge-ingress.namespace" . }}
  labels:
    {{- include "cloudflared.labels" . | nindent 4 }}
    app.kubernetes.io/component: edge-tunnel
automountServiceAccountToken: false
{{- end }}
