{{- if .Values.externalSecrets.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "edge-ingress.fullname" . }}-maxmind
  namespace: {{ include "edge-ingress.namespace" . }}
  labels:
    {{- include "edge-ingress.labels" . | nindent 4 }}
    app.kubernetes.io/component: maxmind-secret
spec:
  refreshInterval: {{ .Values.externalSecrets.maxmind.refreshInterval | default "24h" }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.maxmind.secretStoreName | default "vault-backend" }}
    kind: {{ .Values.externalSecrets.maxmind.secretStoreKind | default "ClusterSecretStore" }}
  target:
    name: {{ .Values.externalSecrets.maxmind.targetSecretName | default "maxmind-credentials" }}
    creationPolicy: Owner
  data:
    - secretKey: license-key
      remoteRef:
        key: {{ .Values.externalSecrets.maxmind.vaultPath | quote }}
        property: license_key
    - secretKey: account-id
      remoteRef:
        key: {{ .Values.externalSecrets.maxmind.vaultPath | quote }}
        property: account_id
{{- end }}
