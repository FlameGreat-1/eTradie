# Production overlay for observability-logs.

# Tracing backend (OTel Collector + Jaeger) is ON in production. The
# four service overlays point their OTEL endpoint at
# otel-collector.etradie-observability.svc.cluster.local:4317. Jaeger
# uses a DURABLE Badger store on a PVC (inherited from base
# tracing.jaeger.persistence.enabled=true) so traces survive pod
# restarts; the PVC is sized + TTL-aligned with the Loki log retention
# below. For HA / horizontally-scaled traces, split into
# jaeger-collector + jaeger-query with an external store (out of scope).
tracing:
  enabled: true
  collector:
    replicaCount: 2
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 1Gi
  jaeger:
    enabled: true
    memoryMaxTraces: "100000"
    # Durable Badger store (base default). Size for projected prod span
    # volume and align the span TTL with the production Loki log
    # retention (336h / 14d) so traces + logs for the same incident
    # window expire together.
    persistence:
      enabled: true
      size: 30Gi
      spanStoreTTL: "336h"
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 2000m
        memory: 2Gi

loki:
  persistence:
    size: 100Gi          # ~14d at the projected production volume
  retentionPeriod: "336h"  # 14 days
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 2Gi
  limits:
    ingestionRateMB: 16
    ingestionBurstSizeMB: 32
    maxStreamsPerUser: 50000

promtail:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 384Mi
