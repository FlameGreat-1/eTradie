# Production overlay for observability-logs.
#
# TABLE 2B profile (BUDGET.md): full observability stack ON, tuned for
# the single-node Contabo 8 vCPU / 24GB / 200GB box.
#   - Loki:   ON, PVC 20Gi, 7d retention (persistent-only by template;
#     retention aligned with the 7d span/log correlation window).
#   - Jaeger: ON (in-memory, Form A): zero disk, traces lost on pod
#     restart. Operator switch to Form B (durable Badger, +10Gi PVC,
#     168h TTL): set tracing.jaeger.persistence.enabled=true AND
#     tracing.jaeger.spanStorageType=badger.
#   - OTel collector: 1 replica (single node; a second replica adds
#     no availability on one host and costs 100m/192Mi).
#
# The four service overlays keep their OTEL endpoint at
# otel-collector.etradie-observability.svc.cluster.local:4317.

tracing:
  enabled: true
  collector:
    replicaCount: 1
    resources:
      requests:
        cpu: 100m
        memory: 192Mi
      limits:
        cpu: 500m
        memory: 512Mi
  jaeger:
    enabled: true
    # Form A (in-memory). BOTH keys are required: with persistence
    # disabled the deployment template renders SPAN_STORAGE_TYPE from
    # spanStorageType, and the base value is 'badger' - which would
    # start Badger with no /badger volume mounted and crash. 'memory'
    # is the correct in-memory engine. 50k traces bounds RSS well
    # inside the 1Gi limit.
    spanStorageType: memory
    memoryMaxTraces: "50000"
    persistence:
      enabled: false
    resources:
      requests:
        cpu: 150m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 1Gi

loki:
  persistence:
    size: 20Gi          # ~7d at the Contabo single-node volume
  retentionPeriod: "168h"  # 7 days
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  limits:
    ingestionRateMB: 8
    ingestionBurstSizeMB: 16
    maxStreamsPerUser: 10000

promtail:
  resources:
    requests:
      cpu: 50m
      memory: 96Mi
    limits:
      cpu: 250m
      memory: 256Mi
