{{- if and .Values.tracing.enabled .Values.networkPolicy.enabled }}
# ── OTel Collector ───────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "olog.collector.fullname" . }}
  namespace: {{ include "olog.namespace" . }}
  labels:
    {{- include "olog.collector.selectorLabels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "olog.collector.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # OTLP ingest from the eTradie service namespaces (engine, gateway,
    # execution, management, mt-node all live in etradie-system).
    - from:
        {{- range .Values.tracing.collector.allowedSourceNamespaces }}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ . | quote }}
        {{- end }}
      ports:
        - protocol: TCP
          port: 4317
        - protocol: TCP
          port: 4318
    # Prometheus scrapes the collector's self-metrics on :8888.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
          podSelector:
            matchLabels:
              app: prometheus
      ports:
        - protocol: TCP
          port: 8888
    # Kubelet liveness/readiness probes target the collector health
    # extension on :13133. The kubelet probe source is the node IP,
    # which a pod/namespace selector cannot match, so allow any IPv4
    # source on the probe port (pod IPs are not routable from outside
    # the cluster, so in practice this only admits the on-node kubelet).
    # Mirrors the helm/mt-node :9100 probe-port rule. Without this a
    # strict CNI drops the probes and the collector never goes Ready.
    - from:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 13133
  egress:
    # Export spans to Jaeger (same namespace) on OTLP :4317.
    - to:
        - podSelector:
            matchLabels:
              {{- include "olog.jaeger.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 4317
    # Cluster DNS.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
{{- if .Values.tracing.jaeger.enabled }}
---
# ── Jaeger ───────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "olog.jaeger.fullname" . }}
  namespace: {{ include "olog.namespace" . }}
  labels:
    {{- include "olog.jaeger.selectorLabels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "olog.jaeger.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Span ingest from the collector (same namespace).
    - from:
        - podSelector:
            matchLabels:
              {{- include "olog.collector.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 4317
    # Query UI (:16686) + admin/metrics (:14269) from Grafana
    # (monitoring ns) for the datasource, and Prometheus for scraping.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.grafanaNamespace | quote }}
      ports:
        - protocol: TCP
          port: 16686
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
          podSelector:
            matchLabels:
              app: prometheus
      ports:
        - protocol: TCP
          port: 14269
    # Kubelet liveness/readiness probes target Jaeger's admin port
    # :14269. Same node-IP source problem as the collector above:
    # allow any IPv4 source on the probe port so a strict CNI does not
    # drop the probes and prevent Jaeger from going Ready. Pod IPs are
    # not externally routable, so this only admits the on-node kubelet
    # in addition to the Prometheus scrape already permitted above.
    - from:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 14269
  egress:
    # Cluster DNS only — the all-in-one store is local/in-memory.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
{{- end }}
{{- end }}