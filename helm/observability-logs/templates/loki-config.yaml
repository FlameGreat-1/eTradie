apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "olog.loki.fullname" . }}-config
  namespace: {{ include "olog.namespace" . }}
  labels:
    {{- include "olog.loki.selectorLabels" . | nindent 4 }}
data:
  loki.yaml: |
    auth_enabled: false

    server:
      http_listen_port: 3100
      grpc_listen_port: 9095
      log_level: info

    common:
      path_prefix: /var/loki
      storage:
        filesystem:
          chunks_directory: /var/loki/chunks
          rules_directory: /var/loki/rules
      replication_factor: 1
      ring:
        kvstore:
          store: inmemory

    ingester:
      lifecycler:
        address: 127.0.0.1
        ring:
          kvstore:
            store: inmemory
          replication_factor: 1
        final_sleep: 0s
      chunk_idle_period: 5m
      chunk_retain_period: 30s
      wal:
        enabled: true
        dir: /var/loki/wal

    schema_config:
      configs:
        - from: 2024-01-01
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h

    storage_config:
      tsdb_shipper:
        active_index_directory: /var/loki/tsdb-shipper-active
        cache_location: /var/loki/tsdb-shipper-cache
        cache_ttl: 24h
      filesystem:
        directory: /var/loki/chunks

    compactor:
      working_directory: /var/loki/compactor
      compaction_interval: 10m
      retention_enabled: true
      retention_delete_delay: 2h
      retention_delete_worker_count: 150
      delete_request_store: filesystem

    limits_config:
      retention_period: {{ .Values.loki.retentionPeriod | quote }}
      ingestion_rate_mb: {{ .Values.loki.limits.ingestionRateMB }}
      ingestion_burst_size_mb: {{ .Values.loki.limits.ingestionBurstSizeMB }}
      max_streams_per_user: {{ .Values.loki.limits.maxStreamsPerUser }}
      max_line_size: {{ .Values.loki.limits.maxLineSizeBytes }}
      reject_old_samples: true
      reject_old_samples_max_age: 168h
      max_query_lookback: {{ .Values.loki.retentionPeriod | quote }}
      allow_structured_metadata: true
      volume_enabled: true

    query_range:
      align_queries_with_step: true
      cache_results: true
      results_cache:
        cache:
          embedded_cache:
            enabled: true
            max_size_mb: 100

    analytics:
      reporting_enabled: false

    ruler:
      storage:
        type: local
        local:
          directory: /var/loki/rules
      rule_path: /var/loki/rules-temp
      ring:
        kvstore:
          store: inmemory
      enable_api: true
