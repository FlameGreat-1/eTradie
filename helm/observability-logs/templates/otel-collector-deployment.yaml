{{- if .Values.tracing.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "olog.collector.fullname" . }}
  namespace: {{ include "olog.namespace" . }}
  labels:
    {{- include "olog.collector.selectorLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.tracing.collector.replicaCount | default 2 }}
  revisionHistoryLimit: 10
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      {{- include "olog.collector.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "olog.collector.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/otel-collector-config.yaml") . | sha256sum }}
        prometheus.io/scrape: "true"
        prometheus.io/port: "8888"
        prometheus.io/path: "/metrics"
        {{- with .Values.tracing.collector.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "olog.collector.fullname" . }}
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 10003
        runAsGroup: 10003
        fsGroup: 10003
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: otel-collector
          image: "{{ .Values.tracing.collector.image.repository }}:{{ .Values.tracing.collector.image.tag }}"
          imagePullPolicy: {{ .Values.tracing.collector.image.pullPolicy | default "IfNotPresent" }}
          args:
            - "--config=/etc/otelcol/config.yaml"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10003
            capabilities:
              drop:
                - ALL
          ports:
            - name: otlp-grpc
              containerPort: 4317
              protocol: TCP
            - name: otlp-http
              containerPort: 4318
              protocol: TCP
            - name: metrics
              containerPort: 8888
              protocol: TCP
            - name: health
              containerPort: 13133
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: health
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.tracing.collector.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/otelcol
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: {{ include "olog.collector.fullname" . }}-config
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi
{{- end }}