# Promtail must list/watch pods + nodes (for service discovery) so
# that logs are labelled with pod metadata. ClusterRole because
# Promtail watches the whole cluster.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "olog.promtail.fullname" . }}
  labels:
    {{- include "olog.promtail.selectorLabels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources:
      - nodes
      - services
      - endpoints
      - pods
    verbs:
      - get
      - list
      - watch
