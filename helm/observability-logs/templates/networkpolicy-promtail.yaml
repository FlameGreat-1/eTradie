{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "olog.promtail.fullname" . }}
  namespace: {{ include "olog.namespace" . }}
  labels:
    {{- include "olog.promtail.selectorLabels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "olog.promtail.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Prometheus scrapes /metrics on :3101.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
          podSelector:
            matchLabels:
              app: prometheus
      ports:
        - protocol: TCP
          port: {{ .Values.promtail.service.port | default 3101 }}
  egress:
    # Push logs to Loki.
    - to:
        - podSelector:
            matchLabels:
              {{- include "olog.loki.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 3100
    # K8s API server for pod / node service discovery.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: default
      ports:
        - protocol: TCP
          port: 443
    # Cluster DNS.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
{{- end }}
