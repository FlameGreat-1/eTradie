{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "olog.promtail.fullname" . }}
  namespace: {{ include "olog.namespace" . }}
  labels:
    {{- include "olog.promtail.selectorLabels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "olog.promtail.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Prometheus scrapes /metrics on :3101.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
          podSelector:
            matchLabels:
              app: prometheus
      ports:
        - protocol: TCP
          port: {{ .Values.promtail.service.port | default 3101 }}
    # Kubelet readiness probe hits /ready on the http-metrics port.
    # The probe source is the node IP, which a pod/namespace selector
    # cannot match, so allow any IPv4 source on the probe port. Pod
    # IPs are not externally routable, so this only admits the on-node
    # kubelet beyond the Prometheus scrape already permitted above.
    - from:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: {{ .Values.promtail.service.port | default 3101 }}
  egress:
    # Push logs to Loki.
    - to:
        - podSelector:
            matchLabels:
              {{- include "olog.loki.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 3100
    # K8s API server for pod / node service discovery. Promtail's
    # kubernetes_sd_configs (role: pod) calls the apiserver, reached
    # via the kubernetes.default Service whose endpoints are the
    # host-network control-plane node IPs - NOT a pod in the default
    # namespace - so a namespaceSelector egress cannot match it under
    # a strict CNI and pod discovery (hence all log shipping) stops.
    # Allow any IPv4 destination on :443 so the apiserver is reachable
    # regardless of how its endpoints resolve; the namespaceSelector
    # rule is retained for clusters where it does match.
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: default
      ports:
        - protocol: TCP
          port: 443
    # Cluster DNS.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
{{- end }}
