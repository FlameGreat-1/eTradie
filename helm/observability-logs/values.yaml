# Default values for etradie-observability-logs.
#
# Loki + Promtail deployed in the `etradie-observability` namespace.
# Production and staging overlays tune retention and resources.
#
# This chart is intentionally minimal: it does NOT deploy Grafana.
# The platform expects Grafana to live in the `monitoring` namespace
# (alongside the Prometheus Operator) and to consume Loki via its
# in-cluster Service DNS.

nameOverride: ""
fullnameOverride: ""

namespace:
  # Same namespace the engine + mt-node charts whitelist in their
  # NetworkPolicy egress for the OTel collector. Promtail does NOT
  # need egress out of this namespace; it scrapes node-local files.
  name: etradie-observability
  create: true
  # The kube-apiserver populates kubernetes.io/metadata.name=<ns>
  # automatically (NamespaceDefaultLabelName admission, GA 1.22+).
  # The mt-node + engine charts select on that label.

# ---------------------------------------------------------------------
# Loki
# ---------------------------------------------------------------------
loki:
  image:
    repository: grafana/loki
    tag: "2.9.4"
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 3100

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi

  persistence:
    enabled: true
    storageClass: ""
    size: 50Gi
    accessMode: ReadWriteOnce

  # Retention. Loki's built-in retention runs as part of the compactor.
  # Default 14d matches the mt-node soak SLO + the engine's processor
  # audit retention so cross-correlation is trivial.
  retentionPeriod: "336h"  # 14 days

  # Per-stream rate limits. Defaults are conservative; production
  # overlay tightens them once we have real volume data.
  limits:
    ingestionRateMB: 8
    ingestionBurstSizeMB: 16
    maxStreamsPerUser: 10000
    maxLineSizeBytes: 262144  # 256 KiB - covers EA reply payloads.

  podAnnotations: {}

  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 10001
    runAsGroup: 10001
    fsGroup: 10001
    seccompProfile:
      type: RuntimeDefault

  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 10001
    capabilities:
      drop:
        - ALL

  serviceMonitor:
    enabled: true
    interval: 30s
    scrapeTimeout: 10s
    labels:
      prometheus: kube-prometheus

# ---------------------------------------------------------------------
# Promtail
# ---------------------------------------------------------------------
promtail:
  image:
    repository: grafana/promtail
    tag: "2.9.4"
    pullPolicy: IfNotPresent

  resources:
    requests:
      cpu: 50m
      memory: 96Mi
    limits:
      cpu: 250m
      memory: 256Mi

  # Promtail must mount the node's /var/log/pods to discover container
  # log files. The mount is hostPath-readonly to minimise escape risk;
  # combined with readOnlyRootFilesystem + drop ALL capabilities the
  # daemon has zero write paths.
  hostMounts:
    varLogPods: /var/log/pods
    varLibDockerContainers: /var/lib/docker/containers

  service:
    enabled: true   # publishes promtail's /metrics for prometheus
    port: 3101

  serviceMonitor:
    enabled: true
    interval: 30s
    scrapeTimeout: 10s
    labels:
      prometheus: kube-prometheus

  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 10002
    runAsGroup: 10002
    fsGroup: 10002
    seccompProfile:
      type: RuntimeDefault

  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 10002
    capabilities:
      drop:
        - ALL

  # Promtail tolerates control-plane nodes so logs from control-plane
  # pods (apiserver, etcd) are also aggregated. Comment out if your
  # cluster's control plane is managed (e.g. GKE / OKE).
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule
    - key: node-role.kubernetes.io/master
      operator: Exists
      effect: NoSchedule

  # Promtail's pipeline drops kubelet + containerd noise, parses
  # JSON logs, and re-labels each stream with namespace, pod,
  # container, plus the eTradie-specific labels exported by the
  # mt-node and engine charts. The full pipeline lives in
  # templates/promtail-config.yaml; this map is the per-overlay
  # tuning surface.
  pipeline:
    dropContainers:
      - kube-proxy
      - calico-node
      - csi-node-driver-registrar

# ---------------------------------------------------------------------
# Tracing backend (OpenTelemetry Collector + Jaeger).
#
# DISABLED by default: a bare `helm template` / dev render emits no
# tracing objects, matching the historical "metrics + logs first"
# posture. The production and staging overlays set tracing.enabled=true
# AND the four service overlays set their OTEL endpoint to
# otel-collector.etradie-observability.svc.cluster.local:4317 (the
# Service name below is fixed at `otel-collector` precisely so those
# endpoints + the per-service NetworkPolicy egress resolve).
#
# Jaeger here is the all-in-one image with a DURABLE Badger store on a
# PVC by default (tracing.jaeger.persistence.enabled=true), so traces
# survive pod restarts. Set persistence.enabled=false in an overlay to
# drop back to the ephemeral in-memory store (cheapest footprint) with
# no code change. For HA / horizontally-scaled traces, split into
# jaeger-collector + jaeger-query backed by Cassandra/Elasticsearch
# (out of scope for this chart's single-pod footprint).
# ---------------------------------------------------------------------
tracing:
  enabled: false

  # Health alerting for the tracing backend (templates/tracing-
  # prometheusrule.yaml). Renders only when tracing.enabled AND this is
  # enabled. Labels must match the Prometheus Operator ruleSelector
  # (kube-prometheus by default), mirroring collector.serviceMonitor.
  # Set enabled=false on a cluster without the Prometheus Operator.
  prometheusRule:
    enabled: true
    labels:
      prometheus: kube-prometheus
      role: alert-rules

  collector:
    image:
      repository: otel/opentelemetry-collector-contrib
      tag: "0.103.1"
      pullPolicy: IfNotPresent
    replicaCount: 2
    # Namespaces whose pods may push OTLP to the collector. The eTradie
    # app services (engine, gateway, execution, management, mt-node) run
    # in etradie-system; Envoy (edge-rooted first span) runs in
    # envoy-system; edge-ingress in edge-ingress-system. All three are
    # admitted so the full edge->app trace producer set can reach the
    # collector on :4317.
    allowedSourceNamespaces:
      - etradie-system
      - envoy-system
      - edge-ingress-system
    resources:
      requests:
        cpu: 100m
        memory: 192Mi
      limits:
        cpu: 500m
        memory: 512Mi
    serviceMonitor:
      enabled: true
      interval: 30s
      scrapeTimeout: 10s
      labels:
        prometheus: kube-prometheus
    podAnnotations: {}

  jaeger:
    enabled: true
    image:
      repository: jaegertracing/all-in-one
      tag: "1.62.0"
      pullPolicy: IfNotPresent
    # Storage backend selector. "badger" = durable on-disk store (PVC),
    # "memory" = ephemeral. Driven together with persistence.enabled
    # below: when persistence is enabled the deployment uses Badger and
    # mounts the PVC; when disabled it uses the in-memory store and
    # mounts no PVC. Switching is a pure values flag - no code change.
    spanStorageType: badger
    # In-memory bound, ONLY used when persistence.enabled=false.
    memoryMaxTraces: "50000"
    # Durable trace storage. ENABLED by default so traces survive pod
    # restarts - an operator can investigate an incident even after the
    # pod that hit it restarted (the in-memory store would wipe exactly
    # the evidence being sought). To trade durability for the cheapest
    # footprint, set enabled=false in an environment overlay: the chart
    # then renders the ephemeral in-memory store + no PVC + no PDB, with
    # no code change.
    persistence:
      enabled: true
      # Leave empty to use the cluster default StorageClass.
      storageClass: ""
      size: 10Gi
      accessMode: ReadWriteOnce
      # Badger span retention TTL. Old spans are GC'd so the PVC stays
      # bounded. 168h = 7 days; align with the Loki/log retention so
      # traces and logs for the same incident expire together.
      spanStoreTTL: "168h"
      annotations: {}
    # PodDisruptionBudget for the single Jaeger pod. maxUnavailable so a
    # 1-replica deployment does not block node drains forever.
    pdb:
      enabled: true
      maxUnavailable: 1
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 1Gi
    podAnnotations: {}

# ---------------------------------------------------------------------
# NetworkPolicy. Loki accepts ingress from Promtail and from Grafana
# (monitoring namespace). Promtail egresses ONLY to Loki and the K8s
# API server (for service discovery). When tracing.enabled, the OTel
# Collector + Jaeger get their own policies (networkpolicy-tracing.yaml).
# ---------------------------------------------------------------------
networkPolicy:
  enabled: true
  grafanaNamespace: monitoring
  grafanaPodLabel:
    name: grafana
    value: ""
