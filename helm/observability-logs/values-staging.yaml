# Staging overlay for observability-logs.

# Tracing backend ON in staging so the full OTLP -> collector -> Jaeger
# path is exercised pre-production. Smaller footprint than prod.
tracing:
  enabled: true
  collector:
    replicaCount: 1
  jaeger:
    enabled: true
    memoryMaxTraces: "50000"
loki:
  persistence:
    size: 20Gi
  retentionPeriod: "168h"  # 7 days in staging
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

promtail:
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 150m
      memory: 192Mi
