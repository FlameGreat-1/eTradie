apiVersion: v1
kind: Service
metadata:
  # Name MUST stay `management` so the in-cluster URL is
  # management.etradie-system.svc.cluster.local:50054 - exactly
  # what helm/gateway/values.yaml config.gateway.managementAddr
  # already points at.
  name: management
  namespace: {{ include "management.namespace" . }}
  labels:
    {{- include "management.labels" . | nindent 4 }}
  annotations:
    description: "eTradie management gRPC + HTTP service. Consumed by gateway."
spec:
  type: {{ .Values.service.type | default "ClusterIP" }}
  sessionAffinity: {{ .Values.service.sessionAffinity | default "None" }}
  selector:
    {{- include "management.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.ports.http.port | default 8083 }}
      targetPort: {{ .Values.service.ports.http.targetPort | default 8083 }}
      protocol: TCP
      appProtocol: http
    - name: grpc
      port: {{ .Values.service.ports.grpc.port | default 50054 }}
      targetPort: {{ .Values.service.ports.grpc.targetPort | default 50054 }}
      protocol: TCP
      appProtocol: grpc
