{{- if .Values.externalSecrets.enabled }}
{{- /*
Fail-fast on a missing Vault path. Audit ref: post-merge audit M5.
*/ -}}
{{- $vaultPath := required "helm/management: .Values.externalSecrets.management.vaultPath is required when externalSecrets.enabled=true. Set it to the canonical Vault path, e.g. etradie/services/management/production." .Values.externalSecrets.management.vaultPath -}}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "management.secretName" . }}
  namespace: {{ include "management.namespace" . }}
  labels:
    {{- include "management.labels" . | nindent 4 }}
    app.kubernetes.io/component: secret
  annotations:
    description: "Management runtime secrets resolved from Vault"
spec:
  refreshInterval: {{ .Values.externalSecrets.management.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.management.secretStoreName | default "vault-backend" }}
    kind: {{ .Values.externalSecrets.management.secretStoreKind | default "ClusterSecretStore" }}
  target:
    name: {{ include "management.secretName" . }}
    creationPolicy: {{ .Values.externalSecrets.management.creationPolicy | default "Owner" }}
    template:
      type: Opaque
      metadata:
        labels:
          {{- include "management.labels" . | nindent 10 }}
  data:
    # Auth-store DSN. The shared src/auth package (used by every Go
    # service) reads AUTH_DATABASE_URL via envconfig with prefix AUTH
    # and validates it as required in production/staging (see
    # src/auth/config.go::Config.DatabaseURL). Without this mapping
    # the pod fails fast at startup with:
    #   fatal: auth config: validation: AUTH_DATABASE_URL must be set
    #   in staging; the auth store cannot start without a valid DSN.
    # MUST byte-equal etradie/services/gateway/<env>:auth_database_url
    # (auth tables are shared across gateway / execution / management).
    - secretKey: AUTH_DATABASE_URL
      remoteRef:
        key: {{ .Values.externalSecrets.management.vaultPath | quote }}
        property: auth_database_url

    # Database. config.go marks MANAGEMENT_DATABASE_URL as required:true,
    # so the pod fails fast at startup if Vault has not been seeded.
    - secretKey: MANAGEMENT_DATABASE_URL
      remoteRef:
        key: {{ .Values.externalSecrets.management.vaultPath | quote }}
        property: management_database_url

    # Redis. config.go default redis://localhost:6379/1; prod URL
    # carries the redis password.
    - secretKey: MANAGEMENT_REDIS_URL
      remoteRef:
        key: {{ .Values.externalSecrets.management.vaultPath | quote }}
        property: management_redis_url

    # Shared JWT signing secret (must equal gateway + execution).
    - secretKey: AUTH_JWT_SECRET
      remoteRef:
        key: {{ .Values.externalSecrets.management.vaultPath | quote }}
        property: auth_jwt_secret

    # Engine internal shared secret. Sent in X-Internal-Auth on every
    # /internal/broker/* call the management reconciler / monitoring
    # loops make to the engine bridge. config.go::validate() REQUIRES
    # this in production/staging when BROKER_MODE=mt5 (the prod overlay
    # sets mt5, and APP_ENV=production arms the guard), so without this
    # mapping the pod fails fast at startup. Bound to the SAME Vault
    # property the gateway consumes (engine_internal_shared_secret) so
    # all four services share one value and the engine's constant-time
    # X-Internal-Auth check matches. Audit ref: B1.
    - secretKey: ENGINE_INTERNAL_SHARED_SECRET
      remoteRef:
        key: {{ .Values.externalSecrets.management.vaultPath | quote }}
        property: engine_internal_shared_secret

    # NOTE: no credential-at-rest KEK is mapped here. The management
    # service never encrypts or decrypts user credentials; it reaches
    # the broker exclusively through the engine's /internal/broker/*
    # bridge (X-Internal-Auth + X-User-Id). The engine owns credential
    # encryption (engine.shared.crypto). Audit ref: Tier 3 cross-service
    # KEK least-privilege.
{{- end }}
