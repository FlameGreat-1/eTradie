{{- if .Values.linkerdPolicy.enabled }}
{{- /*
Tier 9 G9-2: per-service Linkerd authorization for management.
SA identities: <sa>.<ns>.serviceaccount.identity.linkerd.cluster.local;
SA name = release name = etradie-<svc> (verified in _helpers.tpl).
*/ -}}
{{- $ns := include "management.namespace" . -}}
{{- $sel := include "management.selectorLabels" . -}}
# ── gRPC :50054 — gateway only ──────────────────────────────────
apiVersion: policy.linkerd.io/v1beta3
kind: Server
metadata:
  name: {{ include "management.appName" . }}-grpc
  namespace: {{ $ns }}
  labels:
    {{- include "management.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- $sel | nindent 6 }}
  port: {{ .Values.service.ports.grpc.port }}
  proxyProtocol: gRPC
---
apiVersion: policy.linkerd.io/v1beta3
kind: MeshTLSAuthentication
metadata:
  name: {{ include "management.appName" . }}-grpc-callers
  namespace: {{ $ns }}
  labels:
    {{- include "management.labels" . | nindent 4 }}
spec:
  identities:
    {{- range .Values.linkerdPolicy.callerServiceAccounts }}
    - {{ printf "%s.%s.serviceaccount.identity.linkerd.cluster.local" . $ns | quote }}
    {{- end }}
---
apiVersion: policy.linkerd.io/v1alpha1
kind: AuthorizationPolicy
metadata:
  name: {{ include "management.appName" . }}-grpc-authz
  namespace: {{ $ns }}
  labels:
    {{- include "management.labels" . | nindent 4 }}
spec:
  targetRef:
    group: policy.linkerd.io
    kind: Server
    name: {{ include "management.appName" . }}-grpc
  requiredAuthenticationRefs:
    - group: policy.linkerd.io
      kind: MeshTLSAuthentication
      name: {{ include "management.appName" . }}-grpc-callers
---
# ── HTTP :8083 — gateway (dashboard) + Prometheus (/metrics) ─────────
apiVersion: policy.linkerd.io/v1beta3
kind: Server
metadata:
  name: {{ include "management.appName" . }}-http
  namespace: {{ $ns }}
  labels:
    {{- include "management.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- $sel | nindent 6 }}
  port: {{ .Values.service.ports.http.port }}
  proxyProtocol: HTTP/1
---
apiVersion: policy.linkerd.io/v1alpha1
kind: AuthorizationPolicy
metadata:
  name: {{ include "management.appName" . }}-http-authz
  namespace: {{ $ns }}
  labels:
    {{- include "management.labels" . | nindent 4 }}
spec:
  targetRef:
    group: policy.linkerd.io
    kind: Server
    name: {{ include "management.appName" . }}-http
  requiredAuthenticationRefs:
    - group: policy.linkerd.io
      kind: MeshTLSAuthentication
      name: {{ include "management.appName" . }}-grpc-callers
    - group: policy.linkerd.io
      kind: NetworkAuthentication
      name: {{ include "management.appName" . }}-metrics-scrape
---
apiVersion: policy.linkerd.io/v1alpha1
kind: NetworkAuthentication
metadata:
  name: {{ include "management.appName" . }}-metrics-scrape
  namespace: {{ $ns }}
  labels:
    {{- include "management.labels" . | nindent 4 }}
spec:
  # Prometheus (monitoring ns, un-meshed) scrape source. NetworkPolicy
  # already restricts metrics ingress to the Prometheus pod; this
  # satisfies the Linkerd Server's authn requirement for that source.
  networks:
    - cidr: 10.0.0.0/8
    - cidr: 172.16.0.0/12
    - cidr: 192.168.0.0/16
    - cidr: 100.64.0.0/10
{{- end }}
