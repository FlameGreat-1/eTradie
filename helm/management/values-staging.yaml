# Staging overlay for the etradie-management chart.
# TABLE 2B profile (BUDGET.md): single-node Contabo.
#
# SINGLETON CONSTRAINT (see helm/management/values.yaml): replicaCount
# MUST stay 1. Audit ref: MG-C1.

replicaCount: 1
image:
  tag: "cc4df219c02a8b6e4842837a8b9b89e78acddf97"
  pullPolicy: IfNotPresent
podAnnotations:
  tier: staging
config:
  # Staging is prod-like for the auth/security posture. Audit ref: A2.
  app:
    env: "staging"
  management:
    # Staging runs the real engine MT5 bridge end-to-end. Until a user
    # provisions a demo or live broker via the dashboard, the engine's
    # /internal/broker/* endpoints return their own no-broker response
    # and the management dashboard surfaces (journal, performance,
    # active trades) reflect that empty state truthfully.
    logLevel: "DEBUG"
    logJson: "true"
    # Distributed tracing ON in staging.
    otelEndpoint: "otel-collector.etradie-observability.svc.cluster.local:4317"
externalSecrets:
  enabled: true
  management:
    vaultPath: etradie/services/management/staging
    refreshInterval: 5m
resources:
  requests:
    cpu: 150m
    memory: 256Mi
    ephemeral-storage: 64Mi
  limits:
    cpu: 500m
    memory: 512Mi
    ephemeral-storage: 128Mi
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 1
podDisruptionBudget:
  enabled: true
  minAvailable: 0
  unhealthyPodEvictionPolicy: AlwaysAllow
serviceMonitor:
  enabled: true
  interval: 30s
  scrapeTimeout: 10s
terminationGracePeriodSeconds: 30
# GHCR pull credentials. Packages are PRIVATE on GHCR (push posture);
# K8s containerd needs a docker-registry Secret to pull. The `ghcr-pull`
# Secret is created per-namespace at Phase 10.0 BEFORE this chart syncs.
# Future hardening: source this Secret from Vault via ESO (PROGRESS TODO).
imagePullSecrets:
  - name: ghcr-pull
