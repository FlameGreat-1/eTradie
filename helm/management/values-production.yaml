# Production overlay for the etradie-management chart.
# Cloud-agnostic: no AWS instance-type nodeSelector.
#
# SINGLETON CONSTRAINT (see helm/management/values.yaml). replicaCount
# stays 1 in production; the four background loops do not coordinate
# and the in-memory state is per-pod. Audit ref: MG-C1.
replicaCount: 1

image:
  tag: "0.1.0"
  pullPolicy: IfNotPresent

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8083"
  prometheus.io/path: "/metrics"
  cluster-autoscaler.kubernetes.io/safe-to-evict: "false"
  tier: production

config:
  # Arms the management prod fail-closed guards
  # (JWT-secret-required, ENGINE_INTERNAL_SHARED_SECRET under mt5).
  # Audit ref: A2.
  app:
    env: "production"
  management:
    brokerMode: "mt5"
    logLevel: "INFO"
    logJson: "true"

# Per-service Linkerd authorization (Server + AuthorizationPolicy).
# Kept disabled until the mesh is confirmed; enable deliberately (set
# true + re-sync) once `linkerd viz edges` shows SECURED on every
# management edge (docs/runbooks/tier9-linkerd-mesh-rollout.md step 4).
linkerdPolicy:
  enabled: false

externalSecrets:
  enabled: true
  management:
    vaultPath: etradie/services/management/production
    refreshInterval: 1h

resources:
  requests:
    cpu: 500m
    memory: 512Mi
    ephemeral-storage: 256Mi
  limits:
    cpu: "2"
    memory: 1Gi
    ephemeral-storage: 512Mi

# HPA is intentionally OFF. Scaling above 1 replica would re-introduce
# the duplicate-firing problem the singleton constraint exists to
# prevent. Audit ref: MG-C1.
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 1

# With replicaCount=1 a minAvailable: >=1 PDB would block every node
# drain forever. Disable the PDB so cluster operators can drain the
# node holding the management pod normally; the ~30s recreate gap is
# tolerated by every upstream caller's retry path. Audit ref: MG-C1.
podDisruptionBudget:
  enabled: false

serviceMonitor:
  enabled: true
  interval: 15s
  scrapeTimeout: 10s

affinity:
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchLabels:
            app.kubernetes.io/name: etradie-management
        topologyKey: kubernetes.io/hostname
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: etradie-management
          topologyKey: topology.kubernetes.io/zone

topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: etradie-management
  - maxSkew: 2
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: etradie-management

nodeSelector: {}

# Toleration for the dedicated etradie-system node group taint applied
# by infrastructure/cluster/main.tf. A toleration without a matching
# taint is a no-op, so this stays cloud-agnostic: clusters that do
# not taint their nodes are unaffected.
tolerations:
  - key: workload
    operator: Equal
    value: etradie-system
    effect: NoSchedule

terminationGracePeriodSeconds: 90
