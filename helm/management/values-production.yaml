# Production overlay for the etradie-management chart.
# TABLE 2B profile (BUDGET.md): single-node Contabo. Cloud-agnostic.
#
# SINGLETON CONSTRAINT (see helm/management/values.yaml): replicaCount
# stays 1 in production; the four background loops do not coordinate
# and the in-memory state is per-pod. Audit ref: MG-C1.
#
# Required hostname anti-affinity intentionally NOT set (base preferred
# applies; required deadlocks single-node rollouts).

replicaCount: 1

image:
  tag: "0.1.0"
  pullPolicy: IfNotPresent

podAnnotations:
  cluster-autoscaler.kubernetes.io/safe-to-evict: "false"
  tier: production

config:
  # Arms the management prod fail-closed guards. Audit ref: A2.
  app:
    env: "production"
  management:
    # The mt5 bridge is the sole broker.Port implementation. Every
    # call is forwarded to the Python engine's /internal/broker/*
    # surface, which resolves the per-user MT4 or MT5 broker
    # connection from broker_connections at request time.
    logLevel: "INFO"
    logJson: "true"
    # Distributed tracing ON.
    otelEndpoint: "otel-collector.etradie-observability.svc.cluster.local:4317"

# Per-service Linkerd authorization stays disabled until the mesh is
# confirmed (runbook step 4). The mesh itself is ON.
linkerdPolicy:
  enabled: false

externalSecrets:
  enabled: true
  management:
    vaultPath: etradie/services/management/production
    refreshInterval: 1h

resources:
  requests:
    cpu: 300m
    memory: 512Mi
    ephemeral-storage: 256Mi
  limits:
    cpu: "1"
    memory: 1Gi
    ephemeral-storage: 512Mi

# HPA intentionally OFF (singleton constraint). Audit ref: MG-C1.
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 1

# With replicaCount=1 a minAvailable >=1 PDB would block every node
# drain forever. Audit ref: MG-C1.
podDisruptionBudget:
  enabled: false

serviceMonitor:
  enabled: true
  interval: 15s
  scrapeTimeout: 10s

nodeSelector: {}

tolerations:
  - key: workload
    operator: Equal
    value: etradie-system
    effect: NoSchedule

terminationGracePeriodSeconds: 90
