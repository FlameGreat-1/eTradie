# helm/billing values-staging.yaml
# Layered on top of values.yaml for the staging environment.
# TABLE 2B profile (BUDGET.md): single-node Contabo, 1 replica.

replicaCount: 1
image:
  repository: ghcr.io/flamegreat-1/etradie/billing
  pullPolicy: IfNotPresent
  tag: "459ce9eaca74c7cdc473f9f92a0655b4bfe4f0b6"
podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8082"
  prometheus.io/path: "/metrics"
  tier: staging
config:
  billing:
    logLevel: "DEBUG"
    logJson: "true"
    # Provider dashboards (Paddle sandbox + Lemon Squeezy test-mode)
    # MUST be configured with https://staging.exoper.com/webhooks/paddle
    # and https://staging.exoper.com/webhooks/lemonsqueezy respectively.
    publicBaseUrl: "https://staging.exoper.com"
    checkoutSuccessUrl: "https://staging.exoper.com/billing/success"
    checkoutCancelUrl: "https://staging.exoper.com/billing/cancel"
    paddleApiBaseUrl: "https://sandbox-api.paddle.com"
    lemonsqueezyApiBaseUrl: "https://api.lemonsqueezy.com"
externalSecrets:
  enabled: true
  billing:
    vaultPath: etradie/services/billing/staging
    refreshInterval: 1h
resources:
  requests:
    cpu: 150m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 1
# A 1-replica PDB with minAvailable>=1 blocks every node drain forever.
podDisruptionBudget:
  enabled: false
serviceMonitor:
  enabled: true
  interval: 15s
  scrapeTimeout: 10s
nodeSelector: {}
tolerations: []
# GHCR pull credentials. Packages are PRIVATE on GHCR (push posture);
# K8s containerd needs a docker-registry Secret to pull. The `ghcr-pull`
# Secret is created per-namespace at Phase 10.0 BEFORE this chart syncs.
# Future hardening: source this Secret from Vault via ESO (PROGRESS TODO).
imagePullSecrets:
  - name: ghcr-pull
