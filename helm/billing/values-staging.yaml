# helm/billing values-staging.yaml
# Layered on top of values.yaml for the staging environment.

replicaCount: 2

image:
  repository: ghcr.io/flamegreat-1/etradie/billing
  pullPolicy: IfNotPresent
  tag: "staging-0.1.0"

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8082"
  prometheus.io/path: "/metrics"
  tier: staging

config:
  billing:
    logLevel: "DEBUG"
    logJson: "true"
    # Staging hosts the SPA and webhooks under the same domain as the
    # rest of the staging stack. The provider dashboards (Paddle
    # sandbox + Lemon Squeezy test-mode) MUST be configured with
    # https://staging.exoper.com/webhooks/paddle and
    # https://staging.exoper.com/webhooks/lemonsqueezy respectively.
    publicBaseUrl: "https://staging.exoper.com"
    checkoutSuccessUrl: "https://staging.exoper.com/billing/success"
    checkoutCancelUrl: "https://staging.exoper.com/billing/cancel"
    # Lemon Squeezy publishes a separate sandbox host; Paddle uses a
    # different base URL for sandbox transactions. Operators set the
    # appropriate sandbox base URL here per environment.
    paddleApiBaseUrl: "https://sandbox-api.paddle.com"
    lemonsqueezyApiBaseUrl: "https://api.lemonsqueezy.com"

externalSecrets:
  enabled: true
  billing:
    vaultPath: etradie/services/billing/staging
    refreshInterval: 1h

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: "500m"
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 3

podDisruptionBudget:
  enabled: true
  minAvailable: 1

serviceMonitor:
  enabled: true
  interval: 15s
  scrapeTimeout: 10s

nodeSelector: {}
tolerations: []
