# helm/billing values-production.yaml
# Layered on top of values.yaml for the production environment.

replicaCount: 3

image:
  repository: ghcr.io/flamegreat-1/etradie/billing
  pullPolicy: IfNotPresent
  tag: "0.1.0"

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8082"
  prometheus.io/path: "/metrics"
  cluster-autoscaler.kubernetes.io/safe-to-evict: "false"
  tier: production

config:
  billing:
    logLevel: "INFO"
    logJson: "true"
    # Production webhook origin. MUST be configured in both provider
    # dashboards (Paddle Billing v1 + Lemon Squeezy production). The
    # platform invariant is documented in docs/deployment/billing-runbook.md
    # §1.1.
    publicBaseUrl: "https://api.exoper.com"
    checkoutSuccessUrl: "https://app.exoper.com/billing/success"
    checkoutCancelUrl: "https://app.exoper.com/billing/cancel"
    paddleApiBaseUrl: "https://api.paddle.com"
    lemonsqueezyApiBaseUrl: "https://api.lemonsqueezy.com"

externalSecrets:
  enabled: true
  billing:
    vaultPath: etradie/services/billing/production
    refreshInterval: 1h

resources:
  requests:
    cpu: 200m
    memory: 384Mi
    ephemeral-storage: 128Mi
  limits:
    cpu: "1"
    memory: 768Mi
    ephemeral-storage: 256Mi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 8
  targetCPUUtilizationPercentage: 65
  targetMemoryUtilizationPercentage: 75
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 600
      policies:
        - type: Percent
          value: 25
          periodSeconds: 120
        - type: Pods
          value: 1
          periodSeconds: 120
      selectPolicy: Min
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 2
          periodSeconds: 30
      selectPolicy: Max

podDisruptionBudget:
  enabled: true
  minAvailable: 2
  unhealthyPodEvictionPolicy: IfHealthyBudget

serviceMonitor:
  enabled: true
  interval: 10s
  scrapeTimeout: 8s
  labels:
    prometheus: kube-prometheus
    environment: production
    tier: critical

affinity:
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchLabels:
            app.kubernetes.io/name: etradie-billing
        topologyKey: kubernetes.io/hostname
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: etradie-billing
          topologyKey: topology.kubernetes.io/zone

topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: etradie-billing
  - maxSkew: 2
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: etradie-billing

nodeSelector: {}

tolerations:
  - key: workload
    operator: Equal
    value: etradie-system
    effect: NoSchedule

terminationGracePeriodSeconds: 90
