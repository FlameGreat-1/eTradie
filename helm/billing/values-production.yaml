# helm/billing values-production.yaml
# Layered on top of values.yaml for the production environment.
# TABLE 2B profile (BUDGET.md): single-node Contabo, 1 replica.
# Required hostname anti-affinity intentionally NOT set (base preferred
# applies; required deadlocks single-node rollouts).

replicaCount: 1

image:
  repository: ghcr.io/flamegreat-1/etradie/billing
  pullPolicy: IfNotPresent
  tag: "0.1.0"

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8082"
  prometheus.io/path: "/metrics"
  cluster-autoscaler.kubernetes.io/safe-to-evict: "false"
  tier: production

config:
  billing:
    logLevel: "INFO"
    logJson: "true"
    # Production webhook origin. MUST be configured in both provider
    # dashboards (Paddle Billing v1 + Lemon Squeezy production). See
    # docs/deployment/billing-runbook.md §1.1.
    publicBaseUrl: "https://api.exoper.com"
    checkoutSuccessUrl: "https://app.exoper.com/billing/success"
    checkoutCancelUrl: "https://app.exoper.com/billing/cancel"
    paddleApiBaseUrl: "https://api.paddle.com"
    lemonsqueezyApiBaseUrl: "https://api.lemonsqueezy.com"

externalSecrets:
  enabled: true
  billing:
    vaultPath: etradie/services/billing/production
    refreshInterval: 1h

resources:
  requests:
    cpu: 200m
    memory: 384Mi
    ephemeral-storage: 128Mi
  limits:
    cpu: "1"
    memory: 768Mi
    ephemeral-storage: 256Mi

# Single node: HPA pinned OFF (TABLE 2B).
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 1

# A 1-replica PDB with minAvailable>=1 blocks every node drain forever.
podDisruptionBudget:
  enabled: false

serviceMonitor:
  enabled: true
  interval: 10s
  scrapeTimeout: 8s
  labels:
    prometheus: kube-prometheus
    environment: production
    tier: critical

nodeSelector: {}

tolerations:
  - key: workload
    operator: Equal
    value: etradie-system
    effect: NoSchedule

terminationGracePeriodSeconds: 90
