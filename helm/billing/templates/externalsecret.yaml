{{- if .Values.externalSecrets.enabled }}
{{- /*
Fail-fast: a missing or empty vaultPath produces an ExternalSecret
with remoteRef.key="". ESO then fails to resolve, synthesises an
empty Secret, and the billing pod CrashLoops with `billing config:
required key ... missing value` — no operator-actionable hint.
Catch the misconfiguration at render time instead.
*/ -}}
{{- $vaultPath := required "helm/billing: .Values.externalSecrets.billing.vaultPath is required when externalSecrets.enabled=true. Set it to the canonical Vault path, e.g. etradie/services/billing/production." .Values.externalSecrets.billing.vaultPath -}}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "billing.secretName" . }}
  namespace: {{ include "billing.namespace" . }}
  labels:
    {{- include "billing.labels" . | nindent 4 }}
    app.kubernetes.io/component: secret
  annotations:
    description: "Billing runtime secrets resolved from Vault"
spec:
  refreshInterval: {{ .Values.externalSecrets.billing.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.billing.secretStoreName | default "vault-backend" }}
    kind: {{ .Values.externalSecrets.billing.secretStoreKind | default "ClusterSecretStore" }}
  target:
    name: {{ include "billing.secretName" . }}
    creationPolicy: {{ .Values.externalSecrets.billing.creationPolicy | default "Owner" }}
    template:
      type: Opaque
      metadata:
        labels:
          {{- include "billing.labels" . | nindent 10 }}
  data:
    # ---------------------------------------------------------------
    # Database. BILLING_DATABASE_URL takes precedence when present;
    # otherwise the binary builds the URL from the POSTGRES_* set,
    # matching the gateway pattern.
    # ---------------------------------------------------------------
    - secretKey: BILLING_DATABASE_URL
      remoteRef:
        key: {{ $vaultPath | quote }}
        property: billing_database_url
    - secretKey: POSTGRES_USER
      remoteRef:
        key: {{ $vaultPath | quote }}
        property: postgres_user
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: {{ $vaultPath | quote }}
        property: postgres_password
    - secretKey: POSTGRES_HOST
      remoteRef:
        key: {{ $vaultPath | quote }}
        property: postgres_host
    - secretKey: POSTGRES_PORT
      remoteRef:
        key: {{ $vaultPath | quote }}
        property: postgres_port
    - secretKey: POSTGRES_DB
      remoteRef:
        key: {{ $vaultPath | quote }}
        property: postgres_db
    - secretKey: POSTGRES_SSLMODE
      remoteRef:
        key: {{ $vaultPath | quote }}
        property: postgres_sslmode

    # ---------------------------------------------------------------
    # Cross-service shared secret. MUST match the value the gateway
    # holds as GATEWAY_BILLING_INTERNAL_SHARED_SECRET, otherwise every
    # /internal/checkout and /internal/portal call returns 401.
    # Generate with: openssl rand -hex 32
    # ---------------------------------------------------------------
    - secretKey: BILLING_INTERNAL_SHARED_SECRET
      remoteRef:
        key: {{ $vaultPath | quote }}
        property: internal_shared_secret

    # ---------------------------------------------------------------
    # Redis URL for cross-service alert publishing. MUST point at the
    # same Redis the gateway subscribes to (etradie:alerts channel).
    # ---------------------------------------------------------------
    - secretKey: BILLING_REDIS_URL
      remoteRef:
        key: {{ $vaultPath | quote }}
        property: billing_redis_url

    # ---------------------------------------------------------------
    # Paddle. webhook_secret signs every notification; api_key is the
    # bearer for transactions + portal-sessions. price IDs are tier
    # mappings (pro_byok, pro_managed).
    # ---------------------------------------------------------------
    - secretKey: PADDLE_WEBHOOK_SECRET
      remoteRef:
        key: {{ $vaultPath | quote }}
        property: paddle_webhook_secret
    - secretKey: PADDLE_API_KEY
      remoteRef:
        key: {{ $vaultPath | quote }}
        property: paddle_api_key
    - secretKey: PADDLE_PRICE_PRO_BYOK
      remoteRef:
        key: {{ $vaultPath | quote }}
        property: paddle_price_pro_byok
    - secretKey: PADDLE_PRICE_PRO_MANAGED
      remoteRef:
        key: {{ $vaultPath | quote }}
        property: paddle_price_pro_managed

    # ---------------------------------------------------------------
    # Lemon Squeezy. store_id + variant IDs are tier mappings.
    # ---------------------------------------------------------------
    - secretKey: LEMONSQUEEZY_WEBHOOK_SECRET
      remoteRef:
        key: {{ $vaultPath | quote }}
        property: lemonsqueezy_webhook_secret
    - secretKey: LEMONSQUEEZY_API_KEY
      remoteRef:
        key: {{ $vaultPath | quote }}
        property: lemonsqueezy_api_key
    - secretKey: LEMONSQUEEZY_STORE_ID
      remoteRef:
        key: {{ $vaultPath | quote }}
        property: lemonsqueezy_store_id
    - secretKey: LEMONSQUEEZY_VARIANT_PRO_BYOK
      remoteRef:
        key: {{ $vaultPath | quote }}
        property: lemonsqueezy_variant_pro_byok
    - secretKey: LEMONSQUEEZY_VARIANT_PRO_MANAGED
      remoteRef:
        key: {{ $vaultPath | quote }}
        property: lemonsqueezy_variant_pro_managed
{{- end }}
