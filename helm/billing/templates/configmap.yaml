apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "billing.configMapName" . }}
  namespace: {{ include "billing.namespace" . }}
  labels:
    {{- include "billing.labels" . | nindent 4 }}
    app.kubernetes.io/component: config
data:
  # HTTP server
  BILLING_HTTP_PORT: {{ .Values.config.billing.httpPort | quote }}
  BILLING_LOG_LEVEL: {{ .Values.config.billing.logLevel | quote }}
  BILLING_LOG_JSON:  {{ .Values.config.billing.logJson | quote }}

  # Webhook hardening
  BILLING_WEBHOOK_REPLAY_WINDOW_SECONDS: {{ .Values.config.billing.webhookReplayWindowSeconds | quote }}
  BILLING_WEBHOOK_MAX_BODY_BYTES:        {{ .Values.config.billing.webhookMaxBodyBytes | quote }}

  # Reconciler + idempotency janitor
  BILLING_RECONCILER_INTERVAL_SECONDS: {{ .Values.config.billing.reconcilerIntervalSeconds | quote }}
  BILLING_IDEMPOTENCY_RETENTION_DAYS:  {{ .Values.config.billing.idempotencyRetentionDays | quote }}

  # Public origin where providers POST webhooks. Logged at startup so
  # operators can cross-check against the Paddle / LS dashboards.
  BILLING_PUBLIC_BASE_URL: {{ required "helm/billing: .Values.config.billing.publicBaseUrl is required (set in values-*.yaml). Must match the URL registered in Paddle + LS dashboards." .Values.config.billing.publicBaseUrl | quote }}

  # Checkout return URLs
  BILLING_CHECKOUT_SUCCESS_URL: {{ required "helm/billing: .Values.config.billing.checkoutSuccessUrl is required (set in values-*.yaml)." .Values.config.billing.checkoutSuccessUrl | quote }}
  BILLING_CHECKOUT_CANCEL_URL:  {{ required "helm/billing: .Values.config.billing.checkoutCancelUrl is required (set in values-*.yaml)." .Values.config.billing.checkoutCancelUrl | quote }}

  # Provider API base URLs. These are NOT secrets; they are the canonical
  # SaaS endpoints (or per-env sandbox overrides).
  PADDLE_API_BASE_URL:       {{ .Values.config.billing.paddleApiBaseUrl | quote }}
  LEMONSQUEEZY_API_BASE_URL: {{ .Values.config.billing.lemonsqueezyApiBaseUrl | quote }}
