# Production overlay for the etradie-engine chart.
# Applied AFTER values.yaml by the ArgoCD child Application.
#
# IMPORTANT: this file is intentionally cloud-agnostic. It does NOT
# pin any AWS-specific instance type via nodeSelector; the same chart
# renders correctly on Contabo K3s, OCI OKE, Talos, or any vanilla
# Kubernetes cluster. Cluster-specific scheduling hints (taints, GPU
# pools, etc.) belong on the cluster, not in the chart.

replicaCount: 3

image:
  tag: "0.1.0"
  pullPolicy: IfNotPresent

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8000"
  prometheus.io/path: "/metrics"
  cluster-autoscaler.kubernetes.io/safe-to-evict: "false"
  tier: production

config:
  # CHECKLIST hardening (Gap #13): explicit mt-node image. The base
  # values.yaml deliberately leaves config.mtNode.image empty so
  # production cannot inherit a default. Forks override this single
  # line; the personal-namespace string lives nowhere else.
  mtNode:
    image: "ghcr.io/flamegreat-1/etradie-mt-node:0.1.0"
    # Production PVC size: 8Gi matches helm/mt-node/values-production.yaml
    # persistence.size. The base values.yaml defaults to 4Gi (staging).
    # Both paths (chart-rendered and engine-provisioned) must use the
    # same size so an operator can flip a tenant between paths without
    # losing the Wine prefix or hitting a PVC resize.
    pvcSize: "8Gi"
    # CHECKLIST Section 8 Step 3 (C3 + M3): scheduling envelope MUST
    # match helm/mt-node/values-production.yaml exactly. The two paths
    # (chart-rendered platform-only and engine-runtime per-tenant) must
    # produce wire-identical pod specs so an operator can flip a tenant
    # between paths and so the runtime path lands on the dedicated
    # node pool that is tainted workload=etradie-system:NoSchedule by
    # infrastructure/cluster/oci/main.tf.
    scheduling:
      priorityClassName: "etradie-mt-node-priority"
      tolerations:
        - key: workload
          operator: Equal
          value: etradie-system
          effect: NoSchedule
      nodeSelector: {}
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: etradie-mt-node
              topologyKey: kubernetes.io/hostname
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: etradie-mt-node
                topologyKey: topology.kubernetes.io/zone
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: etradie-mt-node
        - maxSkew: 2
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: etradie-mt-node
      podAnnotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9100"
        prometheus.io/path: "/metrics"
        cluster-autoscaler.kubernetes.io/safe-to-evict: "false"
        tier: production
  connectivity:
    # Production: same defaults but enforce a minimum EA build so a
    # stale terminal cannot trade. Bumped to 3.0.0 because EA v3.0.0
    # removes the local risk enforcement (CheckRiskLimits) that
    # conflicted with the platform's execution + management services.
    # Any Pod still running EA v2.x will be rejected at the engine's
    # EAIdentityVerifier and the watchdog will force an in-pod restart
    # to load the new binary.
    eaIdentityVerifyEnabled: "true"
    eaMaxClockSkewSecs: "5"
    eaMinVersion: "3.0.0"
    # Section 5: tighter production throughput envelope. Bigger node
    # pool + bigger HPA ceiling means we can afford 20/s per tenant
    # with 8 in-flight and a 40-burst.
    outboundRatePerSecond: "20"
    outboundBurstSize: "40"
    zmqInflightLimit: "8"
  app:
    env: "production"
    debug: "false"
    logLevel: "INFO"
  rag:
    ingestOnStartup: "true"
  processor:
    strictSchemaValidation: "true"
    requireCitations: "true"
    persistAuditLogs: "true"

externalSecrets:
  enabled: true
  engine:
    vaultPath: etradie/services/engine/production
    refreshInterval: 1h
    chromadbAuthVaultPath: etradie/data-layer/chromadb/production
    mtNodeVaultPath: etradie/services/mt-node/production

resources:
  requests:
    cpu: "1"
    memory: 2Gi
    ephemeral-storage: 1Gi
  limits:
    cpu: "2"
    memory: 4Gi
    ephemeral-storage: 4Gi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 6
  targetCPUUtilizationPercentage: 65
  targetMemoryUtilizationPercentage: 75
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 600
      policies:
        - type: Percent
          value: 25
          periodSeconds: 120
        - type: Pods
          value: 1
          periodSeconds: 120
      selectPolicy: Min
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 2
          periodSeconds: 30
      selectPolicy: Max

podDisruptionBudget:
  enabled: true
  minAvailable: 2
  unhealthyPodEvictionPolicy: IfHealthyBudget

serviceMonitor:
  enabled: true
  interval: 15s
  scrapeTimeout: 10s

affinity:
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchLabels:
            app.kubernetes.io/name: etradie-engine
        topologyKey: kubernetes.io/hostname
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: etradie-engine
          topologyKey: topology.kubernetes.io/zone

topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: etradie-engine
  - maxSkew: 2
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: etradie-engine

nodeSelector: {}

# Toleration for the dedicated etradie-system node group taint applied
# by infrastructure/cluster/main.tf. A toleration without a matching
# taint is a no-op, so this stays cloud-agnostic: clusters that do
# not taint their nodes are unaffected.
tolerations:
  - key: workload
    operator: Equal
    value: etradie-system
    effect: NoSchedule

terminationGracePeriodSeconds: 60
