# Production overlay for the etradie-engine chart.
# Applied AFTER values.yaml by the ArgoCD child Application.
#
# IMPORTANT: this file is intentionally cloud-agnostic. It does NOT
# pin any AWS-specific instance type via nodeSelector; the same chart
# renders correctly on Contabo K3s, OCI OKE, Talos, or any vanilla
# Kubernetes cluster. Cluster-specific scheduling hints (taints, GPU
# pools, etc.) belong on the cluster, not in the chart.
#
# Image references (etradie-engine + mt-node) live in
# helm/engine/values-image.yaml. This overlay may pin a
# production-specific tag below by re-declaring image.tag; the
# registry path stays in the shared values-image.yaml file.

replicaCount: 3

image:
  tag: "0.1.0"
  pullPolicy: IfNotPresent

# Per-service Linkerd authorization (Server + AuthorizationPolicy).
# Kept disabled until the mesh is confirmed; enable deliberately (set
# true + re-sync) once `linkerd viz edges` shows SECURED on every engine
# edge (docs/runbooks/tier9-linkerd-mesh-rollout.md step 4).
linkerdPolicy:
  enabled: false

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8000"
  prometheus.io/path: "/metrics"
  cluster-autoscaler.kubernetes.io/safe-to-evict: "false"
  tier: production
  # Tier 9 (CHECKLIST microservice security): join the Linkerd mesh.
  # The engine is the hub — it receives HTTP from gateway/execution/
  # management and dials Postgres/Redis/Chroma/mt-node + Vault + K8s API
  # + external HTTPS. Port handling below is tuned to that egress
  # profile. Audit ref: Tier 9 G9-1.
  linkerd.io/inject: enabled
  # ZeroMQ to mt-node :5555 is a non-HTTP, server-speaks-first framing;
  # mark it opaque so the proxy mTLS-tunnels it as raw TCP between
  # meshed peers instead of attempting HTTP/2 detection.
  config.linkerd.io/opaque-ports: "5555"
  # Run the proxy as a native sidecar so it is Ready before the engine's
  # init containers run: `migrate` (alembic upgrade head) and
  # `wait-for-deps` both dial meshed postgres/redis, which a non-native
  # proxy would not yet be up to carry.
  config.linkerd.io/proxy-enable-native-sidecar: "true"
  # OTLP gRPC collector (etradie-observability) is operator-installed
  # and may be un-meshed; skip its port so traces flow regardless and
  # the proxy never fails a handshake to a non-meshed collector. The
  # K8s API server is auto-skipped by Linkerd; external HTTPS (443)
  # passes through transparently to non-meshed hosts.
  config.linkerd.io/skip-outbound-ports: "4317"

config:
  # mt-node image: defined in helm/engine/values-image.yaml. Only
  # production-specific tuning lives here.
  mtNode:
    # Production PVC size: 8Gi matches helm/mt-node/values-production.yaml
    # persistence.size. The base values.yaml defaults to 4Gi (staging).
    # Both paths (chart-rendered and engine-provisioned) must use the
    # same size so an operator can flip a tenant between paths without
    # losing the Wine prefix or hitting a PVC resize.
    pvcSize: "8Gi"
    # Mirrors helm/mt-node/values-production.yaml so the chart-
    # rendered and engine-runtime paths produce wire-identical pod
    # specs. The toleration is required to land on the dedicated
    # node pool tainted workload=etradie-system:NoSchedule.
    scheduling:
      priorityClassName: "etradie-mt-node-priority"
      tolerations:
        - key: workload
          operator: Equal
          value: etradie-system
          effect: NoSchedule
      nodeSelector: {}
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: etradie-mt-node
              topologyKey: kubernetes.io/hostname
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: etradie-mt-node
                topologyKey: topology.kubernetes.io/zone
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: etradie-mt-node
        - maxSkew: 2
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: etradie-mt-node
      podAnnotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9100"
        prometheus.io/path: "/metrics"
        cluster-autoscaler.kubernetes.io/safe-to-evict: "false"
        tier: production
        # Tier 9 (CHECKLIST microservice security): every runtime-
        # provisioned mt-node StatefulSet joins the mesh. HostedProvisioner
        # merges these onto the pod template (MT_NODE_POD_ANNOTATIONS_JSON
        # -> merged_annotations), so the engine<->mt-node ZeroMQ :5555 hop
        # is mTLS'd. Opaque because ZMQ is a non-HTTP server-first framing
        # (matches the engine pod's own opaque-ports 5555). The Linkerd
        # proxy coexists with the Vault Agent + watchdog sidecars. Audit
        # ref: Tier 9 G9-1.
        linkerd.io/inject: enabled
        # Native sidecar is required: runtime mt-node pods carry the
        # Vault Agent init container (agent-init-first), which must
        # reach Vault through an already-running proxy. Merged onto
        # every runtime StatefulSet by HostedProvisioner.
        config.linkerd.io/proxy-enable-native-sidecar: "true"
        config.linkerd.io/opaque-ports: "5555"
  # Vault address. Production runs an in-cluster Vault on the
  # 'vault' namespace. Operators on HCP Vault or an external
  # Vault override this in their own overlay.
  vault:
    address: "https://vault.vault.svc.cluster.local:8200"
  connectivity:
    # Production: same defaults but enforce a minimum EA build so a
    # stale terminal cannot trade. Bumped to 3.0.0 because EA v3.0.0
    # removes the local risk enforcement (CheckRiskLimits) that
    # conflicted with the platform's execution + management services.
    # Any Pod still running EA v2.x will be rejected at the engine's
    # EAIdentityVerifier and the watchdog will force an in-pod restart
    # to load the new binary.
    eaIdentityVerifyEnabled: "true"
    eaMaxClockSkewSecs: "5"
    eaMinVersion: "3.0.0"
    # Section 5: tighter production throughput envelope. Bigger node
    # pool + bigger HPA ceiling means we can afford 20/s per tenant
    # with 8 in-flight and a 40-burst.
    outboundRatePerSecond: "20"
    outboundBurstSize: "40"
    zmqInflightLimit: "8"
  app:
    env: "production"
    debug: "false"
    logLevel: "INFO"
  rag:
    ingestOnStartup: "true"
  processor:
    strictSchemaValidation: "true"
    requireCitations: "true"
    persistAuditLogs: "true"

externalSecrets:
  enabled: true
  engine:
    vaultPath: etradie/services/engine/production
    refreshInterval: 1h
    chromadbAuthVaultPath: etradie/data-layer/chromadb/production
    mtNodeVaultPath: etradie/services/mt-node/production

resources:
  requests:
    cpu: "1"
    memory: 2Gi
    ephemeral-storage: 1Gi
  limits:
    cpu: "2"
    memory: 4Gi
    ephemeral-storage: 4Gi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 6
  targetCPUUtilizationPercentage: 65
  targetMemoryUtilizationPercentage: 75
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 600
      policies:
        - type: Percent
          value: 25
          periodSeconds: 120
        - type: Pods
          value: 1
          periodSeconds: 120
      selectPolicy: Min
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 2
          periodSeconds: 30
      selectPolicy: Max

podDisruptionBudget:
  enabled: true
  minAvailable: 2
  unhealthyPodEvictionPolicy: IfHealthyBudget

serviceMonitor:
  enabled: true
  interval: 15s
  scrapeTimeout: 10s

affinity:
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchLabels:
            app.kubernetes.io/name: etradie-engine
        topologyKey: kubernetes.io/hostname
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: etradie-engine
          topologyKey: topology.kubernetes.io/zone

topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: etradie-engine
  - maxSkew: 2
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: etradie-engine

nodeSelector: {}

# Toleration for the dedicated etradie-system node group taint applied
# by infrastructure/cluster/main.tf. A toleration without a matching
# taint is a no-op, so this stays cloud-agnostic: clusters that do
# not taint their nodes are unaffected.
tolerations:
  - key: workload
    operator: Equal
    value: etradie-system
    effect: NoSchedule

terminationGracePeriodSeconds: 60
