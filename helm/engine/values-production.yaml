# Production overlay for the etradie-engine chart.
# Applied AFTER values.yaml + values-image.yaml by the ArgoCD child
# Application. TABLE 2B profile (BUDGET.md): single-node Contabo, full
# stack ON, 1 replica. Cloud-agnostic (no instance-type pins; the
# etradie-system tolerations are no-ops on untainted nodes).
#
# Required hostname anti-affinity is intentionally NOT set here (the
# base chart's preferred term applies): required + maxSurge:1 deadlocks
# every rollout on a single node.
#
# Image references (etradie-engine + mt-node) live in
# helm/engine/values-image.yaml.

replicaCount: 1

image:
  tag: "0.1.0"
  pullPolicy: IfNotPresent

# Per-service Linkerd authorization stays disabled until the mesh is
# confirmed (runbook step 4). The mesh itself is ON.
linkerdPolicy:
  enabled: false

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8000"
  prometheus.io/path: "/metrics"
  cluster-autoscaler.kubernetes.io/safe-to-evict: "false"
  tier: production

config:
  # mt-node runtime tunables (image: values-image.yaml). LOCKSTEP
  # INVARIANT: every value below MUST mirror
  # helm/mt-node/values-production.yaml so engine-runtime-provisioned
  # tenant pods are wire-identical to chart-rendered ones.
  mtNode:
    # TABLE 2B: Burstable QoS (requests < limits) instead of the old
    # Guaranteed 2 CPU / 2Gi pinning. Soak-observed steady state is
    # ~520Mi RSS / sub-core CPU with recalc bursts to ~1.4 cores and
    # ~680Mi; 500m/1Gi requests reserve the steady state and the
    # 1500m/2Gi limits absorb the bursts.
    cpuRequest: "500m"
    cpuLimit: "1500m"
    memRequest: "1Gi"
    memLimit: "2Gi"
    ephemeralRequest: "512Mi"
    ephemeralLimit: "1Gi"
    # TABLE 2B disk budget: 4Gi per tenant (matches
    # helm/mt-node/values-production.yaml persistence.size).
    pvcSize: "4Gi"
    scheduling:
      priorityClassName: "etradie-mt-node-priority"
      tolerations:
        - key: workload
          operator: Equal
          value: etradie-system
          effect: NoSchedule
      nodeSelector: {}
      # PREFERRED anti-affinity (was REQUIRED): required one-tenant-
      # per-node makes any second MT user unschedulable on the
      # single-node box. Preferred still spreads on multi-node.
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: etradie-mt-node
                topologyKey: kubernetes.io/hostname
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: etradie-mt-node
        - maxSkew: 2
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: etradie-mt-node
      podAnnotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9100"
        prometheus.io/path: "/metrics"
        cluster-autoscaler.kubernetes.io/safe-to-evict: "false"
        tier: production
        # Tier 9: every runtime-provisioned mt-node StatefulSet joins
        # the mesh; ZeroMQ :5555 is opaque (server-first framing).
        linkerd.io/inject: enabled
        config.linkerd.io/proxy-enable-native-sidecar: "true"
        config.linkerd.io/opaque-ports: "5555"
        # TABLE 2B: Vault Agent sidecar tuning. The injector's upstream
        # default request is 250m CPU per tenant pod; on the single-node
        # CPU budget that is most of a user's entire allowance. The
        # agent is a persistent sidecar (agent-pre-populate-only=false)
        # and idles far below 50m.
        vault.hashicorp.com/agent-requests-cpu: "50m"
        vault.hashicorp.com/agent-limits-cpu: "250m"
        vault.hashicorp.com/agent-requests-mem: "64Mi"
        vault.hashicorp.com/agent-limits-mem: "128Mi"
  # Vault address. Production runs an in-cluster Vault on the 'vault'
  # namespace.
  vault:
    address: "https://vault.vault.svc.cluster.local:8200"
  connectivity:
    # Enforce a minimum EA build so a stale terminal cannot trade.
    eaIdentityVerifyEnabled: "true"
    eaMaxClockSkewSecs: "5"
    eaMinVersion: "3.0.0"
    # Section 5: production throughput envelope.
    outboundRatePerSecond: "20"
    outboundBurstSize: "40"
    zmqInflightLimit: "8"
  app:
    env: "production"
    debug: "false"
    logLevel: "INFO"
  observability:
    # Distributed tracing ON: export OTLP spans to the in-cluster OTel
    # Collector deployed by helm/observability-logs (tracing.enabled).
    otelEndpoint: "otel-collector.etradie-observability.svc.cluster.local:4317"
  rag:
    ingestOnStartup: "true"
  processor:
    strictSchemaValidation: "true"
    requireCitations: "true"
    persistAuditLogs: "true"

externalSecrets:
  enabled: true
  engine:
    vaultPath: etradie/services/engine/production
    refreshInterval: 1h
    chromadbAuthVaultPath: etradie/data-layer/chromadb/production
    mtNodeVaultPath: etradie/services/mt-node/production

resources:
  requests:
    cpu: 500m
    memory: 1Gi
    ephemeral-storage: 512Mi
  limits:
    cpu: "2"
    memory: 2Gi
    ephemeral-storage: 2Gi

# Single node: HPA pinned OFF (TABLE 2B). Revert with the base values
# when the platform moves to the multi-node cluster (BUDGET.md Table 5).
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 1

# A 1-replica PDB with minAvailable>=1 blocks every node drain forever.
podDisruptionBudget:
  enabled: false

serviceMonitor:
  enabled: true
  interval: 15s
  scrapeTimeout: 10s

nodeSelector: {}

tolerations:
  - key: workload
    operator: Equal
    value: etradie-system
    effect: NoSchedule

terminationGracePeriodSeconds: 60
