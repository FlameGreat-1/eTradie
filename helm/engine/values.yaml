# Default values for the etradie-engine chart.
# Production / staging overlays live in values-production.yaml and
# values-staging.yaml respectively. Local development uses
# docker-compose.yml.
#
# This chart deploys the Python FastAPI engine (root Dockerfile) which
# is consumed by:
#   - gateway:    GATEWAY_ENGINE_HTTP_URL  -> http://engine.etradie-system.svc.cluster.local:8000
#   - execution:  EXECUTION_BROKER_BRIDGE_URL -> http://engine.etradie-system.svc.cluster.local:8000
#   - management: MANAGEMENT_BROKER_BRIDGE_URL -> http://engine.etradie-system.svc.cluster.local:8000
#
# The Service name in templates/service.yaml is hard-pinned to `engine`
# so those URLs resolve regardless of release name.

replicaCount: 2

revisionHistoryLimit: 10

image:
  # The root Dockerfile at the repo root builds the Python engine.
  # CI publishes it to GHCR (ghcr.io/<owner>/<repo>/<service>:<tag>).
  # Owner + repo are lowercased per GHCR case-sensitivity.
  #
  # Repository path is defined in helm/engine/values-image.yaml so a
  # fork or registry rename is a single-file change. Tag default
  # stays here so a local `helm template` without the image overlay
  # still produces a deterministic render.
  repository: ""
  pullPolicy: IfNotPresent
  tag: "0.1.0"

imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

namespace:
  name: etradie-system
  # The etradie-system Namespace is owned solely by the data-layer
  # chart (it reconciles first at sync-wave -2 and also owns the
  # ResourceQuota + LimitRange). The engine chart must NOT also render
  # it, or both Applications claim the same cluster resource and ArgoCD
  # flaps OutOfSync. Engine's .Values.namespace.name is still used as
  # the metadata.namespace target for engine's own resources.
  create: false
  # PodSecurity Standard target profile. The chart renders this as
  # the value of BOTH pod-security.kubernetes.io/warn AND audit. The
  # follow-up MR that flips enforce will set
  # pod-security.kubernetes.io/enforce to this same value.
  podSecurityStandard: restricted
  # Pin the PSS rule version so a future minor K8s upgrade does NOT
  # silently shift the enforced surface area. Bump in lockstep with
  # the cluster's supported PSS version.
  podSecurityStandardVersion: v1.30

serviceAccount:
  create: true
  annotations: {}
  name: ""
  # Engine DOES call the K8s API at runtime via kubernetes_asyncio:
  # HostedProvisioner creates per-user mt-node Deployments, Services,
  # and sealed-credential Secrets in etradie-system when a dashboard
  # user picks connection_type="hosted". The narrow Role in
  # templates/role.yaml grants exactly the verbs required (no
  # wildcards, no ClusterRole). Setting this to true mounts the SA
  # token at /var/run/secrets/kubernetes.io/serviceaccount/token so
  # kubernetes_asyncio.config.load_incluster_config() succeeds.
  # Audit refs: CHECKLIST Section 1 lifecycle pre-req; E-C2, E-C3
  # (previous posture, now intentionally overridden).
  automountServiceAccountToken: true

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8000"
  prometheus.io/path: "/metrics"
  # Auto-roll the engine Deployment whenever its ConfigMap changes.
  # Stakater Reloader (installed in Phase 5) watches this annotation
  # and triggers a rollout when etradie-engine-config changes. This is
  # load-bearing for MT_NODE_IMAGE: the CI deploy-bump job rewrites the
  # mt-node image SHA into the engine ConfigMap on every push, and the
  # runtime HostedProvisioner reads MT_NODE_IMAGE from that ConfigMap
  # at engine boot. Without this annotation the engine pod keeps the
  # OLD env value until someone manually restarts it, so newly-bumped
  # tenant images never take effect. The deployment.yaml already stamps
  # checksum/config, but that only rolls on `helm upgrade`; Reloader
  # also covers the ESO/ApplyOutOfSyncOnly paths where the ConfigMap
  # changes without a template-hash change ArgoCD acts on.
  configmap.reloader.stakater.com/reload: "etradie-engine-config"
  # Join the Linkerd mesh in every environment. Native sidecar so the
  # proxy is Ready before the engine's migrate + wait-for-deps init
  # containers reach meshed postgres/redis. ZeroMQ to mt-node :5555 is
  # opaque (non-HTTP server-first framing); the OTLP collector port
  # 4317 is skipped so traces flow to a possibly-un-meshed collector.
  linkerd.io/inject: enabled
  config.linkerd.io/proxy-enable-native-sidecar: "true"
  # Outbound opaque-ports list. REPLACES cluster default (not
  # additive), so EVERY opaque-server destination the engine dials
  # must be enumerated here:
  #   5555 = mt-node ZMQ (server-first framing, non-HTTP).
  #   8000 = chromadb HTTP. chromadb's pod carries
  #          config.linkerd.io/opaque-ports: "8000" (raw-TCP mTLS
  #          tunnel; see helm/data-layer/templates/chromadb-service.yaml
  #          for the rationale). Without 8000 in the engine's OUTBOUND
  #          list, the engine proxy opens an L7 connection while
  #          chromadb's inbound proxy expects opaque -> protocol
  #          mismatch -> Connection refused (os error 111) ->
  #          RAG bootstrap CrashLoopBackOff (phase10.6 RCA 2026-06-16).
  # postgres :5432 and redis :6379 are NOT listed because they are
  # already in Linkerd's universal cluster-default opaque list.
  config.linkerd.io/opaque-ports: "5555,8000"
  config.linkerd.io/skip-outbound-ports: "4317"
  # Gate EVERY other container (the wait-for-deps + migrate init
  # containers AND the engine main container) until the Linkerd proxy's
  # readiness probe passes. A native sidecar reaches "Certified
  # identity" early, but that is NOT the same as the proxy's OUTBOUND
  # routing/discovery being ready: without proxy-await the engine's
  # FastAPI lifespan hits postgres/redis/chromadb in its first ~30ms,
  # before outbound routing is warm, so every meshed connection is
  # reset/refused and RAG bootstrap fail-fasts -> CrashLoopBackOff.
  # (phase10.6 RCA 2026-06-16, isolated by elimination: a meshed probe
  # with this image+SA+these exact annotations reaches chromadb
  # /api/v2/auth/identity with HTTP 200; only the engine's startup
  # TIMING differed.) proxy-await fixes ordering only; no hardening is
  # weakened.
  config.linkerd.io/proxy-await: enabled

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

# The root Dockerfile creates user `etradie` with uid:gid 1000:1000
# (groupadd --gid 1000 etradie && useradd --uid 1000 ... etradie),
# and the runtime CMD is `uvicorn engine.main:create_app`. Match that
# uid/gid exactly so volume permissions and writes succeed.
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000
  capabilities:
    drop:
      - ALL

service:
  # The Service is named `engine` (hard-coded in templates/service.yaml)
  # so the in-cluster URL is engine.etradie-system.svc.cluster.local:8000
  # exactly as gateway/execution/management expect.
  type: ClusterIP
  sessionAffinity: None
  ports:
    http:
      port: 8000
      targetPort: 8000
      protocol: TCP
      appProtocol: http

# Non-secret runtime configuration. Mirrors .env.example exactly.
# Secrets (DATABASE_URL, REDIS_URL, API keys) come from the
# ExternalSecret in templates/externalsecret.yaml.
config:
  app:
    name: "etradie-engine"
    env: "production"
    debug: "false"
    logLevel: "INFO"
  http:
    timeoutSeconds: "30"
    maxRetries: "3"
    retryBackoffBase: "1.0"
    retryBackoffMax: "60.0"
  rateLimit:
    requestsPerMinute: "60"
    burstSize: "10"
  poll:
    centralBankRSS: "600"
    calendar: "1800"
    cot: "604800"
    dxy: "14400"
    intermarket: "86400"
    sentiment: "604800"
    economicData: "3600"
  cycle:
    analysisCycleInterval: "14400"
  cache:
    centralBank: "600"
    calendar: "900"
    cot: "86400"
    dxy: "14400"
    intermarket: "43200"
    sentiment: "86400"
    economicData: "1800"
  ta:
    enabled: "true"
    smcEnabled: "true"
    sndEnabled: "true"
    primaryBroker: "mt5"
    fallbackBroker: "twelve_data"
    analysisIntervalSeconds: "60"
    backfillOnStartup: "true"
    maxConcurrentSymbolAnalysis: "4"
  rag:
    enabled: "true"
    embeddingProvider: "sentence_transformers"
    embeddingModel: "all-MiniLM-L6-v2"
    embeddingDimensions: "384"
    embeddingBatchSize: "64"
    vectorstoreProvider: "chroma"
    chromaHost: "chromadb.etradie-system.svc.cluster.local"
    chromaPort: "8000"
    chromaSSL: "false"
    collectionDocuments: "etradie_documents"
    collectionScenarios: "etradie_scenarios"
    chunkSize: "1024"
    chunkOverlap: "128"
    retrievalTopK: "150"
    rerankEnabled: "true"
    rerankTopK: "130"
    rerankModel: "rule_weighted"
    knowledgeBaseDir: "/app/knowledge"
    scenarioAssetsDir: "/app/knowledge/scenarios"
    ingestOnStartup: "true"
  processor:
    llmProvider: "anthropic"
    temperature: "0.0"
    maxOutputTokens: "16384"
    timeoutSeconds: "60"
    totalTimeoutSeconds: "90"
    maxRetries: "2"
    strictSchemaValidation: "true"
    requireCitations: "true"
    persistAuditLogs: "true"
  observability:
    otelServiceName: "etradie-engine"
    # OTel tracing is opt-in. Empty endpoint means the OTel SDK
    # exporter is a no-op (no retries, no log spam). Production
    # overlay sets this once an OTel collector is actually deployed.
    # Metrics live on the FastAPI app port (service.ports.http.port)
    # at /metrics; no separate prometheusPort. Audit ref: SC-H7.
  # Broker connectivity (Section 2 of CHECKLIST). Shared by every
  # broker client (ZmqClient, MetaApiClient). Heartbeat cadence and
  # reconnect schedule MUST match the broker's own keep-alive timeout
  # (MetaAPI: 30s default; the EA: TIMER_MS-bounded). The defaults
  # below are intentionally conservative; tune via the production
  # overlay if SLO measurements support it.
  connectivity:
    heartbeatIntervalSecs: "15"
    heartbeatTimeoutSecs: "5"
    heartbeatFailureThreshold: "3"
    reconnectBaseSecs: "1.0"
    reconnectCapSecs: "30.0"
    reconnectMaxAttempts: "10"
    tickMaxAgeSecs: "10"
    # Section 4 (EA stability). Identity verification + clock skew
    # monitor. Set eaIdentityVerifyEnabled to 'false' for an
    # operator kill-switch without redeploying. eaMinVersion is
    # advisory - empty string disables the version floor check.
    eaIdentityVerifyEnabled: "true"
    eaMaxClockSkewSecs: "10"
    eaClockSkewSampleEvery: "60"
    eaMinVersion: ""
    # Section 5 (System scaling + load control). Outbound rate limit
    # (token bucket) + in-flight concurrency gate per ZmqClient +
    # broker client pool sweep config.
    outboundRatePerSecond: "10"
    outboundBurstSize: "20"
    zmqInflightLimit: "4"
    outboundLimitDeadlineSecs: "0.5"
    requestDeadlineSafetyMs: "50"
    brokerPoolIdleTimeoutSecs: "600"
    brokerPoolSweepIntervalSecs: "60"
    # Hosted MT-node failure recovery loop. Read by
    # engine.ta.broker.mt5.hosted.recovery.HostedRecoveryConfig at
    # boot. The startup sweep runs once before the engine serves
    # traffic; the background sweep ticks every sweepIntervalSecs.
    # A StatefulSet not-Ready longer than unhealthyThresholdSecs is
    # reprovisioned, respecting the per-connection cooldown, the
    # fresh-provision grace window, and the in-flight concurrency cap.
    hostedRecoveryEnabled: "true"
    hostedRecoverySweepIntervalSecs: "60"
    # 1200s sits well above the new mtNode.readinessTimeoutSecs=600
    # so the recovery sweep cannot trigger a re-provision against a
    # Pod that is still legitimately cold-booting through its FIRST
    # LiveUpdate + MQL5 recompile cycle. The previous 600s value
    # matched the readiness gate exactly, which created a race where
    # the sweep fired at the same instant the readiness gate expired.
    # See docs/runbooks/HOSTED-MT-PROVISIONING-SESSION.md.
    hostedRecoveryUnhealthyThresholdSecs: "1200"
    hostedRecoveryReprovisionCooldownSecs: "300"
    hostedRecoveryMaxConcurrent: "4"
    # Fresh-provision grace window. A connection younger than this
    # threshold (measured against broker_connections.created_at) is
    # SKIPPED by the recovery sweep, including the bypass-threshold
    # startup sweep that fires when the engine pod restarts. This
    # protects a genuine first-boot (Wine init + LiveUpdate +
    # exit-143 + 453-file MQL5 recompile + EA OnInit, which can take
    # 5-10 minutes) from being torn down by a coincidental engine
    # restart. The provisioner's own readiness gate
    # (mtNode.readinessTimeoutSecs) is the authoritative check during
    # this window. Default 30min = 2x worst-case first-boot envelope
    # plus a 15min operability margin. Set to "0" to disable the
    # guard (pre-fix behaviour).
    hostedRecoveryFreshProvisionGraceSecs: "1800"

  # Broker catalog (multi-broker MT5 provisioning control plane).
  # Directory the engine reads the broker catalog JSON files from. The
  # root Dockerfile copies infrastructure/broker-catalog/ into
  # /app/infrastructure/broker-catalog, so the default below is correct
  # in-image. Surfaced as BROKER_CATALOG_DIR in the ConfigMap and
  # consumed by engine.config.Settings.broker_catalog_dir. Mirrors
  # config.rag.knowledgeBaseDir. Inherited by both env overlays.
  broker:
    catalogDir: "/app/infrastructure/broker-catalog"

  # mt-node runtime tunables read by HostedProvisioner (Step 4 of
  # the mt-node hardening series). Non-secret; the credential
  # encryption key comes from ExternalSecret (see externalSecrets
  # below). Resource sizing here MUST stay in sync with
  # helm/mt-node/values{,-production,-staging}.yaml so a Pod the
  # engine creates lands within the chart's PDB/quota envelope.
  mtNode:
    namespace: "etradie-system"
    # REQUIRED. The chart fail-fasts on a render with an empty
    # image. Set this in the deployment overlay (values-staging.yaml
    # / values-production.yaml) - NOT in the base, so a fork or
    # namespace move is a single-file change and the personal-
    # namespace string never lives in two places.
    # Format: ghcr.io/<org>/etradie-mt-node:<tag> or
    #         ghcr.io/<org>/etradie-mt-node@sha256:<digest>.
    image: ""
    memLimit: "1536Mi"
    memRequest: "1Gi"
    cpuLimit: "1500m"
    cpuRequest: "500m"
    ephemeralLimit: "1Gi"
    ephemeralRequest: "512Mi"
    # PVC size for the Wine prefix volume. MUST stay in sync with
    # helm/mt-node/values{,-production,-staging}.yaml::persistence.size
    # so a Pod the engine creates lands within the same storage envelope
    # as a chart-rendered Pod. TABLE 2B (BUDGET.md): production overlay
    # sets this to 4Gi, staging to 2Gi.
    pvcSize: "4Gi"
    # 600s aligns with src/engine/ta/broker/mt5/hosted/provisioner.py
    # _READINESS_TIMEOUT_SECS default. Sized to cover the genuine
    # FIRST-boot work-time on a fresh PVC (Wine init + MT5 launch +
    # LiveUpdate download of mt5onnx64 + exit-143 self-restart +
    # 453-file MQL5 recompile + EA OnInit + :5555 bind = 175-280s of
    # genuine work, easily 350-450s under I/O contention). The previous
    # 300s value left ~zero margin and used to trigger
    # ProviderTimeoutError, which previously deleted the wine-prefix
    # PVC in _best_effort_cleanup and fed the LiveUpdate self-restart
    # loop documented in
    # docs/runbooks/HOSTED-MT-PROVISIONING-SESSION.md. Subsequent boots
    # are sub-30s because the LiveUpdate-applied component persists on
    # the wine-prefix PVC.
    readinessTimeoutSecs: "600"
    readinessPollSecs: "3"
    zmqProbeTimeoutSecs: "5"
    # Per-user quota for hosted MetaTrader connections. Each hosted
    # connection consumes a dedicated StatefulSet (2 CPU + 2 GiB RAM
    # in production). Default 1 enforces one hosted account per user
    # to prevent dashboard-driven cluster-capacity exhaustion. Raise
    # this for power users via the production overlay or per-tenant
    # override.
    maxHostedPerUser: "1"
    # Name of the chart-rendered platform Secret that holds
    # DEFAULT_ZMQ_AUTH_TOKEN. HostedProvisioner envFroms this Secret
    # on every runtime-provisioned mt-node + watchdog container so
    # entrypoint.sh and watchdog.py have a fallback token when the
    # Vault Agent fails to render the per-tenant credentials file.
    #
    # Value MUST match the Secret name produced by the helm/mt-node
    # chart's platform-only release (mt-node-{staging,production}
    # ArgoCD apps with mtConnection.enabled=false). The chart's
    # mt-node.platformSecretName helper resolves to
    # '<release>-platform' and the ArgoCD child apps pin the release
    # name to 'etradie-mt-node-platform', so the Secret name is
    # 'etradie-mt-node-platform-platform' on both envs.
    #
    # Empty string disables the envFrom in dev / docker-compose where
    # ESO is not running and the Secret does not exist.
    platformSecretName: "etradie-mt-node-platform-platform"
    # Scheduling envelope applied by HostedProvisioner to every
    # runtime-provisioned per-tenant StatefulSet. MUST mirror
    # helm/mt-node/values{,-production,-staging}.yaml so chart-
    # rendered Pods and engine-runtime Pods produce wire-identical
    # specs. Empty defaults preserve the dev/docker-compose shape;
    # the production overlay fills in real values.
    scheduling:
      priorityClassName: ""
      tolerations: []
      nodeSelector: {}
      affinity: {}
      topologySpreadConstraints: []
      podAnnotations: {}
  # Vault HTTP client. The engine reads VAULT_* at boot and uses its
  # ServiceAccount token to authenticate against the Vault Kubernetes
  # auth backend (role 'mt-node-provisioner', policy granting WRITE
  # on etradie/data/tenants/mt-node/*). Empty defaults preserve the
  # dev / docker-compose flow; production and staging overlays MUST
  # set address.
  vault:
    address: ""
    namespace: ""
    kvMount: "etradie"
    k8sAuthPath: "kubernetes"
    k8sAuthRole: "mt-node-provisioner"
    # The Vault k8s-auth role 'mt-node-provisioner' is created with
    # audience="vault" (infrastructure/cluster/vault-paths/
    # mt_node_tenant_secrets.tf). Vault validates the presented SA
    # token's `aud` claim against that audience. The DEFAULT projected
    # token at /var/run/secrets/kubernetes.io/serviceaccount/token has
    # audience https://kubernetes.default.svc (the API server), which
    # Vault rejects with 403. We therefore project a SECOND token
    # scoped to audience="vault" and point the Vault client at it via
    # saTokenPath below. The deployment renders the projected volume +
    # mount from these saToken.* values; set saToken.enabled=false in
    # dev/docker-compose (no in-cluster Vault) to fall back to the
    # default token path.
    saToken:
      enabled: true
      audience: "vault"
      # Projected-token expiration (seconds). The kubelet rotates the
      # token well before expiry; 3600 is the conventional value.
      expirationSeconds: 3600
      mountPath: "/var/run/secrets/vault"
      fileName: "token"
    # Path the Vault client reads the k8s-auth JWT from. MUST match the
    # projected token mount above when saToken.enabled=true. When
    # saToken.enabled=false this should be the default API-server token
    # path (dev only; Vault auth is not exercised there).
    saTokenPath: "/var/run/secrets/vault/token"
    tokenRenewSafetySecs: "60"
  postgres:
    host: "postgres.etradie-system.svc.cluster.local"
    port: "5432"
    db: "etradie"
  redis:
    host: "redis.etradie-system.svc.cluster.local"
    port: "6379"
    db: "0"

  # Database wire-TLS posture. Selected by engine.shared.db.connection.
  # _engine_db_native_tls() and the alembic migrate env.py mirror, both
  # of which read ENGINE_DB_NATIVE_TLS from this ConfigMap.
  #
  #   "false" (DEFAULT in base values): MESH mode. The asyncpg `ssl=`
  #     kwarg is set to False regardless of the DSN's sslmode value.
  #     Used when the postgres server is plaintext (e.g. a managed
  #     external DB without TLS, or our own data-layer chart with
  #     postgres.tls.enabled=false). The validator's sslmode invariant
  #     in src/engine/config.py is unaffected because it inspects the
  #     URL STRING; the wire-level translation is a separate concern.
  #
  #   "true" (set in values-{staging,production}.yaml): NATIVE mode.
  #     The libpq sslmode in the URL is translated to asyncpg's native
  #     ssl values ('require'/'verify-ca'/'verify-full'). Used when
  #     postgres actually serves TLS. The platform's data-layer chart
  #     enables this via postgres.tls.enabled (see helm/data-layer/
  #     values.yaml::postgres.tls), so every overlay that pairs the
  #     engine with that chart MUST set this to "true" to flip
  #     ENGINE_DB_NATIVE_TLS to NATIVE mode.
  #
  # Audit ref: src/engine/shared/db/connection.py::_translate_sslmode_
  # for_asyncpg docstring.
  database:
    nativeTls: "false"

externalSecrets:
  enabled: true
  engine:
    secretStoreName: vault-backend
    secretStoreKind: ClusterSecretStore
    refreshInterval: 1h
    # Engine secrets path. Aligns with
    # infrastructure/cluster/vault-paths/main.tf::vault_kv_secret_v2.engine.
    vaultPath: etradie/services/engine/production
    creationPolicy: Owner
    # Canonical ChromaDB auth token path. The chromadb StatefulSet's
    # CHROMA_SERVER_AUTHN_CREDENTIALS and the engine's
    # RAG_CHROMA_AUTH_TOKEN both read from this exact Vault path so
    # they cannot drift out of sync. Audit ref: IV-C2, X-6, D-C3.
    chromadbAuthVaultPath: etradie/data-layer/chromadb/production
    # mt-node platform path: holds the AES-GCM credential encryption
    # key the engine uses to seal per-user MT broker credentials
    # before writing them to a per-tenant K8s Secret. Single source
    # of truth - rotation invalidates every in-flight per-tenant
    # Secret (runbook in cluster/bootstrap/README.md step 10).
    mtNodeVaultPath: etradie/services/mt-node/production
    # Credential-KEK rotation versions (Tier 3 envelope encryption).
    #
    # The base KEK is BROKER_ENCRYPTION_KEY (version 1), already mapped
    # in templates/externalsecret.yaml. To ROTATE, add a new Vault
    # property holding the new key and declare it here; the
    # ExternalSecret then also delivers BROKER_ENCRYPTION_KEY_V<n> to
    # the engine, engine.shared.crypto picks the HIGHEST version as the
    # active write key, and the re-wrap routine (ops) migrates existing
    # rows onto it. Once every row is re-wrapped, REMOVE the lower
    # version's entry here to REVOKE it.
    #
    # Each entry:
    #   - version:  integer >= 2 (version 1 is the base key).
    #   - property: the Vault KV property under engine.vaultPath that
    #               holds the raw key string.
    # Empty by default: steady-state runs on version 1 only.
    #
    # Example (during a rotation to version 2):
    #   rotationKeyVersions:
    #     - version: 2
    #       property: broker_encryption_key_v2
    rotationKeyVersions: []

# Credential re-wrap Job (Tier 3 KEK rotation / emergency revocation).
# Renders templates/rewrap-job.yaml, which runs the shipped CLI
# `python -m engine.shared.crypto` to re-wrap every stored broker + LLM
# credential onto the ACTIVE KEK version. INERT by default: the Job only
# renders when an operator explicitly enables it during a rotation.
#
# Rotation runbook:
#   1. Add the new key to Vault + externalSecrets.engine.rotationKeyVersions
#      and let the engine roll (the new version becomes the active write
#      key; the cipher still holds the old version for decryption).
#   2. (optional) Size the work without writing:
#        helm upgrade ... --set rotationJob.enabled=true \
#          --set rotationJob.dryRun=true \
#          --set rotationJob.nameSuffix=$(date +%s)
#   3. Execute the re-wrap:
#        helm upgrade ... --set rotationJob.enabled=true \
#          --set rotationJob.nameSuffix=$(date +%s)
#   4. When the Job reports 0 rows on the old version, REMOVE the old
#      version from Vault + rotationKeyVersions to REVOKE it.
rotationJob:
  # Gate. Keep false in the committed overlays; flip only for a rotation.
  enabled: false
  # When true, the Job runs `--dry-run`: it counts the rows/columns that
  # WOULD be re-wrapped and writes NOTHING (pre-rotation sizing).
  dryRun: false
  # Keyset page size for the table scans (CLI --batch-size).
  batchSize: 200
  # Unique suffix so repeated rotations create distinct Jobs instead of
  # colliding with an immutable completed Job. Empty -> release revision.
  # Set to a timestamp (e.g. $(date +%s)) when running back-to-back.
  nameSuffix: ""
  # Retries for transient infra (DB connect blip) before the Job is
  # marked Failed. The re-wrap itself is resumable, so a re-run is safe.
  backoffLimit: 2
  # Hard cap on a single run so a stuck Job cannot hang indefinitely.
  activeDeadlineSeconds: 3600
  # Auto-clean the completed Job + its pod after this many seconds.
  ttlSecondsAfterFinished: 86400
  # Optional resource override. Empty -> reuse the migrate init
  # container's modest envelope (it is the same image, a short-lived
  # batch task, not a long-running server).
  resources: {}

resources:
  requests:
    cpu: 500m
    memory: 1Gi
    ephemeral-storage: 512Mi
  limits:
    cpu: "2"
    memory: 2Gi
    ephemeral-storage: 2Gi

initContainer:
  enabled: true
  image: busybox:1.36
  pullPolicy: IfNotPresent
  timeoutSeconds: 180
  intervalSeconds: 2
  # Engine boots BEFORE gateway, so its dependencies are the data
  # layer only (postgres + redis + chromadb). Listed via service DNS
  # so kustomize/helm overrides are not required for the in-cluster
  # data-layer chart.
  dependencies:
    - host: "postgres.etradie-system.svc.cluster.local"
      port: 5432
    - host: "redis.etradie-system.svc.cluster.local"
      port: 6379
    - host: "chromadb.etradie-system.svc.cluster.local"
      port: 8000
  # Requests must meet the etradie-system namespace LimitRange minimum
  # (50m cpu / 64Mi memory, owned by helm/data-layer/values.yaml::
  # limitRange.container.min). Below that floor every pod admission is
  # rejected by LimitRange admission. The init container runs to
  # completion in a few seconds; the requests are then released back
  # to the namespace quota and the steady-state main-container sizing
  # (per BUDGET.md Table 2B) is unaffected.
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

# Section 6 (CHECKLIST): PrometheusRule covering broker call SLO
# breaches, leak detection, restart loops, EA identity / clock
# kill-switch firings. Renders only when monitoring.coreos.com is
# installed (Prometheus Operator). Set enabled=false on a cluster
# without the operator to skip rendering.
prometheusRule:
  enabled: true
  labels:
    prometheus: kube-prometheus
    role: alert-rules

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
  # Section 5 (CHECKLIST): the engine exposes
  # etradie_active_user_connections{connection_type} via /metrics.
  # To wire this as an HPA scaling signal, deploy prometheus-adapter
  # with a 'series' rule that exposes the metric as an external
  # metric in the K8s metrics API, then add an entry under
  # customMetrics below. We do NOT add the External metric to the
  # HPA spec by default because the cluster may not have the
  # prometheus-adapter installed; the operator opts in by setting
  # this to a non-empty list. Example:
  #   customMetrics:
  #     - external:
  #         metric:
  #           name: etradie_active_user_connections
  #         target:
  #           type: AverageValue
  #           averageValue: "25"  # one engine pod per 25 connections
  customMetrics: []
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 600
      policies:
        - type: Percent
          value: 50
          periodSeconds: 120
        - type: Pods
          value: 1
          periodSeconds: 120
      selectPolicy: Min
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 1
          periodSeconds: 30
      selectPolicy: Max

podDisruptionBudget:
  enabled: true
  minAvailable: 1
  unhealthyPodEvictionPolicy: IfHealthyBudget

# Tier 9 G9-2: per-service Linkerd authorization. Default FALSE; the
# production overlay enables it after staging confirms 100% mTLS.
# The engine HTTP :8000 bridge is called ONLY by gateway, execution and
# management (verified against their NetworkPolicy egress + the
# /internal/* bridge router). Restricting to these three mTLS identities
# closes the "any shared-secret holder is trusted" gap for the engine's
# high-value broker-bridge + credential surface.
linkerdPolicy:
  enabled: false
  callerServiceAccounts:
    - etradie-gateway
    - etradie-execution
    - etradie-management
  monitoringNamespace: monitoring

networkPolicy:
  enabled: true
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Gateway dials engine on :8000 (GATEWAY_ENGINE_HTTP_URL).
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: etradie-gateway
      ports:
        - protocol: TCP
          port: 8000
    # Execution dials engine on :8000 (EXECUTION_BROKER_BRIDGE_URL).
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: etradie-execution
      ports:
        - protocol: TCP
          port: 8000
    # Management dials engine on :8000 (MANAGEMENT_BROKER_BRIDGE_URL).
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: etradie-management
      ports:
        - protocol: TCP
          port: 8000
    # Prometheus scrapes /metrics on :8000.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
          podSelector:
            matchLabels:
              app: prometheus
      ports:
        - protocol: TCP
          port: 8000
    # Linkerd proxy admin port :4191 (proxy metrics, tap, liveness)
    # scraped by Prometheus from the monitoring namespace.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
          podSelector:
            matchLabels:
              app: prometheus
      ports:
        - protocol: TCP
          port: 4191
    # Linkerd proxy INBOUND port :4143 (meshed proxy-to-proxy mTLS).
    # A meshed caller's connection arrives on :4143 (iptables redirect),
    # not the app port; the CNI enforces this NetworkPolicy on :4143, so
    # without this rule the proxy-to-proxy connection is dropped and the
    # app sees "connection closed in the middle of operation".
    # Namespace-scoped: 4143 is opaque mTLS the NetworkPolicy cannot
    # attribute to a caller; Linkerd mTLS identity + policy controller
    # is the real authz on 4143. App-port rules above keep per-caller L4.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: etradie-system
      ports:
        - protocol: TCP
          port: 4143
  egress:
    # The injected Linkerd proxy must reach the control plane in the
    # linkerd namespace (identity for cert signing, destination for
    # discovery, policy for Server/AuthorizationPolicy lookups), or it
    # never becomes Ready. Scoped to the namespace rather than specific
    # ports, which vary across Linkerd versions.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: linkerd
    # Postgres.
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: postgres
      ports:
        - protocol: TCP
          port: 5432
    # Redis.
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: redis
      ports:
        - protocol: TCP
          port: 6379
    # ChromaDB.
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: chromadb
      ports:
        - protocol: TCP
          port: 8000
    # OTel collector.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: etradie-observability
          podSelector:
            matchLabels:
              app.kubernetes.io/name: otel-collector
      ports:
        - protocol: TCP
          port: 4317
    # Cluster DNS.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Outbound HTTPS to the public internet for upstream data
    # providers (FRED, CFTC, TwelveData, RSS feeds, LLM APIs:
    # Anthropic / OpenAI / Gemini) and HuggingFace model cache
    # refreshes. Previously this rule used `namespaceSelector: {}`
    # which matches ONLY in-cluster pods and silently dropped every
    # external HTTPS call -> engine boot stalled at /readiness with
    # rag.embedding_ready=false. Industry-standard fix: explicit
    # ipBlock for 0.0.0.0/0 with `except` for the K3s pod CIDR
    # (10.42.0.0/16) and service CIDR (10.43.0.0/16) so this rule
    # does NOT accidentally cover east-west traffic that the
    # explicit per-service rules above already govern.
    # Only ports 80/443 are permitted outbound; everything else
    # (SMTP, SSH, SOCKS, arbitrary high ports) stays denied. The
    # configured outbound API clients carry their auth headers; this
    # rule is the L4 envelope they need, not authentication.
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 10.42.0.0/16
              - 10.43.0.0/16
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 80
    # Kubernetes API server (post-DNAT apiserver endpoint, :6443).
    # HostedProvisioner creates the per-tenant ServiceAccount +
    # StatefulSet + Services via kubernetes_asyncio AFTER writing the
    # credentials to Vault.
    #
    # On K3s the kubernetes Service VIP (10.43.0.1:443) is DNAT'd by
    # kube-proxy to the node's own apiserver endpoint on :6443 BEFORE
    # the kube-router egress NetworkPolicy is evaluated. A rule allowing
    # the pre-DNAT VIP (10.43.0.1/32:443) therefore NEVER matches the
    # post-DNAT destination, so the API call is REJECTed by the CNI
    # (presenting as 'Connection refused' - a kube-router REJECT, not a
    # timeout) and every hosted-MT provision fails with
    # 'Cannot connect to host 10.43.0.1:443'.
    #
    # We therefore allow the POST-DNAT target: :6443, the apiserver
    # port, which is used by no other east-west service in this cluster.
    # This is node-IP-agnostic so it holds across the staging and
    # production single-node boxes without hardcoding a per-env address.
    # Verified live: a policy-free pod on the node reaches 10.43.0.1:443
    # AND <node-ip>:6443, while the policy-selected engine pod was
    # REJECTed on both until this rule. Egress only; no inbound surface
    # is changed. The service-CIDR exclusion on the external-HTTPS rule
    # above is preserved - this rule is port-scoped to 6443, which that
    # rule never covered (it permits only 80/443).
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 6443

    # Per-user mt-node Deployments. The engine's ZmqClient dials
    # tcp://<connection-id>.etradie-system.svc.cluster.local:5555
    # to bridge to the headless MT4/MT5 terminal running inside a
    # Wine container. Selector matches helm/mt-node's pod labels.
    # Audit ref: CHECKLIST Section 1 broker-connectivity pre-req;
    # previous audit: 'engine NetworkPolicy egress does not allow
    # :5555 - ZmqClient connect would be dropped by CNI'.
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: etradie-mt-node
              app.kubernetes.io/part-of: etradie
      ports:
        - protocol: TCP
          port: 5555
    # HashiCorp Vault (vault namespace, :8200). HostedProvisioner
    # writes per-tenant MT credentials to Vault KV at runtime FROM the
    # engine pod (k8s-auth via the engine ServiceAccount, role
    # 'mt-node-provisioner'). The Vault Service is a ClusterIP in the
    # service CIDR (10.43.0.0/16), which the external-HTTPS ipBlock rule
    # above explicitly EXCLUDES, so that rule cannot cover it. Without
    # this dedicated namespaced rule the provisioner's Vault writes are
    # dropped by the CNI and every hosted-MT provision fails with
    # 'vault connection error: Cannot connect to host
    # vault.vault.svc.cluster.local:8200'. The hosted-recovery sweep
    # hits the same wall reaching the K8s API VIP (10.43.0.1:443).
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: vault
      ports:
        - protocol: TCP
          port: 8200
    

serviceMonitor:
  enabled: true
  interval: 30s
  scrapeTimeout: 10s
  labels:
    prometheus: kube-prometheus
  metricRelabelDropPrefixes:
    - python_gc_
    - process_
    - promhttp_

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: etradie-engine
          topologyKey: kubernetes.io/hostname

topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: etradie-engine

nodeSelector: {}

tolerations: []

# uvicorn binds quickly but the engine performs RAG bootstrap (chroma
# collection load, embedding model download into the model cache)
# before /health returns 200. The startupProbe budgets up to
# initialDelay + period * failureThreshold = 10 + 5 * 60 = 310s.
startupProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  successThreshold: 1
  failureThreshold: 60

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 0
  periodSeconds: 15
  timeoutSeconds: 3
  successThreshold: 1
  failureThreshold: 4

# Readiness gates on DB + cache + RAG health (not just HTTP listener).
# failureThreshold 6 x periodSeconds 10s = 60s grace after the
# startupProbe has already passed, which absorbs RAG bootstrap
# variation without unnecessary pod drops. Audit ref: V-14, X-8.
readinessProbe:
  httpGet:
    path: /readiness
    port: http
  initialDelaySeconds: 0
  periodSeconds: 10
  timeoutSeconds: 5
  successThreshold: 1
  failureThreshold: 6

lifecycle:
  preStop:
    exec:
      command: ["/bin/sh", "-c", "sleep 5"]

terminationGracePeriodSeconds: 60

volumes:
  tmp:
    emptyDir:
      sizeLimit: 128Mi
  # Engine downloads SentenceTransformer weights into ~/.cache. The
  # Dockerfile creates /home/etradie owned by uid 1000; mount an
  # emptyDir there so readOnlyRootFilesystem stays true.
  modelCache:
    emptyDir:
      sizeLimit: 2Gi
