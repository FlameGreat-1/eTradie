# Default values for the etradie-engine chart.
# Production / staging overlays live in values-production.yaml and
# values-staging.yaml respectively. Local development uses
# docker-compose.yml.
#
# This chart deploys the Python FastAPI engine (root Dockerfile) which
# is consumed by:
#   - gateway:    GATEWAY_ENGINE_HTTP_URL  -> http://engine.etradie-system.svc.cluster.local:8000
#   - execution:  EXECUTION_BROKER_BRIDGE_URL -> http://engine.etradie-system.svc.cluster.local:8000
#   - management: MANAGEMENT_BROKER_BRIDGE_URL -> http://engine.etradie-system.svc.cluster.local:8000
#
# The Service name in templates/service.yaml is hard-pinned to `engine`
# so those URLs resolve regardless of release name.

replicaCount: 2

image:
  # The root Dockerfile at the repo root builds the Python engine.
  # CI publishes it to GHCR (ghcr.io/<owner>/<repo>/<service>:<tag>).
  # Owner + repo are lowercased per GHCR case-sensitivity.
  repository: ghcr.io/flamegreat-1/etradie/engine
  pullPolicy: IfNotPresent
  tag: "0.1.0"

imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

namespace:
  name: etradie-system
  podSecurityStandard: restricted

serviceAccount:
  create: true
  annotations: {}
  name: ""
  automountServiceAccountToken: false

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8000"
  prometheus.io/path: "/metrics"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

# The root Dockerfile creates user `etradie` with uid:gid 1000:1000
# (groupadd --gid 1000 etradie && useradd --uid 1000 ... etradie),
# and the runtime CMD is `uvicorn engine.main:create_app`. Match that
# uid/gid exactly so volume permissions and writes succeed.
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000
  capabilities:
    drop:
      - ALL

service:
  # The Service is named `engine` (hard-coded in templates/service.yaml)
  # so the in-cluster URL is engine.etradie-system.svc.cluster.local:8000
  # exactly as gateway/execution/management expect.
  type: ClusterIP
  sessionAffinity: None
  ports:
    http:
      port: 8000
      targetPort: 8000
      protocol: TCP
      appProtocol: http

# Non-secret runtime configuration. Mirrors .env.example exactly.
# Secrets (DATABASE_URL, REDIS_URL, API keys) come from the
# ExternalSecret in templates/externalsecret.yaml.
config:
  app:
    name: "etradie-engine"
    env: "production"
    debug: "false"
    logLevel: "INFO"
  http:
    timeoutSeconds: "30"
    maxRetries: "3"
    retryBackoffBase: "1.0"
    retryBackoffMax: "60.0"
  rateLimit:
    requestsPerMinute: "60"
    burstSize: "10"
  poll:
    centralBankRSS: "600"
    news: "900"
    calendar: "1800"
    cot: "604800"
    dxy: "14400"
    intermarket: "86400"
    sentiment: "604800"
    economicData: "3600"
  cycle:
    analysisCycleInterval: "14400"
  cache:
    centralBank: "600"
    news: "300"
    calendar: "900"
    cot: "86400"
    dxy: "14400"
    intermarket: "43200"
    sentiment: "86400"
    economicData: "1800"
  ta:
    enabled: "true"
    smcEnabled: "true"
    sndEnabled: "true"
    primaryBroker: "mt5"
    fallbackBroker: "twelve_data"
    analysisIntervalSeconds: "60"
    backfillOnStartup: "true"
    maxConcurrentSymbolAnalysis: "4"
  rag:
    enabled: "true"
    embeddingProvider: "sentence_transformers"
    embeddingModel: "all-MiniLM-L6-v2"
    embeddingDimensions: "384"
    embeddingBatchSize: "64"
    vectorstoreProvider: "chroma"
    chromaHost: "chromadb.etradie-system.svc.cluster.local"
    chromaPort: "8000"
    chromaSSL: "false"
    collectionDocuments: "etradie_documents"
    collectionScenarios: "etradie_scenarios"
    chunkSize: "1024"
    chunkOverlap: "128"
    retrievalTopK: "150"
    rerankEnabled: "true"
    rerankTopK: "130"
    rerankModel: "rule_weighted"
    knowledgeBaseDir: "/app/knowledge"
    scenarioAssetsDir: "/app/knowledge/scenarios"
    ingestOnStartup: "true"
  processor:
    llmProvider: "anthropic"
    temperature: "0.0"
    maxOutputTokens: "16384"
    timeoutSeconds: "60"
    totalTimeoutSeconds: "90"
    maxRetries: "2"
    strictSchemaValidation: "true"
    requireCitations: "true"
    persistAuditLogs: "true"
  observability:
    otelServiceName: "etradie-engine"
    otelEndpoint: "otel-collector.etradie-observability.svc.cluster.local:4317"
    prometheusPort: "9090"
  postgres:
    host: "postgres.etradie-system.svc.cluster.local"
    port: "5432"
    db: "etradie"
  redis:
    host: "redis.etradie-system.svc.cluster.local"
    port: "6379"
    db: "0"

externalSecrets:
  enabled: true
  engine:
    secretStoreName: vault-backend
    secretStoreKind: ClusterSecretStore
    refreshInterval: 1h
    vaultPath: etradie/services/engine
    creationPolicy: Owner

resources:
  requests:
    cpu: 500m
    memory: 1Gi
    ephemeral-storage: 512Mi
  limits:
    cpu: "2"
    memory: 2Gi
    ephemeral-storage: 2Gi

initContainer:
  enabled: true
  image: busybox:1.36
  pullPolicy: IfNotPresent
  timeoutSeconds: 180
  intervalSeconds: 2
  # Engine boots BEFORE gateway, so its dependencies are the data
  # layer only (postgres + redis + chromadb). Listed via service DNS
  # so kustomize/helm overrides are not required for the in-cluster
  # data-layer chart.
  dependencies:
    - host: "postgres.etradie-system.svc.cluster.local"
      port: 5432
    - host: "redis.etradie-system.svc.cluster.local"
      port: 6379
    - host: "chromadb.etradie-system.svc.cluster.local"
      port: 8000
  resources:
    requests:
      cpu: 10m
      memory: 16Mi
    limits:
      cpu: 50m
      memory: 32Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 600
      policies:
        - type: Percent
          value: 50
          periodSeconds: 120
        - type: Pods
          value: 1
          periodSeconds: 120
      selectPolicy: Min
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 1
          periodSeconds: 30
      selectPolicy: Max

podDisruptionBudget:
  enabled: true
  minAvailable: 1
  unhealthyPodEvictionPolicy: IfHealthyBudget

networkPolicy:
  enabled: true
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Gateway dials engine on :8000 (GATEWAY_ENGINE_HTTP_URL).
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: etradie-gateway
      ports:
        - protocol: TCP
          port: 8000
    # Execution dials engine on :8000 (EXECUTION_BROKER_BRIDGE_URL).
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: etradie-execution
      ports:
        - protocol: TCP
          port: 8000
    # Management dials engine on :8000 (MANAGEMENT_BROKER_BRIDGE_URL).
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: etradie-management
      ports:
        - protocol: TCP
          port: 8000
    # Prometheus scrapes /metrics on :8000.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
          podSelector:
            matchLabels:
              app: prometheus
      ports:
        - protocol: TCP
          port: 8000
  egress:
    # Postgres.
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: postgres
      ports:
        - protocol: TCP
          port: 5432
    # Redis.
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: redis
      ports:
        - protocol: TCP
          port: 6379
    # ChromaDB.
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: chromadb
      ports:
        - protocol: TCP
          port: 8000
    # OTel collector.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: etradie-observability
          podSelector:
            matchLabels:
              app.kubernetes.io/name: otel-collector
      ports:
        - protocol: TCP
          port: 4317
    # Cluster DNS.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Outbound HTTPS for upstream data providers (FRED, CFTC,
    # TwelveData, RSS feeds, LLM APIs). The Cloudflare/Contabo/OCI
    # network plugin handles SNAT.
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 80

serviceMonitor:
  enabled: true
  interval: 30s
  scrapeTimeout: 10s
  labels:
    prometheus: kube-prometheus
  metricRelabelDropPrefixes:
    - python_gc_
    - process_
    - promhttp_

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: etradie-engine
          topologyKey: kubernetes.io/hostname

topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: etradie-engine

nodeSelector: {}

tolerations: []

# uvicorn binds quickly but the engine performs RAG bootstrap (chroma
# collection load, embedding model download into the model cache)
# before /health returns 200. The startupProbe budgets up to
# initialDelay + period * failureThreshold = 10 + 5 * 60 = 310s.
startupProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  successThreshold: 1
  failureThreshold: 60

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 0
  periodSeconds: 15
  timeoutSeconds: 3
  successThreshold: 1
  failureThreshold: 4

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 0
  periodSeconds: 10
  timeoutSeconds: 3
  successThreshold: 1
  failureThreshold: 3

lifecycle:
  preStop:
    exec:
      command: ["/bin/sh", "-c", "sleep 5"]

terminationGracePeriodSeconds: 60

volumes:
  tmp:
    emptyDir:
      sizeLimit: 128Mi
  # Engine downloads SentenceTransformer weights into ~/.cache. The
  # Dockerfile creates /home/etradie owned by uid 1000; mount an
  # emptyDir there so readOnlyRootFilesystem stays true.
  modelCache:
    emptyDir:
      sizeLimit: 2Gi
