{{- if .Values.externalSecrets.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "engine.secretName" . }}
  namespace: {{ include "engine.namespace" . }}
  labels:
    {{- include "engine.labels" . | nindent 4 }}
    app.kubernetes.io/component: secret
  annotations:
    description: "Engine runtime secrets resolved from Vault"
spec:
  refreshInterval: {{ .Values.externalSecrets.engine.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.engine.secretStoreName | default "vault-backend" }}
    kind: {{ .Values.externalSecrets.engine.secretStoreKind | default "ClusterSecretStore" }}
  target:
    name: {{ include "engine.secretName" . }}
    creationPolicy: {{ .Values.externalSecrets.engine.creationPolicy | default "Owner" }}
    template:
      type: Opaque
      metadata:
        labels:
          {{- include "engine.labels" . | nindent 10 }}
  data:
    # Database. Engine reads DATABASE_URL directly
    # (asyncpg://USER:PASS@HOST:PORT/DB).
    - secretKey: DATABASE_URL
      remoteRef:
        key: {{ .Values.externalSecrets.engine.vaultPath | quote }}
        property: database_url
    - secretKey: POSTGRES_USER
      remoteRef:
        key: {{ .Values.externalSecrets.engine.vaultPath | quote }}
        property: postgres_user
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: {{ .Values.externalSecrets.engine.vaultPath | quote }}
        property: postgres_password

    # Redis. Engine reads REDIS_URL.
    - secretKey: REDIS_URL
      remoteRef:
        key: {{ .Values.externalSecrets.engine.vaultPath | quote }}
        property: redis_url
    - secretKey: REDIS_PASSWORD
      remoteRef:
        key: {{ .Values.externalSecrets.engine.vaultPath | quote }}
        property: redis_password

    # ChromaDB token. Must match data-layer chromadb-externalsecret
    # so the client and server agree on the auth token.
    - secretKey: RAG_CHROMA_AUTH_TOKEN
      remoteRef:
        key: {{ .Values.externalSecrets.engine.vaultPath | quote }}
        property: rag_chroma_auth_token

    # Credential-at-rest encryption keys (consistent with gateway).
    - secretKey: BROKER_ENCRYPTION_KEY
      remoteRef:
        key: {{ .Values.externalSecrets.engine.vaultPath | quote }}
        property: broker_encryption_key
    - secretKey: LLM_ENCRYPTION_KEY
      remoteRef:
        key: {{ .Values.externalSecrets.engine.vaultPath | quote }}
        property: llm_encryption_key

    # Auth JWT secret (engine validates service tokens issued by
    # gateway when execution/management call back through the bridge).
    - secretKey: AUTH_JWT_SECRET
      remoteRef:
        key: {{ .Values.externalSecrets.engine.vaultPath | quote }}
        property: auth_jwt_secret

    # Data-provider API keys (free-tier optional in dev, required in prod).
    - secretKey: CFTC_APP_TOKEN
      remoteRef:
        key: {{ .Values.externalSecrets.engine.vaultPath | quote }}
        property: cftc_app_token
    - secretKey: FRED_API_KEY
      remoteRef:
        key: {{ .Values.externalSecrets.engine.vaultPath | quote }}
        property: fred_api_key
    - secretKey: TWELVEDATA_API_KEY
      remoteRef:
        key: {{ .Values.externalSecrets.engine.vaultPath | quote }}
        property: twelvedata_api_key

    # LLM provider keys (one or more; engine fails fast at startup
    # only for the provider currently selected via PROCESSOR_LLM_PROVIDER).
    - secretKey: PROCESSOR_ANTHROPIC_API_KEY
      remoteRef:
        key: {{ .Values.externalSecrets.engine.vaultPath | quote }}
        property: processor_anthropic_api_key
    - secretKey: PROCESSOR_OPENAI_API_KEY
      remoteRef:
        key: {{ .Values.externalSecrets.engine.vaultPath | quote }}
        property: processor_openai_api_key
    - secretKey: PROCESSOR_GEMINI_API_KEY
      remoteRef:
        key: {{ .Values.externalSecrets.engine.vaultPath | quote }}
        property: processor_gemini_api_key

    # MetaApi platform-level developer token used by the
    # MetaApiProvisioner for per-user MT5 cloud account provisioning.
    - secretKey: MT5_METAAPI_TOKEN
      remoteRef:
        key: {{ .Values.externalSecrets.engine.vaultPath | quote }}
        property: mt5_metaapi_token
{{- end }}
