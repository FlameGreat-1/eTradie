apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "engine.appName" . }}
  namespace: {{ include "engine.namespace" . }}
  labels:
    {{- include "engine.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  revisionHistoryLimit: {{ .Values.revisionHistoryLimit | default 10 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      {{- include "engine.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "engine.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
        app.kubernetes.io/part-of: etradie
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secrets: {{ include (print $.Template.BasePath "/externalsecret.yaml") . | sha256sum }}
        # Prometheus scrape annotations come from .Values.podAnnotations
        # (single source of truth). Audit ref: E-M3.
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "engine.serviceAccountName" . }}
      # Audit ref: X-5 - single source of truth on serviceAccount values.
      automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken | default false }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds | default 60 }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: {{ .Values.podSecurityContext.runAsUser | default 1000 }}
        runAsGroup: {{ .Values.podSecurityContext.runAsGroup | default 1000 }}
        fsGroup: {{ .Values.podSecurityContext.fsGroup | default 1000 }}
        seccompProfile:
          type: RuntimeDefault
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if and .Values.initContainer.enabled .Values.initContainer.dependencies }}
      initContainers:
        # 1. wait-for-deps: confirms Postgres + Redis + ChromaDB are
        #    reachable before the migration runs. Kubernetes runs init
        #    containers in list order; this MUST be first.
        - name: wait-for-deps
          image: "{{ .Values.initContainer.image }}"
          imagePullPolicy: {{ .Values.initContainer.pullPolicy | default "IfNotPresent" }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: {{ .Values.podSecurityContext.runAsUser | default 1000 }}
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          env:
            - name: WAIT_FOR_DEPS_TIMEOUT_SECS
              value: {{ .Values.initContainer.timeoutSeconds | default 180 | quote }}
            - name: WAIT_FOR_DEPS_INTERVAL_SECS
              value: {{ .Values.initContainer.intervalSeconds | default 2 | quote }}
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              deadline=$(( $(date +%s) + ${WAIT_FOR_DEPS_TIMEOUT_SECS} ))
              {{- range $i, $dep := .Values.initContainer.dependencies }}
              echo "[wait-for-deps] checking {{ $dep.host }}:{{ $dep.port }}"
              while ! nc -z -w 2 {{ $dep.host | quote }} {{ $dep.port }}; do
                if [ "$(date +%s)" -ge "${deadline}" ]; then
                  echo "[wait-for-deps] FATAL: timed out waiting for {{ $dep.host }}:{{ $dep.port }}"
                  exit 1
                fi
                echo "[wait-for-deps] {{ $dep.host }}:{{ $dep.port }} not yet reachable; sleeping ${WAIT_FOR_DEPS_INTERVAL_SECS}s"
                sleep "${WAIT_FOR_DEPS_INTERVAL_SECS}"
              done
              echo "[wait-for-deps] {{ $dep.host }}:{{ $dep.port }} reachable"
              {{- end }}
              echo "[wait-for-deps] all dependencies reachable"
          resources:
            {{- toYaml .Values.initContainer.resources | nindent 12 }}
        # 2. migrate: runs 'alembic upgrade head' after Postgres is
        #    confirmed reachable. Industry-standard zero-downtime
        #    migration pattern. Idempotent: Alembic tracks applied
        #    revisions in alembic_version and skips already-applied
        #    migrations. Uses the SAME image as the engine so migration
        #    scripts are always in sync with the running code.
        #
        #    Failure behaviour: exits non-zero -> Pod stays Init:Error
        #    -> engine never starts -> previous replicas keep serving
        #    (RollingUpdate maxUnavailable=0) -> ArgoCD surfaces failure
        #    immediately. No downtime on a failed migration.
        - name: migrate
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy | default "IfNotPresent" }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: {{ .Values.podSecurityContext.runAsUser | default 1000 }}
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              echo "[migrate] running alembic upgrade head"
              alembic upgrade head
              echo "[migrate] migration complete"
          envFrom:
            - configMapRef:
                name: {{ include "engine.configMapName" . }}
                optional: false
            {{- if .Values.externalSecrets.enabled }}
            - secretRef:
                name: {{ include "engine.secretName" . }}
                optional: false
            {{- end }}
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: HOME
              value: "/home/etradie"
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: model-cache
              mountPath: /home/etradie/.cache
      {{- end }}
      containers:
        - name: engine
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy | default "IfNotPresent" }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: {{ .Values.securityContext.runAsUser | default 1000 }}
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: {{ .Values.service.ports.http.port | default 8000 }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "engine.configMapName" . }}
                optional: false
            {{- if .Values.externalSecrets.enabled }}
            - secretRef:
                name: {{ include "engine.secretName" . }}
                optional: false
            {{- end }}
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            # The engine reads PYTHONPATH=/app/src in docker-compose;
            # in this image the package is installed into site-packages
            # so PYTHONPATH is unnecessary. Setting PYTHONUNBUFFERED
            # so logs flush immediately is enough.
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: HOME
              value: "/home/etradie"
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          startupProbe:
            {{- toYaml .Values.startupProbe | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          lifecycle:
            {{- toYaml .Values.lifecycle | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            # SentenceTransformer downloads model weights into
            # /home/etradie/.cache (HOME=/home/etradie, set in env
            # above; the etradie user the Dockerfile creates owns
            # this dir). Required because readOnlyRootFilesystem=true.
            - name: model-cache
              mountPath: /home/etradie/.cache
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: {{ .Values.volumes.tmp.emptyDir.sizeLimit | default "128Mi" }}
        - name: model-cache
          emptyDir:
            sizeLimit: {{ .Values.volumes.modelCache.emptyDir.sizeLimit | default "2Gi" }}
      dnsPolicy: ClusterFirst
      restartPolicy: Always
