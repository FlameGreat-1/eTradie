{{- if .Values.serviceAccount.create -}}
# Engine Role (namespaced to etradie-system).
#
# Grants the precise verbs the engine FastAPI app needs to
# manage per-user mt-node Deployments/Services/Secrets at runtime
# through kubernetes_asyncio. Used by HostedProvisioner when a
# dashboard user picks connection_type="hosted".
#
# Posture:
#   - Namespaced Role, NOT ClusterRole. Engine cannot touch any
#     resource outside etradie-system.
#   - No wildcards. Every verb/resource is enumerated.
#   - No 'pods' resource. The engine creates Deployments and lets
#     the K8s controller manager create Pods on its behalf. This
#     keeps mt-node lifecycle reconcilable by the standard controllers
#     (restartPolicy, podDisruptionBudget, rolling updates) instead
#     of bypassing them with raw Pod creates.
#   - 'get' on configmaps is included only for downward-config reads
#     the engine may add later (e.g. broker-server allowlist); it does
#     NOT have create/update on configmaps to prevent the engine from
#     mutating its own chart-managed config.
#
# Audit refs:
#   - CHECKLIST.md Section 1 - terminal lifecycle pre-req
#   - Previous audit: 'engine Role had rules: [] - HostedProvisioner
#     would 403 on every K8s API call'
#   - E-C1, E-C2 - rule was deliberately empty; this commit replaces
#     it because the architecture changed (engine now owns mt-node
#     lifecycle via Deployments, not via dead code)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "engine.fullname" . }}
  namespace: {{ include "engine.namespace" . }}
  labels:
    {{- include "engine.labels" . | nindent 4 }}
    app.kubernetes.io/component: rbac
rules:
  # Per-user mt-node workloads. Engine creates a StatefulSet per
  # broker connection so each Pod keeps a stable network identity
  # (release-0) the engine's ZmqClient can resolve through the
  # headless Service. The K8s StatefulSet controller spawns the Pod.
  - apiGroups: ["apps"]
    resources: ["statefulsets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["statefulsets/status"]
    verbs: ["get"]

  # Per-tenant ServiceAccount the Vault Agent Injector uses to
  # authenticate to Vault. Names match etradie-mt-* (bound to the
  # mt-node-tenant Vault role). Engine creates one SA per broker
  # connection at provision time and deletes it on connection
  # removal so SA garbage stays cleaned up.
  - apiGroups: [""]
    resources: ["serviceaccounts"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Engine reads the StatefulSet's controller-managed Pods to surface
  # phase/restart-count/last-state in the dashboard. NO create/delete
  # on pods - those are controller-managed.
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]

  # ClusterIP + headless Services per mt-node so the engine's
  # ZmqClient can dial tcp://<svc>.etradie-system.svc.cluster.local:5555.
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # K8s Secrets. With credentials now in Vault, the engine no
  # longer creates per-tenant Secrets, so create/update/patch are
  # dropped. delete is retained so the recovery service can clean
  # up any legacy *-creds Secrets left over from pre-Vault releases
  # during the cutover window. get/list are required so the
  # recovery service can detect those legacy Secrets without
  # blindly issuing deletes.
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "delete"]

  # Downward config reads (broker-server allowlist, symbol-suffix
  # rules). Engine does NOT mutate ConfigMaps - chart owns them.
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]

  # Events: engine reads K8s Events for the mt-node StatefulSet so
  # the dashboard can show 'ImagePullBackOff', 'OOMKilled' etc.
  # No create/update/delete - events come from the K8s controllers.
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch"]

  # PersistentVolumeClaims owned by the StatefulSet's
  # volumeClaimTemplates. K8s does NOT GC volumeClaimTemplate PVCs
  # when the STS is deleted (by design); the engine deletes them
  # explicitly in HostedProvisioner.delete_account.
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "delete"]
{{- end }}
