apiVersion: v1
kind: Service
metadata:
  # Name MUST stay `engine` so the in-cluster URL is
  # http://engine.etradie-system.svc.cluster.local:8000 - which is
  # exactly what gateway (GATEWAY_ENGINE_HTTP_URL),
  # execution (EXECUTION_BROKER_BRIDGE_URL), and
  # management (MANAGEMENT_BROKER_BRIDGE_URL) already use.
  # Renaming this Service breaks all three callers.
  name: engine
  namespace: {{ include "engine.namespace" . }}
  labels:
    {{- include "engine.labels" . | nindent 4 }}
  annotations:
    description: "eTradie engine HTTP API (Python FastAPI). Consumed by gateway, execution, management."
spec:
  type: {{ .Values.service.type | default "ClusterIP" }}
  sessionAffinity: {{ .Values.service.sessionAffinity | default "None" }}
  selector:
    {{- include "engine.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.ports.http.port | default 8000 }}
      targetPort: {{ .Values.service.ports.http.targetPort | default 8000 }}
      protocol: TCP
      appProtocol: http
