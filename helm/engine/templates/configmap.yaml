apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "engine.configMapName" . }}
  namespace: {{ include "engine.namespace" . }}
  labels:
    {{- include "engine.labels" . | nindent 4 }}
    app.kubernetes.io/component: config
data:
  # Application identity (read by engine.config + observability bootstrap).
  APP_NAME: {{ .Values.config.app.name | quote }}
  APP_ENV: {{ .Values.config.app.env | quote }}
  APP_DEBUG: {{ .Values.config.app.debug | quote }}
  APP_LOG_LEVEL: {{ .Values.config.app.logLevel | quote }}

  # PostgreSQL non-secret connection pieces. Password + DATABASE_URL
  # come from the ExternalSecret.
  POSTGRES_HOST: {{ .Values.config.postgres.host | quote }}
  POSTGRES_PORT: {{ .Values.config.postgres.port | quote }}
  POSTGRES_DB: {{ .Values.config.postgres.db | quote }}

  # Wire-TLS mode for asyncpg. "false" = MESH mode (asyncpg ssl=False,
  # plaintext to a postgres that does not serve TLS); "true" = NATIVE
  # mode (asyncpg ssl='require', server must serve TLS). The platform
  # data-layer chart enables postgres TLS by default, so the staging
  # and production overlays set this to "true". Read by both the
  # engine main container and the migrate init container.
  ENGINE_DB_NATIVE_TLS: {{ .Values.config.database.nativeTls | default "false" | quote }}

  # Redis non-secret pieces. Password + REDIS_URL come from the
  # ExternalSecret.
  REDIS_HOST: {{ .Values.config.redis.host | quote }}
  REDIS_PORT: {{ .Values.config.redis.port | quote }}
  REDIS_DB: {{ .Values.config.redis.db | quote }}

  # HTTP client defaults.
  HTTP_TIMEOUT_SECONDS: {{ .Values.config.http.timeoutSeconds | quote }}
  HTTP_MAX_RETRIES: {{ .Values.config.http.maxRetries | quote }}
  HTTP_RETRY_BACKOFF_BASE: {{ .Values.config.http.retryBackoffBase | quote }}
  HTTP_RETRY_BACKOFF_MAX: {{ .Values.config.http.retryBackoffMax | quote }}

  # Rate limiting.
  RATE_LIMIT_REQUESTS_PER_MINUTE: {{ .Values.config.rateLimit.requestsPerMinute | quote }}
  RATE_LIMIT_BURST_SIZE: {{ .Values.config.rateLimit.burstSize | quote }}

  # Polling intervals (seconds).
  POLL_INTERVAL_CENTRAL_BANK_RSS: {{ .Values.config.poll.centralBankRSS | quote }}
  POLL_INTERVAL_CALENDAR: {{ .Values.config.poll.calendar | quote }}
  POLL_INTERVAL_COT: {{ .Values.config.poll.cot | quote }}
  POLL_INTERVAL_DXY: {{ .Values.config.poll.dxy | quote }}
  POLL_INTERVAL_INTERMARKET: {{ .Values.config.poll.intermarket | quote }}
  POLL_INTERVAL_SENTIMENT: {{ .Values.config.poll.sentiment | quote }}
  POLL_INTERVAL_ECONOMIC_DATA: {{ .Values.config.poll.economicData | quote }}
  ANALYSIS_CYCLE_INTERVAL: {{ .Values.config.cycle.analysisCycleInterval | quote }}

  # Cache TTLs (seconds).
  CACHE_TTL_CENTRAL_BANK: {{ .Values.config.cache.centralBank | quote }}
  CACHE_TTL_CALENDAR: {{ .Values.config.cache.calendar | quote }}
  CACHE_TTL_COT: {{ .Values.config.cache.cot | quote }}
  CACHE_TTL_DXY: {{ .Values.config.cache.dxy | quote }}
  CACHE_TTL_INTERMARKET: {{ .Values.config.cache.intermarket | quote }}
  CACHE_TTL_SENTIMENT: {{ .Values.config.cache.sentiment | quote }}
  CACHE_TTL_ECONOMIC_DATA: {{ .Values.config.cache.economicData | quote }}

  # Technical Analysis module.
  TA_ENABLED: {{ .Values.config.ta.enabled | quote }}
  TA_SMC_ENABLED: {{ .Values.config.ta.smcEnabled | quote }}
  TA_SND_ENABLED: {{ .Values.config.ta.sndEnabled | quote }}
  TA_PRIMARY_BROKER: {{ .Values.config.ta.primaryBroker | quote }}
  TA_FALLBACK_BROKER: {{ .Values.config.ta.fallbackBroker | quote }}
  TA_ANALYSIS_INTERVAL_SECONDS: {{ .Values.config.ta.analysisIntervalSeconds | quote }}
  TA_BACKFILL_ON_STARTUP: {{ .Values.config.ta.backfillOnStartup | quote }}
  TA_MAX_CONCURRENT_SYMBOL_ANALYSIS: {{ .Values.config.ta.maxConcurrentSymbolAnalysis | quote }}

  # RAG / Vector store.
  RAG_ENABLED: {{ .Values.config.rag.enabled | quote }}
  RAG_EMBEDDING_PROVIDER: {{ .Values.config.rag.embeddingProvider | quote }}
  RAG_EMBEDDING_MODEL: {{ .Values.config.rag.embeddingModel | quote }}
  RAG_EMBEDDING_DIMENSIONS: {{ .Values.config.rag.embeddingDimensions | quote }}
  RAG_EMBEDDING_BATCH_SIZE: {{ .Values.config.rag.embeddingBatchSize | quote }}
  RAG_VECTORSTORE_PROVIDER: {{ .Values.config.rag.vectorstoreProvider | quote }}
  RAG_CHROMA_HOST: {{ .Values.config.rag.chromaHost | quote }}
  RAG_CHROMA_PORT: {{ .Values.config.rag.chromaPort | quote }}
  RAG_CHROMA_SSL: {{ .Values.config.rag.chromaSSL | quote }}
  RAG_COLLECTION_DOCUMENTS: {{ .Values.config.rag.collectionDocuments | quote }}
  RAG_COLLECTION_SCENARIOS: {{ .Values.config.rag.collectionScenarios | quote }}
  RAG_CHUNK_SIZE: {{ .Values.config.rag.chunkSize | quote }}
  RAG_CHUNK_OVERLAP: {{ .Values.config.rag.chunkOverlap | quote }}
  RAG_RETRIEVAL_TOP_K: {{ .Values.config.rag.retrievalTopK | quote }}
  RAG_RERANK_ENABLED: {{ .Values.config.rag.rerankEnabled | quote }}
  RAG_RERANK_TOP_K: {{ .Values.config.rag.rerankTopK | quote }}
  RAG_RERANK_MODEL: {{ .Values.config.rag.rerankModel | quote }}
  RAG_KNOWLEDGE_BASE_DIR: {{ .Values.config.rag.knowledgeBaseDir | quote }}
  RAG_SCENARIO_ASSETS_DIR: {{ .Values.config.rag.scenarioAssetsDir | quote }}
  RAG_INGEST_ON_STARTUP: {{ .Values.config.rag.ingestOnStartup | quote }}

  # Processor / LLM.
  PROCESSOR_LLM_PROVIDER: {{ .Values.config.processor.llmProvider | quote }}
  PROCESSOR_TEMPERATURE: {{ .Values.config.processor.temperature | quote }}
  PROCESSOR_MAX_OUTPUT_TOKENS: {{ .Values.config.processor.maxOutputTokens | quote }}
  PROCESSOR_LLM_TIMEOUT_SECONDS: {{ .Values.config.processor.timeoutSeconds | quote }}
  PROCESSOR_TOTAL_TIMEOUT_SECONDS: {{ .Values.config.processor.totalTimeoutSeconds | quote }}
  PROCESSOR_MAX_RETRIES: {{ .Values.config.processor.maxRetries | quote }}
  PROCESSOR_STRICT_SCHEMA_VALIDATION: {{ .Values.config.processor.strictSchemaValidation | quote }}
  PROCESSOR_REQUIRE_CITATIONS: {{ .Values.config.processor.requireCitations | quote }}
  PROCESSOR_PERSIST_AUDIT_LOGS: {{ .Values.config.processor.persistAuditLogs | quote }}

  # Observability. Metrics live on the FastAPI app port (8000) at
  # /metrics; there is no separate prometheus_metrics_port. Audit ref:
  # SC-H7 / E-M5.
  OTEL_SERVICE_NAME: {{ .Values.config.observability.otelServiceName | quote }}
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ .Values.config.observability.otelEndpoint | quote }}

  # Broker connectivity (Section 2). Consumed by ZmqClient / MetaApiClient
  # via their connectivity primitives. Non-secret.
  ENGINE_CONNECTIVITY_HEARTBEAT_INTERVAL_SECS: {{ .Values.config.connectivity.heartbeatIntervalSecs | quote }}
  ENGINE_CONNECTIVITY_HEARTBEAT_TIMEOUT_SECS: {{ .Values.config.connectivity.heartbeatTimeoutSecs | quote }}
  ENGINE_CONNECTIVITY_HEARTBEAT_FAILURE_THRESHOLD: {{ .Values.config.connectivity.heartbeatFailureThreshold | quote }}
  ENGINE_CONNECTIVITY_RECONNECT_BASE_SECS: {{ .Values.config.connectivity.reconnectBaseSecs | quote }}
  ENGINE_CONNECTIVITY_RECONNECT_CAP_SECS: {{ .Values.config.connectivity.reconnectCapSecs | quote }}
  ENGINE_CONNECTIVITY_RECONNECT_MAX_ATTEMPTS: {{ .Values.config.connectivity.reconnectMaxAttempts | quote }}
  ENGINE_CONNECTIVITY_TICK_MAX_AGE_SECS: {{ .Values.config.connectivity.tickMaxAgeSecs | quote }}

  # EA stability (Section 4). Consumed by EAIdentityVerifier and
  # ClockSkewMonitor inside ZmqClient. Non-secret.
  ENGINE_EA_IDENTITY_VERIFY_ENABLED: {{ .Values.config.connectivity.eaIdentityVerifyEnabled | quote }}
  ENGINE_EA_MAX_CLOCK_SKEW_SECS: {{ .Values.config.connectivity.eaMaxClockSkewSecs | quote }}
  ENGINE_EA_CLOCK_SKEW_SAMPLE_EVERY_SECS: {{ .Values.config.connectivity.eaClockSkewSampleEvery | quote }}
  ENGINE_EA_MIN_VERSION: {{ .Values.config.connectivity.eaMinVersion | quote }}

  # System scaling + load control (Section 5). Consumed by the
  # OutboundRateLimiter + in-flight gate inside ZmqClient. Non-secret.
  ENGINE_OUTBOUND_RATE_PER_SECOND: {{ .Values.config.connectivity.outboundRatePerSecond | quote }}
  ENGINE_OUTBOUND_BURST_SIZE: {{ .Values.config.connectivity.outboundBurstSize | quote }}
  ENGINE_ZMQ_INFLIGHT_LIMIT: {{ .Values.config.connectivity.zmqInflightLimit | quote }}
  ENGINE_OUTBOUND_LIMIT_DEADLINE_SECS: {{ .Values.config.connectivity.outboundLimitDeadlineSecs | quote }}
  ENGINE_REQUEST_DEADLINE_SAFETY_MS: {{ .Values.config.connectivity.requestDeadlineSafetyMs | quote }}
  ENGINE_BROKER_POOL_IDLE_TIMEOUT_SECS: {{ .Values.config.connectivity.brokerPoolIdleTimeoutSecs | quote }}
  ENGINE_BROKER_POOL_SWEEP_INTERVAL_SECS: {{ .Values.config.connectivity.brokerPoolSweepIntervalSecs | quote }}

  # Section 8 (CHECKLIST): hosted MT-node failure recovery. Consumed by
  # engine.ta.broker.mt5.hosted.recovery.HostedRecoveryConfig.from_env().
  ENGINE_HOSTED_RECOVERY_ENABLED: {{ .Values.config.connectivity.hostedRecoveryEnabled | quote }}
  ENGINE_HOSTED_RECOVERY_SWEEP_INTERVAL_SECS: {{ .Values.config.connectivity.hostedRecoverySweepIntervalSecs | quote }}
  ENGINE_HOSTED_RECOVERY_UNHEALTHY_THRESHOLD_SECS: {{ .Values.config.connectivity.hostedRecoveryUnhealthyThresholdSecs | quote }}
  ENGINE_HOSTED_RECOVERY_REPROVISION_COOLDOWN_SECS: {{ .Values.config.connectivity.hostedRecoveryReprovisionCooldownSecs | quote }}
  ENGINE_HOSTED_RECOVERY_MAX_CONCURRENT: {{ .Values.config.connectivity.hostedRecoveryMaxConcurrent | default "4" | quote }}

  # Broker catalog directory (multi-broker MT5 provisioning control
  # plane). Read by engine.config.Settings.broker_catalog_dir and the
  # broker registry loader. Defaults to the in-image path the root
  # Dockerfile copies the catalog into. Mirrors RAG_KNOWLEDGE_BASE_DIR.
  BROKER_CATALOG_DIR: {{ .Values.config.broker.catalogDir | default "/app/infrastructure/broker-catalog" | quote }}

  # mt-node runtime tunables consumed by HostedProvisioner. Non-secret.
  MT_NODE_NAMESPACE: {{ .Values.config.mtNode.namespace | quote }}
  # CHECKLIST hardening (Gap #13): image is REQUIRED. The required-
  # template-function fails the helm render with a clear message
  # when the deployment overlay has not set it. Without this, a
  # silent inheritance of an empty string would render an unusable
  # ConfigMap (engine pod start crashes at HostedProvisioner._resolve_image).
  MT_NODE_IMAGE: {{ required "helm/engine: .Values.config.mtNode.image is REQUIRED. Set it in helm/engine/values-{staging,production}.yaml to the pinned mt-node image, e.g. ghcr.io/<your-org>/etradie-mt-node@sha256:<digest>." .Values.config.mtNode.image | quote }}
  MT_NODE_MEM_LIMIT: {{ .Values.config.mtNode.memLimit | quote }}
  MT_NODE_MEM_REQUEST: {{ .Values.config.mtNode.memRequest | quote }}
  MT_NODE_CPU_LIMIT: {{ .Values.config.mtNode.cpuLimit | quote }}
  MT_NODE_CPU_REQUEST: {{ .Values.config.mtNode.cpuRequest | quote }}
  MT_NODE_EPHEMERAL_LIMIT: {{ .Values.config.mtNode.ephemeralLimit | quote }}
  MT_NODE_EPHEMERAL_REQUEST: {{ .Values.config.mtNode.ephemeralRequest | quote }}
  MT_NODE_PVC_SIZE: {{ .Values.config.mtNode.pvcSize | default "4Gi" | quote }}
  MT_NODE_READINESS_TIMEOUT_SECS: {{ .Values.config.mtNode.readinessTimeoutSecs | quote }}
  MT_NODE_READINESS_POLL_SECS: {{ .Values.config.mtNode.readinessPollSecs | quote }}
  MT_NODE_MAX_HOSTED_PER_USER: {{ .Values.config.mtNode.maxHostedPerUser | default "1" | quote }}
  # Name of the chart-rendered platform Secret (holds DEFAULT_ZMQ_AUTH_TOKEN)
  # that HostedProvisioner envFroms onto every runtime-provisioned
  # mt-node + watchdog container so the entrypoint and watchdog have a
  # fallback token if the Vault Agent file render fails. Empty string
  # disables the envFrom (dev / docker-compose).
  MT_NODE_PLATFORM_SECRET_NAME: {{ .Values.config.mtNode.platformSecretName | default "" | quote }}

  # Vault HTTP client. The engine writes per-tenant MT credentials
  # under VAULT_MOUNT/data/tenants/mt-node/<sa_name>; the per-tenant
  # Pod's Vault Agent Injector reads from the same path. VAULT_ADDR
  # MUST be set in production / staging (the overlays do this).
  VAULT_ADDR: {{ .Values.config.vault.address | default "" | quote }}
  VAULT_NAMESPACE: {{ .Values.config.vault.namespace | default "" | quote }}
  VAULT_MOUNT: {{ .Values.config.vault.kvMount | default "etradie" | quote }}
  VAULT_K8S_AUTH_PATH: {{ .Values.config.vault.k8sAuthPath | default "kubernetes" | quote }}
  VAULT_K8S_AUTH_ROLE: {{ .Values.config.vault.k8sAuthRole | default "mt-node-provisioner" | quote }}
  VAULT_K8S_SA_TOKEN_PATH: {{ .Values.config.vault.saTokenPath | default "/var/run/secrets/kubernetes.io/serviceaccount/token" | quote }}
  VAULT_TOKEN_RENEW_SAFETY_SECS: {{ .Values.config.vault.tokenRenewSafetySecs | default "60" | quote }}

  # Scheduling envelope read by HostedProvisioner so runtime-provisioned
  # Pods match the chart-rendered platform shape. Empty defaults mean
  # 'do not set the field'; the production overlay fills them in.
  MT_NODE_PRIORITY_CLASS_NAME: {{ .Values.config.mtNode.scheduling.priorityClassName | default "" | quote }}
  MT_NODE_TOLERATIONS_JSON: {{ .Values.config.mtNode.scheduling.tolerations | default list | toJson | quote }}
  MT_NODE_NODE_SELECTOR_JSON: {{ .Values.config.mtNode.scheduling.nodeSelector | default dict | toJson | quote }}
  MT_NODE_AFFINITY_JSON: {{ .Values.config.mtNode.scheduling.affinity | default dict | toJson | quote }}
  MT_NODE_TOPOLOGY_SPREAD_JSON: {{ .Values.config.mtNode.scheduling.topologySpreadConstraints | default list | toJson | quote }}
  MT_NODE_POD_ANNOTATIONS_JSON: {{ .Values.config.mtNode.scheduling.podAnnotations | default dict | toJson | quote }}
