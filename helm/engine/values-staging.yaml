# Staging overlay for the etradie-engine chart.
# Applied AFTER values.yaml + values-image.yaml by the ArgoCD child
# Application. TABLE 2B profile (BUDGET.md): single-node Contabo, full
# stack ON, 1 replica.
#
# Image references (etradie-engine + mt-node) live in
# helm/engine/values-image.yaml.

replicaCount: 1
image:
  # tag is overwritten on every push to main by the CI `deploy-bump`
  # job with the immutable git SHA (see .github/workflows/ci.yml); the
  # literal below is only the value between pushes. IfNotPresent is
  # correct because each push produces a NEW tag (the SHA), so ArgoCD
  # always sees a real diff and the node always pulls the new bytes.
  tag: "6f01951cd964cf01fd16ffa6883a884f3f8afdaf"
  pullPolicy: IfNotPresent
podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8000"
  prometheus.io/path: "/metrics"
  tier: staging
  # TEMPORARY (STAGING ONLY) — mesh disabled on the engine pod.
  #
  # The postgres TLS work in this Phase 10.6 series resolved the
  # postgres handshake side of the cold-start race (engine asyncpg
  # uses ENGINE_DB_NATIVE_TLS=true to negotiate TLS against the now-
  # TLS-serving postgres). The migrate init container succeeds against
  # TLS postgres in <3 seconds. The remaining failure is the engine →
  # chromadb outbound mesh hop: even with chromadb's opaque-ports:8000
  # + no appProtocol on the Service, the engine's outbound proxy keeps
  # treating chromadb as HTTP/1.1 and gets Connection refused (a
  # Linkerd 2.14 outbound-discovery race documented in PROGRESS.md
  # `Phase 10.6 — RESOLVED 2026-06-16 evening`).
  #
  # Re-disabling mesh on the engine pod sidesteps the whole class of
  # failure for staging while keeping every other workload meshed.
  # Production overlay is UNTOUCHED — production engine stays meshed.
  #
  # REVERT PATH (do this BEFORE production cutover):
  #   1. Add retry-with-backoff in src/engine/main.py::lifespan
  #      around the first DB / redis / chromadb call (5s of
  #      Connection-refused jitter tolerance is enough in practice).
  #   2. Validate against a freshly-rolled linkerd-destination that
  #      the engine pod can come up with mesh on.
  #   3. Remove THIS annotation; the rest of the base values.yaml's
  #      mesh setup (native sidecar, proxy-await, opaque-ports for
  #      mt-node :5555 + chromadb :8000, skip-outbound for OTel
  #      :4317) is already correct and will take effect.
  linkerd.io/inject: "disabled"
config:
  app:
    env: "staging"
    debug: "false"
    logLevel: "DEBUG"
  # The staging data-layer chart enables postgres.tls (commit in this
  # series), so flip the engine to native-TLS asyncpg. ssl='require'
  # negotiates an encrypted channel without chain verification, which
  # matches the chart's self-signed posture exactly.
  database:
    nativeTls: "true"
  observability:
    # Distributed tracing ON in staging: export OTLP spans to the
    # in-cluster OTel Collector (helm/observability-logs tracing.enabled).
    otelEndpoint: "otel-collector.etradie-observability.svc.cluster.local:4317"
  vault:
    # In-cluster Vault serves plain HTTP on 8200 (matches the ESO
    # ClusterSecretStore http:// scheme and RAG chromaSSL=false). Using
    # https:// made HostedProvisioner attempt TLS against a non-TLS
    # listener and fail the per-tenant credential write.
    address: "http://vault.vault.svc.cluster.local:8200"
  rag:
    ingestOnStartup: "true"
  processor:
    strictSchemaValidation: "true"
  # mt-node runtime tunables (image: values-image.yaml). LOCKSTEP
  # INVARIANT: every value below MUST mirror
  # helm/mt-node/values-staging.yaml so engine-runtime-provisioned
  # tenant pods are wire-identical to chart-rendered ones. The base
  # values (1Gi/1536Mi, pvc 4Gi) are the PRODUCTION-leaning defaults
  # and previously leaked into staging runtime pods.
  mtNode:
    cpuRequest: "300m"
    cpuLimit: "750m"
    memRequest: "512Mi"
    memLimit: "768Mi"
    ephemeralRequest: "256Mi"
    ephemeralLimit: "512Mi"
    pvcSize: "2Gi"
    scheduling:
      # Mirrors helm/mt-node base podAnnotations (mesh + scrape) plus
      # the Vault Agent sidecar tuning (TABLE 2B): the injector's
      # upstream default request is 250m CPU per tenant pod, which the
      # single-node CPU budget cannot afford. agent-pre-populate-only
      # stays false (chart-side), so the agent runs as a persistent
      # sidecar at the tuned size.
      podAnnotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9100"
        prometheus.io/path: "/metrics"
        tier: staging
        config.linkerd.io/proxy-enable-native-sidecar: "true"
        config.linkerd.io/opaque-ports: "5555"
        vault.hashicorp.com/agent-requests-cpu: "50m"
        vault.hashicorp.com/agent-limits-cpu: "250m"
        vault.hashicorp.com/agent-requests-mem: "64Mi"
        vault.hashicorp.com/agent-limits-mem: "128Mi"
    image: ghcr.io/flamegreat-1/etradie/mt-node:6f01951cd964cf01fd16ffa6883a884f3f8afdaf
externalSecrets:
  enabled: true
  engine:
    vaultPath: etradie/services/engine/staging
    refreshInterval: 5m
    # Staging chromadb token path (matches the chromadb StatefulSet's
    # data-layer staging path). Audit ref: IV-C2.
    chromadbAuthVaultPath: etradie/data-layer/chromadb/staging
    # Staging mt-node platform path. Matches
    # helm/mt-node/values-staging.yaml::externalSecrets.platform.vaultPath.
    mtNodeVaultPath: etradie/services/mt-node/staging
resources:
  requests:
    cpu: 250m
    memory: 512Mi
    ephemeral-storage: 256Mi
  limits:
    cpu: "1"
    memory: 1Gi
    ephemeral-storage: 1Gi
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 1
# A single-replica deployment cannot satisfy minAvailable=1 during a
# roll; minAvailable 0 keeps drains and deploys unblocked.
podDisruptionBudget:
  enabled: true
  minAvailable: 0
  unhealthyPodEvictionPolicy: AlwaysAllow
serviceMonitor:
  enabled: true
  interval: 30s
  scrapeTimeout: 10s
terminationGracePeriodSeconds: 30
# GHCR pull credentials. Packages are PRIVATE on GHCR (push posture);
# K8s containerd needs a docker-registry Secret to pull. The `ghcr-pull`
# Secret is created per-namespace at Phase 10.0 BEFORE this chart syncs.
# Future hardening: source this Secret from Vault via ESO (PROGRESS TODO).
imagePullSecrets:
  - name: ghcr-pull
