# Staging overlay for the etradie-engine chart.
# Applied AFTER values.yaml by the ArgoCD child Application.
#
# Image references (etradie-engine + mt-node) live in
# helm/engine/values-image.yaml. This overlay may pin a
# staging-specific tag below by re-declaring image.tag; the
# registry path stays in the shared values-image.yaml file.

replicaCount: 1

image:
  tag: "0.1.0"
  pullPolicy: IfNotPresent

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8000"
  prometheus.io/path: "/metrics"
  tier: staging

config:
  app:
    env: "staging"
    debug: "false"
    logLevel: "DEBUG"
  # mt-node image: defined in helm/engine/values-image.yaml.
  vault:
    address: "https://vault.vault.svc.cluster.local:8200"
  rag:
    ingestOnStartup: "true"
  processor:
    strictSchemaValidation: "true"

externalSecrets:
  enabled: true
  engine:
    vaultPath: etradie/services/engine/staging
    refreshInterval: 5m
    # Staging chromadb token path (matches the chromadb StatefulSet's
    # data-layer staging path). Audit ref: IV-C2.
    chromadbAuthVaultPath: etradie/data-layer/chromadb/staging
    # Staging mt-node platform path. Matches
    # helm/mt-node/values-staging.yaml::externalSecrets.platform.vaultPath
    # so the ExternalSecret targets the correct Vault location.
    mtNodeVaultPath: etradie/services/mt-node/staging

resources:
  requests:
    cpu: 250m
    memory: 768Mi
    ephemeral-storage: 256Mi
  limits:
    cpu: "1"
    memory: 1536Mi
    ephemeral-storage: 1Gi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 2

# A single-replica staging deployment cannot satisfy minAvailable=1
# while a rolling update is in progress, so the PDB would block
# every roll. Drop minAvailable to 0 here; staging accepts the
# downtime trade-off in exchange for being able to deploy.
podDisruptionBudget:
  enabled: true
  minAvailable: 0
  unhealthyPodEvictionPolicy: AlwaysAllow

serviceMonitor:
  enabled: true
  interval: 30s
  scrapeTimeout: 10s

terminationGracePeriodSeconds: 30
