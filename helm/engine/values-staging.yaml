# Staging overlay for the etradie-engine chart.
# Applied AFTER values.yaml by the ArgoCD child Application.

replicaCount: 1

image:
  tag: "0.1.0"
  pullPolicy: IfNotPresent

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8000"
  prometheus.io/path: "/metrics"
  tier: staging

config:
  app:
    env: "staging"
    debug: "false"
    logLevel: "DEBUG"
  # CHECKLIST hardening (Gap #13): explicit mt-node image. Same
  # reasoning as values-production.yaml.
  mtNode:
    image: "ghcr.io/flamegreat-1/etradie-mt-node:0.1.0"
  rag:
    ingestOnStartup: "true"
  processor:
    strictSchemaValidation: "true"

externalSecrets:
  enabled: true
  engine:
    vaultPath: etradie/services/engine/staging
    refreshInterval: 5m
    # Staging chromadb token path (matches the chromadb StatefulSet's
    # data-layer staging path). Audit ref: IV-C2.
    chromadbAuthVaultPath: etradie/data-layer/chromadb/staging
    # Staging mt-node platform path (matches helm/mt-node/values-staging.yaml
    # externalSecrets.platform.vaultPath). Without this the engine externalsecret
    # template's 'required' on mtNodeVaultPath silently inherits the production
    # default from base values.yaml and ExternalSecret materialisation fails on
    # the staging cluster. Audit ref: CHECKLIST Section 8 Step 3 audit.
    mtNodeVaultPath: etradie/services/mt-node/staging

resources:
  requests:
    cpu: 250m
    memory: 768Mi
    ephemeral-storage: 256Mi
  limits:
    cpu: "1"
    memory: 1536Mi
    ephemeral-storage: 1Gi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 2

# A single-replica staging deployment cannot satisfy minAvailable=1
# while a rolling update is in progress, so the PDB would block
# every roll. Drop minAvailable to 0 here; staging accepts the
# downtime trade-off in exchange for being able to deploy.
podDisruptionBudget:
  enabled: true
  minAvailable: 0
  unhealthyPodEvictionPolicy: AlwaysAllow

serviceMonitor:
  enabled: true
  interval: 30s
  scrapeTimeout: 10s

terminationGracePeriodSeconds: 30
