# Production overlay for the etradie-execution chart.
# TABLE 2B profile (BUDGET.md): single-node Contabo, 1 replica.
# Cloud-agnostic. Required hostname anti-affinity intentionally NOT set
# (base preferred applies; required deadlocks single-node rollouts).

replicaCount: 1

image:
  tag: "0.1.0"
  pullPolicy: IfNotPresent

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8080"
  prometheus.io/path: "/metrics"
  cluster-autoscaler.kubernetes.io/safe-to-evict: "false"
  tier: production

config:
  # Arms the execution prod fail-closed guards. Audit ref: A2.
  app:
    env: "production"
  execution:
    # Real broker. The Python engine's broker bridge does the actual
    # MT5 socket work; this service dispatches via HTTP.
    brokerMode: "mt5"
    logLevel: "INFO"
    logJson: "true"
    maxOrderLatencyMs: "5000"
    orderIdempotencyTtlSecs: "86400"
    reconcileIntervalSecs: "60"
    # Distributed tracing ON.
    otelEndpoint: "otel-collector.etradie-observability.svc.cluster.local:4317"

# Per-service Linkerd authorization stays disabled until the mesh is
# confirmed (runbook step 4). The mesh itself is ON.
linkerdPolicy:
  enabled: false

externalSecrets:
  enabled: true
  execution:
    vaultPath: etradie/services/execution/production
    refreshInterval: 1h

resources:
  requests:
    cpu: 300m
    memory: 512Mi
    ephemeral-storage: 256Mi
  limits:
    cpu: "1"
    memory: 1Gi
    ephemeral-storage: 512Mi

# Single node: HPA pinned OFF (TABLE 2B).
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 1

# A 1-replica PDB with minAvailable>=1 blocks every node drain forever.
podDisruptionBudget:
  enabled: false

serviceMonitor:
  enabled: true
  interval: 15s
  scrapeTimeout: 10s

nodeSelector: {}

tolerations:
  - key: workload
    operator: Equal
    value: etradie-system
    effect: NoSchedule

terminationGracePeriodSeconds: 90
