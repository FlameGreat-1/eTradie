# Production overlay for the etradie-execution chart.
# Cloud-agnostic: deploys identically on Contabo K3s, OCI OKE, or any
# vanilla Kubernetes cluster.

replicaCount: 3

image:
  tag: "0.1.0"
  pullPolicy: IfNotPresent

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8080"
  prometheus.io/path: "/metrics"
  cluster-autoscaler.kubernetes.io/safe-to-evict: "false"
  tier: production

config:
  # Arms the execution prod fail-closed guards
  # (ENGINE_INTERNAL_SHARED_SECRET required under brokerMode=mt5,
  # JWT-secret-required). Audit ref: A2.
  app:
    env: "production"
  execution:
    # Real broker. The Python engine's broker bridge does the actual
    # MT5 socket work; this service just dispatches via HTTP.
    brokerMode: "mt5"
    logLevel: "INFO"
    logJson: "true"
    maxOrderLatencyMs: "5000"
    orderIdempotencyTtlSecs: "86400"
    reconcileIntervalSecs: "60"

# Per-service Linkerd authorization (Server + AuthorizationPolicy).
# Kept disabled until the mesh is confirmed; enable deliberately (set
# true + re-sync) once `linkerd viz edges` shows SECURED on every
# execution edge (docs/runbooks/tier9-linkerd-mesh-rollout.md step 4). Until
# then the control-plane defaultAllowPolicy still encrypts every
# meshed<->meshed hop.
linkerdPolicy:
  enabled: false

externalSecrets:
  enabled: true
  execution:
    vaultPath: etradie/services/execution/production
    refreshInterval: 1h

resources:
  requests:
    cpu: 500m
    memory: 512Mi
    ephemeral-storage: 256Mi
  limits:
    cpu: "2"
    memory: 1Gi
    ephemeral-storage: 512Mi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 6
  targetCPUUtilizationPercentage: 65
  targetMemoryUtilizationPercentage: 75
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 600
      policies:
        - type: Percent
          value: 25
          periodSeconds: 120
        - type: Pods
          value: 1
          periodSeconds: 120
      selectPolicy: Min
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 2
          periodSeconds: 30
      selectPolicy: Max

podDisruptionBudget:
  enabled: true
  minAvailable: 2
  unhealthyPodEvictionPolicy: IfHealthyBudget

serviceMonitor:
  enabled: true
  interval: 15s
  scrapeTimeout: 10s

affinity:
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchLabels:
            app.kubernetes.io/name: etradie-execution
        topologyKey: kubernetes.io/hostname
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: etradie-execution
          topologyKey: topology.kubernetes.io/zone

topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: etradie-execution
  - maxSkew: 2
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: etradie-execution

nodeSelector: {}

# Toleration for the dedicated etradie-system node group taint applied
# by infrastructure/cluster/main.tf. A toleration without a matching
# taint is a no-op, so this stays cloud-agnostic: clusters that do
# not taint their nodes are unaffected.
tolerations:
  - key: workload
    operator: Equal
    value: etradie-system
    effect: NoSchedule

terminationGracePeriodSeconds: 90
