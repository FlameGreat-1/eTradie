# Default values for the etradie-execution chart.
# Production / staging overlays live in values-production.yaml and
# values-staging.yaml respectively.
#
# This chart deploys src/execution (Go service) which is consumed by:
#   - gateway:    GATEWAY_EXECUTION_ADDR -> execution.etradie-system.svc.cluster.local:50053
#
# It dials, in turn:
#   - engine on :8000  (EXECUTION_BROKER_BRIDGE_URL)
#   - gateway on :50052 (EXECUTION_GATEWAY_ADDR, for instant-mode confirmation callbacks)
#   - postgres on :5432 (EXECUTION_DATABASE_URL, audit + pnl + watcher state)
#   - redis on :6379    (EXECUTION_REDIS_URL,    shared alert hub)

replicaCount: 2

# Audit ref: X-3.
revisionHistoryLimit: 10

image:
  # CI publishes to GHCR (ghcr.io/<owner>/<repo>/<service>:<tag>).
  repository: ghcr.io/flamegreat-1/etradie/execution
  pullPolicy: IfNotPresent
  tag: "0.1.0"

imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

namespace:
  name: etradie-system
  podSecurityStandard: restricted

serviceAccount:
  create: true
  annotations: {}
  name: ""
  automountServiceAccountToken: false

podAnnotations:
  # Join the Linkerd mesh in every environment. Native sidecar so the
  # proxy is Ready before the wait-for-deps init container dials meshed
  # postgres/redis/engine.
  linkerd.io/inject: enabled
  config.linkerd.io/proxy-enable-native-sidecar: "true"
  # CALLER-SIDE opaque-ports. REQUIRED for the meshed postgres (5432)
  # and redis (6379) hops. Linkerd 2.14 opaque-ports is a two-sided
  # contract: postgres/redis pods declare these ports opaque on their
  # INBOUND side, and the caller MUST declare them opaque here so its
  # OUTBOUND proxy opens an opaque raw-TCP mTLS tunnel instead of
  # running L7 protocol detection over the pg SSLRequest / RESP
  # preamble. Without this the outbound proxy resets the connection
  # mid-handshake -> `tls error: read: connection reset by peer` on the
  # startup db ping. (phase10.6 RCA 2026-06-17.) mTLS preserved.
  config.linkerd.io/opaque-ports: "5432,6379"
  # OTLP traces egress to the un-meshed OTel Collector
  # (etradie-observability, no linkerd inject) on 4317. Skip the proxy
  # on that port so the gRPC export bypasses protocol-detection and is
  # not disrupted if a collector-side Server/AuthorizationPolicy is ever
  # added. Matches the engine pod annotations.
  config.linkerd.io/skip-outbound-ports: "4317"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65532
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  sessionAffinity: None
  ports:
    http:
      port: 8080
      targetPort: 8080
      protocol: TCP
      appProtocol: http
    grpc:
      port: 50053
      targetPort: 50053
      protocol: TCP
      appProtocol: grpc

# Non-secret runtime configuration.
# Every key here corresponds to an EXECUTION_<KEY> env var that the
# Go service actually reads via envconfig.Process("EXECUTION", ...).
# Source: src/execution/internal/config/config.go.
config:
  # Application environment. SAFE default of "development"; the
  # production / staging overlays override to arm the prod
  # fail-closed guards. Audit ref: A2.
  app:
    env: "development"
  execution:
    grpcPort: "50053"
    httpPort: "8080"
    # No safe default. Production must set 'mt5'; non-prod environments
    # explicitly opt-in to 'mock'. Empty string fails validate() so a
    # fresh deploy with no overlay refuses to boot. Audit ref: X-10, EX-M2.
    brokerMode: ""
    brokerBridgeURL: "http://engine.etradie-system.svc.cluster.local:8000"
    brokerTimeoutMs: "5000"
    # Section 3 - end-to-end latency kill-switch.
    maxOrderLatencyMs: "5000"
    # Section 3 - order idempotency window.
    orderIdempotencyTtlSecs: "86400"
    reconcileIntervalSecs: "60"
    # Tier 8 (CHECKLIST) - signed internal execution requests + replay
    # protection. requireSignedRequests="" auto-resolves to ENFORCE in
    # prod-like envs (APP_ENV=production/staging) and warn-only
    # otherwise, so the base chart is safe for a bare render while the
    # production overlay (app.env=production) enforces automatically.
    # The HMAC key falls back to ENGINE_INTERNAL_SHARED_SECRET (already
    # delivered via externalsecret), so no new secret is required.
    requireSignedRequests: ""
    requestSignatureMaxSkewSecs: "30"
    # Section 3 - order intake backpressure (BurstQueue). queuePerUserCap
    # must be <= queueMaxConcurrent (validated in config.go).
    queueMaxConcurrent: "8"
    queuePerUserCap: "4"
    queueDeadlineMs: "2000"
    # Section 7 (CHECKLIST) - position snapshots + ghost detection.
    # positionSnapshotEnabled is the operator kill-switch; when 'false'
    # the reconciler runs the legacy Section-3 path with no snapshot
    # writes and no ghost detection. The table is still created by
    # SchemaSQL() but stays empty.
    positionSnapshotEnabled: "true"
    # Retention sweeper deletes snapshots older than this (hours).
    # Default 168h = 7 days matches the regulatory minimum for retail
    # trading audit. Range 1..720 (1h..30d).
    positionSnapshotRetentionHours: "168"
    # Minimum age the latest snapshot must have before the reconciler
    # classifies a 'broker no longer reports' position as a ghost.
    # Default 300s (5min) > reconcile cadence + broker REST latency.
    # Range 60..3600 (1min..1h).
    ghostPositionMinAgeSecs: "300"
    # Section 7 Step C: eager position preload on startup.
    # When true, the execution service calls Refresh() for every active
    # user before the gRPC listener opens. Set to 'false' in dev/test
    # environments where the broker bridge is not available at startup.
    preloadPositionsOnStart: "true"
    mockBrokerBalance: "10000.0"
    gatewayAddr: "gateway.etradie-system.svc.cluster.local:50052"
    defaultExecutionMode: "LIMIT"
    minLotSize: "0.01"
    maxLotSize: "10.0"
    maxConcurrentTrades: "3"
    dailyLossLimitPct: "3.0"
    weeklyDrawdownPct: "5.0"
    spreadMultiplierNormal: "2.0"
    spreadMultiplierScalping: "1.5"
    newsLockoutMinutes: "30"
    newsLockoutMinutesScalping: "45"
    enabledSessions: "LONDON_OPEN,LONDON_NY_OVERLAP,NEW_YORK"
    overshootToleranceMultiplier: "1.5"
    watcherPollIntervalMs: "500"
    watcherTimeoutMinutes: "45"
    watcherConfirmPollIntervalSecs: "300"
    databaseMaxConns: "10"
    databaseMinConns: "2"
    databaseMaxIdleMs: "30000"
    databaseConnMaxLifeSeconds: "3600"
    logLevel: "INFO"
    logJson: "true"
    # OTel tracing is opt-in. Empty endpoint means the OTel SDK
    # exporter is a no-op. Production overlay sets this once an
    # OTel collector is actually deployed. Audit ref: NOTE.md S2-C.
    otelEndpoint: ""
    otelServiceName: "etradie-execution"
  auth:
    accessTokenTtlSeconds: "900"
    refreshTokenTtlSeconds: "604800"
    serviceTokenTtlSeconds: "2592000"
    bcryptCost: "12"
    maxSessionsPerUser: "5"
    issuer: "etradie"

externalSecrets:
  enabled: true
  execution:
    secretStoreName: vault-backend
    secretStoreKind: ClusterSecretStore
    refreshInterval: 1h
    # Production Vault path. Aligns with
    # infrastructure/cluster/vault-paths/main.tf::vault_kv_secret_v2.execution
    # (etradie/services/execution/${environment}).
    vaultPath: etradie/services/execution/production
    creationPolicy: Owner

resources:
  requests:
    cpu: 200m
    memory: 256Mi
    ephemeral-storage: 128Mi
  limits:
    cpu: "1"
    memory: 512Mi
    ephemeral-storage: 256Mi

initContainer:
  enabled: true
  image: busybox:1.36
  pullPolicy: IfNotPresent
  timeoutSeconds: 180
  intervalSeconds: 2
  # Execution depends on engine, postgres, redis. It also needs gateway
  # for the confirmation gRPC client, but gateway dials execution back
  # so we deliberately DO NOT block on gateway here (would deadlock the
  # ArgoCD sync wave). Gateway has its own init-container that waits
  # for execution.
  dependencies:
    - host: "postgres.etradie-system.svc.cluster.local"
      port: 5432
    - host: "redis.etradie-system.svc.cluster.local"
      port: 6379
    - host: "engine.etradie-system.svc.cluster.local"
      port: 8000
  # Requests must meet the etradie-system namespace LimitRange minimum
  # (50m cpu / 64Mi memory). The init container runs to completion in
  # a few seconds; steady-state main-container sizing per Table 2B is
  # unaffected.
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

# Section 6 (CHECKLIST): PrometheusRule covering order failure rate,
# placement latency, queue drops, latency kill-switch, audit write
# failures. Renders only when monitoring.coreos.com is installed.
prometheusRule:
  enabled: true
  labels:
    prometheus: kube-prometheus
    role: alert-rules

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 600
      policies:
        - type: Percent
          value: 50
          periodSeconds: 120
        - type: Pods
          value: 1
          periodSeconds: 120
      selectPolicy: Min
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 1
          periodSeconds: 30
      selectPolicy: Max

podDisruptionBudget:
  enabled: true
  minAvailable: 1
  unhealthyPodEvictionPolicy: IfHealthyBudget

# Tier 9 (CHECKLIST microservice security) — per-service Linkerd
# authorization (G9-2). Renders policy.linkerd.io Server +
# ServerAuthorization that lock each port to the exact client
# ServiceAccount identities. DEFAULT FALSE: a bare/dev render emits no
# policy. Production overlay sets enabled=true ONLY after staging
# confirms 100% mTLS on every edge (phased rollout). Until enabled, the
# Linkerd control-plane defaultAllowPolicy=all-authenticated still
# enforces mTLS (any meshed peer) — this just narrows it to the
# legitimate caller per port.
linkerdPolicy:
  enabled: false
  # Client ServiceAccount identities permitted to reach execution.
  # SA = release name = etradie-<svc> (verified in _helpers.tpl); all
  # in etradie-system. The gateway orchestrator is the ONLY execution
  # gRPC + dashboard-HTTP caller.
  callerServiceAccounts:
    - etradie-gateway
  # Namespace that runs Prometheus (un-meshed) for the /metrics scrape
  # NetworkAuthentication. Matches the NetworkPolicy ingress selector.
  monitoringNamespace: monitoring

networkPolicy:
  enabled: true
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Gateway dials execution on :50053 (orchestrator -> execution gRPC).
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: etradie-gateway
      ports:
        - protocol: TCP
          port: 50053
    # Dashboard via gateway -> execution HTTP (settings, state, account).
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: etradie-gateway
      ports:
        - protocol: TCP
          port: 8080
    # Prometheus scrapes /metrics on :8080.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
          podSelector:
            matchLabels:
              app: prometheus
      ports:
        - protocol: TCP
          port: 8080
    # Linkerd proxy admin port :4191 (proxy metrics, tap, liveness)
    # scraped by Prometheus from the monitoring namespace.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
          podSelector:
            matchLabels:
              app: prometheus
      ports:
        - protocol: TCP
          port: 4191
    # Linkerd proxy INBOUND port :4143 (meshed proxy-to-proxy mTLS).
    # See the engine chart NetworkPolicy for the full rationale.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: etradie-system
      ports:
        - protocol: TCP
          port: 4143
  egress:
    # The injected Linkerd proxy must reach the control plane in the
    # linkerd namespace (identity, destination, policy), or it never
    # becomes Ready. Scoped to the namespace rather than specific ports,
    # which vary across Linkerd versions.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: linkerd
    # Postgres.
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: postgres
      ports:
        - protocol: TCP
          port: 5432
    # Redis.
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: redis
      ports:
        - protocol: TCP
          port: 6379
    # Engine HTTP broker bridge.
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: etradie-engine
      ports:
        - protocol: TCP
          port: 8000
    # Gateway gRPC (instant-mode confirmation callback).
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: etradie-gateway
      ports:
        - protocol: TCP
          port: 50052
    # OTel collector.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: etradie-observability
          podSelector:
            matchLabels:
              app.kubernetes.io/name: otel-collector
      ports:
        - protocol: TCP
          port: 4317
    # Cluster DNS.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

serviceMonitor:
  enabled: true
  interval: 30s
  scrapeTimeout: 10s
  labels:
    prometheus: kube-prometheus
  metricRelabelDropPrefixes:
    - go_
    - process_
    - promhttp_

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: etradie-execution
          topologyKey: kubernetes.io/hostname

topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: etradie-execution

nodeSelector: {}

tolerations: []

startupProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 2
  timeoutSeconds: 2
  successThreshold: 1
  failureThreshold: 30

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 0
  periodSeconds: 10
  timeoutSeconds: 3
  successThreshold: 1
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 0
  periodSeconds: 5
  timeoutSeconds: 3
  successThreshold: 1
  failureThreshold: 3

lifecycle:
  preStop:
    exec:
      command: ["/bin/sh", "-c", "sleep 5"]

terminationGracePeriodSeconds: 60

volumes:
  tmp:
    emptyDir:
      sizeLimit: 64Mi
