# Default values for the etradie-execution chart.
# Production / staging overlays live in values-production.yaml and
# values-staging.yaml respectively.
#
# This chart deploys src/execution (Go service) which is consumed by:
#   - gateway:    GATEWAY_EXECUTION_ADDR -> execution.etradie-system.svc.cluster.local:50053
#
# It dials, in turn:
#   - engine on :8000  (EXECUTION_BROKER_BRIDGE_URL)
#   - gateway on :50052 (EXECUTION_GATEWAY_ADDR, for instant-mode confirmation callbacks)
#   - postgres on :5432 (EXECUTION_DATABASE_URL, audit + pnl + watcher state)
#   - redis on :6379    (EXECUTION_REDIS_URL,    shared alert hub)

replicaCount: 2

image:
  # CI publishes to GHCR (ghcr.io/<owner>/<repo>/<service>:<tag>).
  repository: ghcr.io/flamegreat-1/etradie/execution
  pullPolicy: IfNotPresent
  tag: "0.1.0"

imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

namespace:
  name: etradie-system
  podSecurityStandard: restricted

serviceAccount:
  create: true
  annotations: {}
  name: ""
  automountServiceAccountToken: false

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8080"
  prometheus.io/path: "/metrics"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65532
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  sessionAffinity: None
  ports:
    http:
      port: 8080
      targetPort: 8080
      protocol: TCP
      appProtocol: http
    grpc:
      port: 50053
      targetPort: 50053
      protocol: TCP
      appProtocol: grpc

# Non-secret runtime configuration.
# Every key here corresponds to an EXECUTION_<KEY> env var that the
# Go service actually reads via envconfig.Process("EXECUTION", ...).
# Source: src/execution/internal/config/config.go.
config:
  execution:
    grpcPort: "50053"
    httpPort: "8080"
    brokerMode: "mock"
    brokerBridgeURL: "http://engine.etradie-system.svc.cluster.local:8000"
    brokerTimeoutMs: "5000"
    mockBrokerBalance: "10000.0"
    gatewayAddr: "gateway.etradie-system.svc.cluster.local:50052"
    defaultExecutionMode: "LIMIT"
    minLotSize: "0.01"
    maxLotSize: "10.0"
    maxConcurrentTrades: "3"
    dailyLossLimitPct: "3.0"
    weeklyDrawdownPct: "5.0"
    spreadMultiplierNormal: "2.0"
    spreadMultiplierScalping: "1.5"
    newsLockoutMinutes: "30"
    newsLockoutMinutesScalping: "45"
    enabledSessions: "LONDON_OPEN,LONDON_NY_OVERLAP,NEW_YORK"
    overshootToleranceMultiplier: "1.5"
    watcherPollIntervalMs: "500"
    watcherTimeoutMinutes: "45"
    watcherConfirmPollIntervalSecs: "300"
    databaseMaxConns: "10"
    databaseMinConns: "2"
    databaseMaxIdleMs: "30000"
    databaseConnMaxLifeSeconds: "3600"
    logLevel: "INFO"
    logJson: "true"
    # OTel tracing is opt-in. Empty endpoint means the OTel SDK
    # exporter is a no-op. Production overlay sets this once an
    # OTel collector is actually deployed. Audit ref: NOTE.md S2-C.
    otelEndpoint: ""
    otelServiceName: "etradie-execution"
  auth:
    accessTokenTtlSeconds: "900"
    refreshTokenTtlSeconds: "604800"
    serviceTokenTtlSeconds: "2592000"
    bcryptCost: "12"
    maxSessionsPerUser: "5"
    issuer: "etradie"

externalSecrets:
  enabled: true
  execution:
    secretStoreName: vault-backend
    secretStoreKind: ClusterSecretStore
    refreshInterval: 1h
    # Production Vault path. Aligns with
    # infrastructure/cluster/vault-paths/main.tf::vault_kv_secret_v2.execution
    # (etradie/services/execution/${environment}).
    vaultPath: etradie/services/execution/production
    creationPolicy: Owner

resources:
  requests:
    cpu: 200m
    memory: 256Mi
    ephemeral-storage: 128Mi
  limits:
    cpu: "1"
    memory: 512Mi
    ephemeral-storage: 256Mi

initContainer:
  enabled: true
  image: busybox:1.36
  pullPolicy: IfNotPresent
  timeoutSeconds: 180
  intervalSeconds: 2
  # Execution depends on engine, postgres, redis. It also needs gateway
  # for the confirmation gRPC client, but gateway dials execution back
  # so we deliberately DO NOT block on gateway here (would deadlock the
  # ArgoCD sync wave). Gateway has its own init-container that waits
  # for execution.
  dependencies:
    - host: "postgres.etradie-system.svc.cluster.local"
      port: 5432
    - host: "redis.etradie-system.svc.cluster.local"
      port: 6379
    - host: "engine.etradie-system.svc.cluster.local"
      port: 8000
  resources:
    requests:
      cpu: 10m
      memory: 16Mi
    limits:
      cpu: 50m
      memory: 32Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 600
      policies:
        - type: Percent
          value: 50
          periodSeconds: 120
        - type: Pods
          value: 1
          periodSeconds: 120
      selectPolicy: Min
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 1
          periodSeconds: 30
      selectPolicy: Max

podDisruptionBudget:
  enabled: true
  minAvailable: 1
  unhealthyPodEvictionPolicy: IfHealthyBudget

networkPolicy:
  enabled: true
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Gateway dials execution on :50053 (orchestrator -> execution gRPC).
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: etradie-gateway
      ports:
        - protocol: TCP
          port: 50053
    # Dashboard via gateway -> execution HTTP (settings, state, account).
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: etradie-gateway
      ports:
        - protocol: TCP
          port: 8080
    # Prometheus scrapes /metrics on :8080.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
          podSelector:
            matchLabels:
              app: prometheus
      ports:
        - protocol: TCP
          port: 8080
  egress:
    # Postgres.
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: postgres
      ports:
        - protocol: TCP
          port: 5432
    # Redis.
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: redis
      ports:
        - protocol: TCP
          port: 6379
    # Engine HTTP broker bridge.
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: etradie-engine
      ports:
        - protocol: TCP
          port: 8000
    # Gateway gRPC (instant-mode confirmation callback).
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: etradie-gateway
      ports:
        - protocol: TCP
          port: 50052
    # OTel collector.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: etradie-observability
          podSelector:
            matchLabels:
              app.kubernetes.io/name: otel-collector
      ports:
        - protocol: TCP
          port: 4317
    # Cluster DNS.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

serviceMonitor:
  enabled: true
  interval: 30s
  scrapeTimeout: 10s
  labels:
    prometheus: kube-prometheus
  metricRelabelDropPrefixes:
    - go_
    - process_
    - promhttp_

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: etradie-execution
          topologyKey: kubernetes.io/hostname

topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: etradie-execution

nodeSelector: {}

tolerations: []

startupProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 2
  timeoutSeconds: 2
  successThreshold: 1
  failureThreshold: 30

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 0
  periodSeconds: 10
  timeoutSeconds: 3
  successThreshold: 1
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 0
  periodSeconds: 5
  timeoutSeconds: 3
  successThreshold: 1
  failureThreshold: 3

lifecycle:
  preStop:
    exec:
      command: ["/bin/sh", "-c", "sleep 5"]

terminationGracePeriodSeconds: 60

volumes:
  tmp:
    emptyDir:
      sizeLimit: 64Mi
