# Staging overlay for the etradie-execution chart.
# TABLE 2B profile (BUDGET.md): single-node Contabo, 1 replica.

replicaCount: 1
image:
  tag: "c86a1a0383e9e0f907705c1d89029f2fab452bcb"
  pullPolicy: IfNotPresent
podAnnotations:
  tier: staging
config:
  # Staging is prod-like for the auth/security posture. Audit ref: A2.
  app:
    env: "staging"
  execution:
    # Staging runs the real engine MT5 bridge end-to-end. Until a user
    # provisions a demo or live broker via the dashboard, the engine's
    # /internal/broker/* endpoints return their own no-broker response
    # and the dashboard header shows the empty state. Provisioning a
    # connection flips the header to real account data on the next
    # 5s poll, with no caching layer in between.
    logLevel: "DEBUG"
    logJson: "true"
    # Distributed tracing ON in staging.
    otelEndpoint: "otel-collector.etradie-observability.svc.cluster.local:4317"
externalSecrets:
  enabled: true
  execution:
    vaultPath: etradie/services/execution/staging
    refreshInterval: 5m
resources:
  requests:
    cpu: 150m
    memory: 256Mi
    ephemeral-storage: 64Mi
  limits:
    cpu: 500m
    memory: 512Mi
    ephemeral-storage: 128Mi
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 1
podDisruptionBudget:
  enabled: true
  minAvailable: 0
  unhealthyPodEvictionPolicy: AlwaysAllow
serviceMonitor:
  enabled: true
  interval: 30s
  scrapeTimeout: 10s
terminationGracePeriodSeconds: 30
# GHCR pull credentials. Packages are PRIVATE on GHCR (push posture);
# K8s containerd needs a docker-registry Secret to pull. The `ghcr-pull`
# Secret is created per-namespace at Phase 10.0 BEFORE this chart syncs.
# Future hardening: source this Secret from Vault via ESO (PROGRESS TODO).
imagePullSecrets:
  - name: ghcr-pull
