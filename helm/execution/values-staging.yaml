# Staging overlay for the etradie-execution chart.
# TABLE 2B profile (BUDGET.md): single-node Contabo, 1 replica.

replicaCount: 1

image:
  tag: "0.1.0"
  pullPolicy: IfNotPresent

podAnnotations:
  tier: staging

config:
  # Staging is prod-like for the auth/security posture. Audit ref: A2.
  app:
    env: "staging"
  execution:
    # Staging explicitly opts into mock; production overlay sets mt5.
    brokerMode: "mock"
    logLevel: "DEBUG"
    logJson: "true"
    # Distributed tracing ON in staging.
    otelEndpoint: "otel-collector.etradie-observability.svc.cluster.local:4317"

externalSecrets:
  enabled: true
  execution:
    vaultPath: etradie/services/execution/staging
    refreshInterval: 5m

resources:
  requests:
    cpu: 150m
    memory: 256Mi
    ephemeral-storage: 64Mi
  limits:
    cpu: 500m
    memory: 512Mi
    ephemeral-storage: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 1

podDisruptionBudget:
  enabled: true
  minAvailable: 0
  unhealthyPodEvictionPolicy: AlwaysAllow

serviceMonitor:
  enabled: true
  interval: 30s
  scrapeTimeout: 10s

terminationGracePeriodSeconds: 30
