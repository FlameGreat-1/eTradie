# Staging overlay for the etradie-execution chart.

replicaCount: 1

image:
  tag: "0.1.0"
  pullPolicy: IfNotPresent

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8080"
  prometheus.io/path: "/metrics"
  tier: staging

config:
  # Staging is prod-like for the auth/security posture: arm the same
  # fail-closed guards as production. Broker behaviour stays mock
  # (see brokerMode below); APP_ENV only governs the security guards.
  # Audit ref: A2.
  app:
    env: "staging"
  execution:
    # Staging explicitly opts into mock; production overlay sets mt5.
    brokerMode: "mock"
    logLevel: "DEBUG"
    logJson: "true"
    # Distributed tracing ON in staging: export OTLP spans to the
    # in-cluster OTel Collector (helm/observability-logs tracing.enabled).
    otelEndpoint: "otel-collector.etradie-observability.svc.cluster.local:4317"

externalSecrets:
  enabled: true
  execution:
    vaultPath: etradie/services/execution/staging
    refreshInterval: 5m

resources:
  requests:
    cpu: 100m
    memory: 192Mi
    ephemeral-storage: 64Mi
  limits:
    cpu: 500m
    memory: 384Mi
    ephemeral-storage: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 1

podDisruptionBudget:
  enabled: true
  minAvailable: 0
  unhealthyPodEvictionPolicy: AlwaysAllow

serviceMonitor:
  enabled: true
  interval: 30s
  scrapeTimeout: 10s

terminationGracePeriodSeconds: 30
