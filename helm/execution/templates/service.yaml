apiVersion: v1
kind: Service
metadata:
  # Name MUST stay `execution` so the in-cluster URL is
  # execution.etradie-system.svc.cluster.local:50053 - exactly what
  # helm/gateway/values.yaml config.gateway.executionAddr already
  # points at. Renaming this Service breaks gateway routing.
  name: execution
  namespace: {{ include "execution.namespace" . }}
  labels:
    {{- include "execution.labels" . | nindent 4 }}
  annotations:
    description: "eTradie execution gRPC + HTTP service. Consumed by gateway."
spec:
  type: {{ .Values.service.type | default "ClusterIP" }}
  sessionAffinity: {{ .Values.service.sessionAffinity | default "None" }}
  selector:
    {{- include "execution.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.ports.http.port | default 8080 }}
      targetPort: {{ .Values.service.ports.http.targetPort | default 8080 }}
      protocol: TCP
      appProtocol: http
    - name: grpc
      port: {{ .Values.service.ports.grpc.port | default 50053 }}
      targetPort: {{ .Values.service.ports.grpc.targetPort | default 50053 }}
      protocol: TCP
      appProtocol: grpc
