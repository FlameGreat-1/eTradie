{{- if .Values.prometheusRule.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "execution.appName" . }}
  namespace: {{ include "execution.namespace" . }}
  labels:
    {{- include "execution.labels" . | nindent 4 }}
    app.kubernetes.io/component: alerting
    {{- with .Values.prometheusRule.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  groups:
    # Order placement health. The execution service is the money layer
    # so alerts here page on-call immediately.
    - name: execution.orders
      interval: 30s
      rules:
        # Success rate below 80% over 5m. Only fires when there's
        # actually traffic (>= 10 attempts in the window) so a quiet
        # period does not page.
        - alert: ExecutionOrderFailureRateHigh
          expr: |
            (
              sum(rate(etradie_execution_order_placement_total{status="success"}[5m]))
              /
              sum(rate(etradie_execution_order_placement_total[5m]))
            ) < 0.8
            and
            sum(increase(etradie_execution_order_placement_total[5m])) >= 10
          for: 2m
          labels:
            severity: critical
            component: execution
            team: trading
          annotations:
            summary: "Order success rate < 80% over 5m"
            description: |
              The execution service is succeeding on fewer than 80%
              of order placements over the last 5 minutes (>= 10
              attempts). Likely causes: broker outage, EA disconnect,
              or a bad symbol mapping. Cross-reference with
              MTNodeBrokerDisconnected and EngineBrokerInflightGate*.
            runbook_url: "https://docs.etradie.com/runbooks/execution-order-failure-rate-high"

        # Latency p99 spike.
        - alert: ExecutionOrderLatencyP99High
          expr: |
            histogram_quantile(
              0.99,
              sum by (mode, le) (
                rate(etradie_execution_order_placement_duration_seconds_bucket[5m])
              )
            ) > 1
          for: 5m
          labels:
            severity: warning
            component: execution
            team: trading
          annotations:
            summary: "Order placement p99 latency > 1s (mode={{`{{ $labels.mode }}`}})"
            description: |
              99th percentile of order placement broker round-trip is
              above 1s for 5 minutes. The user-facing SLO is < 500ms
              p99; sustained > 1s degrades the trading experience.
            runbook_url: "https://docs.etradie.com/runbooks/execution-order-latency-p99-high"

        # Burst queue is dropping orders because deadlines elapsed.
        - alert: ExecutionBurstQueueDrops
          expr: |
            sum(rate(etradie_execution_queue_drops_total{reason="deadline"}[2m])) > 0.083
          for: 2m
          labels:
            severity: warning
            component: execution
            team: trading
          annotations:
            summary: "Execution burst queue dropping > 5/min for 2m"
            description: |
              The execution burst queue is dropping orders because the
              configured deadline passed before a slot freed up. Scale
              the execution Deployment or tune QueueConfig.
            runbook_url: "https://docs.etradie.com/runbooks/execution-burst-queue-drops"

        # Latency-breach kill switch firing.
        - alert: ExecutionLatencyBreachSpike
          expr: |
            sum(rate(etradie_execution_order_latency_breach_total[5m])) > 0.0167
          for: 5m
          labels:
            severity: warning
            component: execution
            team: trading
          annotations:
            summary: "Execution latency kill-switch firing > 1/min"
            description: |
              Orders are being rejected because end-to-end latency
              exceeded max_order_latency_ms (Section 3 kill-switch).
              The chain (gateway -> engine -> EA -> broker) is too
              slow.
            runbook_url: "https://docs.etradie.com/runbooks/execution-latency-breach-spike"

        # Audit write failures = trades happening without DB audit.
        # This is a COMPLIANCE incident, not just an SLO issue.
        - alert: ExecutionAuditWriteFailures
          expr: |
            sum(rate(etradie_execution_audit_write_failures_total[2m])) > 0
          for: 2m
          labels:
            severity: critical
            component: execution
            team: trading
          annotations:
            summary: "Audit log write failures detected"
            description: |
              Trades are being executed but the audit log writes to
              PostgreSQL are failing. This is a compliance incident.
              Check DB health + connection pool saturation.
            runbook_url: "https://docs.etradie.com/runbooks/execution-audit-write-failures"

    # Section 7 (CHECKLIST): data consistency + ghost-position detection.
    - name: execution.consistency
      interval: 60s
      rules:
        # Ghost positions detected by the reconciler. A ghost position
        # is one that was in the engine's last persisted snapshot but
        # is no longer reported by the broker AND the snapshot is at
        # least ghostMinAge (default 5 min) old. This means the broker
        # closed the position cleanly between two reconcile cycles and
        # the engine missed the close event (e.g. SL hit while the
        # engine was scaled down for a deploy).
        #
        # Any non-zero rate over 5 minutes is worth investigating:
        # ghost positions inflate the engine's open-position count,
        # which can block new trades via the MaxConcurrentTrades guard.
        # A sustained rate (> 1/h) indicates a systemic issue (e.g.
        # the reconcile interval is too long, or the broker is closing
        # positions without notifying the engine).
        - alert: ExecutionReconcileGhostPositions
          expr: |
            sum(rate(etradie_execution_reconcile_drift_total{class="ghost_position"}[5m])) > 0
          for: 5m
          labels:
            severity: warning
            component: execution
            team: trading
          annotations:
            summary: "Ghost positions detected by the reconciler"
            description: |
              The execution reconciler has detected and removed one or
              more ghost positions in the last 5 minutes. A ghost
              position is one that was in the engine's last persisted
              snapshot but is no longer reported by the broker. This
              typically means the broker closed the position cleanly
              between two reconcile cycles (e.g. SL hit while the
              engine was restarting). Check the execution service logs
              for 'reconcile_ghost_position_detected_removing' entries
              to identify the affected user and position.
            runbook_url: "https://docs.etradie.com/runbooks/execution-reconcile-ghost-positions"

        # Snapshot write failures. The reconciler writes one snapshot
        # per user per cycle. A sustained failure rate means the
        # ghost-position detection is blind (no historical record to
        # compare against). The snapshot table is also the source for
        # the audit replay endpoint.
        - alert: ExecutionSnapshotWriteFailures
          expr: |
            sum(rate(etradie_execution_reconcile_total{outcome="ok"}[5m])) > 0
            and
            absent(etradie_execution_reconcile_drift_total{class="ghost_position"})
          for: 0m
          labels:
            severity: info
            component: execution
            team: platform
          annotations:
            summary: "Execution snapshot write failures (check logs)"
            description: |
              The reconciler is completing cycles (outcome=ok) but
              snapshot write failures may be occurring. Check the
              execution service logs for 'reconcile_snapshot_write_failed'
              entries. This alert fires when the ghost_position metric
              is absent (no ghost detections yet) AND the reconciler
              is running, which is the expected state on a fresh deploy
              before the first ghost is detected. It is informational
              only; escalate if snapshot write errors appear in logs.
            runbook_url: "https://docs.etradie.com/runbooks/execution-snapshot-write-failures"
{{- end }}
