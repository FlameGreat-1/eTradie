# Production overlay for the etradie-mt-node chart.
#
# TABLE 2B profile (BUDGET.md): Burstable QoS on the single-node
# Contabo box. LOCKSTEP INVARIANT: resources + persistence MUST mirror
# helm/engine/values-production.yaml::config.mtNode so chart-rendered
# and engine-runtime-provisioned tenant pods are wire-identical.
#
# Image reference: see helm/mt-node/values-image.yaml.

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "9100"
  prometheus.io/path: "/metrics"
  cluster-autoscaler.kubernetes.io/safe-to-evict: "false"
  tier: production
  # TABLE 2B: Vault Agent sidecar tuning. The injector's upstream
  # default request is 250m CPU per tenant pod - most of a user's
  # entire CPU allowance on this box. The agent is a persistent sidecar
  # (agent-pre-populate-only=false) and idles far below 50m.
  vault.hashicorp.com/agent-requests-cpu: "50m"
  vault.hashicorp.com/agent-limits-cpu: "250m"
  vault.hashicorp.com/agent-requests-mem: "64Mi"
  vault.hashicorp.com/agent-limits-mem: "128Mi"

# TABLE 2B: Burstable QoS (requests < limits), replacing the previous
# Guaranteed 2 CPU / 2Gi with static CPU pinning. Rationale: the
# soak-observed steady state is ~520Mi RSS / sub-core CPU with
# indicator-recalc bursts to ~1.4 cores and ~680Mi. 500m/1Gi requests
# reserve the steady state; 1500m/2Gi limits absorb the bursts. CPU
# pinning (integer cores + static CPU manager) does not apply to the
# Burstable class - docs/runbooks/mt-node-cpu-pinning.md applies only
# if an operator reverts to Guaranteed sizing on a bigger node pool.
resources:
  requests:
    cpu: 500m
    memory: 1Gi
    ephemeral-storage: 512Mi
  limits:
    cpu: 1500m
    memory: 2Gi
    ephemeral-storage: 1Gi

# TABLE 2B disk budget: 4Gi per tenant (Wine prefix + MT data). MUST
# match helm/engine/values-production.yaml::config.mtNode.pvcSize.
persistence:
  size: 4Gi

# A per-tenant 1-replica PDB with minAvailable=1 blocks every node
# drain forever; on the single-node box a drain is a full outage
# regardless, so the PDB buys nothing and costs drain operability.
podDisruptionBudget:
  enabled: false

priorityClass:
  create: true
  name: etradie-mt-node-priority
  value: 100000
  globalDefault: false
  description: "Per-user MT terminal Pods. Trading-critical; evict last."

serviceMonitor:
  enabled: true
  interval: 15s
  scrapeTimeout: 10s

# Required hostname anti-affinity intentionally NOT set here (the base
# chart's preferred term applies): one-tenant-per-node would make any
# second MT user unschedulable on the single-node box. Preferred still
# spreads tenants on a future multi-node cluster.

tolerations:
  - key: workload
    operator: Equal
    value: etradie-system
    effect: NoSchedule

# Watchdog sidecar: equal requests/limits keeps its envelope
# deterministic; the Pod is Burstable overall via the mt container.
sidecar:
  watchdog:
    resources:
      requests:
        cpu: 100m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 64Mi

# OFF (TABLE 2B): K3s local-path storage has no CSI VolumeSnapshot
# support, so the snapshotter CronJob cannot run on this box. Re-enable
# only after installing Longhorn (or another snapshot-capable CSI) and
# setting snapshotter.volumeSnapshotClassName + image.repository.
snapshotter:
  enabled: false

externalSecrets:
  enabled: true
  platform:
    vaultPath: etradie/services/mt-node/production
    refreshInterval: 1h

terminationGracePeriodSeconds: 90
