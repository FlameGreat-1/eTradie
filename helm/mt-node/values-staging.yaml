# Staging overlay for the etradie-mt-node chart.
#
# Applied via --values values-staging.yaml after values.yaml +
# values-image.yaml. The engine's HostedProvisioner picks the overlay
# based on the ENV environment variable on the engine Pod.
#
# TABLE 2B profile (BUDGET.md): Burstable QoS, single-node Contabo.
# LOCKSTEP INVARIANT: resources + persistence MUST mirror
# helm/engine/values-staging.yaml::config.mtNode.

# Image tag override (staging only). The image.repository stays in
# helm/mt-node/values-image.yaml (single source of truth, shared with
# production); this overlay overrides ONLY the tag. CI's deploy-bump
# job rewrites this to the immutable git SHA on every push to main, so
# ArgoCD always sees a real diff and the node always pulls fresh bytes
# (IfNotPresent never serves a stale layer). The literal below is the
# value between pushes. Production is NOT bumped here: it rolls on the
# human-reviewed RELEASE_TAG in values-image.yaml. This file is loaded
# AFTER values-image.yaml by the mt-node-staging ArgoCD child, so this
# tag wins for the engine-runtime + chart-rendered staging paths.
image:
  tag: "533c62761a8c580b9aec6c306184ff39ed36da19"
resources:
  requests:
    cpu: 300m
    memory: 512Mi
    ephemeral-storage: 256Mi
  limits:
    cpu: 750m
    memory: 768Mi
    ephemeral-storage: 512Mi
persistence:
  size: 2Gi
# TABLE 2B: Vault Agent sidecar tuning. The injector's upstream default
# request is 250m CPU per tenant pod; the agent is a persistent sidecar
# (agent-pre-populate-only=false in the StatefulSet template) and idles
# far below 50m. Merged with the base podAnnotations (mesh + scrape).
podAnnotations:
  vault.hashicorp.com/agent-requests-cpu: "50m"
  vault.hashicorp.com/agent-limits-cpu: "250m"
  vault.hashicorp.com/agent-requests-mem: "64Mi"
  vault.hashicorp.com/agent-limits-mem: "128Mi"
# A per-tenant 1-replica PDB with minAvailable=1 blocks every node
# drain forever; on the single-node box a drain is a full outage
# regardless, so the PDB buys nothing and costs drain operability.
podDisruptionBudget:
  enabled: false
# OFF (TABLE 2B): K3s local-path storage has no CSI VolumeSnapshot
# support, so the snapshotter CronJob cannot run on this box. Re-enable
# only after installing Longhorn (or another snapshot-capable CSI) and
# setting snapshotter.volumeSnapshotClassName + image.repository.
snapshotter:
  enabled: false
externalSecrets:
  enabled: true
  platform:
    vaultPath: etradie/services/mt-node/staging
priorityClass:
  create: false
