# Staging overlay for the etradie-mt-node chart.
#
# Applied via --values values-staging.yaml after values.yaml.
# The engine's HostedProvisioner picks the overlay based on the
# ENV environment variable on the engine Pod.
#
# Image reference: see helm/mt-node/values-image.yaml. This overlay
# may pin a staging-specific tag by re-declaring image.tag below;
# the registry path stays in the shared values-image.yaml file.

resources:
  requests:
    cpu: 300m
    memory: 512Mi
    ephemeral-storage: 256Mi
  limits:
    cpu: 750m
    memory: 768Mi
    ephemeral-storage: 512Mi

persistence:
  size: 2Gi

externalSecrets:
  enabled: true
  platform:
    vaultPath: etradie/services/mt-node/staging

priorityClass:
  create: false
