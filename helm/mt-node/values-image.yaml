# Single source of truth for the etradie-mt-node container image.
#
# Loaded by every ArgoCD child Application that targets helm/mt-node
# (see deployments/argocd/children/mt-node-{staging,production}.yaml).
# Loaded AFTER values.yaml and BEFORE values-{env}.yaml so an env
# overlay can override the tag without copying the registry path.
#
# Forks override exactly this one line. Do not duplicate the
# repository string anywhere else in the chart tree.
image:
  repository: ghcr.io/flamegreat-1/etradie-mt-node
  tag: "0.1.0"
  pullPolicy: IfNotPresent
