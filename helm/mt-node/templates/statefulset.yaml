{{- include "mt-node.preflight" . -}}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "mt-node.fullname" . }}
  namespace: {{ include "mt-node.namespace" . }}
  labels:
    {{- include "mt-node.labels" . | nindent 4 }}
spec:
  replicas: 1
  serviceName: {{ include "mt-node.fullname" . }}-headless
  podManagementPolicy: OrderedReady
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      partition: 0
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      {{- include "mt-node.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "mt-node.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
        app.kubernetes.io/part-of: etradie
        app.kubernetes.io/component: mt-node
        etradie.user-id: {{ .Values.mtConnection.userId | quote }}
        etradie.platform: {{ .Values.mtConnection.platform | quote }}
      annotations:
        checksum/watchdog-config: {{ include (print $.Template.BasePath "/configmap-watchdog.yaml") . | sha256sum }}
        checksum/platform-secret: {{ include (print $.Template.BasePath "/externalsecret-platform.yaml") . | sha256sum }}
        # Per-tenant sealed Secret name is set by the engine; checksum
        # of its name is enough to force a rollout if the engine
        # re-seals credentials (e.g. user updated their broker password).
        checksum/sealed-secret-name: {{ .Values.mtConnection.sealedSecretName | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "mt-node.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken | default false }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds | default 60 }}
      {{- if .Values.priorityClass.create }}
      priorityClassName: {{ .Values.priorityClass.name }}
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: {{ .Values.podSecurityContext.runAsUser | default 1000 }}
        runAsGroup: {{ .Values.podSecurityContext.runAsGroup | default 1000 }}
        fsGroup: {{ .Values.podSecurityContext.fsGroup | default 1000 }}
        seccompProfile:
          type: RuntimeDefault
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: mt-node
          image: {{ include "mt-node.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy | default "IfNotPresent" }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: {{ .Values.securityContext.runAsUser | default 1000 }}
            capabilities:
              drop:
                - ALL
          ports:
            - name: zmq
              containerPort: {{ .Values.service.zmqPort | default 5555 }}
              protocol: TCP
          env:
            - name: MT_PLATFORM
              value: {{ .Values.mtConnection.platform | quote }}
            - name: MT_SERVER
              value: {{ .Values.mtConnection.server | quote }}
            - name: MT_SYMBOL
              value: {{ .Values.mtConnection.symbol | quote }}
            - name: ZMQ_PORT
              value: {{ .Values.service.zmqPort | default 5555 | quote }}
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          envFrom:
            # Per-tenant sealed credentials (MT_LOGIN, MT_PASSWORD,
            # MT_ZMQ_AUTH_TOKEN). Created by the engine BEFORE helm
            # install. The engine deletes this Secret when the
            # broker connection is removed.
            - secretRef:
                name: {{ .Values.mtConnection.sealedSecretName | quote }}
                optional: false
            # Platform defaults (DEFAULT_ZMQ_AUTH_TOKEN). The container
            # entrypoint prefers MT_ZMQ_AUTH_TOKEN from the per-tenant
            # Secret when set, else falls back to DEFAULT_ZMQ_AUTH_TOKEN.
            - secretRef:
                name: {{ include "mt-node.platformSecretName" . }}
                optional: false
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          startupProbe:
            {{- toYaml .Values.startupProbe | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          lifecycle:
            {{- toYaml .Values.lifecycle | nindent 12 }}
          volumeMounts:
            - name: wine-prefix
              mountPath: /home/mt/.wine
            - name: mt-cache
              mountPath: /home/mt/.cache
            - name: tmp
              mountPath: /tmp
            - name: var-tmp
              mountPath: /var/tmp
        {{- if .Values.sidecar.watchdog.enabled }}
        - name: watchdog
          image: {{ include "mt-node.image" . | quote }}
          imagePullPolicy: {{ .Values.sidecar.watchdog.image.pullPolicy | default "IfNotPresent" }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: {{ .Values.securityContext.runAsUser | default 1000 }}
            capabilities:
              drop:
                - ALL
          command:
            - /usr/bin/tini
            - --
            - /usr/bin/env
            - python3
            - /opt/watchdog/watchdog.py
          ports:
            - name: watchdog
              containerPort: {{ .Values.service.watchdogPort | default 9100 }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "mt-node.watchdogConfigMapName" . }}
                optional: false
            - secretRef:
                name: {{ .Values.mtConnection.sealedSecretName | quote }}
                optional: false
            - secretRef:
                name: {{ include "mt-node.platformSecretName" . }}
                optional: false
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            {{- toYaml .Values.sidecar.watchdog.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
        {{- end }}
      volumes:
        - name: mt-cache
          emptyDir:
            sizeLimit: 256Mi
        - name: tmp
          emptyDir:
            sizeLimit: 256Mi
        - name: var-tmp
          emptyDir:
            sizeLimit: 64Mi
      dnsPolicy: ClusterFirst
      restartPolicy: Always
  {{- if .Values.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: wine-prefix
        labels:
          {{- include "mt-node.labels" . | nindent 10 }}
          app.kubernetes.io/component: wine-prefix
        {{- with .Values.persistence.annotations }}
        annotations:
          {{- toYaml . | nindent 10 }}
        {{- end }}
      spec:
        accessModes:
          - {{ .Values.persistence.accessMode | default "ReadWriteOnce" }}
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size | default "4Gi" }}
  {{- end }}
