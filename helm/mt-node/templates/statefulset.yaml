{{- if .Values.mtConnection.enabled }}
{{- include "mt-node.preflight" . -}}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "mt-node.fullname" . }}
  namespace: {{ include "mt-node.namespace" . }}
  labels:
    {{- include "mt-node.labels" . | nindent 4 }}
  annotations:
    # Stakater Reloader watches this named Secret. When ESO
    # refreshes DEFAULT_ZMQ_AUTH_TOKEN from Vault into the platform
    # Secret, Reloader bumps this StatefulSet's pod template and
    # rolls the Pod so the new token reaches the EA's envFrom block.
    # Per-tenant credential rotation is handled by the Vault Agent
    # Injector (template re-render + file re-source), not by
    # Reloader.
    secret.reloader.stakater.com/reload: {{ include "mt-node.platformSecretName" . | quote }}
spec:
  replicas: 1
  serviceName: {{ include "mt-node.fullname" . }}-headless
  podManagementPolicy: OrderedReady
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      partition: 0
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      {{- include "mt-node.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "mt-node.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
        app.kubernetes.io/part-of: etradie
        app.kubernetes.io/component: mt-node
        etradie.user-id: {{ .Values.mtConnection.userId | quote }}
        etradie.platform: {{ .Values.mtConnection.platform | quote }}
      annotations:
        checksum/watchdog-config: {{ include (print $.Template.BasePath "/configmap-watchdog.yaml") . | sha256sum }}
        # Vault Agent Injector: render per-tenant broker credentials
        # from Vault to /vault/secrets/{{ .Values.vault.fileName }}
        # before the mt-node container starts. agent-init-first=true
        # guarantees the file exists by the time entrypoint.sh runs.
        # agent-pre-populate-only=false keeps the agent sidecar
        # running so credential rotations are picked up without a
        # pod restart on the next file source.
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: {{ include "mt-node.vaultRole" . | quote }}
        # The mt-node-tenant Vault k8s-auth role requires audience=vault
        # (infrastructure/cluster/vault-paths/mt_node_tenant_secrets.tf).
        # This injects audience:vault into the Vault Agent auto_auth
        # kubernetes method config so the login JWT carries aud=vault;
        # without it the agent uses the pod default-audience SA token and
        # Vault rejects the login 403 'invalid audience (aud) claim'.
        vault.hashicorp.com/auth-config-audience: "vault"
        # Point the Vault Agent at the projected aud=vault token (mounted
        # at /var/run/secrets/vault from the vault-token volume below) so
        # its kubernetes-auth login JWT carries aud=vault; the default
        # SA token's audience is the API server and Vault 403s on it.
        vault.hashicorp.com/auth-config-token-path: "/var/run/secrets/vault/token"
        vault.hashicorp.com/agent-init-first: "true"
        vault.hashicorp.com/agent-pre-populate-only: "false"
        vault.hashicorp.com/agent-inject-secret-{{ .Values.vault.fileName }}: {{ include "mt-node.vaultTenantPath" . | quote }}
        vault.hashicorp.com/agent-inject-template-{{ .Values.vault.fileName }}: |
          {{`{{- with secret "`}}{{ include "mt-node.vaultTenantPath" . }}{{`" -}}`}}
          export MT_LOGIN={{`{{ .Data.data.mt5_login }}`}}
          export MT_PASSWORD={{`{{ .Data.data.mt5_password }}`}}
          export MT_ZMQ_AUTH_TOKEN={{`{{ .Data.data.mt5_zmq_auth_token }}`}}
          export MT_VAULT_RENDERED_AT={{`{{ timestamp "2006-01-02T15:04:05Z" }}`}}
          {{`{{- end -}}`}}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "mt-node.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken | default false }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds | default 60 }}
      {{- if .Values.priorityClass.create }}
      priorityClassName: {{ .Values.priorityClass.name }}
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: {{ .Values.podSecurityContext.runAsUser | default 1000 }}
        runAsGroup: {{ .Values.podSecurityContext.runAsGroup | default 1000 }}
        fsGroup: {{ .Values.podSecurityContext.fsGroup | default 1000 }}
        seccompProfile:
          type: RuntimeDefault
      # Share the PID namespace between mt-node and the watchdog
      # sidecar so the watchdog's psutil.process_iter can see
      # terminal64.exe / terminal.exe / wineserver and SIGTERM them
      # when soft-cap thresholds trip. Each container has its own PID
      # namespace by default, which would make every soft-cap signal a
      # no-op.
      shareProcessNamespace: true
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: mt-node
          image: {{ include "mt-node.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy | default "IfNotPresent" }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: {{ .Values.securityContext.runAsUser | default 1000 }}
            capabilities:
              drop:
                - ALL
          ports:
            - name: zmq
              containerPort: {{ .Values.service.zmqPort | default 5555 }}
              protocol: TCP
          env:
            - name: MT_PLATFORM
              value: {{ .Values.mtConnection.platform | quote }}
            - name: MT_SERVER
              value: {{ .Values.mtConnection.server | quote }}
            - name: MT_SYMBOL
              value: {{ .Values.mtConnection.symbol | quote }}
            - name: ZMQ_PORT
              value: {{ .Values.service.zmqPort | default 5555 | quote }}
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          envFrom:
            # Platform defaults (DEFAULT_ZMQ_AUTH_TOKEN). The container
            # entrypoint prefers MT_ZMQ_AUTH_TOKEN sourced from the
            # Vault-rendered file at /vault/secrets/{{ .Values.vault.fileName }},
            # else falls back to DEFAULT_ZMQ_AUTH_TOKEN.
            - secretRef:
                name: {{ include "mt-node.platformSecretName" . }}
                optional: false
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          startupProbe:
            {{- toYaml .Values.startupProbe | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          lifecycle:
            {{- toYaml .Values.lifecycle | nindent 12 }}
          volumeMounts:
            - name: wine-prefix
              mountPath: /home/mt/.wine
            - name: mt-cache
              mountPath: /home/mt/.cache
            - name: tmp
              mountPath: /tmp
            - name: var-tmp
              mountPath: /var/tmp
            # aud=vault projected token (volume defined below); the Vault
            # Agent reads it via the auth-config-token-path annotation.
            - name: vault-token
              mountPath: /var/run/secrets/vault
              readOnly: true
        {{- if .Values.sidecar.watchdog.enabled }}
        - name: watchdog
          image: {{ include "mt-node.image" . | quote }}
          imagePullPolicy: {{ .Values.sidecar.watchdog.image.pullPolicy | default "IfNotPresent" }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: {{ .Values.securityContext.runAsUser | default 1000 }}
            capabilities:
              drop:
                - ALL
          command:
            - /usr/bin/tini
            - --
            - /usr/bin/env
            - python3
            - /opt/watchdog/watchdog.py
          ports:
            - name: watchdog
              containerPort: {{ .Values.service.watchdogPort | default 9100 }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "mt-node.watchdogConfigMapName" . }}
                optional: false
            # Platform default ZMQ token; per-tenant token is sourced
            # from /vault/secrets/{{ .Values.vault.fileName }} by
            # the watchdog at startup before AUTH_TOKEN is evaluated.
            - secretRef:
                name: {{ include "mt-node.platformSecretName" . }}
                optional: false
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            {{- toYaml .Values.sidecar.watchdog.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
        {{- end }}
      volumes:
        - name: mt-cache
          emptyDir:
            sizeLimit: 256Mi
        - name: tmp
          emptyDir:
            sizeLimit: 256Mi
        - name: var-tmp
          emptyDir:
            sizeLimit: 64Mi
        # Projected SA token scoped to audience=vault so the injected
        # Vault Agent presents an aud=vault JWT (the mt-node-tenant role
        # requires audience=vault). Mirrors the engine's vault-token
        # projection in helm/engine/templates/deployment.yaml.
        - name: vault-token
          projected:
            sources:
              - serviceAccountToken:
                  path: token
                  audience: vault
                  expirationSeconds: 3600
      dnsPolicy: ClusterFirst
      restartPolicy: Always
  {{- if .Values.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: wine-prefix
        labels:
          {{- include "mt-node.labels" . | nindent 10 }}
          app.kubernetes.io/component: wine-prefix
        {{- with .Values.persistence.annotations }}
        annotations:
          {{- toYaml . | nindent 10 }}
        {{- end }}
      spec:
        accessModes:
          - {{ .Values.persistence.accessMode | default "ReadWriteOnce" }}
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size | default "4Gi" }}
  {{- end }}
{{- end }}
