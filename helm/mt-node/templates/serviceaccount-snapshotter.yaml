{{- if and .Values.snapshotter.enabled (not .Values.mtConnection.enabled) }}
# Dedicated ServiceAccount for the daily Wine-prefix snapshot CronJob.
# Renders ONLY on the platform-only render path (mtConnection.enabled=false)
# because the snapshotter is a namespace-singleton, not a per-tenant
# resource. Token automount is true because the Pod calls the K8s API.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "mt-node.fullname" . }}-snapshotter
  namespace: {{ include "mt-node.namespace" . }}
  labels:
    {{- include "mt-node.labels" . | nindent 4 }}
    app.kubernetes.io/component: snapshotter
automountServiceAccountToken: true
{{- end }}
