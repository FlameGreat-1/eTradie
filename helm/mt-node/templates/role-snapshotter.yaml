{{- if and .Values.snapshotter.enabled (not .Values.mtConnection.enabled) }}
# Namespace-scoped Role granting the snapshotter SA EXACTLY the verbs
# it needs. No wildcards, no cluster-scoped grants. A future security
# review should pin this list against the snapshot_wine_prefixes.py
# call surface (it must change only if the script's K8s API usage
# changes).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "mt-node.fullname" . }}-snapshotter
  namespace: {{ include "mt-node.namespace" . }}
  labels:
    {{- include "mt-node.labels" . | nindent 4 }}
    app.kubernetes.io/component: snapshotter
rules:
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list"]
  - apiGroups: ["snapshot.storage.k8s.io"]
    resources: ["volumesnapshots"]
    verbs: ["get", "list", "create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "mt-node.fullname" . }}-snapshotter
  namespace: {{ include "mt-node.namespace" . }}
  labels:
    {{- include "mt-node.labels" . | nindent 4 }}
    app.kubernetes.io/component: snapshotter
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "mt-node.fullname" . }}-snapshotter
subjects:
  - kind: ServiceAccount
    name: {{ include "mt-node.fullname" . }}-snapshotter
    namespace: {{ include "mt-node.namespace" . }}
{{- end }}
