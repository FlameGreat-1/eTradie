{{- /*
A single namespace-scoped ServiceMonitor selects every mt-node Service
via the stable app.kubernetes.io/name=etradie-mt-node label, so one
CRD covers all tenants. Renders only on the platform-only path
(mtConnection.enabled=false); per-tenant releases emit no
ServiceMonitor of their own.
*/ -}}
{{- if and (not .Values.mtConnection.enabled) .Values.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: etradie-mt-node-platform
  namespace: {{ include "mt-node.namespace" . }}
  labels:
    app.kubernetes.io/name: etradie-mt-node
    app.kubernetes.io/part-of: etradie
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/component: servicemonitor
    {{- with .Values.serviceMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  # Match every mt-node Service in this namespace - one per tenant.
  # Prometheus discovers them all from this single ServiceMonitor.
  selector:
    matchLabels:
      app.kubernetes.io/name: etradie-mt-node
  namespaceSelector:
    matchNames:
      - {{ include "mt-node.namespace" . }}
  endpoints:
    - port: watchdog
      path: /metrics
      interval: {{ .Values.serviceMonitor.interval | default "30s" }}
      scrapeTimeout: {{ .Values.serviceMonitor.scrapeTimeout | default "10s" }}
      scheme: http
      {{- with .Values.serviceMonitor.metricRelabelDropPrefixes }}
      metricRelabelings:
        {{- range . }}
        - sourceLabels: [__name__]
          regex: ^{{ . }}.*
          action: drop
        {{- end }}
      {{- end }}
{{- end }}
