{{- if .Values.externalSecrets.enabled }}
{{- /*
Platform-level Secret. Holds the encryption key (used by the engine
to SEAL per-user credentials before writing them to the per-tenant
Secret) and the default ZMQ auth token. The mt-node container reads
DEFAULT_ZMQ_AUTH_TOKEN as the EA's AUTH_TOKEN input; the engine's
ZmqClient uses the SAME token (passed at runtime by the engine
through the per-user Secret if overridden, else this default).
*/ -}}
{{- $vaultPath := required "helm/mt-node: .Values.externalSecrets.platform.vaultPath is required when externalSecrets.enabled=true. Set it to etradie/services/mt-node/<env>." .Values.externalSecrets.platform.vaultPath -}}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "mt-node.platformSecretName" . }}
  namespace: {{ include "mt-node.namespace" . }}
  labels:
    {{- include "mt-node.labels" . | nindent 4 }}
    app.kubernetes.io/component: secret
  annotations:
    description: "mt-node platform secrets resolved from Vault"
spec:
  refreshInterval: {{ .Values.externalSecrets.platform.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.platform.secretStoreName | default "vault-backend" }}
    kind: {{ .Values.externalSecrets.platform.secretStoreKind | default "ClusterSecretStore" }}
  target:
    name: {{ include "mt-node.platformSecretName" . }}
    creationPolicy: {{ .Values.externalSecrets.platform.creationPolicy | default "Owner" }}
    template:
      type: Opaque
      metadata:
        labels:
          {{- include "mt-node.labels" . | nindent 10 }}
  data:
    - secretKey: DEFAULT_ZMQ_AUTH_TOKEN
      remoteRef:
        key: {{ $vaultPath | quote }}
        property: default_zmq_auth_token
{{- end }}
