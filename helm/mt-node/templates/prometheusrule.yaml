{{- if and .Values.prometheusRule.enabled (not .Values.mtConnection.enabled) }}
# Rendered on the PLATFORM render path (mtConnection.enabled=false) so
# the rule ships alongside the namespace-wide ServiceMonitor
# (servicemonitor.yaml renders on the same path). Per-tenant mt-node
# pods are created at runtime by the engine HostedProvisioner via the
# K8s API, not by Helm, so a per-tenant render path would never deploy
# these alerts. The platform ServiceMonitor scrapes every tenant pod
# (selector app.kubernetes.io/name=etradie-mt-node, namespace-wide), so
# one rule set covers the whole fleet. All alerts are keyed on the real
# series labels (namespace, pod); there are no per-tenant connection_id/
# user_id rule labels because on the platform render those values are
# the "platform" stub.
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "mt-node.fullname" . }}
  namespace: {{ include "mt-node.namespace" . }}
  labels:
    {{- include "mt-node.labels" . | nindent 4 }}
    app.kubernetes.io/component: alerting
    {{- with .Values.prometheusRule.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  groups:
    # Cluster-capacity alarm. mt-node Pods Pending > 60s means the
    # cluster needs more nodes (the OCI node-pool autoscaler may be
    # slow to react during burst signups). Pages the operator to
    # either bump the maxSize or wait for the autoscaler.
    - name: mt-node.capacity
      interval: 30s
      rules:
        - alert: MTNodePodPending
          expr: |
            sum by (namespace, pod) (
              kube_pod_status_phase{phase="Pending",namespace="{{ include "mt-node.namespace" . }}"}
              * on (namespace, pod) group_left
              kube_pod_labels{label_app_kubernetes_io_name="etradie-mt-node"}
            ) > 0
          for: 60s
          labels:
            severity: warning
            component: mt-node
            team: platform
          annotations:
            summary: "mt-node Pod {{`{{ $labels.pod }}`}} sat in Pending > 60s"
            description: |
              A per-user MT terminal Pod could not schedule for more
              than 60 seconds. The cluster autoscaler may be saturated
              or the node-pool maxSize has been hit. Investigate
              cluster capacity before more users sign up.
            runbook_url: "https://docs.etradie.com/runbooks/mt-node-pod-pending"

    # Per-pod watchdog liveness. The watchdog sidecar exposes its
    # /metrics on :9100 (Service port name 'watchdog'); the platform
    # ServiceMonitor scrapes it, so an `up == 0` for a scraped
    # mt-node target means the watchdog endpoint is unreachable.
    - name: mt-node.health
      interval: 30s
      rules:
        - alert: MTNodeWatchdogDown
          expr: |
            up{namespace="{{ include "mt-node.namespace" . }}",endpoint="watchdog"} == 0
          for: 5m
          labels:
            severity: critical
            component: mt-node
            team: platform
          annotations:
            summary: "mt-node watchdog unreachable ({{`{{ $labels.pod }}`}})"
            description: |
              The watchdog sidecar metrics endpoint has been
              unreachable (up == 0) for 5 minutes for an mt-node Pod
              scraped by the platform ServiceMonitor. The Pod's in-Pod
              restart loop has likely also failed. Operator must
              inspect the Pod and decide whether to kubectl delete
              (forces a fresh PVC mount cycle).
            runbook_url: "https://docs.etradie.com/runbooks/mt-node-watchdog-down"

        # The watchdog exports mt_node_ea_mt5_connected (1/0), set from
        # the EA HEALTH reply's mt5_connected field. Sustained 0 means
        # the EA is up but the terminal cannot reach the broker.
        - alert: MTNodeBrokerDisconnected
          expr: |
            mt_node_ea_mt5_connected{namespace="{{ include "mt-node.namespace" . }}"} == 0
          for: 3m
          labels:
            severity: warning
            component: mt-node
            team: platform
          annotations:
            summary: "mt-node broker disconnected ({{`{{ $labels.pod }}`}})"
            description: |
              The EA reports mt5_connected=false for more than 3
              minutes. Likely causes: broker maintenance window,
              incorrect credentials, NetworkPolicy blocked broker
              egress. Check Pod logs + verify broker status page.
            runbook_url: "https://docs.etradie.com/runbooks/mt-node-broker-disconnected"

    # Memory leak detection. The watchdog soft-cap catches the
    # acute case (RSS > 0.8 of cgroup limit -> restart MT5). These
    # rules catch the slow case BEFORE the soft-cap fires.
    - name: mt-node.memory
      interval: 1m
      rules:
        # Slope of MT5 process RSS over the last 4h exceeds 50 MB/h.
        # The mt_node_mt5_process_rss_bytes gauge is exported by the
        # watchdog sidecar's record_process_metrics().
        - alert: MTNodeMemoryLeak
          expr: |
            deriv(
              mt_node_mt5_process_rss_bytes{namespace="{{ include "mt-node.namespace" . }}"}[4h]
            ) > 50 * 1024 * 1024 / 3600
          for: 30m
          labels:
            severity: warning
            component: mt-node
            team: platform
          annotations:
            summary: "mt-node memory leak detected ({{`{{ $labels.pod }}`}})"
            description: |
              MT5 RSS has been growing at > 50 MB/h sustained over
              the last 4 hours. This will eventually hit the cgroup
              memory limit and trigger the watchdog soft-cap (Section
              1) or an OOM kill. Capture the Pod for analysis before
              the next watchdog restart: kubectl -n {{ include "mt-node.namespace" . }} exec {{`{{ $labels.pod }}`}} -c mt-node -- ps aux
            runbook_url: "https://docs.etradie.com/runbooks/mt-node-memory-leak"

        # The soft-cap has fired more than once per hour for 2 hours.
        # This means the leak is now fast enough that the in-pod
        # watchdog is restarting MT5 repeatedly. Operator must
        # investigate the EA / indicators in use.
        - alert: MTNodeMemorySoftCapTripFrequent
          expr: |
            sum by (namespace, pod) (
              rate(mt_node_watchdog_memory_soft_cap_trips_total[1h])
            ) > 0.000277
          for: 2h
          labels:
            severity: critical
            component: mt-node
            team: platform
          annotations:
            summary: "mt-node memory soft-cap tripping > 1/hour for 2h ({{`{{ $labels.pod }}`}})"
            description: |
              The watchdog has had to restart MT5 because RSS
              exceeded the soft-cap fraction more than once per
              hour for the last 2 hours. The leak is now severe;
              the Pod's user-facing trading session is being
              interrupted on every cap trip.
            runbook_url: "https://docs.etradie.com/runbooks/mt-node-memory-soft-cap-trip-frequent"

    # CPU throttling. CHECKLIST Section 1 'Indicator recalculation
    # spikes do not freeze system'. The watchdog soft-cap catches the
    # acute case (CFS throttled > 0.5 of periods sustained for 60s);
    # these rules catch the slower / less acute cases.
    - name: mt-node.cpu
      interval: 1m
      rules:
        # Sustained throttling without yet tripping the soft-cap.
        # 0.05 throttled periods/sec averaged over 5m = ~3 periods/min,
        # i.e. the cgroup is being throttled at least every other CFS
        # period for 10 minutes. Operator-visible 'this Pod is CPU-bound'.
        - alert: MTNodeCPUThrottledSustained
          expr: |
            rate(
              mt_node_cgroup_cpu_throttled_periods_total{namespace="{{ include "mt-node.namespace" . }}"}[5m]
            ) > 0.05
          for: 10m
          labels:
            severity: warning
            component: mt-node
            team: platform
          annotations:
            summary: "mt-node CPU throttling sustained ({{`{{ $labels.pod }}`}})"
            description: |
              The cgroup has been CFS-throttled in at least 5% of
              CFS periods over the last 5 minutes, sustained for
              10 minutes. The user's strategy is no longer running
              on the EA's OnTimer cadence; indicator recalculation
              is missing windows. Either the EA / indicators in
              use need optimisation, or the Pod's CPU envelope
              needs to be raised. The watchdog soft-cap will
              eventually restart MT if this gets worse.
            runbook_url: "https://docs.etradie.com/runbooks/mt-node-cpu-throttled-sustained"

        # The CPU soft-cap has fired more than once per hour for 2h.
        # Mirror of the memory variant - 'this leak is severe enough
        # that the in-pod watchdog is restarting MT repeatedly'.
        - alert: MTNodeCPUSoftCapTripFrequent
          expr: |
            sum by (namespace, pod) (
              rate(mt_node_watchdog_cpu_soft_cap_trips_total[1h])
            ) > 0.000277
          for: 2h
          labels:
            severity: critical
            component: mt-node
            team: platform
          annotations:
            summary: "mt-node CPU soft-cap tripping > 1/hour for 2h ({{`{{ $labels.pod }}`}})"
            description: |
              The watchdog has had to restart MT5 because CFS
              throttling exceeded the soft-cap fraction more than
              once per hour for the last 2 hours. The user's
              trading session is being interrupted on every cap
              trip. The EA / indicators in use need investigation,
              or the Pod's CPU envelope must be raised.
            runbook_url: "https://docs.etradie.com/runbooks/mt-node-cpu-soft-cap-trip-frequent"
{{- end }}
