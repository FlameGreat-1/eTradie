{{- if and .Values.prometheusRule.enabled .Values.mtConnection.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "mt-node.fullname" . }}
  namespace: {{ include "mt-node.namespace" . }}
  labels:
    {{- include "mt-node.labels" . | nindent 4 }}
    app.kubernetes.io/component: alerting
    {{- with .Values.prometheusRule.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  groups:
    # Cluster-capacity alarm. mt-node Pods Pending > 60s means the
    # cluster needs more nodes (the OCI node-pool autoscaler may be
    # slow to react during burst signups). Pages the operator to
    # either bump the maxSize or wait for the autoscaler.
    - name: mt-node.capacity
      interval: 30s
      rules:
        - alert: MTNodePodPending
          expr: |
            sum by (namespace, pod) (
              kube_pod_status_phase{phase="Pending",namespace="{{ include "mt-node.namespace" . }}"}
              * on (namespace, pod) group_left
              kube_pod_labels{label_app_kubernetes_io_name="etradie-mt-node"}
            ) > 0
          for: 60s
          labels:
            severity: warning
            component: mt-node
            team: platform
            connection_id: "{{ .Values.mtConnection.connectionId }}"
            user_id: "{{ .Values.mtConnection.userId }}"
          annotations:
            summary: "mt-node Pod {{`{{ $labels.pod }}`}} sat in Pending > 60s"
            description: |
              A per-user MT terminal Pod could not schedule for more
              than 60 seconds. The cluster autoscaler may be saturated
              or the node-pool maxSize has been hit. Investigate
              cluster capacity before more users sign up.
            runbook_url: "https://docs.etradie.com/runbooks/mt-node-pod-pending"

    # Per-pod watchdog liveness. The watchdog sidecar exposes
    # /healthz on :9100; a sustained 5xx for 5 min means the EA is
    # not responding and the in-Pod restart loop has been unable to
    # recover. Pages the operator to intervene.
    - name: mt-node.health
      interval: 30s
      rules:
        - alert: MTNodeWatchdogDown
          expr: |
            up{job="{{ include "mt-node.fullname" . }}",namespace="{{ include "mt-node.namespace" . }}"} == 0
          for: 5m
          labels:
            severity: critical
            component: mt-node
            team: platform
            connection_id: "{{ .Values.mtConnection.connectionId }}"
            user_id: "{{ .Values.mtConnection.userId }}"
          annotations:
            summary: "mt-node watchdog unreachable for connection {{ .Values.mtConnection.connectionId }}"
            description: |
              The watchdog sidecar has been unreachable for 5
              minutes. The Pod's in-Pod restart loop has also failed.
              Operator must inspect the Pod and decide whether to
              kubectl delete (forces a fresh PVC mount cycle).
            runbook_url: "https://docs.etradie.com/runbooks/mt-node-watchdog-down"

        # The watchdog exports etradie_mt_node_broker_connected (1/0).
        # Sustained 0 means the EA is up but cannot reach the broker.
        - alert: MTNodeBrokerDisconnected
          expr: |
            etradie_mt_node_broker_connected{namespace="{{ include "mt-node.namespace" . }}"} == 0
          for: 3m
          labels:
            severity: warning
            component: mt-node
            team: platform
            connection_id: "{{ .Values.mtConnection.connectionId }}"
            user_id: "{{ .Values.mtConnection.userId }}"
          annotations:
            summary: "mt-node broker disconnected for connection {{ .Values.mtConnection.connectionId }}"
            description: |
              The EA reports mt5_connected=false for more than 3
              minutes. Likely causes: broker maintenance window,
              incorrect credentials, NetworkPolicy blocked broker
              egress. Check Pod logs + verify broker status page.
            runbook_url: "https://docs.etradie.com/runbooks/mt-node-broker-disconnected"
{{- end }}
