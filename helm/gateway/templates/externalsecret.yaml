{{- if .Values.externalSecrets.enabled }}
{{- /*
Fail-fast: a missing or empty vaultPath produces an ExternalSecret
with remoteRef.key="". ESO then fails to resolve, synthesises an
empty Secret, and the gateway pod CrashLoops with `pgxpool.New:
invalid connection string` — no operator-actionable hint. Catch
the misconfiguration at render time instead. Audit ref: NOTE.md N-H2.
*/ -}}
{{- $vaultPath := required "helm/gateway: .Values.externalSecrets.gateway.vaultPath is required when externalSecrets.enabled=true. Set it to the canonical Vault path, e.g. etradie/services/gateway/production." .Values.externalSecrets.gateway.vaultPath -}}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "gateway.secretName" . }}
  namespace: {{ include "gateway.namespace" . }}
  labels:
    {{- include "gateway.labels" . | nindent 4 }}
    app.kubernetes.io/component: secret
  annotations:
    description: "Gateway runtime secrets resolved from Vault"
spec:
  refreshInterval: {{ .Values.externalSecrets.gateway.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.gateway.secretStoreName | default "vault-backend" }}
    kind: {{ .Values.externalSecrets.gateway.secretStoreKind | default "ClusterSecretStore" }}
  target:
    name: {{ include "gateway.secretName" . }}
    creationPolicy: {{ .Values.externalSecrets.gateway.creationPolicy | default "Owner" }}
    template:
      type: Opaque
      metadata:
        labels:
          {{- include "gateway.labels" . | nindent 10 }}
  data:
    # Database
    - secretKey: AUTH_DATABASE_URL
      remoteRef:
        key: {{ .Values.externalSecrets.gateway.vaultPath | quote }}
        property: auth_database_url
    - secretKey: POSTGRES_USER
      remoteRef:
        key: {{ .Values.externalSecrets.gateway.vaultPath | quote }}
        property: postgres_user
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: {{ .Values.externalSecrets.gateway.vaultPath | quote }}
        property: postgres_password
    - secretKey: POSTGRES_HOST
      remoteRef:
        key: {{ .Values.externalSecrets.gateway.vaultPath | quote }}
        property: postgres_host
    - secretKey: POSTGRES_PORT
      remoteRef:
        key: {{ .Values.externalSecrets.gateway.vaultPath | quote }}
        property: postgres_port
    - secretKey: POSTGRES_DB
      remoteRef:
        key: {{ .Values.externalSecrets.gateway.vaultPath | quote }}
        property: postgres_db
    # Redis
    - secretKey: GATEWAY_REDIS_URL
      remoteRef:
        key: {{ .Values.externalSecrets.gateway.vaultPath | quote }}
        property: gateway_redis_url
    # JWT signing
    - secretKey: AUTH_JWT_SECRET
      remoteRef:
        key: {{ .Values.externalSecrets.gateway.vaultPath | quote }}
        property: auth_jwt_secret
    # Admin seed (rotated post-bootstrap)
    - secretKey: AUTH_ADMIN_PASSWORD
      remoteRef:
        key: {{ .Values.externalSecrets.gateway.vaultPath | quote }}
        property: auth_admin_password
    # NOTE: the credential-at-rest KEK (BROKER_ENCRYPTION_KEY) and the
    # dead LLM_ENCRYPTION_KEY are intentionally NOT mapped here. The
    # gateway never encrypts or decrypts user credentials -- that is
    # owned solely by the engine (engine.shared.crypto). Granting the
    # KEK to the orchestrator would widen the blast radius of the secret
    # Tier 3 protects for zero functional benefit. Audit ref: Tier 3
    # cross-service KEK least-privilege.
    # Engine internal shared secret. The gateway sends this in
    # X-Internal-Auth on every /internal/* call to the engine.
    # Must match ENGINE_INTERNAL_SHARED_SECRET on the engine side.
    # Generate with: openssl rand -hex 32
    - secretKey: GATEWAY_ENGINE_INTERNAL_SHARED_SECRET
      remoteRef:
        key: {{ .Values.externalSecrets.gateway.vaultPath | quote }}
        property: engine_internal_shared_secret
    # Billing internal shared secret. The gateway sends this in
    # X-Internal-Auth on every /internal/checkout and /internal/portal
    # call to the billing service. MUST match the value the billing
    # service reads as BILLING_INTERNAL_SHARED_SECRET from
    # etradie/services/billing/<env>/internal_shared_secret.
    # Generate once: openssl rand -hex 32, then populate both Vault
    # paths with the same value.
    - secretKey: GATEWAY_BILLING_INTERNAL_SHARED_SECRET
      remoteRef:
        key: {{ .Values.externalSecrets.gateway.vaultPath | quote }}
        property: billing_internal_shared_secret
{{- end }}
