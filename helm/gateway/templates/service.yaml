apiVersion: v1
kind: Service
metadata:
  # Name MUST stay `gateway` so the in-cluster URL is
  # gateway.etradie-system.svc.cluster.local:{8080,50052} - exactly
  # what helm/execution/values.yaml (EXECUTION_GATEWAY_ADDR) already
  # encodes. Renaming this Service breaks execution's instant-mode
  # confirmation callback. Aligns with every other chart's bare name
  # convention (engine, postgres, redis, chromadb, execution,
  # management). Audit ref: EX-C1, X-7, G-H4.
  name: gateway
  namespace: {{ include "gateway.namespace" . }}
  labels:
    {{- include "gateway.labels" . | nindent 4 }}
  annotations:
    description: "eTradie gateway HTTP + gRPC service (ClusterIP)"
spec:
  type: {{ .Values.service.type | default "ClusterIP" }}
  sessionAffinity: {{ .Values.service.sessionAffinity | default "None" }}
  selector:
    {{- include "gateway.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.ports.http.port | default 8080 }}
      targetPort: {{ .Values.service.ports.http.targetPort | default 8080 }}
      protocol: TCP
      appProtocol: http
    - name: grpc
      port: {{ .Values.service.ports.grpc.port | default 50052 }}
      targetPort: {{ .Values.service.ports.grpc.targetPort | default 50052 }}
      protocol: TCP
      appProtocol: grpc
{{- if .Values.headlessService.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-headless
  namespace: {{ include "gateway.namespace" . }}
  labels:
    {{- include "gateway.labels" . | nindent 4 }}
  annotations:
    description: "eTradie gateway headless service (per-pod gRPC dialling)"
spec:
  type: ClusterIP
  clusterIP: None
  publishNotReadyAddresses: {{ .Values.headlessService.publishNotReadyAddresses | default false }}
  selector:
    {{- include "gateway.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.ports.http.port | default 8080 }}
      targetPort: {{ .Values.service.ports.http.targetPort | default 8080 }}
      protocol: TCP
      appProtocol: http
    - name: grpc
      port: {{ .Values.service.ports.grpc.port | default 50052 }}
      targetPort: {{ .Values.service.ports.grpc.targetPort | default 50052 }}
      protocol: TCP
      appProtocol: grpc
{{- end }}
