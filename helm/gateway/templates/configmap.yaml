apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "gateway.configMapName" . }}
  namespace: {{ include "gateway.namespace" . }}
  labels:
    {{- include "gateway.labels" . | nindent 4 }}
    app.kubernetes.io/component: config
data:
  # Application environment. Read by the Go services via
  # appEnv()/isProdLikeEnv() (src/auth/config.go) and
  # isProdLikeEnvContainer() (gateway container) to ARM the prod
  # fail-closed guards: HIBP breach check, mandatory Redis attempt
  # limiter, cookie-Secure enforcement, and the
  # JWT/DB/admin-secret-required checks. Sourced from
  # .Values.config.app.env (development in base values, production /
  # staging in the overlays). Audit ref: A2.
  APP_ENV: {{ .Values.config.app.env | quote }}

  # Gateway core
  GATEWAY_ENABLED: {{ .Values.config.gateway.enabled | quote }}
  GATEWAY_HTTP_PORT: {{ .Values.config.gateway.httpPort | quote }}
  GATEWAY_GRPC_PORT: {{ .Values.config.gateway.grpcPort | quote }}
  GATEWAY_DEFAULT_SYMBOLS: {{ .Values.config.gateway.defaultSymbols | quote }}
  GATEWAY_CYCLE_INTERVAL_SECONDS: {{ .Values.config.gateway.cycleIntervalSeconds | quote }}
  GATEWAY_CYCLE_TIMEOUT_SECONDS: {{ .Values.config.gateway.cycleTimeoutSeconds | quote }}
  GATEWAY_MAX_CONCURRENT_SYMBOLS: {{ .Values.config.gateway.maxConcurrentSymbols | quote }}
  GATEWAY_TA_MACRO_PARALLEL_TIMEOUT_SECONDS: {{ .Values.config.gateway.taMacroParallelTimeoutSeconds | quote }}
  GATEWAY_RAG_TIMEOUT_SECONDS: {{ .Values.config.gateway.ragTimeoutSeconds | quote }}
  GATEWAY_PROCESSOR_TIMEOUT_SECONDS: {{ .Values.config.gateway.processorTimeoutSeconds | quote }}
  GATEWAY_GUARD_TIMEOUT_SECONDS: {{ .Values.config.gateway.guardTimeoutSeconds | quote }}
  GATEWAY_TA_CACHE_TTL_SECONDS: {{ .Values.config.gateway.taCacheTtlSeconds | quote }}
  GATEWAY_MACRO_CACHE_TTL_SECONDS: {{ .Values.config.gateway.macroCacheTtlSeconds | quote }}
  GATEWAY_MAX_CYCLE_RETRIES: {{ .Values.config.gateway.maxCycleRetries | quote }}
  GATEWAY_RETRY_BACKOFF_BASE_SECONDS: {{ .Values.config.gateway.retryBackoffBaseSeconds | quote }}
  GATEWAY_LOG_LEVEL: {{ .Values.config.gateway.logLevel | quote }}
  GATEWAY_LOG_JSON: {{ .Values.config.gateway.logJson | quote }}
  GATEWAY_LOG_FULL_CONTEXT_PAYLOAD: {{ .Values.config.gateway.logFullContextPayload | quote }}
  GATEWAY_OTEL_SERVICE_NAME: {{ .Values.config.gateway.otelServiceName | quote }}
  GATEWAY_OTEL_ENDPOINT: {{ .Values.config.gateway.otelEndpoint | quote }}
  GATEWAY_ENGINE_HTTP_URL: {{ .Values.config.gateway.engineHttpUrl | quote }}
  GATEWAY_EXECUTION_ENABLED: {{ .Values.config.gateway.executionEnabled | quote }}
  GATEWAY_EXECUTION_ADDR: {{ .Values.config.gateway.executionAddr | quote }}
  GATEWAY_EXECUTION_TIMEOUT_MS: {{ .Values.config.gateway.executionTimeoutMs | quote }}
  GATEWAY_MANAGEMENT_ENABLED: {{ .Values.config.gateway.managementEnabled | quote }}
  GATEWAY_MANAGEMENT_ADDR: {{ .Values.config.gateway.managementAddr | quote }}
  GATEWAY_MANAGEMENT_TIMEOUT_MS: {{ .Values.config.gateway.managementTimeoutMs | quote }}

  # Browser-facing reverse-proxy upstreams (Option B — single public
  # entry point). The gateway proxies the SPA's /api/execution/* and
  # /api/management/* prefixes to these internal HTTP servers so the
  # browser only ever talks to the gateway origin. These are the HTTP
  # surfaces (execution :8080, management :8083), DISTINCT from the gRPC
  # ADDR values above which the orchestrator/kill-switch use. Engine's
  # browser HTTP surface is proxied to GATEWAY_ENGINE_HTTP_URL above.
  #
  # CRITICAL: src/gateway/internal/config/config.go::validate() refuses
  # to boot when either is empty / non-http(s) / localhost-in-prod.
  GATEWAY_EXECUTION_HTTP_URL: {{ .Values.config.gateway.executionHttpUrl | quote }}
  GATEWAY_MANAGEMENT_HTTP_URL: {{ .Values.config.gateway.managementHttpUrl | quote }}
  GATEWAY_REDIS_MAX_CONNECTIONS: {{ .Values.config.gateway.redisMaxConnections | quote }}
  GATEWAY_ALLOWED_ORIGINS: {{ .Values.config.gateway.allowedOrigins | quote }}

  # Billing microservice client. The gateway proxies
  # /api/v1/billing/{checkout,portal,subscription} to the billing
  # service via the in-cluster Service DNS below. The shared secret
  # the gateway sends in the X-Internal-Auth header lives in the
  # ExternalSecret (GATEWAY_BILLING_INTERNAL_SHARED_SECRET).
  #
  # CRITICAL: src/gateway/internal/config/config.go::validate() refuses
  # to boot when BillingServiceURL is empty, BillingInternalSharedSecret
  # is < 32 chars, or BillingClientTimeoutMs is outside [1000..60000].
  # The values below cover the first and third; the shared secret is
  # validated when ESO materialises the Secret.
  GATEWAY_BILLING_SERVICE_URL:        {{ .Values.config.gateway.billingServiceUrl | quote }}
  GATEWAY_BILLING_CLIENT_TIMEOUT_MS:  {{ .Values.config.gateway.billingClientTimeoutMs | quote }}

  # Auth
  AUTH_ACCESS_TOKEN_TTL_SECONDS: {{ .Values.config.auth.accessTokenTtlSeconds | quote }}
  AUTH_REFRESH_TOKEN_TTL_SECONDS: {{ .Values.config.auth.refreshTokenTtlSeconds | quote }}
  AUTH_SERVICE_TOKEN_TTL_SECONDS: {{ .Values.config.auth.serviceTokenTtlSeconds | quote }}
  AUTH_BCRYPT_COST: {{ .Values.config.auth.bcryptCost | quote }}
  AUTH_MAX_SESSIONS_PER_USER: {{ .Values.config.auth.maxSessionsPerUser | quote }}
  AUTH_ISSUER: {{ .Values.config.auth.issuer | quote }}
  AUTH_ADMIN_USERNAME: {{ .Values.config.auth.adminUsername | quote }}
  AUTH_ADMIN_EMAIL: {{ .Values.config.auth.adminEmail | quote }}

  # Cookie auth policy. These are non-secret policy values; secrets
  # (JWT signing key, admin password) live in the ExternalSecret.
  AUTH_COOKIE_DOMAIN: {{ .Values.config.auth.cookieDomain | default "" | quote }}
  AUTH_COOKIE_SECURE: {{ .Values.config.auth.cookieSecure | default "true" | quote }}
  AUTH_COOKIE_SAMESITE: {{ .Values.config.auth.cookieSameSite | default "Strict" | quote }}
  AUTH_CSRF_HEADER: {{ .Values.config.auth.csrfHeader | default "X-CSRF-Token" | quote }}
  AUTH_CSRF_SIGNED: {{ .Values.config.auth.csrfSigned | default "true" | quote }}
  AUTH_RETURN_TOKENS_IN_BODY: {{ .Values.config.auth.returnTokensInBody | default "false" | quote }}

  # Trust chain (Cloudflare → edge-ingress → envoy → gateway).
  # trustedProxyCidrs accepts a list (preferred) or a scalar string;
  # this template normalises both to a comma-joined string for the
  # Go binary's envconfig parser. Empty list -> empty string, which
  # is the safe default (no trusted proxies = peer wins).
  AUTH_TRUSTED_PROXY_CIDRS: {{ if kindIs "slice" .Values.trustChain.trustedProxyCidrs -}}
  {{- join "," .Values.trustChain.trustedProxyCidrs | quote -}}
  {{- else -}}
  {{- .Values.trustChain.trustedProxyCidrs | default "" | quote -}}
  {{- end }}
  AUTH_TRUST_CLOUDFLARE: {{ .Values.trustChain.trustCloudflare | quote }}
  {{- if eq (.Values.trustChain.trustCloudflare | toString) "true" }}
  # When Cloudflare trust is enabled, point the gateway at the
  # ConfigMap-mounted ipv4.txt / ipv6.txt files so the binary picks
  # up live-refreshed ranges instead of its compile-time fallback.
  # The path matches the volumeMount configured in deployment.yaml
  # and the ConfigMap rendered by configmap-cf-ranges.yaml.
  AUTH_CLOUDFLARE_RANGES_DIR: {{ .Values.trustChain.cloudflareRangesMountPath | default "/etc/etradie/cloudflare" | quote }}
  {{- end }}
