{{- if .Values.linkerdPolicy.enabled }}
{{- /*
Tier 9 G9-2: per-service Linkerd authorization for the gateway.
Unlike execution/management, the gateway has DISTINCT caller sets per
port (gRPC callbacks from execution+management in etradie-system; HTTP
from envoy in envoy-system), so identities are built from
{name,namespace} pairs to support cross-namespace callers.
*/ -}}
{{- $ns := include "gateway.namespace" . -}}
{{- $sel := include "gateway.selectorLabels" . -}}
# ── gRPC :50052 — execution + management callbacks only ─────────────
apiVersion: policy.linkerd.io/v1beta3
kind: Server
metadata:
  name: {{ include "gateway.appName" . }}-grpc
  namespace: {{ $ns }}
  labels:
    {{- include "gateway.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- $sel | nindent 6 }}
  port: {{ .Values.service.ports.grpc.port }}
  proxyProtocol: gRPC
---
apiVersion: policy.linkerd.io/v1beta3
kind: MeshTLSAuthentication
metadata:
  name: {{ include "gateway.appName" . }}-grpc-callers
  namespace: {{ $ns }}
  labels:
    {{- include "gateway.labels" . | nindent 4 }}
spec:
  identities:
    {{- range .Values.linkerdPolicy.grpcCallerServiceAccounts }}
    - {{ printf "%s.%s.serviceaccount.identity.linkerd.cluster.local" .name .namespace | quote }}
    {{- end }}
---
apiVersion: policy.linkerd.io/v1alpha1
kind: AuthorizationPolicy
metadata:
  name: {{ include "gateway.appName" . }}-grpc-authz
  namespace: {{ $ns }}
  labels:
    {{- include "gateway.labels" . | nindent 4 }}
spec:
  targetRef:
    group: policy.linkerd.io
    kind: Server
    name: {{ include "gateway.appName" . }}-grpc
  requiredAuthenticationRefs:
    - group: policy.linkerd.io
      kind: MeshTLSAuthentication
      name: {{ include "gateway.appName" . }}-grpc-callers
---
# ── HTTP :8080 — envoy (north-south) + Prometheus (/metrics) ────────
apiVersion: policy.linkerd.io/v1beta3
kind: Server
metadata:
  name: {{ include "gateway.appName" . }}-http
  namespace: {{ $ns }}
  labels:
    {{- include "gateway.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- $sel | nindent 6 }}
  port: {{ .Values.service.ports.http.port }}
  proxyProtocol: HTTP/1
---
apiVersion: policy.linkerd.io/v1beta3
kind: MeshTLSAuthentication
metadata:
  name: {{ include "gateway.appName" . }}-http-callers
  namespace: {{ $ns }}
  labels:
    {{- include "gateway.labels" . | nindent 4 }}
spec:
  identities:
    {{- range .Values.linkerdPolicy.httpCallerServiceAccounts }}
    - {{ printf "%s.%s.serviceaccount.identity.linkerd.cluster.local" .name .namespace | quote }}
    {{- end }}
---
apiVersion: policy.linkerd.io/v1alpha1
kind: AuthorizationPolicy
metadata:
  name: {{ include "gateway.appName" . }}-http-authz
  namespace: {{ $ns }}
  labels:
    {{- include "gateway.labels" . | nindent 4 }}
spec:
  targetRef:
    group: policy.linkerd.io
    kind: Server
    name: {{ include "gateway.appName" . }}-http
  requiredAuthenticationRefs:
    - group: policy.linkerd.io
      kind: MeshTLSAuthentication
      name: {{ include "gateway.appName" . }}-http-callers
    - group: policy.linkerd.io
      kind: NetworkAuthentication
      name: {{ include "gateway.appName" . }}-metrics-scrape
---
apiVersion: policy.linkerd.io/v1alpha1
kind: NetworkAuthentication
metadata:
  name: {{ include "gateway.appName" . }}-metrics-scrape
  namespace: {{ $ns }}
  labels:
    {{- include "gateway.labels" . | nindent 4 }}
spec:
  networks:
    - cidr: 10.0.0.0/8
    - cidr: 172.16.0.0/12
    - cidr: 192.168.0.0/16
    - cidr: 100.64.0.0/10
{{- end }}
