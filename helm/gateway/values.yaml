# Default values for the etradie-gateway chart.
# Production / staging overlays live in values-production.yaml and
# values-staging.yaml respectively. Local development uses the
# kustomize overlay under deployments/gateway/kubernetes/overlays/local
# rather than this chart.

replicaCount: 3

# Keep N old ReplicaSets per Deployment for rollback. Audit ref: X-3.
revisionHistoryLimit: 10

image:
  # CI publishes to GHCR (ghcr.io/<owner>/<repo>/<service>:<tag>).
  # Owner + repo lowercased per GHCR case-sensitivity.
  repository: ghcr.io/flamegreat-1/etradie/gateway
  pullPolicy: IfNotPresent
  tag: "0.1.0"

imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

namespace:
  name: etradie-system
  podSecurityStandard: restricted

serviceAccount:
  create: true
  annotations: {}
  # Empty so the helper computes from Release.Name; multi-release
  # deployments (e.g. blue/green) get distinct SA names. Production
  # ArgoCD application uses releaseName=etradie-gateway, so the
  # rendered SA name remains `etradie-gateway` in cluster.
  name: ""
  automountServiceAccountToken: false

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8080"
  prometheus.io/path: "/metrics"
  # Join the Linkerd mesh in every environment so gateway pod-to-pod
  # hops (gRPC to execution/management, HTTP to engine, north-south
  # from envoy) are mTLS'd. Native sidecar so the proxy is Ready before
  # the wait-for-deps init container dials meshed postgres/redis/engine.
  linkerd.io/inject: enabled
  config.linkerd.io/proxy-enable-native-sidecar: "true"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65532
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  sessionAffinity: None
  ports:
    http:
      port: 8080
      targetPort: 8080
      protocol: TCP
      appProtocol: http
    grpc:
      port: 50052
      targetPort: 50052
      protocol: TCP
      appProtocol: grpc

headlessService:
  enabled: true
  publishNotReadyAddresses: false

# Non-secret runtime configuration. Mirrors
# deployments/gateway/kubernetes/base/configmap.yaml exactly so the
# helm-rendered ConfigMap is byte-identical to the kustomize one.
config:
  # Application environment. SAFE default of "development" so the
  # prod fail-closed guards stay disarmed for a bare `helm template`
  # / local render; the production and staging overlays override this
  # to "production" / "staging" to ARM them. Audit ref: A2.
  app:
    env: "development"
  gateway:
    enabled: true
    httpPort: "8080"
    grpcPort: "50052"
    defaultSymbols: "EURUSD,GBPUSD,USDJPY,USDCHF,AUDUSD,NZDUSD,USDCAD,XAUUSD"
    cycleIntervalSeconds: "14400"
    cycleTimeoutSeconds: "450"
    maxConcurrentSymbols: "4"
    taMacroParallelTimeoutSeconds: "120"
    ragTimeoutSeconds: "30"
    processorTimeoutSeconds: "180"
    guardTimeoutSeconds: "10"
    taCacheTtlSeconds: "300"
    macroCacheTtlSeconds: "600"
    maxCycleRetries: "1"
    retryBackoffBaseSeconds: "2.0"
    logLevel: "INFO"
    logJson: "true"
    logFullContextPayload: "false"
    otelServiceName: "etradie-gateway"
    # OTel tracing is opt-in. Empty endpoint means the OTel SDK
    # exporter is a no-op. Production overlay sets this once an
    # OTel collector is actually deployed. Audit ref: NOTE.md S2-C.
    otelEndpoint: ""
    engineHttpUrl: "http://engine.etradie-system.svc.cluster.local:8000"
    executionEnabled: "true"
    executionAddr: "execution.etradie-system.svc.cluster.local:50053"
    executionTimeoutMs: "5000"
    managementEnabled: "true"
    managementAddr: "management.etradie-system.svc.cluster.local:50054"
    managementTimeoutMs: "5000"
    redisMaxConnections: "20"
    allowedOrigins: "http://localhost:3000,http://localhost:5173"
    # Billing microservice client. The gateway's billing handler
    # proxies /api/v1/billing/{checkout,portal,subscription} to the
    # billing service over the internal Service DNS. The shared
    # secret travels in the X-Internal-Auth header (ExternalSecret).
    billingServiceUrl: "http://billing-service.etradie-system.svc.cluster.local:8082"
    billingClientTimeoutMs: "15000"
  auth:
    accessTokenTtlSeconds: "900"
    refreshTokenTtlSeconds: "604800"
    serviceTokenTtlSeconds: "2592000"
    bcryptCost: "12"
    maxSessionsPerUser: "5"
    issuer: "etradie"
    adminUsername: "admin"
    adminEmail: "admin@etradie.local"
    # Cookie auth policy.
    # These defaults are SAFE for a single-host HTTPS deployment where
    # the SPA and the gateway live on the same hostname. For cross-
    # subdomain deployments (e.g. app.exoper.com + api.exoper.com),
    # the production overlay MUST override:
    #   cookieDomain:   ".exoper.com"   (registrable domain, leading dot)
    #   cookieSameSite: "None"          (required for cross-site cookies)
    # SameSite=None requires Secure=true; the gateway validate() call
    # refuses the combination at startup if Secure is false.
    cookieDomain: ""
    cookieSecure: "true"
    cookieSameSite: "Strict"
    csrfHeader: "X-CSRF-Token"
    csrfSigned: "true"
    returnTokensInBody: "false"

# Trust-chain (read by src/auth/clientip.go via AUTH_TRUSTED_PROXY_CIDRS
# and AUTH_TRUST_CLOUDFLARE). Base values match the PRODUCTION posture
# - the eTradie production pod CIDR with Cloudflare in front. Staging
# overrides this to 10.42.0.0/16 + trustCloudflare="false". Local dev
# does not use this chart.
#
# When trustCloudflare="true" the chart also mounts the published
# Cloudflare IPv4/IPv6 ranges (helm/gateway/files/cloudflare/*) at
# /etc/etradie/cloudflare/{ipv4,ipv6}.txt and the gateway binary reads
# them at startup via AUTH_CLOUDFLARE_RANGES_DIR (wired by
# templates/configmap.yaml).
#
# trustedProxyCidrs accepts EITHER a YAML list (preferred) OR a single
# comma-joined scalar string. The list form is preferred because each
# entry is validated at gateway startup by ParseTrustedCIDRs, and a
# malformed entry surfaces a clear error pointing at the bad CIDR.
trustChain:
  trustedProxyCidrs:
    - "10.100.0.0/16"
  trustCloudflare: "true"
  cloudflareRangesMountPath: "/etc/etradie/cloudflare"

externalSecrets:
  enabled: true
  gateway:
    secretStoreName: vault-backend
    secretStoreKind: ClusterSecretStore
    refreshInterval: 1h
    # Production Vault path. Aligns with
    # infrastructure/cluster/main.tf::vault_kv_secret_v2.gateway
    # (etradie/services/gateway/${environment}). values-staging.yaml
    # overrides this to etradie/services/gateway/staging.
    vaultPath: etradie/services/gateway/production
    creationPolicy: Owner

resources:
  requests:
    cpu: 250m
    memory: 512Mi
    ephemeral-storage: 256Mi
  limits:
    cpu: "1"
    memory: 1Gi
    ephemeral-storage: 512Mi

initContainer:
  # Set to false to skip the wait-for-deps init-container entirely
  # (e.g. when the cluster's CNI handles ordering through some
  # external mechanism, or in pure-test renders).
  enabled: true
  image: busybox:1.36
  pullPolicy: IfNotPresent
  # Total wall-clock budget across ALL dependencies. 120s is enough
  # for an EKS node cold-start to bring up its CoreDNS forwarder.
  timeoutSeconds: 120
  # Sleep between consecutive `nc -z` retries against the same dep.
  intervalSeconds: 2
  # Hostnames + ports the init-container probes before the main
  # container starts. MUST match the endpoints the gateway dials at
  # runtime, otherwise the chart will pass init-checks then crash on
  # first request. Production / staging overlays override the host
  # values when datastores are off-cluster (RDS / ElastiCache).
  dependencies:
    - host: "postgres.etradie-system.svc.cluster.local"
      port: 5432
    - host: "redis.etradie-system.svc.cluster.local"
      port: 6379
    - host: "engine.etradie-system.svc.cluster.local"
      port: 8000
    # billing-service is intentionally NOT in this list. The gateway
    # is critical-path; coupling its boot to billing's availability
    # was wrong. The billing client retries at request time and
    # /api/v1/billing/* returns 503 only for the billing endpoints if
    # billing is unreachable. Audit ref: G-H3.
  resources:
    requests:
      cpu: 10m
      memory: 16Mi
    limits:
      cpu: 50m
      memory: 32Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
        - type: Pods
          value: 1
          periodSeconds: 60
      selectPolicy: Min
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 2
          periodSeconds: 30
      selectPolicy: Max

podDisruptionBudget:
  enabled: true
  minAvailable: 1
  unhealthyPodEvictionPolicy: IfHealthyBudget

# Tier 9 G9-2: per-service Linkerd authorization. Default FALSE; the
# production overlay enables it after staging confirms 100% mTLS.
#
# gRPC :50052 is the CALLBACK surface — only execution + management call
# it (ConfirmSetup / NotifyExecutionCompleted / CheckNewsWindow). HTTP
# :8080 is fronted by envoy (north-south), whose SA lives in the
# envoy-system namespace.
linkerdPolicy:
  enabled: false
  grpcCallerServiceAccounts:
    - name: etradie-execution
      namespace: etradie-system
    - name: etradie-management
      namespace: etradie-system
  httpCallerServiceAccounts:
    - name: etradie-envoy
      namespace: envoy-system
  monitoringNamespace: monitoring

networkPolicy:
  enabled: true
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: envoy-system
          podSelector:
            matchLabels:
              app.kubernetes.io/name: etradie-envoy
      ports:
        - protocol: TCP
          port: 8080
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
          podSelector:
            matchLabels:
              app: prometheus
      ports:
        - protocol: TCP
          port: 8080
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: etradie-execution
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: etradie-management
      ports:
        - protocol: TCP
          port: 50052
    # Linkerd proxy admin port :4191 (proxy metrics, tap, liveness)
    # scraped by Prometheus from the monitoring namespace.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
          podSelector:
            matchLabels:
              app: prometheus
      ports:
        - protocol: TCP
          port: 4191
  egress:
    # The injected Linkerd proxy must reach the control plane in the
    # linkerd namespace (identity, destination, policy), or it never
    # becomes Ready. Scoped to the namespace rather than specific ports,
    # which vary across Linkerd versions.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: linkerd
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: postgres
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: redis
      ports:
        - protocol: TCP
          port: 6379
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: etradie-engine
      ports:
        - protocol: TCP
          port: 8000
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: etradie-execution
      ports:
        - protocol: TCP
          port: 50053
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: etradie-management
      ports:
        - protocol: TCP
          port: 50054
    # Billing microservice (Phase 4 wiring). The gateway dials
    # billing-service:8082 for every /internal/checkout and
    # /internal/portal call. Without this egress rule the gateway
    # would receive ECONNREFUSED and the SPA's Upgrade /
    # Manage Subscription flows would 502.
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: etradie-billing
      ports:
        - protocol: TCP
          port: 8082
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: etradie-observability
          podSelector:
            matchLabels:
              app.kubernetes.io/name: otel-collector
      ports:
        - protocol: TCP
          port: 4317
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

serviceMonitor:
  enabled: true
  interval: 30s
  scrapeTimeout: 10s
  labels:
    prometheus: kube-prometheus
  metricRelabelDropPrefixes:
    - go_
    - process_
    - promhttp_

# Abuse-monitoring alert rules (gateway per-user limiter, execution
# per-user limiter, Envoy L7 backstop, edge-ingress connection caps).
# The labels block must match the operator's Prometheus ruleSelector
# (kube-prometheus by default), mirroring serviceMonitor.labels.
prometheusRule:
  enabled: true
  labels:
    prometheus: kube-prometheus

resourceQuota:
  enabled: true
  hard:
    requestsCpu: "4"
    requestsMemory: "8Gi"
    limitsCpu: "8"
    limitsMemory: "16Gi"
    persistentvolumeclaims: "0"
    servicesLoadbalancers: "0"
    servicesNodeports: "0"

limitRange:
  enabled: true

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: etradie-gateway
          topologyKey: kubernetes.io/hostname

topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: etradie-gateway

nodeSelector: {}

tolerations: []

startupProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 2
  timeoutSeconds: 2
  successThreshold: 1
  failureThreshold: 30

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 0
  periodSeconds: 10
  timeoutSeconds: 3
  successThreshold: 1
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /readiness
    port: http
  initialDelaySeconds: 0
  periodSeconds: 5
  timeoutSeconds: 3
  successThreshold: 1
  failureThreshold: 3

lifecycle:
  preStop:
    exec:
      command: ["/bin/sh", "-c", "sleep 5"]

terminationGracePeriodSeconds: 60

volumes:
  tmp:
    emptyDir:
      sizeLimit: 64Mi
  cache:
    emptyDir:
      sizeLimit: 256Mi
