replicaCount: 5

image:
  # CI publishes to GHCR. Path is duplicated here (vs values.yaml)
  # only because the production overlay historically pinned the same
  # value; keep them in lockstep.
  repository: ghcr.io/flamegreat-1/etradie/gateway
  pullPolicy: IfNotPresent
  tag: "0.1.0"

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8080"
  prometheus.io/path: "/metrics"
  cluster-autoscaler.kubernetes.io/safe-to-evict: "false"
  tier: production
  # Tier 9 (CHECKLIST microservice security): join the Linkerd mesh so
  # every gateway pod-to-pod hop (gRPC to execution/management, HTTP to
  # engine) is automatically mTLS'd. gRPC/HTTP2 is detected natively by
  # the proxy; no opaque-ports needed. Audit ref: Tier 9 G9-1.
  linkerd.io/inject: enabled

config:
  # Arms every Go-service prod fail-closed guard: HIBP breach check
  # (Tier 1 item 7), mandatory Redis attempt limiter, cookie-Secure
  # enforcement, and the JWT/DB/admin-secret-required checks.
  # Audit ref: A2.
  app:
    env: "production"
  gateway:
    logLevel: "INFO"
    logJson: "true"
    logFullContextPayload: "false"
    allowedOrigins: "https://app.exoper.com,https://exoper.com"
    # Production billing endpoint (in-cluster). Keep default for now;
    # if we ever split billing into its own namespace, update the
    # Service DNS here AND the egress NetworkPolicy in values.yaml.
    billingServiceUrl: "http://billing-service.etradie-system.svc.cluster.local:8082"
    billingClientTimeoutMs: "15000"
  auth:
    # Production cross-subdomain cookie policy.
    # The SPA lives at https://app.exoper.com; the gateway lives at
    # https://api.exoper.com (or behind the same Cloudflare zone).
    # Cookies must be scoped to the registrable domain so the browser
    # sends them on requests from app.exoper.com to api.exoper.com.
    #
    # SameSite=None is required for cross-site cookies. It MUST be
    # paired with Secure=true (browsers reject the combination otherwise
    # and the gateway validate() call refuses it at startup).
    #
    # AUTH_COOKIE_DOMAIN, AUTH_COOKIE_SAMESITE, AUTH_COOKIE_SECURE,
    # AUTH_CSRF_SIGNED, and AUTH_RETURN_TOKENS_IN_BODY are emitted by
    # the configmap template from these values. They are NOT in the
    # ExternalSecret because they are not secrets; they are policy.
    cookieDomain: ".exoper.com"
    cookieSecure: "true"
    cookieSameSite: "None"
    csrfHeader: "X-CSRF-Token"
    csrfSigned: "true"
    returnTokensInBody: "false"

trustChain:
  trustedProxyCidrs:
    - "10.100.0.0/16"
  trustCloudflare: "true"

externalSecrets:
  enabled: true
  gateway:
    vaultPath: etradie/services/gateway/production
    refreshInterval: 1h

resources:
  requests:
    cpu: "1"
    memory: 1Gi
    ephemeral-storage: 512Mi
  limits:
    cpu: "2"
    memory: 2Gi
    ephemeral-storage: 1Gi

autoscaling:
  enabled: true
  minReplicas: 5
  maxReplicas: 10
  targetCPUUtilizationPercentage: 65
  targetMemoryUtilizationPercentage: 75
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 600
      policies:
        - type: Percent
          value: 25
          periodSeconds: 120
        - type: Pods
          value: 1
          periodSeconds: 120
      selectPolicy: Min
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 2
          periodSeconds: 30
      selectPolicy: Max

podDisruptionBudget:
  enabled: true
  minAvailable: 3
  unhealthyPodEvictionPolicy: IfHealthyBudget

serviceMonitor:
  enabled: true
  interval: 10s
  scrapeTimeout: 8s

resourceQuota:
  enabled: true
  hard:
    requestsCpu: "24"
    requestsMemory: "48Gi"
    limitsCpu: "48"
    limitsMemory: "96Gi"
    persistentvolumeclaims: "0"
    servicesLoadbalancers: "0"
    servicesNodeports: "0"

affinity:
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchLabels:
            app.kubernetes.io/name: etradie-gateway
        topologyKey: kubernetes.io/hostname
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: etradie-gateway
          topologyKey: topology.kubernetes.io/zone

# Topology spread constraints: prefer balanced zone distribution
# but DO schedule when the cluster has only 2 AZs or when an AZ is
# degraded. The hostname-level pod anti-affinity
# (requiredDuringSchedulingIgnoredDuringExecution above) already
# guarantees no two pods land on the same node, which is the
# blast-radius property we actually need; the zone constraint here
# is best-effort balance, not a hard requirement.
topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: etradie-gateway
  - maxSkew: 2
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: etradie-gateway

# Cloud-agnostic: do NOT pin AWS-specific instance types here.
# Cluster-specific scheduling hints (instance types, GPU pools,
# spot/on-demand) belong on the cluster (taints, custom labels), not
# in the chart. The chart now deploys identically on Contabo K3s,
# OCI OKE, Talos, EKS, GKE, AKS, or kubeadm.
nodeSelector: {}

# Toleration for the dedicated etradie-system node group taint applied
# by infrastructure/cluster/main.tf. A toleration without a matching
# taint is a no-op, so this stays cloud-agnostic: clusters that do
# not taint their nodes are unaffected. Without this, gateway pods
# cannot schedule onto the etradie-system pool and would compete with
# cluster add-ons on the untainted system pool.
tolerations:
  - key: workload
    operator: Equal
    value: etradie-system
    effect: NoSchedule

terminationGracePeriodSeconds: 90
