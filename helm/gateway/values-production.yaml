# Production overlay for the etradie-gateway chart.
# TABLE 2B profile (BUDGET.md): single-node Contabo, full stack ON,
# 1 replica. Required hostname anti-affinity is intentionally NOT set
# here (the base chart's preferred term applies): required + the
# deployment's maxSurge:1/maxUnavailable:0 strategy deadlocks every
# rollout on a single node.

replicaCount: 1

image:
  repository: ghcr.io/flamegreat-1/etradie/gateway
  pullPolicy: IfNotPresent
  tag: "0.1.0"

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8080"
  prometheus.io/path: "/metrics"
  cluster-autoscaler.kubernetes.io/safe-to-evict: "false"
  tier: production

# Per-service Linkerd authorization stays disabled until `linkerd viz
# edges` confirms SECURED on every gateway edge (runbook step 4). The
# mesh itself is ON; this is only the per-service authz layer.
linkerdPolicy:
  enabled: false

config:
  # Arms every Go-service prod fail-closed guard. Audit ref: A2.
  app:
    env: "production"
  gateway:
    logLevel: "INFO"
    logJson: "true"
    logFullContextPayload: "false"
    # Distributed tracing ON: export OTLP spans to the in-cluster OTel
    # Collector (helm/observability-logs tracing.enabled).
    otelEndpoint: "otel-collector.etradie-observability.svc.cluster.local:4317"
    # Canonical-host model: app.exoper.com is the only origin that
    # issues cross-origin API calls (exoper.com + www 308-redirect at
    # the Vercel edge before the SPA boots).
    allowedOrigins: "https://app.exoper.com"
    billingServiceUrl: "http://billing-service.etradie-system.svc.cluster.local:8082"
    billingClientTimeoutMs: "15000"
  auth:
    # Production cross-subdomain cookie policy (SPA app.exoper.com,
    # API api.exoper.com). SameSite=None requires Secure=true.
    cookieDomain: ".exoper.com"
    cookieSecure: "true"
    cookieSameSite: "None"
    csrfHeader: "X-CSRF-Token"
    csrfSigned: "true"
    returnTokensInBody: "false"

trustChain:
  trustedProxyCidrs:
    - "10.100.0.0/16"
  trustCloudflare: "true"

externalSecrets:
  enabled: true
  gateway:
    vaultPath: etradie/services/gateway/production
    refreshInterval: 1h

resources:
  requests:
    cpu: 500m
    memory: 512Mi
    ephemeral-storage: 512Mi
  limits:
    cpu: "1500m"
    memory: 1Gi
    ephemeral-storage: 1Gi

# Single node: HPA pinned OFF (TABLE 2B). Revert with the base values
# when the platform moves to the multi-node cluster (BUDGET.md Table 5).
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 1

# A 1-replica PDB with minAvailable>=1 blocks every node drain forever.
podDisruptionBudget:
  enabled: false

serviceMonitor:
  enabled: true
  interval: 10s
  scrapeTimeout: 8s

# NOTE: the gateway chart ships no ResourceQuota template; namespace
# governance (ResourceQuota + LimitRange for etradie-system) is owned
# solely by the data-layer chart. Values here are kept aligned with
# helm/data-layer for documentation only.
resourceQuota:
  enabled: true
  hard:
    requestsCpu: "8"
    requestsMemory: "16Gi"
    limitsCpu: "24"
    limitsMemory: "40Gi"
    persistentvolumeclaims: "20"
    servicesLoadbalancers: "0"
    servicesNodeports: "0"

# Cloud-agnostic: do NOT pin instance types here. The etradie-system
# toleration is a no-op on the untainted single-node K3s box and
# becomes effective again on a future tainted node pool.
nodeSelector: {}

tolerations:
  - key: workload
    operator: Equal
    value: etradie-system
    effect: NoSchedule

terminationGracePeriodSeconds: 90
