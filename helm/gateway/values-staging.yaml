replicaCount: 3

image:
  repository: ghcr.io/flamegreat-1/etradie/gateway
  pullPolicy: IfNotPresent
  tag: "staging-0.1.0"

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8080"
  prometheus.io/path: "/metrics"
  tier: staging

config:
  # Staging is prod-like: arm the same fail-closed guards as
  # production so staging exercises the real posture. Audit ref: A2.
  app:
    env: "staging"
  gateway:
    logLevel: "DEBUG"
    logJson: "true"
    logFullContextPayload: "true"
    # Distributed tracing ON in staging: export OTLP spans to the
    # in-cluster OTel Collector (helm/observability-logs tracing.enabled).
    otelEndpoint: "otel-collector.etradie-observability.svc.cluster.local:4317"
    allowedOrigins: "https://staging.exoper.com,https://staging-app.exoper.com"
    billingServiceUrl: "http://billing-service.etradie-system.svc.cluster.local:8082"
    billingClientTimeoutMs: "15000"
  auth:
    # Staging uses a single-host HTTPS deployment (SPA and gateway on
    # the same hostname) so Strict + host-only cookies are correct.
    # If staging ever moves to a cross-subdomain topology, update these
    # to match the production values.
    cookieDomain: ""
    cookieSecure: "true"
    cookieSameSite: "Strict"
    csrfHeader: "X-CSRF-Token"
    csrfSigned: "true"
    returnTokensInBody: "false"

trustChain:
  # List form preferred over scalar for per-entry validation.
  # Audit ref: G-M2.
  trustedProxyCidrs:
    - "10.42.0.0/16"
  trustCloudflare: "false"

externalSecrets:
  enabled: true
  gateway:
    vaultPath: etradie/services/gateway/staging
    refreshInterval: 1h

resources:
  requests:
    cpu: 500m
    memory: 768Mi
    ephemeral-storage: 256Mi
  limits:
    cpu: "1500m"
    memory: 1536Mi
    ephemeral-storage: 512Mi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

podDisruptionBudget:
  enabled: true
  minAvailable: 2

serviceMonitor:
  enabled: true
  interval: 15s
  scrapeTimeout: 10s

resourceQuota:
  enabled: true
  hard:
    requestsCpu: "8"
    requestsMemory: "16Gi"
    limitsCpu: "16"
    limitsMemory: "32Gi"
    persistentvolumeclaims: "0"
    servicesLoadbalancers: "0"
    servicesNodeports: "0"

nodeSelector: {}

tolerations: []
