# Staging overlay for the etradie-gateway chart.
# TABLE 2B profile (BUDGET.md): single-node Contabo, full stack ON,
# 1 replica.

replicaCount: 1
image:
  repository: ghcr.io/flamegreat-1/etradie/gateway
  pullPolicy: IfNotPresent
  tag: "dfef71bcf57896c8413efc6a04ee261ae861dd37"
podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8080"
  prometheus.io/path: "/metrics"
  tier: staging
config:
  # Staging is prod-like: arm the same fail-closed guards as
  # production so staging exercises the real posture. Audit ref: A2.
  app:
    env: "staging"
  gateway:
    logLevel: "DEBUG"
    logJson: "true"
    logFullContextPayload: "true"
    # Distributed tracing ON in staging: export OTLP spans to the
    # in-cluster OTel Collector (helm/observability-logs tracing.enabled).
    otelEndpoint: "otel-collector.etradie-observability.svc.cluster.local:4317"
    # Cross-origin Vercel SPA -> staging API. The Vercel project
    # serves the SAME SPA build at TWO custom domains:
    #   - staging.exoper.com  (canonical staging URL; 307-redirects
    #                          to app.exoper.com per Vercel domain
    #                          configuration)
    #   - app.exoper.com      (the redirect target; where the SPA
    #                          actually loads in the browser)
    # The 307 preserves path + query, so OAuth callbacks land at
    # app.exoper.com/auth/callback/google?code=...&state=... after
    # the redirect, and EVERY subsequent fetch from the SPA carries
    # Origin: https://app.exoper.com (not staging.exoper.com).
    # Both origins are allow-listed so the gateway CORS middleware
    # admits requests from either entry point. corsMiddleware
    # (src/gateway/internal/server/http_server.go) validates each
    # entry at startup and refuses to boot with malformed entries.
    allowedOrigins: "https://staging.exoper.com,https://app.exoper.com"
    billingServiceUrl: "http://billing-service.etradie-system.svc.cluster.local:8082"
    billingClientTimeoutMs: "15000"
  auth:
    # Cross-subdomain Vercel deployment: cookies scoped to the
    # registrable domain, cross-site-capable. SameSite None requires
    # Secure true (gateway validate() fails fast otherwise).
    cookieDomain: ".exoper.com"
    cookieSecure: "true"
    cookieSameSite: "None"
    csrfHeader: "X-CSRF-Token"
    csrfSigned: "true"
    returnTokensInBody: "false"
    # Google OAuth 2.0 ON for staging. The four client fields
    # (id, secret, redirect_uri, link_redirect_uri) MUST be present
    # in Vault at etradie/services/gateway/staging BEFORE the gateway
    # pod rolls with this overlay; auth/config.go::validate() fails
    # the pod start otherwise. The two staging redirect URIs:
    #   https://staging.exoper.com/auth/callback/google
    #   https://staging.exoper.com/settings/oauth/callback/google
    # MUST also be added to the GCP OAuth Client's Authorized
    # redirect URIs alongside the existing localhost + production
    # entries (see PROGRESS.md Phase 14 frontend OAuth section).
    googleOAuthEnabled: "true"
trustChain:
  # List form preferred over scalar for per-entry validation.
  # Audit ref: G-M2.
  trustedProxyCidrs:
    - "10.42.0.0/16"
  trustCloudflare: "false"
externalSecrets:
  enabled: true
  gateway:
    vaultPath: etradie/services/gateway/staging
    refreshInterval: 1h
resources:
  requests:
    cpu: 250m
    memory: 256Mi
    ephemeral-storage: 256Mi
  limits:
    cpu: "1"
    memory: 512Mi
    ephemeral-storage: 512Mi
# Single node: HPA pinned OFF (TABLE 2B). Revert with the base values
# on a multi-node cluster.
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 1
# A 1-replica PDB with minAvailable>=1 blocks every node drain forever.
podDisruptionBudget:
  enabled: false
serviceMonitor:
  enabled: true
  interval: 15s
  scrapeTimeout: 10s
# NOTE: the gateway chart ships no ResourceQuota template; namespace
# governance (ResourceQuota + LimitRange for etradie-system) is owned
# solely by the data-layer chart. Values here are documentation-only
# and mirror the staging data-layer envelope (helm/data-layer/values.yaml
# base quota: 16/32Gi limits), NOT the production overlay.
resourceQuota:
  enabled: true
  hard:
    requestsCpu: "8"
    requestsMemory: "16Gi"
    limitsCpu: "16"
    limitsMemory: "32Gi"
    persistentvolumeclaims: "20"
    servicesLoadbalancers: "0"
    servicesNodeports: "0"
nodeSelector: {}
tolerations: []
# GHCR pull credentials. Packages are PRIVATE on GHCR (push posture);
# K8s containerd needs a docker-registry Secret to pull. The `ghcr-pull`
# Secret is created per-namespace at Phase 10.0 BEFORE this chart syncs.
# Future hardening: source this Secret from Vault via ESO (PROGRESS TODO).
imagePullSecrets:
  - name: ghcr-pull
