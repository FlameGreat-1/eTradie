replicaCount: 3

image:
  repository: ghcr.io/flamegreat-1/etradie/gateway
  pullPolicy: IfNotPresent
  tag: "staging-0.1.0"

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8080"
  prometheus.io/path: "/metrics"
  tier: staging

config:
  # Staging is prod-like: arm the same fail-closed guards as
  # production so staging exercises the real posture. Audit ref: A2.
  app:
    env: "staging"
  gateway:
    logLevel: "DEBUG"
    logJson: "true"
    logFullContextPayload: "true"
    # Distributed tracing ON in staging: export OTLP spans to the
    # in-cluster OTel Collector (helm/observability-logs tracing.enabled).
    otelEndpoint: "otel-collector.etradie-observability.svc.cluster.local:4317"
    # Cross-origin Vercel SPA -> staging API, same topology as
    # production. Canonical SPA host is staging-app.exoper.com (the
    # entry host staging.exoper.com 308-redirects to it at the Vercel
    # edge), so the canonical host is the only origin that calls the
    # staging API cross-origin and is the sole CORS origin.
    allowedOrigins: "https://staging-app.exoper.com"
    billingServiceUrl: "http://billing-service.etradie-system.svc.cluster.local:8082"
    billingClientTimeoutMs: "15000"
  auth:
    # Staging is a cross-subdomain Vercel deployment (SPA on
    # staging-app.exoper.com, API on the staging gateway host), so the
    # cookies MUST be scoped to the registrable domain and be
    # cross-site-capable - identical posture to production. SameSite None
    # requires Secure true (the gateway validate refuses the combination
    # otherwise and fails fast at startup).
    cookieDomain: ".exoper.com"
    cookieSecure: "true"
    cookieSameSite: "None"
    csrfHeader: "X-CSRF-Token"
    csrfSigned: "true"
    returnTokensInBody: "false"

trustChain:
  # List form preferred over scalar for per-entry validation.
  # Audit ref: G-M2.
  trustedProxyCidrs:
    - "10.42.0.0/16"
  trustCloudflare: "false"

externalSecrets:
  enabled: true
  gateway:
    vaultPath: etradie/services/gateway/staging
    refreshInterval: 1h

resources:
  requests:
    cpu: 500m
    memory: 768Mi
    ephemeral-storage: 256Mi
  limits:
    cpu: "1500m"
    memory: 1536Mi
    ephemeral-storage: 512Mi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

podDisruptionBudget:
  enabled: true
  minAvailable: 2

serviceMonitor:
  enabled: true
  interval: 15s
  scrapeTimeout: 10s

resourceQuota:
  enabled: true
  hard:
    requestsCpu: "8"
    requestsMemory: "16Gi"
    limitsCpu: "16"
    limitsMemory: "32Gi"
    persistentvolumeclaims: "0"
    servicesLoadbalancers: "0"
    servicesNodeports: "0"

nodeSelector: {}

tolerations: []
