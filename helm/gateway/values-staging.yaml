replicaCount: 3

image:
  repository: ghcr.io/flamegreat-1/etradie/gateway
  pullPolicy: IfNotPresent
  tag: "staging-0.1.0"

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8080"
  prometheus.io/path: "/metrics"
  tier: staging

config:
  gateway:
    logLevel: "DEBUG"
    logJson: "true"
    logFullContextPayload: "true"
    allowedOrigins: "https://staging.exoper.com,https://staging-app.exoper.com"

trustChain:
  trustedProxyCidrs: "10.42.0.0/16"
  trustCloudflare: "false"

externalSecrets:
  enabled: true
  gateway:
    vaultPath: etradie/services/gateway/staging
    refreshInterval: 1h

resources:
  requests:
    cpu: 500m
    memory: 768Mi
    ephemeral-storage: 256Mi
  limits:
    cpu: "1500m"
    memory: 1536Mi
    ephemeral-storage: 512Mi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

podDisruptionBudget:
  enabled: true
  minAvailable: 2

serviceMonitor:
  enabled: true
  interval: 15s
  scrapeTimeout: 10s

resourceQuota:
  enabled: true
  hard:
    requestsCpu: "8"
    requestsMemory: "16Gi"
    limitsCpu: "16"
    limitsMemory: "32Gi"
    persistentvolumeclaims: "0"
    servicesLoadbalancers: "0"
    servicesNodeports: "0"

nodeSelector: {}

tolerations: []
