# Staging overlay for the etradie-gateway chart.
# TABLE 2B profile (BUDGET.md): single-node Contabo, full stack ON,
# 1 replica.

replicaCount: 1

image:
  repository: ghcr.io/flamegreat-1/etradie/gateway
  pullPolicy: IfNotPresent
  tag: "staging-0.1.0"

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8080"
  prometheus.io/path: "/metrics"
  tier: staging

config:
  # Staging is prod-like: arm the same fail-closed guards as
  # production so staging exercises the real posture. Audit ref: A2.
  app:
    env: "staging"
  gateway:
    logLevel: "DEBUG"
    logJson: "true"
    logFullContextPayload: "true"
    # Distributed tracing ON in staging: export OTLP spans to the
    # in-cluster OTel Collector (helm/observability-logs tracing.enabled).
    otelEndpoint: "otel-collector.etradie-observability.svc.cluster.local:4317"
    # Cross-origin Vercel SPA -> staging API, same topology as
    # production. Canonical SPA host is staging.exoper.com (the
    # registrable-domain staging apex on Vercel; matches billing's
    # publicBaseUrl below).
    allowedOrigins: "https://staging.exoper.com"
    billingServiceUrl: "http://billing-service.etradie-system.svc.cluster.local:8082"
    billingClientTimeoutMs: "15000"
  auth:
    # Cross-subdomain Vercel deployment: cookies scoped to the
    # registrable domain, cross-site-capable. SameSite None requires
    # Secure true (gateway validate() fails fast otherwise).
    cookieDomain: ".exoper.com"
    cookieSecure: "true"
    cookieSameSite: "None"
    csrfHeader: "X-CSRF-Token"
    csrfSigned: "true"
    returnTokensInBody: "false"

trustChain:
  # List form preferred over scalar for per-entry validation.
  # Audit ref: G-M2.
  trustedProxyCidrs:
    - "10.42.0.0/16"
  trustCloudflare: "false"

externalSecrets:
  enabled: true
  gateway:
    vaultPath: etradie/services/gateway/staging
    refreshInterval: 1h

resources:
  requests:
    cpu: 250m
    memory: 256Mi
    ephemeral-storage: 256Mi
  limits:
    cpu: "1"
    memory: 512Mi
    ephemeral-storage: 512Mi

# Single node: HPA pinned OFF (TABLE 2B). Revert with the base values
# on a multi-node cluster.
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 1

# A 1-replica PDB with minAvailable>=1 blocks every node drain forever.
podDisruptionBudget:
  enabled: false

serviceMonitor:
  enabled: true
  interval: 15s
  scrapeTimeout: 10s

# NOTE: the gateway chart ships no ResourceQuota template; namespace
# governance (ResourceQuota + LimitRange for etradie-system) is owned
# solely by the data-layer chart. Values here are documentation-only
# and mirror the staging data-layer envelope (helm/data-layer/values.yaml
# base quota: 16/32Gi limits), NOT the production overlay.
resourceQuota:
  enabled: true
  hard:
    requestsCpu: "8"
    requestsMemory: "16Gi"
    limitsCpu: "16"
    limitsMemory: "32Gi"
    persistentvolumeclaims: "20"
    servicesLoadbalancers: "0"
    servicesNodeports: "0"

nodeSelector: {}

tolerations: []
