# helm/envoy - default values.
#
# These defaults reflect the PRODUCTION posture of
# deployments/envoy/kubernetes/base + overlays/production. Operators
# render staging by layering values-staging.yaml on top; local dev does
# not use this chart (kustomize-only).

replicaCount: 5
revisionHistoryLimit: 10

image:
  repository: envoyproxy/envoy
  pullPolicy: IfNotPresent
  tag: "v1.28.0"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: "etradie-envoy"

environment: "production"

namespace:
  create: true
  name: "envoy-system"
  podSecurityStandard: "restricted"

serviceAccount:
  create: true
  name: ""
  annotations: {}
  automountServiceAccountToken: false

# Mesh envoy in every environment so the edge-ingress->envoy and
# envoy->gateway hops are mTLS'd. Envoy dials the gateway over HTTP/1.1
# (gateway_cluster sets no http2_protocol_options), handled natively by
# the proxy and matching the gateway's Linkerd Server proxyProtocol:
# HTTP/1. Native sidecar for a uniform mesh and deterministic
# proxy-startup readiness.
podAnnotations:
  linkerd.io/inject: enabled
  config.linkerd.io/proxy-enable-native-sidecar: "true"

podSecurityContext:
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

securityContext:
  runAsUser: 1000

strategy:
  maxSurge: 1
  maxUnavailable: 0

service:
  type: ClusterIP
  annotations: {}
  ports:
    http: 8080
    admin: 9901

headlessService:
  enabled: true

resources:
  requests:
    cpu: "2"
    memory: 4Gi
    ephemeral-storage: 1Gi
  limits:
    cpu: "4"
    memory: 8Gi
    ephemeral-storage: 2Gi

autoscaling:
  enabled: true
  minReplicas: 5
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
        - type: Pods
          value: 1
          periodSeconds: 60
      selectPolicy: Min
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 2
          periodSeconds: 30
      selectPolicy: Max
  # Custom metrics require an external adapter (prometheus-adapter or
  # KEDA) configured to serve the metric below as a per-pod custom
  # metric. Default-OFF so the chart works on any cluster; flip to
  # true in values-production.yaml once the adapter is installed.
  #
  # Metric: envoy_cluster_upstream_rq_active{envoy_cluster_name="gateway_cluster"}
  #   - This is a per-pod gauge of in-flight requests proxied to the
  #     gateway cluster. It is a more direct backpressure signal than
  #     per-listener downstream metrics because it correlates with
  #     real upstream work, not just connection accepts.
  #
  # Required prometheus-adapter rule (paste into the adapter's
  # ConfigMap; do NOT ship from this chart, that crosses concerns):
  #
  #   - seriesQuery: 'envoy_cluster_upstream_rq_active{envoy_cluster_name="gateway_cluster",namespace!="",pod!=""}'
  #     resources:
  #       overrides:
  #         namespace: { resource: namespace }
  #         pod:       { resource: pod }
  #     name:
  #       matches: 'envoy_cluster_upstream_rq_active'
  #       as:      'envoy_gateway_cluster_upstream_rq_active'
  #     metricsQuery: |
  #       sum by (<<.GroupBy>>) (
  #         envoy_cluster_upstream_rq_active{<<.LabelMatchers>>,envoy_cluster_name="gateway_cluster"}
  #       )
  customMetricsEnabled: false
  customMetricsList:
    - type: Pods
      pods:
        metric:
          name: envoy_gateway_cluster_upstream_rq_active
        target:
          type: AverageValue
          averageValue: "500"

podDisruptionBudget:
  enabled: true
  minAvailable: 3
  unhealthyPodEvictionPolicy: IfHealthyBudget

resourceQuota:
  enabled: true
  hard:
    requestsCpu: "20"
    requestsMemory: "40Gi"
    limitsCpu: "40"
    limitsMemory: "80Gi"
    persistentvolumeclaims: "0"
    servicesLoadbalancers: "0"
    servicesNodeports: "0"

limitRange:
  enabled: true
  container:
    max:
      cpu: "4"
      memory: "8Gi"
    min:
      cpu: "100m"
      memory: "128Mi"
    default:
      cpu: "4"
      memory: "8Gi"
    defaultRequest:
      cpu: "2"
      memory: "4Gi"

networkPolicy:
  enabled: true
  edgeIngressNamespace: "edge-ingress-system"
  monitoringNamespace: "monitoring"
  gatewayNamespace: "etradie-system"
  extraIngress: []
  extraEgress: []

serviceMonitor:
  enabled: true
  interval: 10s
  scrapeTimeout: 8s
  labels:
    prometheus: kube-prometheus

affinity:
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchLabels:
            app.kubernetes.io/name: etradie-envoy
        topologyKey: kubernetes.io/hostname

# Best-effort zone spread; pod anti-affinity above already enforces
# one envoy per node. ScheduleAnyway lets the HPA scale up during an
# AZ outage (DoNotSchedule would block exactly when we need scale).
topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: etradie-envoy

nodeSelector: {}
tolerations: []

# Chart-owned PriorityClass. The previous chart pinned
# `system-cluster-critical`, which is reserved by Kubernetes for
# cluster components (kubelet, kube-proxy, CoreDNS) and rejected by
# common hardened-admission policies (Kyverno, OPA Gatekeeper) when
# used outside kube-system. envoy is data-plane, so it owns its own
# class.
#
# value 900000 ranks envoy above default workloads (0) and below
# edge-ingress-critical (1_000_000) so the public TLS terminator wins
# the rare case where capacity is tight enough to preempt.
priorityClass:
  enabled: true
  name: "etradie-envoy-critical"
  value: 900000
  globalDefault: false
  preemptionPolicy: "PreemptLowerPriority"
  description: "Critical priority for envoy data-plane proxy. Ranks below edge-ingress-critical (1_000_000) and above default workloads."

terminationGracePeriodSeconds: 60

extraEnv: []

volumes:
  tmp:
    sizeLimit: "200Mi"
    medium: "Memory"
  cache:
    sizeLimit: "1Gi"

# Envoy listener / cluster / circuit-breaker / overload knobs. The
# template at templates/configmap.yaml renders these into envoy.yaml.
config:
  envoy:
    admin:
      port: 9901
    listener:
      port: 8080
      useRemoteAddress: true
      xffNumTrustedHops: 1
    cluster:
      connectTimeout: "5s"
      circuitBreaker:
        maxConnections: 1024
        maxPendingRequests: 1024
        maxRequests: 1024
        maxRetries: 3
      outlierDetection:
        consecutive5xx: 5
        interval: "10s"
        baseEjectionTime: "30s"
        maxEjectionPercent: 50
      upstream:
        address: "gateway-headless.etradie-system.svc.cluster.local"
        port: 8080
      healthCheck:
        path: "/readiness"
        timeout: "1s"
        interval: "10s"
        unhealthyThreshold: 3
        healthyThreshold: 2
    billingCluster:
      connectTimeout: "5s"
      circuitBreaker:
        maxConnections: 256
        maxPendingRequests: 256
        maxRequests: 256
        maxRetries: 0
      outlierDetection:
        consecutive5xx: 5
        interval: "10s"
        baseEjectionTime: "30s"
        maxEjectionPercent: 50
      upstream:
        address: "billing-service.etradie-system.svc.cluster.local"
        port: 8082
      healthCheck:
        path: "/readiness"
        timeout: "1s"
        interval: "10s"
        unhealthyThreshold: 3
        healthyThreshold: 2
    route:
      timeout: "30s"
      idleTimeout: "60s"
      numRetries: 2
      perTryTimeout: "10s"
      # TIER4 A2b: per-route request-body cap on the gateway route.
      # 10 MiB leaves margin above the engine 8 MiB body cap; the heavy
      # gateway->engine traffic does NOT traverse this Envoy, and the
      # inbound dashboard/auth bodies are a few KB, so this never clips
      # legitimate traffic. An over-cap body gets a 413.
      maxRequestBytes: 10485760
    webhookRoute:
      timeout: "20s"
      idleTimeout: "30s"
      numRetries: 0
      perTryTimeout: "15s"
      # Webhook bodies are small JSON events; a tight 256 KiB cap is
      # ample. Webhook routes are also EXEMPT from local_ratelimit.
      maxRequestBytes: 262144
    # TIER4 A2b: HCM header-size cap + the chain-level buffer ceiling.
    # The chain-level buffer is effectively the gateway-route value; the
    # real per-route enforcement is via BufferPerRoute on each route.
    maxRequestHeadersKb: 64
    maxRequestBytesChainCeiling: 10485760
    # TIER4 A2a: coarse per-Envoy-POD L7 rate-limit backstop. Sized
    # generously: 2000 tokens, refilled 2000 every 1s => ~2000 rps per
    # pod steady-state with a 2000 burst. With replicaCount=5 that is a
    # ~10k rps aggregate floor before the backstop trips, far above
    # legitimate dashboard + cycle/run traffic. enforcedFraction=100
    # means trips are enforced (return 429) in production.
    localRateLimit:
      enabled: true
      maxTokens: 2000
      tokensPerFill: 2000
      fillIntervalSeconds: 1
      enforcedFraction: 100
    overload:
      maxHeapSizeBytes: 2147483648
      globalMaxConnections: 50000
    # Distributed tracing. Envoy is the first server-side hop, so when
    # enabled it generates/propagates the W3C traceparent the gateway
    # (and everything downstream) continues, and exports its own span to
    # the OTel Collector over OTLP/gRPC. DISABLED by default so a bare
    # render or a cluster without the collector is unaffected; the prod
    # + staging overlays set enabled=true. The collector address is the
    # same fixed Service the app services export to. Audit ref:
    # observability end-to-end (Step 10e).
    tracing:
      enabled: false
      collectorCluster: "otel_collector_cluster"
      collectorAddress: "otel-collector.etradie-observability.svc.cluster.local"
      collectorPort: 4317
      serviceName: "etradie-envoy"
      # Percentage of requests to sample (0..100). 100 in non-prod for
      # full visibility; the production overlay may lower this to bound
      # span volume / collector load.
      samplePercent: 100
      connectTimeout: "5s"

# ---------------------------------------------------------------------------
# TIER 5: browser security response headers.
#
# Emitted by the Envoy HCM on EVERY response via response_headers_to_add
# (see templates/configmap.yaml). This Envoy fronts the API origin
# (api.* -> gateway_cluster, plus the billing webhook routes); it serves
# JSON, never HTML or scripts, so the CSP below is the locked-down
# API-origin policy: nothing may be loaded, executed, or framed from this
# origin. That is correct and SAFE for an API surface and cannot affect
# the SPA, whose HTML document is served by a separate static host and
# carries its own page-level CSP.
#
# HSTS is intentionally NOT set here: it is emitted once at the
# TLS-terminating Cloudflare edge (infrastructure/cloudflare/main.tf,
# cloudflare_ruleset.hsts) so it is only ever asserted over the
# Cloudflare-terminated TLS connection. Setting it here too would be a
# duplicate with a weaker trust boundary.
#
# Every value is operator-overridable per environment (values-staging /
# values-production). No hostname is hardcoded in the chart.
securityHeaders:
  # Master switch. When false the response_headers_to_add block is not
  # rendered at all, so the chart degrades to its previous behaviour.
  enabled: true
  # Content-Security-Policy for the API origin. default-src 'none'
  # forbids loading/executing anything from api.*; frame-ancestors 'none'
  # blocks clickjacking via <frame>/<iframe>/<embed>/<object>; base-uri
  # 'none' blocks <base> tag injection; form-action 'none' blocks the
  # origin being used as a form target. An API never needs more.
  contentSecurityPolicy: "default-src 'none'; frame-ancestors 'none'; base-uri 'none'; form-action 'none'"
  # Defence-in-depth alongside frame-ancestors for legacy browsers.
  xFrameOptions: "DENY"
  # Stop MIME sniffing of API responses.
  xContentTypeOptions: "nosniff"
  # Never leak the API URL (which can carry resource ids) cross-origin.
  referrerPolicy: "no-referrer"

# WASM filter binary. Chart REQUIRES this to be set; rendering fails
# without it.
#
# CI provisioning:
#   helm upgrade ... \
#     --set-file wasm.base64=src/envoy/target/wasm32-wasi/release/etradie_envoy_integration_filter.wasm \
#     --set wasm.sha256=$(sha256sum ...) \
#     --set wasm.builtAt=$(date -u +%FT%TZ)
#
# (Helm's --set-file injects the file's bytes; in this chart we
# additionally pre-encode them via the binaryData ConfigMap field.)
wasm:
  base64: ""
  sha256: ""
  builtAt: ""
