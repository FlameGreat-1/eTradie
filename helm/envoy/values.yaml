# helm/envoy - default values.
#
# These defaults reflect the PRODUCTION posture of
# deployments/envoy/kubernetes/base + overlays/production. Operators
# render staging by layering values-staging.yaml on top; local dev does
# not use this chart (kustomize-only).

replicaCount: 5
revisionHistoryLimit: 10

image:
  repository: envoyproxy/envoy
  pullPolicy: IfNotPresent
  tag: "v1.28.0"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: "etradie-envoy"

environment: "production"

namespace:
  create: true
  name: "envoy-system"
  podSecurityStandard: "restricted"

serviceAccount:
  create: true
  name: ""
  annotations: {}
  automountServiceAccountToken: false

podAnnotations: {}

podSecurityContext:
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

securityContext:
  runAsUser: 1000

strategy:
  maxSurge: 1
  maxUnavailable: 0

service:
  type: ClusterIP
  annotations: {}
  ports:
    http: 8080
    admin: 9901

headlessService:
  enabled: true

resources:
  requests:
    cpu: "2"
    memory: 4Gi
    ephemeral-storage: 1Gi
  limits:
    cpu: "4"
    memory: 8Gi
    ephemeral-storage: 2Gi

autoscaling:
  enabled: true
  minReplicas: 5
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
        - type: Pods
          value: 1
          periodSeconds: 60
      selectPolicy: Min
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 2
          periodSeconds: 30
      selectPolicy: Max
  # Custom metrics require an external adapter (prometheus-adapter or
  # KEDA) configured to serve `envoy_http_downstream_rq_active`.
  # Default-OFF; flip to true in values-production.yaml once the
  # adapter is installed.
  customMetricsEnabled: false
  customMetricsList:
    - type: Pods
      pods:
        metric:
          name: envoy_http_downstream_rq_active
        target:
          type: AverageValue
          averageValue: "1500"

podDisruptionBudget:
  enabled: true
  minAvailable: 3
  unhealthyPodEvictionPolicy: IfHealthyBudget

resourceQuota:
  enabled: true
  hard:
    requestsCpu: "20"
    requestsMemory: "40Gi"
    limitsCpu: "40"
    limitsMemory: "80Gi"
    persistentvolumeclaims: "0"
    servicesLoadbalancers: "0"
    servicesNodeports: "0"

limitRange:
  enabled: true
  container:
    max:
      cpu: "4"
      memory: "8Gi"
    min:
      cpu: "100m"
      memory: "128Mi"
    default:
      cpu: "4"
      memory: "8Gi"
    defaultRequest:
      cpu: "2"
      memory: "4Gi"

networkPolicy:
  enabled: true
  edgeIngressNamespace: "edge-ingress-system"
  monitoringNamespace: "monitoring"
  gatewayNamespace: "etradie-system"
  extraIngress: []
  extraEgress: []

serviceMonitor:
  enabled: true
  interval: 10s
  scrapeTimeout: 8s
  labels:
    prometheus: kube-prometheus

affinity:
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchLabels:
            app.kubernetes.io/name: etradie-envoy
        topologyKey: kubernetes.io/hostname

topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: DoNotSchedule
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: etradie-envoy

nodeSelector: {}
tolerations: []
priorityClassName: "system-cluster-critical"
terminationGracePeriodSeconds: 60

extraEnv: []

volumes:
  tmp:
    sizeLimit: "200Mi"
    medium: "Memory"
  cache:
    sizeLimit: "1Gi"

# Envoy listener / cluster / circuit-breaker / overload knobs. The
# template at templates/configmap.yaml renders these into envoy.yaml.
config:
  envoy:
    admin:
      port: 9901
    listener:
      port: 8080
      useRemoteAddress: true
      xffNumTrustedHops: 1
    route:
      timeout: "30s"
      idleTimeout: "60s"
      numRetries: 2
      perTryTimeout: "10s"
    cluster:
      connectTimeout: "5s"
      circuitBreaker:
        maxConnections: 1024
        maxPendingRequests: 1024
        maxRequests: 1024
        maxRetries: 3
      outlierDetection:
        consecutive5xx: 5
        interval: "10s"
        baseEjectionTime: "30s"
        maxEjectionPercent: 50
      upstream:
        # Production gateway-service FQDN, port 8080.
        address: "gateway-service.etradie-system.svc.cluster.local"
        port: 8080
      healthCheck:
        path: "/readiness"
        timeout: "1s"
        interval: "10s"
        unhealthyThreshold: 3
        healthyThreshold: 2
    overload:
      maxHeapSizeBytes: 2147483648
      globalMaxConnections: 50000

# WASM filter binary. Chart REQUIRES this to be set; rendering fails
# without it.
#
# CI provisioning:
#   helm upgrade ... \
#     --set-file wasm.base64=src/envoy/target/wasm32-wasi/release/etradie_envoy_integration_filter.wasm \
#     --set wasm.sha256=$(sha256sum ...) \
#     --set wasm.builtAt=$(date -u +%FT%TZ)
#
# (Helm's --set-file injects the file's bytes; in this chart we
# additionally pre-encode them via the binaryData ConfigMap field.)
wasm:
  base64: ""
  sha256: ""
  builtAt: ""
