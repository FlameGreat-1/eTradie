{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "envoy.fullname" . }}-network-policy
  namespace: {{ include "envoy.namespace" . }}
  labels:
    {{- include "envoy.labels" . | nindent 4 }}
    app.kubernetes.io/component: network-policy
spec:
  podSelector:
    matchLabels:
      {{- include "envoy.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Edge-ingress -> envoy:8080
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.edgeIngressNamespace | default "edge-ingress-system" }}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: edge-ingress
      ports:
        - protocol: TCP
          port: {{ .Values.config.envoy.listener.port | default 8080 }}
    # Prometheus -> envoy admin (metrics)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.monitoringNamespace | default "monitoring" }}
          podSelector:
            matchLabels:
              app: prometheus
      ports:
        - protocol: TCP
          port: {{ .Values.config.envoy.admin.port | default 9901 }}
    # Prometheus -> Linkerd proxy admin port :4191 (proxy self-metrics).
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.monitoringNamespace | default "monitoring" }}
          podSelector:
            matchLabels:
              app: prometheus
      ports:
        - protocol: TCP
          port: 4191
    # Linkerd proxy INBOUND port :4143. edge-ingress is meshed, so the
    # edge-ingress -> envoy:8080 hop arrives as proxy-to-proxy mTLS on
    # envoy:4143 (iptables redirect), NOT :8080; the CNI enforces this
    # NetworkPolicy on :4143. Without this rule the north-south hop is
    # dropped and public traffic dies at envoy. Scoped to the caller's
    # namespace (edge-ingress-system); the 4143 stream is opaque mTLS
    # the NetworkPolicy cannot attribute further, and Linkerd mTLS
    # identity + policy controller is the real authz on 4143.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.edgeIngressNamespace | default "edge-ingress-system" }}
      ports:
        - protocol: TCP
          port: 4143
    {{- with .Values.networkPolicy.extraIngress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  egress:
    # The injected Linkerd proxy must reach the control plane in the
    # linkerd namespace (identity, destination, policy) or it never
    # becomes Ready.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: linkerd
    # envoy -> gateway:8080
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.gatewayNamespace | default "etradie-system" }}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: etradie-gateway
      ports:
        - protocol: TCP
          port: {{ .Values.config.envoy.cluster.upstream.port | default 8080 }}
    {{- if .Values.config.envoy.tracing.enabled }}
    # envoy -> OTel Collector (OTLP/gRPC span export). Rendered only
    # when tracing is enabled. Matches the collector pod selector +
    # port the app services egress to; the collector NetworkPolicy
    # admits envoy-system on :4317.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: etradie-observability
          podSelector:
            matchLabels:
              app.kubernetes.io/name: otel-collector
      ports:
        - protocol: TCP
          port: {{ .Values.config.envoy.tracing.collectorPort | default 4317 }}
    {{- end }}
    # DNS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    {{- with .Values.networkPolicy.extraEgress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
