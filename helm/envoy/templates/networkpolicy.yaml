{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "envoy.fullname" . }}-network-policy
  namespace: {{ include "envoy.namespace" . }}
  labels:
    {{- include "envoy.labels" . | nindent 4 }}
    app.kubernetes.io/component: network-policy
spec:
  podSelector:
    matchLabels:
      {{- include "envoy.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Edge-ingress -> envoy:8080
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.edgeIngressNamespace | default "edge-ingress-system" }}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: edge-ingress
      ports:
        - protocol: TCP
          port: {{ .Values.config.envoy.listener.port | default 8080 }}
    # Prometheus -> envoy admin (metrics)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.monitoringNamespace | default "monitoring" }}
          podSelector:
            matchLabels:
              app: prometheus
      ports:
        - protocol: TCP
          port: {{ .Values.config.envoy.admin.port | default 9901 }}
    {{- with .Values.networkPolicy.extraIngress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  egress:
    # envoy -> gateway:8080
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.gatewayNamespace | default "etradie-system" }}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: etradie-gateway
      ports:
        - protocol: TCP
          port: {{ .Values.config.envoy.cluster.upstream.port | default 8080 }}
    # DNS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    {{- with .Values.networkPolicy.extraEgress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
