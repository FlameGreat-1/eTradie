# helm/envoy values-production.yaml
# Layered on top of values.yaml. Production already drives the base
# values, so this file only adds production-only annotations and node
# scheduling that should NOT bleed into staging or future environments.

podAnnotations:
  cluster-autoscaler.kubernetes.io/safe-to-evict: "false"
  tier: "production"
  # Tier 9 (CHECKLIST microservice security): mesh envoy so the
  # envoy->gateway hop is mTLS'd. Envoy speaks HTTP/2 to gateway
  # (already meshed) so the proxy handles it natively — no opaque-ports.
  # Envoy's :8080 inbound now arrives from a MESHED edge-ingress and is
  # accepted under the control-plane defaultAllowPolicy. Audit ref:
  # Tier 9 G9-1.
  linkerd.io/inject: enabled
  # Native sidecar for a uniform mesh.
  config.linkerd.io/proxy-enable-native-sidecar: "true"

# Cloud-agnostic: do NOT pin AWS-specific instance types here. Envoy
# tolerates the etradie-system taint (set by
# infrastructure/cluster/main.tf::eks_managed_node_groups.etradie_system)
# so it lands on the dedicated internal-data-plane node group with
# gateway/engine/execution/management. The previous overlay tolerated
# the `edge` taint, which is reserved for edge-ingress; that was wrong
# and caused envoy to compete with edge-ingress for capacity on the
# public-facing pool.
#
# A toleration without a matching taint is a no-op, so this stays
# cloud-agnostic.
nodeSelector: {}

tolerations:
  - key: workload
    operator: Equal
    value: etradie-system
    effect: NoSchedule

serviceMonitor:
  labels:
    prometheus: kube-prometheus
    environment: production
    tier: critical
