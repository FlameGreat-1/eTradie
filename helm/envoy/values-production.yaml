# helm/envoy values-production.yaml
# Layered on top of values.yaml. Production already drives the base
# values, so this file only adds production-only annotations / node
# pinning that should NOT bleed into staging or future environments.

podAnnotations:
  cluster-autoscaler.kubernetes.io/safe-to-evict: "false"
  tier: "production"

nodeSelector:
  node.kubernetes.io/instance-type: c6i.2xlarge

tolerations:
  - key: "workload"
    operator: "Equal"
    value: "edge"
    effect: "NoSchedule"

serviceMonitor:
  labels:
    prometheus: kube-prometheus
    environment: production
    tier: critical
