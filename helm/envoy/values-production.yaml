# helm/envoy values-production.yaml
# Layered on top of values.yaml. Production already drives the base
# values, so this file only adds production-only annotations and node
# scheduling that should NOT bleed into staging or future environments.

podAnnotations:
  cluster-autoscaler.kubernetes.io/safe-to-evict: "false"
  tier: "production"

# Cloud-agnostic: do NOT pin AWS-specific instance types here. Envoy
# tolerates the etradie-system taint (set by
# infrastructure/cluster/main.tf::eks_managed_node_groups.etradie_system)
# so it lands on the dedicated internal-data-plane node group with
# gateway/engine/execution/management. The previous overlay tolerated
# the `edge` taint, which is reserved for edge-ingress; that was wrong
# and caused envoy to compete with edge-ingress for capacity on the
# public-facing pool.
#
# A toleration without a matching taint is a no-op, so this stays
# cloud-agnostic.
nodeSelector: {}

tolerations:
  - key: workload
    operator: Equal
    value: etradie-system
    effect: NoSchedule

serviceMonitor:
  labels:
    prometheus: kube-prometheus
    environment: production
    tier: critical

# Distributed tracing ON. Envoy is the edge-rooted first span and
# propagates W3C traceparent to the gateway. Head-sampling at 20% is
# made once here at the root and honoured by every downstream hop
# (sampled flag in the propagated traceparent), bounding collector +
# Jaeger load while capturing a representative slice of COMPLETE traces.
# The collectorAddress/Port/serviceName come from the base values block.
config:
  envoy:
    tracing:
      enabled: true
      samplePercent: 20

# TIER 5 browser security response headers (CSP / X-Frame-Options /
# X-Content-Type-Options / Referrer-Policy) are inherited UNCHANGED from
# helm/envoy/values.yaml::securityHeaders. They are an API-origin policy
# (default-src 'none'; frame-ancestors 'none') that is identical in every
# environment, so there is deliberately no production override here.
# Override a single header only if a production-specific need arises.
