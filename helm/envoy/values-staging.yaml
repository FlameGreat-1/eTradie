# helm/envoy values-staging.yaml
# Layered on top of values.yaml. TABLE 2B profile (BUDGET.md):
# single-node Contabo, full stack ON, 1 replica.

replicaCount: 1
environment: "staging"

image:
  tag: "v1.28.0"

resources:
  requests:
    cpu: 250m
    memory: 256Mi
    ephemeral-storage: 256Mi
  limits:
    cpu: "1"
    memory: 512Mi
    ephemeral-storage: 512Mi

# Single node: an HPA scale-up adds no availability and competes for
# the same CPU the MT tenants need. Pinned OFF; revert with the base
# values on a multi-node cluster.
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 1

# A 1-replica PDB with minAvailable>=1 blocks every node drain forever.
podDisruptionBudget:
  enabled: false

# Single-node scheduling: the base chart's REQUIRED hostname
# anti-affinity + strategy maxSurge:1/maxUnavailable:0 deadlocks every
# rollout on one node (the surge pod can never schedule beside the old
# pod). Drop the required term (null deletes the base key) and keep a
# preferred term so multi-node clusters still spread.
affinity:
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution: null
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: etradie-envoy
          topologyKey: kubernetes.io/hostname

resourceQuota:
  hard:
    requestsCpu: "2"
    requestsMemory: "4Gi"
    limitsCpu: "4"
    limitsMemory: "8Gi"
    persistentvolumeclaims: "0"
    servicesLoadbalancers: "0"
    servicesNodeports: "0"

# LimitRange retuned for the lean profile. min MUST admit the Linkerd
# proxy sidecar (50m/64Mi requests, verified in
# deployments/linkerd/control-plane-values.yaml); the base min of
# 100m/128Mi would reject every meshed pod in this namespace at
# admission.
limitRange:
  container:
    max:
      cpu: "2"
      memory: "2Gi"
    min:
      cpu: "50m"
      memory: "64Mi"
    default:
      cpu: "1"
      memory: "512Mi"
    defaultRequest:
      cpu: "250m"
      memory: "256Mi"

serviceMonitor:
  interval: 15s
  scrapeTimeout: 10s
  labels:
    prometheus: kube-prometheus
    environment: staging

# TIER4 A2a: keep the filter ENABLED but ENFORCED at 0% in staging so
# the 429 path is exercised in metrics/logs without rejecting traffic.
# Flip enforcedFraction to 100 in a staging soak before trusting the
# prod value.
config:
  envoy:
    localRateLimit:
      enabled: true
      maxTokens: 500
      tokensPerFill: 500
      fillIntervalSeconds: 1
      enforcedFraction: 0
    # Distributed tracing ON at 100% in staging for full trace
    # visibility during validation. collectorAddress/Port/serviceName
    # come from the base values block.
    tracing:
      enabled: true
      samplePercent: 100

# TIER 5 browser security response headers are inherited UNCHANGED from
# helm/envoy/values.yaml::securityHeaders.

terminationGracePeriodSeconds: 45

volumes:
  tmp:
    sizeLimit: "100Mi"
  cache:
    sizeLimit: "500Mi"
