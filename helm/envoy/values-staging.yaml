replicaCount: 3

resources:
  requests:
    cpu: 1
    memory: 2Gi
    ephemeral-storage: 1Gi
  limits:
    cpu: 2
    memory: 4Gi
    ephemeral-storage: 2Gi

autoscaling:
  minReplicas: 3
  maxReplicas: 6
  targetCPUUtilizationPercentage: 65
  targetMemoryUtilizationPercentage: 75

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: etradie-envoy
          topologyKey: kubernetes.io/hostname

topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: etradie-envoy

terminationGracePeriodSeconds: 45

env:
  - name: ENVIRONMENT
    value: "staging"
  - name: LOG_LEVEL
    value: "info"

serviceMonitor:
  interval: 15s
  scrapeTimeout: 10s
  labels:
    environment: staging
