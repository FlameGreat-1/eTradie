# helm/envoy values-staging.yaml
# Layered on top of values.yaml. Only fields that genuinely differ in
# staging are listed.

replicaCount: 3
environment: "staging"

image:
  tag: "v1.28.0"

resources:
  requests:
    cpu: "1"
    memory: 2Gi
    ephemeral-storage: 512Mi
  limits:
    cpu: "2"
    memory: 4Gi
    ephemeral-storage: 1Gi

autoscaling:
  minReplicas: 3
  maxReplicas: 6
  targetCPUUtilizationPercentage: 65
  targetMemoryUtilizationPercentage: 75

podDisruptionBudget:
  minAvailable: 2

resourceQuota:
  hard:
    requestsCpu: "10"
    requestsMemory: "20Gi"
    limitsCpu: "20"
    limitsMemory: "40Gi"

serviceMonitor:
  interval: 15s
  scrapeTimeout: 10s
  labels:
    prometheus: kube-prometheus
    environment: staging

# TIER4 A2a: in staging keep the filter ENABLED but ENFORCED at 0% so
# the 429 path is exercised in metrics/logs without actually rejecting
# traffic, and trip it at a lower token ceiling for load testing. Flip
# enforcedFraction to 100 in a staging soak before trusting the prod
# value. (config block is layered over values.yaml.)
config:
  envoy:
    localRateLimit:
      enabled: true
      maxTokens: 500
      tokensPerFill: 500
      fillIntervalSeconds: 1
      enforcedFraction: 0

terminationGracePeriodSeconds: 45

volumes:
  tmp:
    sizeLimit: "100Mi"
  cache:
    sizeLimit: "500Mi"
