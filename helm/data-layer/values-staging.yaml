# Staging overlay for the etradie-data-layer chart.
# Smaller storage; backups disabled (staging is rebuildable from
# alembic + RAG ingest).

postgres:
  storage:
    size: 4Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  externalSecret:
    vaultPath: etradie/data-layer/postgres/staging
    refreshInterval: 5m
  backup:
    enabled: false

redis:
  storage:
    size: 1Gi
  maxmemory: "128mb"
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi
  externalSecret:
    vaultPath: etradie/data-layer/redis/staging
    refreshInterval: 5m

chromadb:
  storage:
    size: 4Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  externalSecret:
    vaultPath: etradie/data-layer/chromadb/staging
    refreshInterval: 5m
