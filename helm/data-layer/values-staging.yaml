# Staging overlay for the etradie-data-layer chart.
#
# TABLE 2B profile (BUDGET.md): single-node Contabo, full stack ON.
# Backups disabled in staging (rebuildable from alembic + RAG ingest);
# exporters stay ON (metrics.enabled base default) because monitoring
# is ON in this profile.

postgres:
  storage:
    size: 4Gi
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  externalSecret:
    vaultPath: etradie/data-layer/postgres/staging
    refreshInterval: 5m
  backup:
    enabled: false

redis:
  storage:
    size: 1Gi
  # ~50% of the 512Mi container limit so RESP buffers + fork overhead
  # never push the process past the cgroup ceiling.
  maxmemory: "256mb"
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  externalSecret:
    vaultPath: etradie/data-layer/redis/staging
    refreshInterval: 5m

chromadb:
  storage:
    size: 4Gi
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  externalSecret:
    vaultPath: etradie/data-layer/chromadb/staging
    refreshInterval: 5m
