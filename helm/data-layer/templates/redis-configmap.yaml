{{- if .Values.redis.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "redis.configMap" . }}
  namespace: {{ include "data-layer.namespace" . }}
  labels:
    {{- include "redis.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis-config
  annotations:
    description: "Redis runtime configuration. Mirrors docker-compose.yml command-line flags. Password is supplied via env var at startup, never persisted here."
data:
  # Mounted at /etc/redis/redis.conf. The container starts with
  # `redis-server /etc/redis/redis.conf --requirepass $REDIS_PASSWORD`
  # so the auth password is appended on the command line at runtime,
  # NOT baked into the configmap.
  redis.conf: |
    bind 0.0.0.0
    protected-mode yes
    port {{ .Values.redis.service.port | default 6379 }}
    dir /data
    maxmemory {{ .Values.redis.maxmemory | default "512mb" }}
    maxmemory-policy {{ .Values.redis.maxmemoryPolicy | default "allkeys-lru" }}
    appendonly {{ .Values.redis.appendOnly | default "no" }}
    {{- if .Values.redis.saveSchedule }}
    save {{ .Values.redis.saveSchedule }}
    {{- else }}
    save ""
    {{- end }}
    # Disable dangerous commands.
    rename-command FLUSHALL ""
    rename-command FLUSHDB ""
    rename-command CONFIG ""
    rename-command DEBUG ""
    rename-command SHUTDOWN ""
{{- end }}
