{{- if .Values.redis.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "redis.configMap" . }}
  namespace: {{ include "data-layer.namespace" . }}
  labels:
    {{- include "redis.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis-config
  annotations:
    description: "Redis runtime configuration template. Mirrors docker-compose.yml command-line flags. The password is never persisted here; an init container appends it to the rendered runtime config."
data:
  # Mounted read-only at /etc/redis-template/redis.conf. The render
  # init container concatenates this template with a runtime
  # `requirepass <password>` line into /run/redis/redis.conf, and the
  # redis container starts with `redis-server /run/redis/redis.conf`.
  # The password therefore never appears on argv or in this ConfigMap.
  redis.conf: |
    bind 0.0.0.0
    protected-mode yes
    port {{ .Values.redis.service.port | default 6379 }}
    dir /data
    maxmemory {{ .Values.redis.maxmemory | default "512mb" }}
    maxmemory-policy {{ .Values.redis.maxmemoryPolicy | default "allkeys-lru" }}
    appendonly {{ .Values.redis.appendOnly | default "no" }}
    {{- if .Values.redis.saveSchedule }}
    save {{ .Values.redis.saveSchedule }}
    {{- else }}
    save ""
    {{- end }}
    # Disable dangerous commands.
    rename-command FLUSHALL ""
    rename-command FLUSHDB ""
    rename-command CONFIG ""
    rename-command DEBUG ""
    rename-command SHUTDOWN ""
{{- end }}
