{{- if and .Values.postgres.enabled .Values.postgres.externalSecret.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "postgres.secretName" . }}
  namespace: {{ include "data-layer.namespace" . }}
  labels:
    {{- include "postgres.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres-secret
  annotations:
    description: "PostgreSQL bootstrap credentials resolved from Vault."
spec:
  refreshInterval: {{ .Values.postgres.externalSecret.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ .Values.postgres.externalSecret.secretStoreName | default "vault-backend" }}
    kind: {{ .Values.postgres.externalSecret.secretStoreKind | default "ClusterSecretStore" }}
  target:
    name: {{ include "postgres.secretName" . }}
    creationPolicy: {{ .Values.postgres.externalSecret.creationPolicy | default "Owner" }}
  data:
    # secretKey == env var name. The synthesised Secret carries
    # POSTGRES_USER / POSTGRES_DB / POSTGRES_PASSWORD directly so the
    # StatefulSet's envFrom secretRef populates them as env vars
    # without any template indirection.
    - secretKey: POSTGRES_USER
      remoteRef:
        key: {{ .Values.postgres.externalSecret.vaultPath | quote }}
        property: postgres_user
    - secretKey: POSTGRES_DB
      remoteRef:
        key: {{ .Values.postgres.externalSecret.vaultPath | quote }}
        property: postgres_db
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: {{ .Values.postgres.externalSecret.vaultPath | quote }}
        property: postgres_password
{{- end }}
