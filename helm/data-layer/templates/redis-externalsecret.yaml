{{- if and .Values.redis.enabled .Values.redis.externalSecret.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "redis.secretName" . }}
  namespace: {{ include "data-layer.namespace" . }}
  labels:
    {{- include "redis.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis-secret
  annotations:
    description: "Redis password resolved from Vault."
spec:
  refreshInterval: {{ .Values.redis.externalSecret.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ .Values.redis.externalSecret.secretStoreName | default "vault-backend" }}
    kind: {{ .Values.redis.externalSecret.secretStoreKind | default "ClusterSecretStore" }}
  target:
    name: {{ include "redis.secretName" . }}
    creationPolicy: {{ .Values.redis.externalSecret.creationPolicy | default "Owner" }}
  data:
    - secretKey: REDIS_PASSWORD
      remoteRef:
        key: {{ .Values.redis.externalSecret.vaultPath | quote }}
        property: redis_password
{{- end }}
