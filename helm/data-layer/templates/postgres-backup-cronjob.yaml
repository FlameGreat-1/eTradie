{{- if and .Values.postgres.enabled .Values.postgres.backup.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "postgres.backupPVC" . }}
  namespace: {{ include "data-layer.namespace" . }}
  labels:
    {{- include "postgres.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres-backup
spec:
  accessModes:
    {{- toYaml .Values.postgres.backup.storage.accessModes | nindent 4 }}
  {{- if .Values.postgres.backup.storage.storageClassName }}
  storageClassName: {{ .Values.postgres.backup.storage.storageClassName | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.postgres.backup.storage.size }}
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "postgres.backupName" . }}
  namespace: {{ include "data-layer.namespace" . }}
  labels:
    {{- include "postgres.labels" . | nindent 4 }}
    app.kubernetes.io/name: postgres-backup
    app.kubernetes.io/component: postgres-backup
spec:
  schedule: {{ .Values.postgres.backup.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 600
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 3600
      # Completed backup pods release their RWO PVC claim within an hour
      # so the next scheduled job can schedule on a different node if
      # the previous node is unreachable. Audit ref: D-H5.
      ttlSecondsAfterFinished: 3600
      template:
        metadata:
          labels:
            {{- include "data-layer.commonLabels" . | nindent 12 }}
            app.kubernetes.io/name: postgres-backup
            app.kubernetes.io/component: postgres-backup
        spec:
          restartPolicy: OnFailure
          automountServiceAccountToken: false
          securityContext:
            runAsNonRoot: true
            runAsUser: 70
            runAsGroup: 70
            fsGroup: 70
            seccompProfile:
              type: RuntimeDefault
          {{- with .Values.postgres.nodeSelector }}
          nodeSelector:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.postgres.tolerations }}
          tolerations:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          # Co-schedule with the postgres pod. The backups PVC is
          # ReadWriteOnce; landing on the same node as postgres (and
          # therefore the same node the RWO volume attaches to) avoids a
          # Multi-Attach hang on multi-node clusters. NOTE: this
          # deliberately does NOT inherit .Values.postgres.affinity,
          # which is the postgres pod's ANTI-affinity and would push the
          # job away from postgres.
          affinity:
            podAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      {{- include "postgres.selectorLabels" . | nindent 22 }}
                  topologyKey: kubernetes.io/hostname
          {{- with .Values.postgres.topologySpreadConstraints }}
          topologySpreadConstraints:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          containers:
            - name: backup
              image: "{{ .Values.postgres.backup.image.repository }}:{{ .Values.postgres.backup.image.tag }}"
              imagePullPolicy: {{ .Values.postgres.backup.image.pullPolicy | default "IfNotPresent" }}
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                runAsNonRoot: true
                runAsUser: 70
                capabilities:
                  drop:
                    - ALL
              env:
                - name: PGHOST
                  value: {{ .Values.postgres.service.name | default "postgres" }}
                - name: PGPORT
                  value: {{ .Values.postgres.service.port | default 5432 | quote }}
                - name: PGUSER
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "postgres.secretName" . }}
                      key: POSTGRES_USER
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "postgres.secretName" . }}
                      key: POSTGRES_PASSWORD
                - name: PGDATABASE
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "postgres.secretName" . }}
                      key: POSTGRES_DB
                - name: RETENTION_DAYS
                  value: {{ .Values.postgres.backup.retentionDays | default 7 | quote }}
                {{- if .Values.postgres.backup.offsite.enabled }}
                - name: OFFSITE_WAIT_SECS
                  value: {{ .Values.postgres.backup.offsite.uploadTimeoutSeconds | default 1800 | quote }}
                {{- end }}
              command:
                - sh
                - -c
                - |
                  set -eu
                  STAMP=$(date -u +%Y%m%dT%H%M%SZ)
                  TARGET=/backups/etradie-${STAMP}.dump
                  echo "[backup] writing ${TARGET}"
                  pg_dump --format=custom --no-owner --no-privileges "${PGDATABASE}" > "${TARGET}.tmp"
                  mv "${TARGET}.tmp" "${TARGET}"
                  echo "[backup] pg_dump complete: $(ls -lh "${TARGET}")"
                  # Signal the offsite-upload container (if any) that
                  # a new dump is ready to upload. Audit ref: D-H3.
                  echo "${TARGET}" > /backups/.dump-ready
                  {{- if .Values.postgres.backup.offsite.enabled }}
                  echo "[backup] waiting for offsite-upload to confirm copy (max ${OFFSITE_WAIT_SECS}s)"
                  wait_deadline=$(( $(date +%s) + ${OFFSITE_WAIT_SECS} ))
                  while [ ! -f /backups/.upload-ready ]; do
                    if [ "$(date +%s)" -ge "${wait_deadline}" ]; then
                      echo "[backup] FATAL: offsite-upload did not complete within ${OFFSITE_WAIT_SECS}s; skipping retention prune so the latest dump is preserved locally."
                      exit 1
                    fi
                    sleep 5
                  done
                  echo "[backup] offsite-upload confirmed"
                  # Reset the flag so the NEXT run's wait blocks until
                  # the NEXT upload completes.
                  rm -f /backups/.upload-ready /backups/.dump-ready
                  {{- end }}
                  echo "[backup] retention prune (>${RETENTION_DAYS} days)"
                  find /backups -maxdepth 1 -type f -name 'etradie-*.dump' -mtime "+${RETENTION_DAYS}" -print -delete
                  echo "[backup] done"
              resources:
                {{- toYaml .Values.postgres.backup.resources | nindent 16 }}
              volumeMounts:
                - name: backups
                  mountPath: /backups
                - name: tmp
                  mountPath: /tmp
            {{- if .Values.postgres.backup.offsite.enabled }}
            # Off-cluster upload step. rclone copies every freshly
            # written dump to the S3-compatible remote configured in
            # the postgres-backup-credentials ExternalSecret. Runs
            # as a second container in the SAME pod so it sees the
            # /backups volume the backup container wrote to. The
            # backup container blocks on .upload-ready before
            # running retention prune so a failed upload cannot lose
            # the only off-cluster-pending copy. Audit ref: D-H3.
            - name: offsite-upload
              image: "{{ .Values.postgres.backup.offsite.image.repository }}:{{ .Values.postgres.backup.offsite.image.tag }}"
              imagePullPolicy: {{ .Values.postgres.backup.offsite.image.pullPolicy | default "IfNotPresent" }}
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                runAsNonRoot: true
                runAsUser: 70
                capabilities:
                  drop:
                    - ALL
              envFrom:
                - secretRef:
                    name: postgres-backup-credentials
                    optional: false
              command:
                - sh
                - -c
                - |
                  set -eu
                  echo "[offsite-upload] waiting for backup container to write .dump-ready"
                  while [ ! -f /backups/.dump-ready ]; do sleep 2; done
                  TARGET=$(cat /backups/.dump-ready)
                  echo "[offsite-upload] dump ready: ${TARGET}"
                  echo "[offsite-upload] materialising rclone.conf from RCLONE_CONFIG env"
                  mkdir -p /tmp/rclone
                  printf '%s\n' "${RCLONE_CONFIG}" > /tmp/rclone/rclone.conf
                  chmod 0600 /tmp/rclone/rclone.conf
                  echo "[offsite-upload] rclone copy ${TARGET} -> ${RCLONE_REMOTE_NAME}:${REMOTE_BUCKET}/${REMOTE_PATH_PREFIX}"
                  rclone --config /tmp/rclone/rclone.conf \
                    copy --immutable --no-traverse \
                    "${TARGET}" \
                    "${RCLONE_REMOTE_NAME}:${REMOTE_BUCKET}/${REMOTE_PATH_PREFIX}"
                  echo "[offsite-upload] rclone copy complete"
                  touch /backups/.upload-ready
                  echo "[offsite-upload] done"
              resources:
                {{- toYaml .Values.postgres.backup.offsite.resources | nindent 16 }}
              volumeMounts:
                - name: backups
                  mountPath: /backups
                - name: tmp
                  mountPath: /tmp
                - name: rclone-conf
                  mountPath: /tmp/rclone
            {{- end }}
          volumes:
            - name: backups
              persistentVolumeClaim:
                claimName: {{ include "postgres.backupPVC" . }}
            - name: tmp
              emptyDir:
                sizeLimit: 64Mi
            {{- if .Values.postgres.backup.offsite.enabled }}
            - name: rclone-conf
              emptyDir:
                sizeLimit: 1Mi
            {{- end }}
{{- end }}
