{{- if and .Values.postgres.enabled .Values.postgres.initSQL.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "postgres.initSqlConfigMap" . }}
  namespace: {{ include "data-layer.namespace" . }}
  labels:
    {{- include "postgres.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres-init
  annotations:
    description: "PostgreSQL one-time initialisation SQL. Mounted at /docker-entrypoint-initdb.d/init.sql; executed by the postgres entrypoint on first container start only."
data:
  init.sql: |
    -- eTradie Engine — PostgreSQL Initialization
    -- Executed once on first container start. Mirrors
    -- docker/postgres/init.sql so the same SQL runs in docker-compose
    -- and in cluster.

    -- Extensions.
    CREATE EXTENSION IF NOT EXISTS "uuid-ossp";
    CREATE EXTENSION IF NOT EXISTS "pg_trgm";

    -- Least-privilege hardening. The official postgres entrypoint
    -- creates the role named by POSTGRES_USER as a SUPERUSER and runs
    -- this script AS that role. A superuser connection string in any one service
    -- means a single leaked credential can drop tables, erase the
    -- audit trail, create new roles, read every broker credential, and
    -- bypass row-level security.
    --
    -- We strip the dangerous role attributes in place. The role stays
    -- the OWNER of the application database and of every object it
    -- creates, so each service can still run its idempotent startup
    -- DDL (the Go SchemaSQL() bodies and the engine's Alembic
    -- migrations) and the SECURITY DEFINER maintenance functions keep
    -- executing as this owner. It simply can no longer act as a
    -- cluster superuser.
    --
    -- CREATEDB is deliberately retained: the weekly restore drill
    -- connects as this same role and must CREATE/DROP a throwaway
    -- scratch database to prove the latest dump restores. CREATEDB only
    -- lets the role create and drop databases it owns; it grants no
    -- access to other databases, no role creation, no RLS bypass, and
    -- no superuser escalation.
    --
    -- A role is allowed to drop its own superuser attribute, so this
    -- runs correctly even though the entrypoint executes the script as
    -- the role itself. We target current_user by name so the statement
    -- is independent of whatever POSTGRES_USER is set to.
    DO $$
    BEGIN
        EXECUTE format(
            'ALTER ROLE %I NOSUPERUSER NOCREATEROLE NOREPLICATION NOBYPASSRLS',
            current_user
        );
    END
    $$;

    -- The application database is created by the postgres entrypoint
    -- from POSTGRES_DB. Application schema lives inside the default
    -- public schema. Alembic migrations (and the inline SchemaSQL()
    -- of execution + management) manage all table creation.
    -- Audit ref: D-C4.
{{- end }}
