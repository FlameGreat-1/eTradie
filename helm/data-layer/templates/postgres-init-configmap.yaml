{{- if and .Values.postgres.enabled .Values.postgres.initSQL.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "postgres.initSqlConfigMap" . }}
  namespace: {{ include "data-layer.namespace" . }}
  labels:
    {{- include "postgres.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres-init
  annotations:
    description: "PostgreSQL one-time initialisation SQL. Mounted at /docker-entrypoint-initdb.d/init.sql; executed by the postgres entrypoint on first container start only."
data:
  init.sql: |
    -- eTradie Engine — PostgreSQL Initialization
    -- Executed once on first container start. Mirrors
    -- docker/postgres/init.sql so the same SQL runs in docker-compose
    -- and in cluster.

    -- Extensions.
    CREATE EXTENSION IF NOT EXISTS "uuid-ossp";
    CREATE EXTENSION IF NOT EXISTS "pg_trgm";

    -- Ensure the application database exists (Docker POSTGRES_DB
    -- handles this, but we guard it here for manual setups).
    SELECT 'CREATE DATABASE etradie'
    WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'etradie')\gexec

    -- Application schema lives inside the default public schema.
    -- Alembic migrations (and the inline SchemaSQL() of execution +
    -- management) manage all table creation.
{{- end }}
