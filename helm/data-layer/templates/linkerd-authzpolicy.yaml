{{- if .Values.linkerdPolicy.enabled }}
{{- /*
Tier 9 G9-2: per-datastore Linkerd authorization.
SA identities: <sa>.etradie-system.serviceaccount.identity.linkerd.cluster.local
(SA name = release name = etradie-<svc>, verified in each service's
_helpers.tpl). Postgres/Redis are server-first TCP -> proxyProtocol
opaque (matches the opaque-ports injection in Phase 1). Chroma is HTTP.
The postgres-backup Job pod is UN-meshed and admitted by a same-ns
NetworkAuthentication so nightly backups keep working.
*/ -}}
{{- $ns := include "data-layer.namespace" . -}}
{{- $idfmt := "%s.etradie-system.serviceaccount.identity.linkerd.cluster.local" -}}
{{- if .Values.postgres.enabled }}
# ── Postgres :5432 ──────────────────────────────────────────
apiVersion: policy.linkerd.io/v1beta3
kind: Server
metadata:
  name: postgres
  namespace: {{ $ns }}
  labels:
    {{- include "postgres.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: postgres
  port: {{ .Values.postgres.service.port }}
  proxyProtocol: opaque
---
apiVersion: policy.linkerd.io/v1beta3
kind: MeshTLSAuthentication
metadata:
  name: postgres-callers
  namespace: {{ $ns }}
  labels:
    {{- include "postgres.labels" . | nindent 4 }}
spec:
  identities:
    {{- range .Values.linkerdPolicy.postgresCallers }}
    - {{ printf $idfmt . | quote }}
    {{- end }}
---
# Un-meshed same-cluster batch clients of postgres. Batch Jobs stay
# un-meshed (a meshed restartPolicy:Never/OnFailure Job pod would keep
# the proxy running and never terminate) and are admitted by source
# network. This intentionally covers EVERY un-meshed private-CIDR
# client of postgres in the cluster, which today is:
#   - the nightly postgres-backup CronJob pod, and
#   - the operator-run engine credential-rewrap Job (Tier 3 KEK
#     rotation; carries engine.selectorLabels so the engine
#     NetworkPolicy egress to :5432 applies).
# Linkerd evaluates requiredAuthenticationRefs as an OR, so an
# un-meshed source satisfying this NetworkAuthentication is authorized
# even though it presents no mTLS identity. The PRECISE per-pod control
# is the NetworkPolicy (which restricts :5432 ingress to the exact
# caller pods); this authn is the mesh-layer defense-in-depth that
# keeps those un-meshed batch paths working once authz is enabled.
apiVersion: policy.linkerd.io/v1alpha1
kind: NetworkAuthentication
metadata:
  name: postgres-backup-network
  namespace: {{ $ns }}
  labels:
    {{- include "postgres.labels" . | nindent 4 }}
spec:
  networks:
    - cidr: 10.0.0.0/8
    - cidr: 172.16.0.0/12
    - cidr: 192.168.0.0/16
    - cidr: 100.64.0.0/10
---
apiVersion: policy.linkerd.io/v1alpha1
kind: AuthorizationPolicy
metadata:
  name: postgres-authz
  namespace: {{ $ns }}
  labels:
    {{- include "postgres.labels" . | nindent 4 }}
spec:
  targetRef:
    group: policy.linkerd.io
    kind: Server
    name: postgres
  requiredAuthenticationRefs:
    - group: policy.linkerd.io
      kind: MeshTLSAuthentication
      name: postgres-callers
    - group: policy.linkerd.io
      kind: NetworkAuthentication
      name: postgres-backup-network
{{- if .Values.postgres.metrics.enabled }}
---
# postgres-exporter :9187 (HTTP) — Prometheus only. The exporter is a
# separate HTTP port on the meshed postgres pod, so it needs its own
# Server + authz; the opaque postgres Server above does not cover it.
# Prometheus is un-meshed, so it is admitted by source network (the
# same posture as postgres-backup-network), with the NetworkPolicy as
# the precise per-pod control.
apiVersion: policy.linkerd.io/v1beta3
kind: Server
metadata:
  name: postgres-metrics
  namespace: {{ $ns }}
  labels:
    {{- include "postgres.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: postgres
  port: {{ .Values.postgres.metrics.exporter.port | default 9187 }}
  proxyProtocol: HTTP/1
---
apiVersion: policy.linkerd.io/v1alpha1
kind: NetworkAuthentication
metadata:
  name: postgres-metrics-network
  namespace: {{ $ns }}
  labels:
    {{- include "postgres.labels" . | nindent 4 }}
spec:
  networks:
    - cidr: 10.0.0.0/8
    - cidr: 172.16.0.0/12
    - cidr: 192.168.0.0/16
    - cidr: 100.64.0.0/10
---
apiVersion: policy.linkerd.io/v1alpha1
kind: AuthorizationPolicy
metadata:
  name: postgres-metrics-authz
  namespace: {{ $ns }}
  labels:
    {{- include "postgres.labels" . | nindent 4 }}
spec:
  targetRef:
    group: policy.linkerd.io
    kind: Server
    name: postgres-metrics
  requiredAuthenticationRefs:
    - group: policy.linkerd.io
      kind: NetworkAuthentication
      name: postgres-metrics-network
{{- end }}
{{- end }}
