{{- if and .Values.chromadb.enabled .Values.chromadb.externalSecret.enabled }}
{{- /*
Fail-fast on a missing Vault path. Audit ref: post-merge audit H2, M5.
*/ -}}
{{- $vaultPath := required "helm/data-layer: .Values.chromadb.externalSecret.vaultPath is required when chromadb.externalSecret.enabled=true. Set it to the canonical Vault path, e.g. etradie/data-layer/chromadb/production." .Values.chromadb.externalSecret.vaultPath -}}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "chromadb.secretName" . }}
  namespace: {{ include "data-layer.namespace" . }}
  labels:
    {{- include "chromadb.labels" . | nindent 4 }}
    app.kubernetes.io/component: chromadb-secret
  annotations:
    description: "ChromaDB auth token resolved from Vault. Same value engine reads as RAG_CHROMA_AUTH_TOKEN."
spec:
  refreshInterval: {{ .Values.chromadb.externalSecret.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ .Values.chromadb.externalSecret.secretStoreName | default "vault-backend" }}
    kind: {{ .Values.chromadb.externalSecret.secretStoreKind | default "ClusterSecretStore" }}
  target:
    name: {{ include "chromadb.secretName" . }}
    creationPolicy: {{ .Values.chromadb.externalSecret.creationPolicy | default "Owner" }}
  data:
    # secretKey == env var name expected by the chromadb 0.5.x server.
    # The Vault property is the simpler 'auth_token' so the engine
    # ExternalSecret can read from the SAME path (single source of
    # truth between server and client). Audit ref: IV-C2, X-6, D-C3.
    - secretKey: CHROMA_SERVER_AUTHN_CREDENTIALS
      remoteRef:
        key: {{ .Values.chromadb.externalSecret.vaultPath | quote }}
        property: auth_token
{{- end }}
