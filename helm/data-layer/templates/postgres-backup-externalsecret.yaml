{{- if and .Values.postgres.enabled .Values.postgres.backup.enabled .Values.postgres.backup.offsite.enabled }}
{{- /*
Fail-fast on a missing Vault path. Off-cluster backup is broken without
it. Audit ref: D-H3.
*/ -}}
{{- $vaultPath := required "helm/data-layer: .Values.postgres.backup.offsite.vaultPath is required when postgres.backup.offsite.enabled=true. Set it to the canonical Vault path, e.g. etradie/data-layer/postgres-backup/production." .Values.postgres.backup.offsite.vaultPath -}}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: postgres-backup-credentials
  namespace: {{ include "data-layer.namespace" . }}
  labels:
    {{- include "postgres.labels" . | nindent 4 }}
  annotations:
    description: "rclone configuration + remote-bucket identity for the postgres-backup CronJob. Audit ref: D-H3."
spec:
  refreshInterval: {{ .Values.postgres.backup.offsite.externalSecret.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ .Values.postgres.backup.offsite.externalSecret.secretStoreName | default "vault-backend" }}
    kind: {{ .Values.postgres.backup.offsite.externalSecret.secretStoreKind | default "ClusterSecretStore" }}
  target:
    name: postgres-backup-credentials
    creationPolicy: {{ .Values.postgres.backup.offsite.externalSecret.creationPolicy | default "Owner" }}
  data:
    # The full rclone.conf body. Multi-provider — the operator can
    # define more than one [remote] section in the same file; only
    # the remote whose name equals RCLONE_REMOTE_NAME is used.
    - secretKey: RCLONE_CONFIG
      remoteRef:
        key: {{ $vaultPath | quote }}
        property: rclone_config
    - secretKey: RCLONE_REMOTE_NAME
      remoteRef:
        key: {{ $vaultPath | quote }}
        property: rclone_remote_name
    - secretKey: REMOTE_BUCKET
      remoteRef:
        key: {{ $vaultPath | quote }}
        property: remote_bucket
    - secretKey: REMOTE_PATH_PREFIX
      remoteRef:
        key: {{ $vaultPath | quote }}
        property: remote_path_prefix
{{- end }}
