{{- if .Values.redis.enabled }}
apiVersion: v1
kind: Service
metadata:
  # Name MUST stay `redis`. Engine, gateway, execution, management
  # all dial redis.etradie-system.svc.cluster.local:6379.
  name: {{ .Values.redis.service.name | default "redis" }}
  namespace: {{ include "data-layer.namespace" . }}
  labels:
    {{- include "redis.labels" . | nindent 4 }}
  annotations:
    description: "Redis ClusterIP. Consumed by engine + alert hub in execution + management."
spec:
  type: ClusterIP
  selector:
    {{- include "redis.selectorLabels" . | nindent 4 }}
  ports:
    - name: redis
      port: {{ .Values.redis.service.port | default 6379 }}
      targetPort: redis
      protocol: TCP
      # NO appProtocol here. The redis POD carries
      # config.linkerd.io/opaque-ports: "6379" (raw-TCP mTLS tunnel).
      # Declaring appProtocol: redis made meshed callers' OUTBOUND
      # proxy attempt L7 RESP handling while redis's INBOUND proxy
      # expects an opaque tunnel -> connection reset on the meshed
      # client->redis hop (same class as the postgres appProtocol bug,
      # phase10.6 RCA 2026-06-17). Leaving appProtocol unset lets
      # opaque-ports:6379 govern the hop end-to-end. Identical posture
      # to postgres + chromadb.
    {{- if .Values.redis.metrics.enabled }}
    - name: metrics
      port: {{ .Values.redis.metrics.exporter.port | default 9121 }}
      targetPort: metrics
      protocol: TCP
      appProtocol: http
    {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.redis.service.headlessName | default "redis-headless" }}
  namespace: {{ include "data-layer.namespace" . }}
  labels:
    {{- include "redis.labels" . | nindent 4 }}
  annotations:
    description: "Redis headless service for stable per-pod DNS."
spec:
  type: ClusterIP
  clusterIP: None
  publishNotReadyAddresses: false
  selector:
    {{- include "redis.selectorLabels" . | nindent 4 }}
  ports:
    - name: redis
      port: {{ .Values.redis.service.port | default 6379 }}
      targetPort: redis
      protocol: TCP
      # NO appProtocol (see ClusterIP Service above): opaque-ports:6379
      # on the redis pod governs this hop. Declaring appProtocol: redis
      # here breaks the meshed client->redis opaque mTLS path
      # (phase10.6 RCA 2026-06-17).
{{- end }}
