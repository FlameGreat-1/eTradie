{{- if .Values.networkPolicy.enabled }}
{{- if .Values.postgres.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: postgres-network-policy
  namespace: {{ include "data-layer.namespace" . }}
  labels:
    {{- include "postgres.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres-network-policy
spec:
  podSelector:
    matchLabels:
      {{- include "postgres.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Engine.
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: etradie-engine
      ports:
        - protocol: TCP
          port: {{ .Values.postgres.service.port | default 5432 }}
    # Gateway (auth tables).
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: etradie-gateway
      ports:
        - protocol: TCP
          port: {{ .Values.postgres.service.port | default 5432 }}
    # Execution (audit, pnl, watcher).
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: etradie-execution
      ports:
        - protocol: TCP
          port: {{ .Values.postgres.service.port | default 5432 }}
    # Management (journal, analytics).
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: etradie-management
      ports:
        - protocol: TCP
          port: {{ .Values.postgres.service.port | default 5432 }}
    # Backup CronJob.
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: postgres-backup
      ports:
        - protocol: TCP
          port: {{ .Values.postgres.service.port | default 5432 }}
    {{- if .Values.postgres.restoreDrill.enabled }}
    # Restore-drill CronJob. Connects to recreate + restore into a
    # throwaway scratch database.
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: postgres-restore-drill
      ports:
        - protocol: TCP
          port: {{ .Values.postgres.service.port | default 5432 }}
    {{- end }}
    # Linkerd proxy admin port :4191 scraped by Prometheus.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
          podSelector:
            matchLabels:
              app: prometheus
      ports:
        - protocol: TCP
          port: 4191
  egress:
    # The injected Linkerd proxy must reach the control plane in the
    # linkerd namespace (identity, destination, policy) or the pod
    # never becomes Ready.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: linkerd
    # Cluster DNS.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
{{- end }}
