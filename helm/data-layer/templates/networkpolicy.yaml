{{- if .Values.chromadb.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: chromadb-network-policy
  namespace: {{ include "data-layer.namespace" . }}
  labels:
    {{- include "chromadb.labels" . | nindent 4 }}
    app.kubernetes.io/component: chromadb-network-policy
spec:
  podSelector:
    matchLabels:
      {{- include "chromadb.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Only the engine talks to ChromaDB.
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: etradie-engine
      ports:
        - protocol: TCP
          port: {{ .Values.chromadb.service.port | default 8000 }}
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
{{- end }}
{{- end }}
