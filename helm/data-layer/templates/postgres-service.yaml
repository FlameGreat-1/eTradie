{{- if .Values.postgres.enabled }}
apiVersion: v1
kind: Service
metadata:
  # Name MUST stay `postgres` so the in-cluster URL is
  # postgres.etradie-system.svc.cluster.local:5432 - exactly the
  # FQDN engine/execution/management/gateway already encode in their
  # values.yaml (configmap.postgres.host, EXECUTION_DATABASE_URL, etc.).
  name: {{ .Values.postgres.service.name | default "postgres" }}
  namespace: {{ include "data-layer.namespace" . }}
  labels:
    {{- include "postgres.labels" . | nindent 4 }}
  annotations:
    description: "PostgreSQL ClusterIP. Consumed by engine, gateway, execution, management."
spec:
  type: ClusterIP
  selector:
    {{- include "postgres.selectorLabels" . | nindent 4 }}
  ports:
    - name: postgres
      port: {{ .Values.postgres.service.port | default 5432 }}
      targetPort: postgres
      protocol: TCP
      # NO appProtocol here. The postgres POD carries
      # config.linkerd.io/opaque-ports: "5432" (raw-TCP mTLS tunnel).
      # If this Service declared appProtocol: postgresql (as it did
      # before phase10.6 RCA 2026-06-17), the Linkerd 2.14 destination
      # controller advertises an L7 protocol to meshed callers; their
      # OUTBOUND proxy then opens an L7 connection while postgres's
      # INBOUND proxy expects an opaque tunnel. That mismatch, on top
      # of the pg driver's native SSLRequest->TLS preamble, resets the
      # connection mid-handshake -> `tls error: read: connection reset
      # by peer` on the meshed gateway/execution/management/billing
      # startup ping. Leaving appProtocol unset lets opaque-ports:5432
      # govern the hop end-to-end (identical posture to chromadb, see
      # chromadb-service.yaml). The un-meshed engine was never affected
      # because no outbound proxy touches its connection.
    {{- if .Values.postgres.metrics.enabled }}
    - name: metrics
      port: {{ .Values.postgres.metrics.exporter.port | default 9187 }}
      targetPort: metrics
      protocol: TCP
      appProtocol: http
    {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.postgres.service.headlessName | default "postgres-headless" }}
  namespace: {{ include "data-layer.namespace" . }}
  labels:
    {{- include "postgres.labels" . | nindent 4 }}
  annotations:
    description: "PostgreSQL headless service for stable per-pod DNS (postgres-0.postgres-headless.<ns>.svc.cluster.local)."
spec:
  type: ClusterIP
  clusterIP: None
  publishNotReadyAddresses: false
  selector:
    {{- include "postgres.selectorLabels" . | nindent 4 }}
  ports:
    - name: postgres
      port: {{ .Values.postgres.service.port | default 5432 }}
      targetPort: postgres
      protocol: TCP
      # NO appProtocol (see ClusterIP Service above): opaque-ports:5432
      # on the postgres pod governs this hop. Declaring
      # appProtocol: postgresql here breaks the meshed client->postgres
      # opaque mTLS TLS handshake (phase10.6 RCA 2026-06-17).
{{- end }}
