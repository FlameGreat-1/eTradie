{{- if .Values.postgres.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: {{ include "data-layer.namespace" . }}
  labels:
    {{- include "postgres.labels" . | nindent 4 }}
spec:
  serviceName: {{ .Values.postgres.service.headlessName | default "postgres-headless" }}
  replicas: {{ .Values.postgres.replicaCount | default 1 }}
  podManagementPolicy: OrderedReady
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      {{- include "postgres.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "postgres.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/init: {{ include (print $.Template.BasePath "/postgres-init-configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/postgres-externalsecret.yaml") . | sha256sum }}
        {{- with .Values.postgres.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 60
      securityContext:
        # Official postgres:16-alpine runs as uid:gid 70:70 internally.
        runAsNonRoot: true
        runAsUser: 70
        runAsGroup: 70
        fsGroup: 70
        seccompProfile:
          type: RuntimeDefault
      {{- with .Values.postgres.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.postgres.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.postgres.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.postgres.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.postgres.tls.enabled }}
      # tls-cert-init: generate a self-signed RSA server cert + key at
      # first boot. Reuses the postgres:16-alpine image (already cached
      # on the node; postgres user uid 70 is native). The openssl CLI
      # is NOT in the base image (libssl is, but not /usr/bin/openssl),
      # so the init container installs it via `apk add --no-cache
      # openssl` first, then drops privileges with `su-exec` to uid 70
      # before actually generating the cert. The resulting key + cert
      # files end up owned by uid 70 — the strict-mode owner postgres
      # checks at startup (`FATAL: private key file has group or world
      # access` otherwise).
      #
      # Security posture (Tier 9 / PSS):
      #   - The namespace is PSS warn+audit only (no enforce, owned by
      #     helm/data-layer/templates/namespace.yaml); a root init
      #     container is admitted under the same posture Linkerd's
      #     proxy-init already runs (NET_ADMIN + NET_RAW for iptables).
      #   - allowPrivilegeEscalation: false retained.
      #   - capabilities.drop: [ALL] retained.
      #   - readOnlyRootFilesystem MUST be false here because apk writes
      #     to /lib/apk and /usr/bin. The MAIN postgres container is
      #     unchanged (also readOnlyRootFilesystem: false because it
      #     writes the unix socket at /var/run/postgresql).
      #   - The actual cert generation runs as uid 70 via su-exec, so
      #     the only privileged step is the apk install itself.
      initContainers:
        - name: tls-cert-init
          image: "{{ .Values.postgres.image.repository }}:{{ .Values.postgres.image.tag }}"
          imagePullPolicy: {{ .Values.postgres.image.pullPolicy | default "IfNotPresent" }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: false
            runAsUser: 0
            capabilities:
              drop:
                - ALL
          command:
            - sh
            - -c
            - |
              set -eu
              CERT_DIR=/var/lib/postgresql/certs
              CERT_FILE=$CERT_DIR/server.crt
              KEY_FILE=$CERT_DIR/server.key
              CONFIG=/etc/postgres-tls-init/openssl.cnf
              VALIDITY_DAYS={{ .Values.postgres.tls.certValidityDays | default 3650 }}
              # Make sure the certs dir is writable + owned by the
              # postgres user. fsGroup: 70 on the pod sets the group;
              # explicit chown handles ownership for the case where
              # the init container created the dir as root.
              chown 70:70 "$CERT_DIR"
              chmod 0750 "$CERT_DIR"
              # Idempotency: regenerate only when the cert is missing
              # OR will expire in <30 days. This check runs BEFORE the
              # apk install so a rolling-restart on the same node
              # (cert already present) skips the install entirely.
              # Use the system 'test' for the file checks; openssl
              # comes later only if we need to inspect the cert.
              if [ -f "$CERT_FILE" ] && [ -f "$KEY_FILE" ]; then
                # Install openssl JUST to run the expiry check + log
                # subject/dates. This is cheap (~3MB, <2s) and only
                # needed if a regeneration path is possible.
                apk add --no-cache openssl >/dev/null 2>&1
                if openssl x509 -in "$CERT_FILE" -noout -checkend 2592000 >/dev/null 2>&1; then
                  echo "[tls-cert-init] existing cert is valid for >30d; skipping regeneration"
                  echo "[tls-cert-init] subject: $(openssl x509 -in "$CERT_FILE" -noout -subject)"
                  echo "[tls-cert-init] not after: $(openssl x509 -in "$CERT_FILE" -noout -enddate)"
                  exit 0
                fi
                echo "[tls-cert-init] existing cert expires within 30d; regenerating"
              else
                echo "[tls-cert-init] no cert present; installing openssl and generating fresh self-signed cert"
                apk add --no-cache openssl >/dev/null 2>&1
              fi
              # Drop privileges to uid 70 for the actual cert
              # generation. su-exec is shipped by the official
              # postgres:16-alpine image (the entrypoint uses it to
              # drop root before exec'ing postgres). umask 077 means
              # both files are created mode 0600 by default; we then
              # chmod the cert to 0644 explicitly.
              umask 077
              su-exec 70:70 openssl req \
                -x509 \
                -new \
                -nodes \
                -days "$VALIDITY_DAYS" \
                -config "$CONFIG" \
                -keyout "$KEY_FILE" \
                -out "$CERT_FILE"
              # postgres refuses to start unless ssl_key_file is owner
              # postgres + mode 0600. su-exec made the files owned by
              # uid 70; umask 077 made them 0600. Explicit chmod on the
              # cert lifts it to 0644 (world-readable certs are fine;
              # only the key needs to be owner-only).
              chmod 0600 "$KEY_FILE"
              chmod 0644 "$CERT_FILE"
              echo "[tls-cert-init] cert written: $(openssl x509 -in "$CERT_FILE" -noout -subject -dates)"
          resources:
            {{- toYaml .Values.postgres.tls.initResources | nindent 12 }}
          volumeMounts:
            - name: certs
              mountPath: /var/lib/postgresql/certs
            - name: tls-init-config
              mountPath: /etc/postgres-tls-init
              readOnly: true
            - name: tls-init-tmp
              mountPath: /tmp
      {{- end }}
      containers:
        - name: postgres
          image: "{{ .Values.postgres.image.repository }}:{{ .Values.postgres.image.tag }}"
          imagePullPolicy: {{ .Values.postgres.image.pullPolicy | default "IfNotPresent" }}
          securityContext:
            allowPrivilegeEscalation: false
            # Postgres needs writable /var/run/postgresql for the unix
            # socket; cannot run with readOnlyRootFilesystem=true. The
            # data dir is on the PVC and all caps are dropped.
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 70
            capabilities:
              drop:
                - ALL
          {{- if or .Values.postgres.auditLogging.enabled .Values.postgres.tls.enabled }}
          # Postgres -c args. The official entrypoint forwards every -c
          # pair to the `postgres` server binary unchanged, so we use
          # them for both audit-logging and TLS rather than mounting a
          # config file (which would break the readOnly/non-root posture).
          args:
            {{- if .Values.postgres.auditLogging.enabled }}
            # Database-level audit logging. log_statement=ddl records
            # every CREATE/ALTER/DROP without logging row data.
            - -c
            - log_connections={{ ternary "on" "off" .Values.postgres.auditLogging.logConnections }}
            - -c
            - log_disconnections={{ ternary "on" "off" .Values.postgres.auditLogging.logDisconnections }}
            - -c
            - log_statement={{ .Values.postgres.auditLogging.logStatement | default "ddl" }}
            - -c
            - log_line_prefix={{ .Values.postgres.auditLogging.logLinePrefix | default "%m [%p] user=%u db=%d client=%h app=%a " | quote }}
            {{- end }}
            {{- if .Values.postgres.tls.enabled }}
            # Server-side TLS. Cert + key live in the certs emptyDir,
            # populated by the tls-cert-init initContainer before this
            # container starts. The stock pg_hba.conf is `host all all
            # all scram-sha-256`, which accepts both TLS and non-TLS
            # connections; this is intentional so the postgres-exporter
            # sidecar's loopback connection (sslmode=disable) continues
            # to work. Remote clients enforce sslmode=require at their
            # end, so they always negotiate TLS.
            - -c
            - ssl=on
            - -c
            - ssl_cert_file=/var/lib/postgresql/certs/server.crt
            - -c
            - ssl_key_file=/var/lib/postgresql/certs/server.key
            {{- end }}
          {{- end }}
          ports:
            - name: postgres
              containerPort: {{ .Values.postgres.service.port | default 5432 }}
              protocol: TCP
          envFrom:
            - secretRef:
                name: {{ include "postgres.secretName" . }}
                optional: false
          env:
            # Tell Postgres to put PGDATA in a SUBDIRECTORY of the
            # mounted PVC. Mounting a PVC directly at /var/lib/postgresql/data
            # creates a `lost+found` entry on some StorageClasses
            # that Postgres refuses to initdb into. The `pgdata`
            # subdir is the standard workaround.
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          resources:
            {{- toYaml .Values.postgres.resources | nindent 12 }}
          # readiness/liveness via pg_isready against the unix socket
          # so the probe does NOT depend on TCP/auth being up.
          startupProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB" -h /var/run/postgresql
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 30
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB" -h /var/run/postgresql
            initialDelaySeconds: 0
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 4
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB" -h /var/run/postgresql
            initialDelaySeconds: 0
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            {{- if .Values.postgres.initSQL.enabled }}
            - name: init-sql
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
            {{- end }}
            {{- if .Values.postgres.tls.enabled }}
            - name: certs
              mountPath: /var/lib/postgresql/certs
              readOnly: true
            {{- end }}
        {{- if .Values.postgres.metrics.enabled }}
        # postgres-exporter sidecar. Scrapes Postgres over the in-pod
        # loopback (localhost:5432) using the SAME credentials the
        # server boots with (postgres-credentials Secret). It needs no
        # superuser: the pg_stat_* / pg_settings views it reads are
        # world-readable to the owning role. Exposes Prometheus metrics
        # on :9187 (named `metrics`), scraped by the data-layer
        # ServiceMonitor. Hardened to match the postgres posture
        # (non-root uid 70, RO-rootfs, all caps dropped).
        - name: postgres-exporter
          image: "{{ .Values.postgres.metrics.exporter.image.repository }}:{{ .Values.postgres.metrics.exporter.image.tag }}"
          imagePullPolicy: {{ .Values.postgres.metrics.exporter.image.pullPolicy | default "IfNotPresent" }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 70
            capabilities:
              drop:
                - ALL
          env:
            # DATA_SOURCE_URI is host:port/db (no scheme); user + pass
            # are passed separately so the password never appears in a
            # DSN on argv. sslmode=disable: the hop is in-pod loopback,
            # and meshed peers are mTLS'd by Linkerd, not libpq TLS.
            - name: DATA_SOURCE_URI
              value: "localhost:{{ .Values.postgres.service.port | default 5432 }}/$(POSTGRES_DB)?sslmode=disable"
            - name: DATA_SOURCE_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "postgres.secretName" . }}
                  key: POSTGRES_USER
            - name: DATA_SOURCE_PASS
              valueFrom:
                secretKeyRef:
                  name: {{ include "postgres.secretName" . }}
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: {{ include "postgres.secretName" . }}
                  key: POSTGRES_DB
          ports:
            - name: metrics
              containerPort: {{ .Values.postgres.metrics.exporter.port | default 9187 }}
              protocol: TCP
          resources:
            {{- toYaml .Values.postgres.metrics.exporter.resources | nindent 12 }}
          startupProbe:
            httpGet:
              path: /
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /
              port: metrics
            initialDelaySeconds: 0
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 4
          readinessProbe:
            httpGet:
              path: /
              port: metrics
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
        {{- end }}
      volumes:
        {{- if .Values.postgres.initSQL.enabled }}
        - name: init-sql
          configMap:
            name: {{ include "postgres.initSqlConfigMap" . }}
            defaultMode: 0444
        {{- end }}
        {{- if .Values.postgres.tls.enabled }}
        # Cert + key emptyDir. Written by tls-cert-init initContainer,
        # consumed read-only by the postgres main container.
        - name: certs
          emptyDir:
            sizeLimit: 16Mi
        # openssl.cnf for the tls-cert-init initContainer (SANs etc.).
        - name: tls-init-config
          configMap:
            name: postgres-tls-init-config
            defaultMode: 0444
        # tls-cert-init runs with readOnlyRootFilesystem=true; openssl
        # writes a few small temp files to /tmp during cert generation.
        - name: tls-init-tmp
          emptyDir:
            sizeLimit: 8Mi
        {{- end }}
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          {{- include "postgres.labels" . | nindent 10 }}
      spec:
        accessModes:
          {{- toYaml .Values.postgres.storage.accessModes | nindent 10 }}
        {{- if .Values.postgres.storage.storageClassName }}
        storageClassName: {{ .Values.postgres.storage.storageClassName | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.postgres.storage.size }}
{{- end }}
