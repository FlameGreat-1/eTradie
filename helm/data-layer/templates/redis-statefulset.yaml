{{- if .Values.redis.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: {{ include "data-layer.namespace" . }}
  labels:
    {{- include "redis.labels" . | nindent 4 }}
spec:
  serviceName: {{ .Values.redis.service.headlessName | default "redis-headless" }}
  replicas: {{ .Values.redis.replicaCount | default 1 }}
  podManagementPolicy: OrderedReady
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      {{- include "redis.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "redis.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/redis-configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/redis-externalsecret.yaml") . | sha256sum }}
        {{- with .Values.redis.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      securityContext:
        # Official redis:7-alpine runs as uid:gid 999:1000 internally.
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      {{- with .Values.redis.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.redis.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.redis.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.redis.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      # Init container materialises the runtime redis.conf by
      # concatenating the static template (from the ConfigMap) with
      # a runtime-rendered `requirepass <password>` line. This keeps
      # the password off the argv (audit ref: D-H1) and out of any
      # ConfigMap.
      initContainers:
        - name: render-redis-conf
          image: "{{ .Values.redis.image.repository }}:{{ .Values.redis.image.tag }}"
          imagePullPolicy: {{ .Values.redis.image.pullPolicy | default "IfNotPresent" }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 999
            capabilities:
              drop:
                - ALL
          command:
            - sh
            - -c
            - |
              set -eu
              cat /etc/redis-template/redis.conf > /run/redis/redis.conf
              printf 'requirepass %s\n' "$REDIS_PASSWORD" >> /run/redis/redis.conf
              chmod 0400 /run/redis/redis.conf
          envFrom:
            - secretRef:
                name: {{ include "redis.secretName" . }}
                optional: false
          volumeMounts:
            - name: config-template
              mountPath: /etc/redis-template
              readOnly: true
            - name: runtime-conf
              mountPath: /run/redis
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
      containers:
        - name: redis
          image: "{{ .Values.redis.image.repository }}:{{ .Values.redis.image.tag }}"
          imagePullPolicy: {{ .Values.redis.image.pullPolicy | default "IfNotPresent" }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 999
            capabilities:
              drop:
                - ALL
          # Password lives ONLY in the rendered conf file at
          # /run/redis/redis.conf (init container above). argv contains
          # no secret. Audit ref: D-H1.
          command:
            - redis-server
            - /run/redis/redis.conf
          ports:
            - name: redis
              containerPort: {{ .Values.redis.service.port | default 6379 }}
              protocol: TCP
          envFrom:
            - secretRef:
                name: {{ include "redis.secretName" . }}
                optional: false
          env:
            # redis-cli reads REDISCLI_AUTH env (6.2+); the probes
            # below therefore do NOT pass -a $REDIS_PASSWORD on argv.
            # Audit ref: D-H2.
            - name: REDISCLI_AUTH
              valueFrom:
                secretKeyRef:
                  name: {{ include "redis.secretName" . }}
                  key: REDIS_PASSWORD
          resources:
            {{- toYaml .Values.redis.resources | nindent 12 }}
          startupProbe:
            exec:
              command:
                - sh
                - -c
                - 'redis-cli --no-auth-warning ping | grep PONG'
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 12
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - 'redis-cli --no-auth-warning ping | grep PONG'
            initialDelaySeconds: 0
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 4
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - 'redis-cli --no-auth-warning ping | grep PONG'
            initialDelaySeconds: 0
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: data
              mountPath: /data
            - name: runtime-conf
              mountPath: /run/redis
              readOnly: true
      volumes:
        - name: config-template
          configMap:
            name: {{ include "redis.configMap" . }}
            defaultMode: 0444
        - name: runtime-conf
          emptyDir:
            sizeLimit: 64Ki
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          {{- include "redis.labels" . | nindent 10 }}
      spec:
        accessModes:
          {{- toYaml .Values.redis.storage.accessModes | nindent 10 }}
        {{- if .Values.redis.storage.storageClassName }}
        storageClassName: {{ .Values.redis.storage.storageClassName | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.redis.storage.size }}
{{- end }}
