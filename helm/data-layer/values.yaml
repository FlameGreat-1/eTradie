# Default values for the etradie-data-layer chart.
#
# This chart deploys ONE replica each of Postgres, Redis, ChromaDB as
# StatefulSets backed by PersistentVolumeClaims. It is the cheapest
# production-ready data plane.
#
# Service names are HARD-PINNED to `postgres`, `redis`, `chromadb`
# so consumers (engine, gateway, execution, management) reach them at
# their existing FQDNs without any cross-chart override.
#
# Each datastore can be disabled (enabled: false) when you migrate
# off-cluster to a managed offering (e.g. Neon for Postgres).
# Other charts continue to dial the same FQDN, so an external
# replacement only requires a CoreDNS ExternalName Service or an
# updated values.yaml in the consumer.

namespace:
  name: etradie-system
  podSecurityStandard: restricted
  # Pin the PSS rule version so a future minor K8s upgrade does not
  # silently shift the evaluated surface. Bump in lockstep with the
  # cluster's supported PSS version.
  podSecurityStandardVersion: v1.30

# ----------------------------------------------------------------------
# PostgreSQL 16 (audit + journal + analytics + auth + watcher state).
# Image and major version match docker-compose.yml exactly.
# ----------------------------------------------------------------------
postgres:
  enabled: true
  image:
    repository: postgres
    tag: "16-alpine"
    pullPolicy: IfNotPresent
  replicaCount: 1

  # Postgres user/db are non-secrets; the password lives in the Vault
  # ExternalSecret at templates/postgres-externalsecret.yaml.
  user: "etradie"
  database: "etradie"

  service:
    name: postgres        # FQDN used by every consumer chart
    headlessName: postgres-headless
    port: 5432

  storage:
    storageClassName: ""  # Empty = use cluster default StorageClass
    size: 8Gi
    accessModes:
      - ReadWriteOnce

  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

  # Tier 9 (CHECKLIST microservice security): mesh Postgres so the
  # engine<->postgres hop is mTLS'd. Postgres speaks a server-first
  # protocol on 5432, so mark it opaque: Linkerd mTLS-tunnels it as
  # raw TCP between meshed peers without HTTP detection. Audit ref:
  # Tier 9 G9-1.
  podAnnotations:
    linkerd.io/inject: enabled
    # Native sidecar for a uniform mesh and deterministic proxy-startup
    # readiness. Postgres probes are unix-socket exec, so the proxy does
    # not affect them.
    config.linkerd.io/proxy-enable-native-sidecar: "true"
    config.linkerd.io/opaque-ports: "5432"

  # Scheduling. Empty defaults so the chart deploys on any cluster.
  # Production overlay layers a `workload=etradie-system` toleration on
  # top to land postgres on the dedicated etradie-system node group.
  nodeSelector: {}
  tolerations: []
  affinity: {}
  topologySpreadConstraints: []

  # Use the same init.sql committed at docker/postgres/init.sql.
  # The chart mounts it from a ConfigMap so the same SQL runs in
  # docker-compose AND in cluster.
  initSQL:
    enabled: true

  # Database-level audit logging. Rendered as `postgres -c` args in the
  # StatefulSet (no config-file mount, so the readOnly/non-root posture
  # is preserved). log_statement=ddl records every CREATE/ALTER/DROP
  # against the money database (including the sensitive auth_users,
  # broker_connections, llm_connections and billing_* tables) without
  # logging row data; connection/disconnection lines answer "who
  # connected". Raise logStatement to 'mod' or 'all' for a forensic
  # window; set enabled=false to turn the block off entirely.
  auditLogging:
    enabled: true
    logConnections: true
    logDisconnections: true
    logStatement: "ddl"
    logLinePrefix: "%m [%p] user=%u db=%d client=%h app=%a "

  externalSecret:
    enabled: true
    secretStoreName: vault-backend
    secretStoreKind: ClusterSecretStore
    refreshInterval: 1h
    # Production Vault path. Aligns with
    # infrastructure/cluster/vault-paths/main.tf::vault_kv_secret_v2.data_layer_postgres
    # (etradie/data-layer/postgres/${environment}).
    vaultPath: etradie/data-layer/postgres/production
    creationPolicy: Owner

  # Prometheus metrics. When enabled, a postgres-exporter sidecar is
  # added to the StatefulSet (scrapes the local DB with the same
  # postgres-credentials Secret over loopback) and exposes :9187 as the
  # Service `metrics` port. The data-layer ServiceMonitor scrapes it and
  # the PrometheusRule alerts on it. The NetworkPolicy + Linkerd authz
  # admit Prometheus to :9187 automatically when this is on. Set
  # enabled=false to ship Postgres with no metrics surface.
  metrics:
    enabled: true
    exporter:
      image:
        repository: quay.io/prometheuscommunity/postgres-exporter
        tag: "v0.15.0"
        pullPolicy: IfNotPresent
      port: 9187
      resources:
        requests:
          cpu: 25m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 64Mi

  # Daily logical backup via pg_dump. Backups land on a separate
  # PVC (`postgres-backups`), retained for backup.retentionDays.
  # When backup.offsite.enabled=true an rclone step in the same
  # pod copies every fresh dump to an S3-compatible remote BEFORE
  # the retention prune runs (Audit ref: D-H3).
  backup:
    enabled: true
    schedule: "0 2 * * *"  # 02:00 UTC daily
    retentionDays: 7
    image:
      repository: postgres
      tag: "16-alpine"
      pullPolicy: IfNotPresent
    storage:
      storageClassName: ""
      size: 16Gi
      accessModes:
        - ReadWriteOnce
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi
    # ------------------------------------------------------------------
    # Off-cluster copy (Audit ref: D-H3).
    #
    # When offsite.enabled=true the CronJob's pod adds a second
    # container `offsite-upload` running rclone that uploads every
    # freshly written dump to an S3-compatible remote AFTER pg_dump
    # completes and BEFORE retention prune.
    #
    # OPERATOR PREREQUISITES (cannot be automated by the chart):
    #   1. Create the bucket on the chosen provider with:
    #      - object-lock or immutability matching retentionDays + grace
    #      - lifecycle rule mirroring retentionDays so the remote does
    #        not grow forever (rclone does not enforce retention).
    #      - server-side encryption enabled.
    #   2. Populate the Vault path under offsite.vaultPath with FOUR
    #      keys:
    #        rclone_remote_name   e.g. "b2-prod"
    #        rclone_config        full rclone.conf body (multi-line). See
    #                             https://rclone.org/docs/#config-file for
    #                             the syntax; supports b2/s3/r2/wasabi/etc.
    #        remote_bucket        e.g. "etradie-prod-postgres-backups"
    #        remote_path_prefix   e.g. "production/" (trailing slash)
    #   3. Test the upload path manually on staging first.
    #
    # provider is informational only — the actual provider is encoded
    # in the rclone_config body in Vault; this field exists so the
    # chart can render a sane log line. Default "b2" (Backblaze B2 —
    # cheapest egress-free option for restores at this scale). Set to
    # "s3", "r2", "wasabi", "minio", or any rclone provider name as
    # documentation for the operator reading values.yaml.
    offsite:
      enabled: false
      provider: "b2"
      image:
        repository: rclone/rclone
        tag: "1.65.0"
        pullPolicy: IfNotPresent
      # When enabled the chart renders the
      # postgres-backup-credentials Secret from this Vault path.
      vaultPath: etradie/data-layer/postgres-backup/production
      externalSecret:
        secretStoreName: vault-backend
        secretStoreKind: ClusterSecretStore
        refreshInterval: 1h
        creationPolicy: Owner
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 256Mi
      # Soft cap on how long rclone is allowed to run. rclone exits
      # 0 on success; the backup container only deletes old dumps
      # after the upload-ready flag is observed.
      uploadTimeoutSeconds: 1800

  # Restore drill (proves backups are restorable). Restores the latest
  # local dump into a throwaway scratch database, runs an integrity
  # check, then drops the scratch database. Never touches the live
  # database. Disabled by default so a bare render / dev install does
  # not schedule it; the production overlay enables it weekly.
  restoreDrill:
    enabled: false
    schedule: "0 3 * * 1"  # Mondays 03:00 UTC, after the 02:00 backup
    scratchDatabase: "etradie_restore_drill"
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi

# ----------------------------------------------------------------------
# Redis 7 (shared alert hub + execution/management transport).
# Single replica with AOF disabled (matches docker-compose.yml command).
# ----------------------------------------------------------------------
redis:
  enabled: true
  image:
    repository: redis
    tag: "7-alpine"
    pullPolicy: IfNotPresent
  replicaCount: 1

  service:
    name: redis
    headlessName: redis-headless
    port: 6379

  storage:
    storageClassName: ""
    size: 2Gi
    accessModes:
      - ReadWriteOnce

  # Redis runtime tuning (matches docker-compose.yml).
  maxmemory: "512mb"
  maxmemoryPolicy: "allkeys-lru"
  appendOnly: "no"   # No AOF persistence; LRU cache + RDB snapshots
  saveSchedule: ""   # Empty = no RDB schedule; matches compose --save ""

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 768Mi

  # Tier 9 (CHECKLIST microservice security): mesh Redis so the
  # engine/execution/management <-> redis hops are mTLS'd. RESP is a
  # server-first protocol on 6379, so mark it opaque (raw-TCP mTLS
  # tunnel, no HTTP detection). Audit ref: Tier 9 G9-1.
  podAnnotations:
    linkerd.io/inject: enabled
    # Native sidecar for a uniform mesh. Redis probes are unix-socket
    # exec, so the proxy does not affect them.
    config.linkerd.io/proxy-enable-native-sidecar: "true"
    config.linkerd.io/opaque-ports: "6379"

  # Scheduling. Empty defaults; production overlay sets a toleration
  # for the etradie-system taint.
  nodeSelector: {}
  tolerations: []
  affinity: {}
  topologySpreadConstraints: []

  externalSecret:
    enabled: true
    secretStoreName: vault-backend
    secretStoreKind: ClusterSecretStore
    refreshInterval: 1h
    vaultPath: etradie/data-layer/redis/production
    creationPolicy: Owner

  # Prometheus metrics. When enabled, a redis-exporter sidecar is added
  # to the StatefulSet (authenticated with the redis-credentials Secret
  # over loopback) and exposes :9121 as the Service `metrics` port. The
  # data-layer ServiceMonitor scrapes it and the PrometheusRule alerts
  # on it; the NetworkPolicy + Linkerd authz admit Prometheus to :9121.
  metrics:
    enabled: true
    exporter:
      image:
        repository: oliver006/redis_exporter
        tag: "v1.62.0-alpine"
        pullPolicy: IfNotPresent
      port: 9121
      resources:
        requests:
          cpu: 25m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 64Mi

# ----------------------------------------------------------------------
# ChromaDB (RAG vector store).
# ----------------------------------------------------------------------
chromadb:
  enabled: true
  image:
    repository: chromadb/chroma
    tag: "0.5.20"        # Pin a real version for reproducibility;
    pullPolicy: IfNotPresent
  replicaCount: 1

  service:
    name: chromadb
    headlessName: chromadb-headless
    port: 8000

  storage:
    storageClassName: ""
    size: 8Gi
    accessModes:
      - ReadWriteOnce

  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

  # Tier 9 (CHECKLIST microservice security): mesh ChromaDB so the
  # engine <-> chroma hop is mTLS'd. Chroma speaks HTTP on :8000, so
  # the proxy handles it natively — inject only, no opaque-ports.
  # Audit ref: Tier 9 G9-1.
  podAnnotations:
    linkerd.io/inject: enabled
    # Native sidecar for a uniform mesh. ChromaDB's HTTP
    # /api/v2/heartbeat probe is rewritten by Linkerd to bypass the
    # proxy, so readiness is unaffected.
    config.linkerd.io/proxy-enable-native-sidecar: "true"

  # Scheduling. Empty defaults; production overlay sets a toleration
  # for the etradie-system taint.
  nodeSelector: {}
  tolerations: []
  affinity: {}
  topologySpreadConstraints: []

  externalSecret:
    enabled: true
    secretStoreName: vault-backend
    secretStoreKind: ClusterSecretStore
    refreshInterval: 1h
    vaultPath: etradie/data-layer/chromadb/production
    creationPolicy: Owner

# ----------------------------------------------------------------------
# Namespace-wide ResourceQuota + LimitRange. The data-layer chart is
# the SINGLE owner of the etradie-system namespace (see namespace.yaml).
# These two governance objects apply to every workload in the
# namespace: engine, gateway, billing, execution, management.
# Audit ref: G-C1, X-2, B-M4.
# ----------------------------------------------------------------------
resourceQuota:
  enabled: true
  hard:
    # Sized for the staging baseline. Production overlay raises every
    # value. Sum of: data-layer (postgres + redis + chromadb) +
    # 5 services at staging-baseline (engine/gateway/billing/execution/management).
    requestsCpu: "8"
    requestsMemory: "16Gi"
    limitsCpu: "16"
    limitsMemory: "32Gi"
    # PVCs: postgres data + postgres-backups + redis + chromadb = 4 max.
    # 20 leaves headroom for any future stateful workload in the namespace.
    persistentvolumeclaims: "20"
    # No public LoadBalancer or NodePort in this namespace; edge-ingress
    # is in a separate namespace.
    servicesLoadbalancers: "0"
    servicesNodeports: "0"

limitRange:
  enabled: true
  container:
    max:
      cpu: "4"
      memory: "8Gi"
    min:
      cpu: "50m"
      memory: "64Mi"
    default:
      cpu: "1"
      memory: "2Gi"
    defaultRequest:
      cpu: "250m"
      memory: "512Mi"

# ----------------------------------------------------------------------
# Prometheus Operator integration for the data plane.
#
# serviceMonitor renders one ServiceMonitor per datastore that ships an
# exporter (postgres :9187, redis :9121); chromadb has no exporter and
# is covered by up/kube-state in the rule. prometheusRule renders the
# data-layer alert groups. Both are selected by the operator via the
# `prometheus: kube-prometheus` label (mirroring every service chart);
# the rule additionally carries `role: alert-rules` for the operator
# ruleSelector. Set enabled=false on a cluster with no Prometheus
# Operator to skip the CRDs.
# ----------------------------------------------------------------------
serviceMonitor:
  enabled: true
  interval: 30s
  scrapeTimeout: 10s
  labels:
    prometheus: kube-prometheus
  metricRelabelDropPrefixes:
    - go_
    - process_
    - promhttp_

prometheusRule:
  enabled: true
  labels:
    prometheus: kube-prometheus
    role: alert-rules

# ----------------------------------------------------------------------
# NetworkPolicy: every datastore here only accepts ingress from the
# pods that actually need it (selected by app.kubernetes.io/name) and
# only emits cluster-DNS egress. The chart's per-datastore NetworkPolicy
# is rendered in templates/networkpolicy.yaml.
# ----------------------------------------------------------------------
networkPolicy:
  enabled: true

# Tier 9 G9-2: per-datastore Linkerd authorization. Default FALSE; the
# production overlay enables it after staging confirms 100% mTLS.
# Caller SAs are the meshed services that each datastore's NetworkPolicy
# already admits; the postgres-backup pod is UN-meshed (a meshed Job
# never terminates) and is admitted via a same-namespace
# NetworkAuthentication so nightly pg_dump backups keep working.
linkerdPolicy:
  enabled: false
  # Meshed caller ServiceAccounts (all etradie-system).
  postgresCallers:
    - etradie-gateway
    - etradie-execution
    - etradie-management
    - etradie-engine
    - etradie-billing
  redisCallers:
    - etradie-gateway
    - etradie-execution
    - etradie-management
    - etradie-engine
    - etradie-billing
  chromadbCallers:
    - etradie-engine

# ----------------------------------------------------------------------
# PodDisruptionBudgets are NOT useful at single-replica scale (they
# would block voluntary evictions and keep a node draining forever).
# Scale-out scenarios should use replicated Postgres / Redis Sentinel
# / ChromaDB sharding which is out of scope for this chart.
# ----------------------------------------------------------------------
podDisruptionBudget:
  enabled: false
