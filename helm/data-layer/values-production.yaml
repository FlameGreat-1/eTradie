# Production overlay for the etradie-data-layer chart.
# Cloud-agnostic: relies only on the cluster's default StorageClass.
#
# To use a specific StorageClass (e.g. Longhorn on Contabo K3s,
# OCI Block Volume on OKE, or Local Path Provisioner) override
# postgres.storage.storageClassName / redis.storage.storageClassName /
# chromadb.storage.storageClassName here.
#
# Production schedules every data-layer pod on the dedicated
# etradie-system node group (taint workload=etradie-system:NoSchedule,
# applied by
# infrastructure/cluster/main.tf::eks_managed_node_groups.etradie_system).
# Without the per-datastore toleration below, pods land on the untainted
# `system` add-on pool which is sized for cluster controllers only and
# cannot fit the data-plane.
#
# Cloud-agnostic: a toleration without a matching taint is a no-op, so
# this is safe on Contabo K3s, OCI OKE, Talos, or any cluster that does
# not taint nodes.

# Per-datastore Linkerd authorization (Server + AuthorizationPolicy).
# Kept disabled until the mesh is confirmed; enable deliberately (set
# true + re-sync) once `linkerd viz edges` shows SECURED on every
# data-layer edge (docs/runbooks/tier9-linkerd-mesh-rollout.md step 4).
linkerdPolicy:
  enabled: false

postgres:
  storage:
    size: 32Gi
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 2Gi
  externalSecret:
    vaultPath: etradie/data-layer/postgres/production
    refreshInterval: 1h
  backup:
    enabled: true
    schedule: "0 2 * * *"
    retentionDays: 30
    storage:
      size: 64Gi
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        cpu: "1"
        memory: 512Mi
    # Off-cluster backup copy (Audit ref: D-H3). Operator MUST
    # populate etradie/data-layer/postgres-backup/production in
    # Vault with rclone_remote_name / rclone_config / remote_bucket
    # / remote_path_prefix BEFORE the next 02:00 UTC run, otherwise
    # the ExternalSecret will fail to materialise and the CronJob
    # pod will refuse to start. See helm/data-layer/values.yaml
    # postgres.backup.offsite for the full operator runbook.
    offsite:
      enabled: true
      provider: "b2"
      vaultPath: etradie/data-layer/postgres-backup/production
  tolerations:
    - key: workload
      operator: Equal
      value: etradie-system
      effect: NoSchedule

redis:
  storage:
    size: 8Gi
  maxmemory: "1gb"
  resources:
    requests:
      cpu: 250m
      memory: 768Mi
    limits:
      cpu: "1"
      memory: 1536Mi
  externalSecret:
    vaultPath: etradie/data-layer/redis/production
    refreshInterval: 1h
  tolerations:
    - key: workload
      operator: Equal
      value: etradie-system
      effect: NoSchedule

chromadb:
  storage:
    size: 32Gi
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 2Gi
  externalSecret:
    vaultPath: etradie/data-layer/chromadb/production
    refreshInterval: 1h
  tolerations:
    - key: workload
      operator: Equal
      value: etradie-system
      effect: NoSchedule

# Namespace-wide ResourceQuota + LimitRange sizing for production.
# Sum across data-layer (postgres + redis + chromadb) + 5 services at
# their production replicaCount * resources.limits.
resourceQuota:
  enabled: true
  hard:
    requestsCpu: "32"
    requestsMemory: "64Gi"
    limitsCpu: "64"
    limitsMemory: "128Gi"
    persistentvolumeclaims: "20"
    servicesLoadbalancers: "0"
    servicesNodeports: "0"
