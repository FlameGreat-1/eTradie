# Production overlay for the etradie-data-layer chart.
#
# TABLE 2B profile (BUDGET.md): single-node Contabo 8 vCPU / 24GB /
# 200GB, full stack ON. Cloud-agnostic: relies only on the cluster's
# default StorageClass.
#
# Encryption at rest (production requirement): every datastore MUST
# bind to a StorageClass whose volumes are encrypted at rest. The class
# NAME is provider-specific (Contabo K3s: a LUKS-backed class or an
# encryption-enabled Longhorn class). Left empty it falls back to the
# cluster default class; verify that default is encrypted using the
# per-provider step in the restore-drill runbook.
#
# Disk budget (BUDGET.md TABLE 2B): postgres 16Gi + backup 16Gi +
# chromadb 16Gi + redis 8Gi fits the 200GB box alongside Loki 20Gi,
# Prometheus ~20Gi, Vault 10Gi and per-user MT PVCs.
#
# The workload=etradie-system tolerations are retained: a toleration
# without a matching taint is a no-op on the untainted single-node K3s
# box, and they become effective again on a future tainted multi-node
# cluster without another edit.

# Per-datastore Linkerd authorization stays disabled until the mesh is
# confirmed (docs/runbooks/linkerd-mesh-rollout.md step 4). The mesh
# itself is ON; this is only the per-service authz layer.
linkerdPolicy:
  enabled: false

postgres:
  storage:
    size: 16Gi
    # storageClassName: "<encrypted-class>"  # operator-set; see note above
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 2Gi
  externalSecret:
    vaultPath: etradie/data-layer/postgres/production
    refreshInterval: 1h
  backup:
    enabled: true
    schedule: "0 2 * * *"
    retentionDays: 7
    storage:
      # Local staging area only: dumps are uploaded offsite (B2) by the
      # same pod before the retention prune. 16Gi holds 7 days of dumps
      # for a 16Gi database with compression headroom; the durable copy
      # lives offsite, NOT on this PVC.
      size: 16Gi
      # storageClassName: "<encrypted-class>"  # operator-set; the local
      # dump holds the same data as the live volume and must be
      # encrypted at rest.
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        cpu: "1"
        memory: 512Mi
    # Off-cluster backup copy (Audit ref: D-H3). Operator MUST populate
    # etradie/data-layer/postgres-backup/production in Vault with
    # rclone_remote_name / rclone_config / remote_bucket /
    # remote_path_prefix BEFORE the next 02:00 UTC run.
    offsite:
      enabled: true
      provider: "b2"
      vaultPath: etradie/data-layer/postgres-backup/production
  # Prove backups are restorable on a weekly cadence in production.
  restoreDrill:
    enabled: true
  tolerations:
    - key: workload
      operator: Equal
      value: etradie-system
      effect: NoSchedule

redis:
  storage:
    size: 8Gi
    # storageClassName: "<encrypted-class>"  # operator-set; see note above
  # ~50% of the 1Gi container limit so RESP buffers + fork overhead
  # never push the process past the cgroup ceiling (the previous 1gb
  # maxmemory only made sense against the old 1536Mi limit).
  maxmemory: "512mb"
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  externalSecret:
    vaultPath: etradie/data-layer/redis/production
    refreshInterval: 1h
  tolerations:
    - key: workload
      operator: Equal
      value: etradie-system
      effect: NoSchedule

chromadb:
  storage:
    size: 16Gi
    # storageClassName: "<encrypted-class>"  # operator-set; see note above
  resources:
    requests:
      cpu: 300m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  externalSecret:
    vaultPath: etradie/data-layer/chromadb/production
    refreshInterval: 1h
  tolerations:
    - key: workload
      operator: Equal
      value: etradie-system
      effect: NoSchedule

# Namespace-wide ResourceQuota for the TABLE 2B single-node profile.
# Envelope: data-layer (pg + redis + chroma + 2 exporter sidecars) +
# 5 services at 1 replica + Linkerd proxy sidecars + per-tenant mt-node
# pods (0.70 CPU / 1.19Gi each, Burstable). Requests headroom covers
# ~3 MT tenants plus rollout surge; raise requestsCpu/requestsMemory in
# lockstep with real tenant growth (and with BUDGET.md TABLE 2B).
resourceQuota:
  enabled: true
  hard:
    requestsCpu: "8"
    requestsMemory: "16Gi"
    limitsCpu: "24"
    limitsMemory: "40Gi"
    persistentvolumeclaims: "20"
    servicesLoadbalancers: "0"
    servicesNodeports: "0"
