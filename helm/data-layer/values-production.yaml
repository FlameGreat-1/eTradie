# Production overlay for the etradie-data-layer chart.
# Cloud-agnostic: relies only on the cluster's default StorageClass.
#
# To use a specific StorageClass (e.g. Longhorn on Contabo K3s,
# OCI Block Volume on OKE, or Local Path Provisioner) override
# postgres.storage.storageClassName / redis.storage.storageClassName /
# chromadb.storage.storageClassName here.

postgres:
  storage:
    size: 32Gi
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 2Gi
  externalSecret:
    vaultPath: etradie/data-layer/postgres/production
    refreshInterval: 1h
  backup:
    enabled: true
    schedule: "0 2 * * *"
    retentionDays: 30
    storage:
      size: 64Gi
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        cpu: "1"
        memory: 512Mi

redis:
  storage:
    size: 8Gi
  maxmemory: "1gb"
  resources:
    requests:
      cpu: 250m
      memory: 768Mi
    limits:
      cpu: "1"
      memory: 1536Mi
  externalSecret:
    vaultPath: etradie/data-layer/redis/production
    refreshInterval: 1h

chromadb:
  storage:
    size: 32Gi
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 2Gi
  externalSecret:
    vaultPath: etradie/data-layer/chromadb/production
    refreshInterval: 1h

# Production schedules data-layer pods on the dedicated etradie-system
# node group (taint workload=etradie-system:NoSchedule, applied by
# infrastructure/cluster/main.tf::eks_managed_node_groups.etradie_system).
# Without this toleration, pods land on the untainted `system` add-on
# pool which is sized only for cluster controllers and cannot fit the
# data-plane.
#
# Cloud-agnostic: a toleration without a matching taint is a no-op,
# so this is safe on Contabo K3s, OCI OKE, Talos, or any cluster that
# does not taint nodes.
tolerations:
  - key: workload
    operator: Equal
    value: etradie-system
    effect: NoSchedule
