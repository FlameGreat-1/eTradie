# Development overrides — hot reload, volume mounts, debug ports
services:
  engine:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    volumes:
      - ./src:/app/src:ro
      - ./tests:/app/tests:ro
      - ./pyproject.toml:/app/pyproject.toml:ro
      - ./model_cache:/home/etradie/.cache
    environment:
      APP_ENV: development
      APP_DEBUG: "true"
      APP_LOG_LEVEL: DEBUG
      HF_HOME: /home/etradie/.cache/huggingface
    command: >
      uvicorn engine.main:create_app
      --factory
      --host 0.0.0.0
      --port 8000
      --reload
      --reload-dir /app/src
