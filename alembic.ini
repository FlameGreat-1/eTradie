[alembic]
script_location = src/engine/shared/db/migrations
prepend_sys_path = .
# sqlalchemy.url is INTENTIONALLY EMPTY. env.py overrides it with
# engine.config.Settings.async_database_url before any migration runs.
# Shipping a placeholder URL here was a code smell and would let a
# misconfigured invocation outside the env.py path attempt to connect
# to fake credentials. Audit ref: AL-C1.
sqlalchemy.url =://etradie:etradie_dev@localhost:5432/etradie

[post_write_hooks]
hooks = ruff
ruff.type = exec
ruff.executable = ruff
ruff.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
